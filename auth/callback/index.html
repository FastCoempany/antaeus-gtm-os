<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signing you in...</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/analytics-site-config.js"></script>
    <script src="../../js/analytics.js"></script>
    <script src="../../js/auth-ui.js"></script>

    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        padding: 40px;
        background: #0b1220;
        color: #e5e7eb;
      }
      .box {
        max-width: 560px;
      }
      .muted {
        opacity: 0.7;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h1>Finishing sign-in...</h1>
      <p class="muted">
        If this takes more than a couple seconds, we will bounce you to login.
      </p>
    </div>

    <script src="../../js/onboarding.js"></script>
    <script>
      (async function () {
        try {
          if (!window.supabase || !window.supabase.createClient || !window.initSupabase) {
            document.querySelector('.muted').textContent = 'Unable to connect. Check your internet and try again.';
            setTimeout(function () { window.location.replace('/login.html'); }, 2000);
            return;
          }

          window.initSupabase();

          const timeoutMs = 8000;
          const start = Date.now();
          let session = null;

          while (!session && Date.now() - start < timeoutMs) {
            session = await window.auth.getSession();
            if (!session) await new Promise(function (r) { setTimeout(r, 200); });
          }

          if (session) {
            if (typeof window.resolvePostAuthRoute === 'function') {
              window.location.replace(await window.resolvePostAuthRoute(session, { force: true }));
            } else if (window.gtmOnboarding && !window.gtmOnboarding.isCompleted()) {
              window.location.replace('/app/onboarding/');
            } else {
              window.location.replace('/app/dashboard/');
            }
            return;
          }

          var params = new URLSearchParams(window.location.search || '');
          var rawError = params.get('error_description') || params.get('error') || '';
          var normalized = window.gtmAuthUi ? window.gtmAuthUi.normalizeError(rawError, 'callback') : { message: 'Something went wrong. Return to login.' };
          document.querySelector('.muted').textContent = normalized.message;
          setTimeout(function () { window.location.replace('/login.html'); }, 1500);
        } catch (e) {
          console.error('Auth callback error:', e);
          var normalized = window.gtmAuthUi ? window.gtmAuthUi.normalizeError(e, 'callback') : { message: 'Something went wrong. Return to login.' };
          document.querySelector('.muted').textContent = normalized.message;
          setTimeout(function () { window.location.replace('/login.html'); }, 1500);
        }
      })();
    </script>
  </body>
</html>
