<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finishing Sign-In - Antaeus GTM OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/analytics-site-config.js"></script>
    <script src="../../js/analytics.js"></script>
    <script src="../../js/auth-ui.js"></script>
  </head>

  <body class="auth-page">
    <div class="auth-status-shell">
      <section class="auth-status-card">
        <div class="auth-kicker">Auth callback</div>
        <h1 class="auth-status-title">Finishing sign-in.</h1>
        <p class="auth-status-copy">
          This handoff should be brief. If the session resolves cleanly, Antaeus routes you into the right post-auth surface. If it fails, the page should tell you plainly and return you to login.
        </p>
        <div class="auth-status-line" id="callbackStatusLine">
          Verifying the current session and resolving the post-auth route now.
        </div>
      </section>
    </div>

    <script src="../../js/onboarding.js"></script>
    <script>
      (async function () {
        try {
          var statusLine = document.getElementById('callbackStatusLine');

          if (!window.supabase || !window.supabase.createClient || !window.initSupabase) {
            statusLine.textContent = 'Unable to connect. Check your internet and try again. Returning you to login.';
            setTimeout(function () { window.location.replace('/login.html'); }, 2000);
            return;
          }

          window.initSupabase();

          const timeoutMs = 8000;
          const start = Date.now();
          let session = null;

          while (!session && Date.now() - start < timeoutMs) {
            session = await window.auth.getSession();
            if (!session) await new Promise(function (r) { setTimeout(r, 200); });
          }

          if (session) {
            if (typeof window.resolvePostAuthRoute === 'function') {
              window.location.replace(await window.resolvePostAuthRoute(session, { force: true }));
            } else if (window.gtmOnboarding && !window.gtmOnboarding.isCompleted()) {
              window.location.replace('/app/onboarding/');
            } else {
              window.location.replace('/app/dashboard/');
            }
            return;
          }

          var params = new URLSearchParams(window.location.search || '');
          var rawError = params.get('error_description') || params.get('error') || '';
          var normalized = window.gtmAuthUi ? window.gtmAuthUi.normalizeError(rawError, 'callback') : { message: 'Something went wrong. Return to login.' };
          statusLine.textContent = normalized.message;
          setTimeout(function () { window.location.replace('/login.html'); }, 1500);
        } catch (e) {
          console.error('Auth callback error:', e);
          var normalized = window.gtmAuthUi ? window.gtmAuthUi.normalizeError(e, 'callback') : { message: 'Something went wrong. Return to login.' };
          document.getElementById('callbackStatusLine').textContent = normalized.message;
          setTimeout(function () { window.location.replace('/login.html'); }, 1500);
        }
      })();
    </script>
  </body>
</html>
