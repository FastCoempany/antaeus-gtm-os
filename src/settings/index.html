<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Antaeus GTM OS</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
    <link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../lib/wordmark.css">
    <link rel="stylesheet" href="./settings.css">
</head>
<body>
    <div id="app"></div>
    <!--
        Load the demo-storage bootstrap before the main module so all
        gtmos_* localStorage reads/writes route through the demo
        namespace when sessionStorage.gtmos_env_mode === "demo".
        Without this the Preact Settings room would operate on raw
        localStorage keys while the legacy app expected
        gtmos_demo__-prefixed keys; "Clear local data" could then
        delete sibling demo-workspace data, and the demo card would
        report "Off" even when demo mode is active.
    -->
    <script src="/js/demo-storage-bootstrap.js"></script>
    <script type="module" src="./main.tsx"></script>
</body>
</html>
