<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Signal Console | Antaeus GTM OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>

.sc-root *,.sc-root *::before,.sc-root *::after{box-sizing:border-box;margin:0;padding:0}
.sc-root{
--bg:#06080c;--bg2:#0a0d14;--surf:#0f131c;--surf2:#141924;--surf3:#1a2030;--surf4:#212838;
--bdr:rgba(255,255,255,.05);--bdr2:rgba(255,255,255,.09);--bdr3:rgba(255,255,255,.14);
--tx:#cdd1da;--tx2:#8a90a0;--tx3:#555b6e;--tx4:#3a3f4e;
--gold:#cfa33a;--gold2:rgba(207,163,58,.14);--gold3:rgba(207,163,58,.06);
--blue:#4d9cf0;--blue2:rgba(77,156,240,.12);
--green:#38c97a;--green2:rgba(56,201,122,.12);
--red:#e85454;--red2:rgba(232,84,84,.12);
--amber:#e0a030;--amber2:rgba(224,160,48,.12);
--purple:#9b7cf0;--purple2:rgba(155,124,240,.12);
--cyan:#40c8d0;--cyan2:rgba(64,200,208,.12);
--brig:'Bricolage Grotesque',system-ui,sans-serif;
--mono:'IBM Plex Mono','Courier New',monospace;
--r:5px;--r2:8px;--r3:12px;
}
.sc-root{font-size:13.5px;scroll-behavior:smooth}
.sc-root{font-family:var(--brig);background:var(--bg);color:var(--tx);min-height:100%;line-height:1.5;-webkit-font-smoothing:antialiased}
.sc-root a{color:var(--blue);text-decoration:none}.sc-root a:hover{text-decoration:underline}
.sc-root ::-webkit-scrollbar{width:4px;height:4px}.sc-root ::-webkit-scrollbar-track{background:transparent}.sc-root ::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
.sc-root input,.sc-root select,.sc-root textarea,.sc-root button{font-family:inherit}

/* ── TOP BAR ── */
.sc-root .top{position:sticky;top:var(--signal-shell-offset,0px);z-index:38;background:rgba(6,8,12,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;padding:10px 20px;min-height:52px;flex-wrap:wrap}
.sc-root .top-search{flex:1 1 280px;max-width:360px;position:relative}
.sc-root .top-search input{width:100%;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:6px 10px 6px 28px;font-size:.8rem;color:var(--tx);outline:none;transition:border .15s}
.sc-root .top-search input:focus{border-color:var(--gold)}
.sc-root .top-search::before{content:'⌕';position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:.85rem;color:var(--tx3)}
.sc-root .top-stats{display:flex;gap:14px;font-family:var(--mono);font-size:.65rem;color:var(--tx3);margin-left:auto;flex-shrink:0;flex-wrap:wrap}
.sc-root .top-stats b{color:var(--tx2);font-weight:500}
.sc-root .top-credits{font-family:var(--mono);font-size:.6rem;padding:3px 8px;border-radius:20px;background:var(--surf2);border:1px solid var(--bdr);color:var(--tx3)}
.sc-root .top-actions{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
.signal-first-fold{margin:0 20px 14px;padding:14px 16px 6px;border:1px solid rgba(255,255,255,.06);border-radius:16px;background:linear-gradient(180deg,rgba(15,19,28,.94) 0%,rgba(10,13,20,.98) 100%);box-shadow:0 22px 48px rgba(0,0,0,.18)}
.signal-shell-band{padding:0;background:none;}
.signal-shell-band .shell-command-band{margin:0;}

.sc-root .btn{font-family:var(--brig);font-size:.74rem;font-weight:500;padding:5px 12px;border-radius:var(--r);border:1px solid var(--bdr2);background:var(--surf2);color:var(--tx2);cursor:pointer;transition:all .12s;white-space:nowrap}
.sc-root .btn:hover{background:var(--surf3);color:var(--tx);border-color:var(--bdr3)}
.sc-root .btn-gold{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:600}.sc-root .btn-gold:hover{filter:brightness(1.1)}
.sc-root .btn-sm{padding:3px 8px;font-size:.68rem}
.sc-root .btn-red{border-color:rgba(232,84,84,.3);color:var(--red)}.sc-root .btn-red:hover{background:var(--red2)}
.sc-root .btn-icon{width:28px;height:28px;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:.85rem;border-radius:50%}

/* ── MORNING BRIEF ── */
.sc-root .morning{background:linear-gradient(135deg,rgba(207,163,58,.06),rgba(77,156,240,.04));border:1px solid var(--gold2);border-radius:var(--r2);margin:14px 0 0;padding:16px 20px;display:none}
.sc-root .morning.show{display:block;animation:fadeIn .4s ease}
.sc-root .morning-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sc-root .morning-title{font-family:var(--mono);font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);font-weight:600}
.sc-root .morning-dismiss{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:.85rem;padding:2px 6px;border-radius:var(--r)}
.sc-root .morning-dismiss:hover{color:var(--tx2);background:var(--surf2)}
.sc-root .morning-items{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px}
.sc-root .morning-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px;display:flex;gap:10px;align-items:flex-start}
.sc-root .morning-heat{font-family:var(--mono);font-size:.75rem;font-weight:600;min-width:28px;height:28px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sc-root .morning-info{flex:1;min-width:0}
.sc-root .morning-name{font-weight:600;font-size:.82rem}
.sc-root .morning-sig{font-size:.72rem;color:var(--tx2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-root .morning-prep{font-size:.68rem;margin-top:4px}

/* ── CONTROLS BAR ── */
.sc-root .controls{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:12px 4px 10px;border-bottom:1px solid var(--bdr)}
.sc-root .mode-group{display:flex;gap:0;border:1px solid var(--bdr2);border-radius:var(--r);overflow:hidden}
.sc-root .mode-btn{font-size:.7rem;font-weight:500;padding:5px 14px;background:var(--surf);color:var(--tx3);cursor:pointer;border:none;border-right:1px solid var(--bdr);transition:all .12s}
.sc-root .mode-btn:last-child{border-right:none}
.sc-root .mode-btn:hover{color:var(--tx2);background:var(--surf2)}
.sc-root .mode-btn.active{background:var(--gold2);color:var(--gold);font-weight:600}
.sc-root .filter-sep{width:1px;height:20px;background:var(--bdr);margin:0 4px}
.sc-root .chip{font-family:var(--mono);font-size:.62rem;padding:4px 10px;border-radius:16px;border:1px solid var(--bdr);background:transparent;color:var(--tx3);cursor:pointer;transition:all .12s;white-space:nowrap}
.sc-root .chip:hover{border-color:var(--tx3);color:var(--tx2)}
.sc-root .chip.on{background:var(--gold2);border-color:rgba(207,163,58,.3);color:var(--gold)}
.sc-root .chip b{font-weight:600;margin-left:3px}

/* ── SCORE LEGEND ── */
.sc-root .legend{display:flex;gap:16px;padding:8px 4px 2px;border-bottom:0;font-family:var(--mono);font-size:.6rem;color:var(--tx3);flex-wrap:wrap;align-items:center}
.sc-root .legend-label{font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--tx4)}
.sc-root .legend span{display:flex;align-items:center;gap:4px}
.sc-root .legend .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── MAIN ── */
.sc-root .main{padding:6px 20px 60px;position:relative;z-index:1}
.sc-root .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:10px}

/* ── ACCOUNT CARDS ── */
.sc-root .card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden;transition:all .18s;cursor:pointer;animation:cardUp .35s ease both}
.sc-root .card:hover{border-color:var(--bdr2);box-shadow:0 4px 24px rgba(0,0,0,.25)}
.sc-root .card.open{grid-column:1/-1;cursor:default;border-color:rgba(207,163,58,.15)}
@keyframes cardUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.sc-root .card-head{display:flex;gap:12px;padding:14px 16px;align-items:flex-start}
.sc-root .heat{width:38px;height:38px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.8rem;font-weight:600;flex-shrink:0}
.sc-root .h-hot{background:var(--red2);color:var(--red);border:1px solid rgba(232,84,84,.2)}
.sc-root .h-warm{background:var(--amber2);color:var(--amber);border:1px solid rgba(224,160,48,.2)}
.sc-root .h-med{background:var(--blue2);color:var(--blue);border:1px solid rgba(77,156,240,.2)}
.sc-root .h-cool{background:rgba(255,255,255,.03);color:var(--tx3);border:1px solid var(--bdr)}
.sc-root .card-info{flex:1;min-width:0}
.sc-root .card-name{font-size:.95rem;font-weight:600;display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
.sc-root .card-ticker{font-family:var(--mono);font-size:.65rem;color:var(--tx3);font-weight:500}
.sc-root .fortune-badge{font-family:var(--mono);font-size:.55rem;padding:1px 5px;border-radius:3px;background:var(--gold2);color:var(--gold);border:1px solid rgba(207,163,58,.2)}
.sc-root .card-meta{font-size:.72rem;color:var(--tx3);margin-top:1px}
.sc-root .card-guidance{padding:0 16px 12px;display:grid;gap:8px}
.sc-root .card-guidance-row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.sc-root .card-status{font-family:var(--mono);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;padding:4px 8px;border-radius:999px;border:1px solid var(--bdr2)}
.sc-root .card-status.ok{color:var(--green);background:var(--green2);border-color:rgba(56,201,122,.22)}
.sc-root .card-status.warn{color:var(--amber);background:var(--amber2);border-color:rgba(224,160,48,.22)}
.sc-root .card-status.error{color:var(--red);background:var(--red2);border-color:rgba(232,84,84,.22)}
.sc-root .card-status.progress{color:var(--purple);background:var(--purple2);border-color:rgba(155,124,240,.22)}
.sc-root .card-scoreline{font-family:var(--mono);font-size:.62rem;color:var(--tx3)}
.sc-root .card-guidance-note{font-size:.7rem;color:var(--tx2);line-height:1.45}
.sc-root .card-next{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px}
.sc-root .card-next-copy{flex:1;min-width:200px}
.sc-root .card-next-label{display:block;font-family:var(--mono);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.sc-root .card-next-title{font-size:.78rem;font-weight:600;color:var(--tx);line-height:1.35}
.sc-root .card-next-reason{font-size:.68rem;color:var(--tx3);margin-top:4px;line-height:1.45}
.sc-root .card-pills{display:flex;gap:4px;flex-wrap:wrap;padding:0 16px 12px}
.sc-root .pill{font-family:var(--mono);font-size:.58rem;padding:2px 7px;border-radius:10px}
.sc-root .p-ai{background:var(--purple2);color:var(--purple)}.sc-root .p-trig{background:var(--amber2);color:var(--amber)}
.sc-root .p-pain{background:var(--red2);color:var(--red)}.sc-root .p-intel{background:var(--blue2);color:var(--blue)}
.sc-root .p-mkt{background:var(--green2);color:var(--green)}

/* ── EXPANDED DETAIL ── */
.sc-root .detail{display:none;border-top:1px solid var(--bdr)}
.sc-root .card.open .detail{display:block}
.sc-root .detail-actions{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--bdr);flex-wrap:wrap;align-items:center}
.sc-root .detail-research{display:flex;flex-wrap:wrap;gap:5px;padding:10px 16px;border-bottom:1px solid var(--bdr)}
.sc-root .rlink{font-family:var(--mono);font-size:.6rem;padding:3px 8px;border-radius:var(--r);background:var(--surf2);border:1px solid var(--bdr);color:var(--tx3);text-decoration:none;transition:all .12s;display:inline-flex;align-items:center;gap:3px}
.sc-root .rlink:hover{border-color:rgba(207,163,58,.2);color:var(--gold);background:var(--gold3);text-decoration:none}
.sc-root .detail-tabs{display:flex;border-bottom:1px solid var(--bdr);padding:0 16px;overflow-x:auto}
.sc-root .dtab{font-size:.72rem;font-weight:500;padding:8px 14px;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap}
.sc-root .dtab:hover{color:var(--tx2)}.sc-root .dtab.on{color:var(--gold);border-bottom-color:var(--gold)}
.sc-root .dtab small{font-family:var(--mono);font-size:.6rem;margin-left:4px;opacity:.6}
.sc-root .detail-score{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--bdr);font-family:var(--mono);font-size:.65rem;color:var(--tx3);line-height:1.8}
.sc-root .detail-score-summary{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sc-root .detail-score-chip{padding:2px 7px;border-radius:999px;border:1px solid var(--bdr2);background:var(--surf2);color:var(--tx2)}
.sc-root .detail-score-copy{margin-top:8px;font-size:.68rem;line-height:1.5;color:var(--tx2);font-family:var(--brig)}
.sc-root .detail-score-copy strong{color:var(--tx)}
.detail-.sc-root{padding:14px 16px}

/* ── SIGNAL ITEMS ── */
.sc-root .sig{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;transition:border .12s;position:relative}
.sc-root .sig:hover{border-color:var(--bdr2)}
.sc-root .sig.stale{opacity:.45}
.sc-root .sig.flagged{opacity:.35;border-color:rgba(232,84,84,.15)}
.sc-root .sig-top{display:flex;gap:8px;align-items:flex-start}
.sc-root .sig-dot{width:5px;height:5px;border-radius:50%;margin-top:7px;flex-shrink:0}
.sc-root .d-ai{background:var(--purple)}.sc-root .d-trig{background:var(--amber)}.sc-root .d-pain{background:var(--red)}.sc-root .d-intel{background:var(--blue)}.sc-root .d-mkt{background:var(--green)}
.sig-.sc-root{flex:1;min-width:0}
.sc-root .sig-hl{font-size:.84rem;font-weight:500;line-height:1.4}
.sc-root .sig-ai{font-family:var(--mono);font-size:.52rem;background:var(--purple2);color:var(--purple);padding:1px 5px;border-radius:3px;margin-left:5px;vertical-align:middle;letter-spacing:.04em}
.sc-root .sig-detail{font-size:.76rem;color:var(--tx2);margin-top:4px;line-height:1.5}
.sc-root .sig-why{font-size:.74rem;color:var(--tx3);margin-top:5px;padding-top:5px;border-top:1px solid var(--bdr);line-height:1.5;font-style:italic}
.sc-root .sig-foot{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.sc-root .sig-src{font-family:var(--mono);font-size:.6rem;color:var(--tx3)}
.sc-root .sig-src a{color:var(--blue);font-size:.6rem}
.sc-root .sig-conf{font-family:var(--mono);font-size:.56rem;padding:1px 5px;border-radius:3px;background:var(--surf3);color:var(--tx3)}
.sc-root .sig-age{font-family:var(--mono);font-size:.56rem;padding:1px 5px;border-radius:3px;background:var(--surf2);color:var(--tx4)}
.sc-root .sig-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.sc-root .sig-tag{font-family:var(--mono);font-size:.52rem;padding:1px 5px;border-radius:3px;background:var(--cyan2);color:var(--cyan)}
.sc-root .sig-actions{position:absolute;top:10px;right:10px;display:flex;gap:4px}
.sc-root .sig-vbtn{font-size:.65rem;padding:2px 6px;border-radius:3px;border:1px solid var(--bdr);background:var(--surf2);color:var(--tx3);cursor:pointer;transition:all .1s}
.sc-root .sig-vbtn:hover{border-color:var(--bdr3);color:var(--tx2)}
.sc-root .sig-vbtn.verified{background:var(--green2);border-color:rgba(56,201,122,.2);color:var(--green)}
.sc-root .sig-vbtn.flag{background:var(--red2);border-color:rgba(232,84,84,.2);color:var(--red)}

.sc-root .brief-bar{display:flex;gap:6px;padding:12px 16px;border-top:1px solid var(--bdr);background:var(--surf2)}

/* ── MODAL ── */
.sc-root .overlay{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:16px}
.sc-root .overlay.on{display:flex}
.sc-root .modal{background:var(--surf);border:1px solid var(--bdr2);border-radius:var(--r3);width:100%;max-width:560px;max-height:82vh;overflow-y:auto;padding:20px}
.sc-root .modal h3{font-size:.95rem;font-weight:700;margin-bottom:14px}
.sc-root .modal label{display:block;font-size:.72rem;font-weight:500;color:var(--tx2);margin:10px 0 3px}
.sc-root .modal input,.sc-root .modal select,.sc-root .modal textarea{width:100%;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:7px 10px;font-size:.82rem;color:var(--tx);outline:none}
.sc-root .modal input:focus,.sc-root .modal textarea:focus{border-color:var(--gold)}
.sc-root .modal textarea{min-height:70px;resize:vertical;font-family:var(--mono);font-size:.75rem}
.sc-root .modal-foot{display:flex;gap:6px;margin-top:16px;justify-content:flex-end}
.sc-root .modal .preview-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:.72rem}
.sc-root .modal .preview-table th{text-align:left;padding:4px 6px;background:var(--surf2);color:var(--tx2);font-family:var(--mono);font-size:.62rem;border:1px solid var(--bdr)}
.sc-root .modal .preview-table td{padding:4px 6px;border:1px solid var(--bdr);color:var(--tx3);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── LOADING ── */
.sc-root .shimmer{background:linear-gradient(90deg,var(--surf) 25%,var(--surf3) 50%,var(--surf) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.sc-root .empty{text-align:center;padding:60px 20px;color:var(--tx3)}
.sc-root .empty h3{font-size:1rem;color:var(--tx2);margin-bottom:6px}

.sc-root .enriching-badge{font-family:var(--mono);font-size:.6rem;color:var(--amber);display:inline-flex;align-items:center;gap:4px}
.sc-root .enriching-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

@media(max-width:768px){
.sc-root .grid{grid-template-columns:1fr}
.sc-root .top-stats,.sc-root .legend{display:none}
.sc-root .controls{padding:8px 12px}
.sc-root .main{padding:10px 12px 60px}
}


/* ── Signal Console integration overrides ── */
.app-main.sc-host {
    padding: 0 !important;
    overflow-y: auto;
    background: linear-gradient(180deg, #081019 0, #06080c 280px);
}
.sc-root {
    min-height: 100%;
    position: relative;
}
.sc-root .top {
    position: sticky;
    top: var(--signal-shell-offset,0px);
    margin-top: 10px;
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,.06);
    border-radius: var(--r2);
    background: rgba(8, 12, 20, .86);
}
@media (max-width: 768px) {
    .app-main.sc-host { padding: 0 !important; }
    .signal-first-fold { margin: 0 12px 12px; padding: 12px 12px 4px; }
}

    </style>
</head>
<body class="room-wave2 room-signal-console">
        <script src="/js/app-auth-preflight.js"></script>
<div class="app-container">
        <aside class="app-sidebar">
            <script src="/js/analytics-site-config.js"></script>
    <script src="/js/analytics.js"></script>
            <script src="/js/data-manager.js"></script>
            <script src="/js/nav.js"></script>
        </aside>
        
        <main class="app-main sc-host">
            <header class="app-header module-header">
                <div class="module-header-title">
                    <div class="shell-header-meta">
                        <span class="shell-header-kicker">Signals family</span>

function readScopedUiJson(key,fallback){
  if(window.gtmLocalState&&typeof window.gtmLocalState.get==='function'){

}
function writeScopedUiJson(key,value){
  if(window.gtmLocalState&&typeof window.gtmLocalState.set==='function'){
    window.gtmLocalState.set(key,value,{scope:'user'});
    return;
  }
  try{localStorage.setItem(key,JSON.stringify(value))}catch{}
}

  if(window.gtmLocalState&&typeof window.gtmLocalState.get==='function'){

}

function normalizeSignalItem(sg){
  return {...(sg||{}),id:(sg&&sg.id)||rid(),status:(sg&&sg.status)||'unverified',pain_tags:Array.isArray(sg&&sg.pain_tags)&&(sg.pain_tags||[]).length?(sg.pain_tags||[]):autoTag(sg||{}),fetched_at:(sg&&sg.fetched_at)||new Date().toISOString()};
}

function normalizeAccountItem(acct, fallbackOrigin){
  const next={...(acct||{})};
  next.id=(next.id||next.account_key||rid()).toString();
  next.origin=next.origin||fallbackOrigin||'seed';
  next.signals=Array.isArray(next.signals)?next.signals.map(normalizeSignalItem):[];
  next._heat=Number(next._heat!=null?next._heat:next.heat||0)||0;
  next._lastEnriched=next._lastEnriched||next.lastEnrichedAt||null;
  next.created_at=next.created_at||next.updated_at||new Date().toISOString();
  next.updated_at=next.updated_at||next.created_at;
  return next;
}

function buildDefaultAccounts(){
  return SEEDS.map(a=>normalizeAccountItem({...a},'seed'));
}

function loadLocalAccounts(){
  try{
    const s=JSON.parse(localStorage.getItem(LS)||'{}');
    const raw=Array.isArray(s.accounts)&&s.accounts.length?s.accounts:buildDefaultAccounts();
    return raw.map(a=>normalizeAccountItem(a,a&&a.origin||'seed'));
  }catch{
    return buildDefaultAccounts();
  }
}

function load(){return{accounts:loadLocalAccounts(),mode:'complex',tab:{},search:'',industry:'all',catFilter:'all',painFilter:'all',aiOnly:false,expanded:null,activeBatch:null}}

function formatRelativeTime(value){
  if(!value)return'';
  const dt=new Date(value);
  if(Number.isNaN(dt.getTime()))return'';
  const diff=Math.max(0,Date.now()-dt.getTime());
  const mins=Math.round(diff/60000);
  if(mins<1)return'just now';
  if(mins<60)return mins+'m ago';
  const hrs=Math.round(mins/60);
  if(hrs<24)return hrs+'h ago';
  const days=Math.round(hrs/24);
  return days+'d ago';
}

async function hydrateSignalConsoleFromCloud(){
  if(!(window.gtmPersistence&&window.gtmPersistence.signalConsole&&typeof window.gtmPersistence.signalConsole.load==='function'))return;
  setSyncState({loading:true,error:null});
  try{
    const loaded=await window.gtmPersistence.signalConsole.load();
    if(loaded&&loaded.error)throw loaded.error;
    if(loaded&&Array.isArray(loaded.data)&&loaded.data.length){
      S.accounts=loaded.data.map(a=>normalizeAccountItem(a,a&&a.origin||'cloud'));
      setSyncState({hydrated:true,lastSyncedAt:new Date().toISOString(),error:null});
      render();
      return;
    }
    setSyncState({hydrated:true,lastSyncedAt:new Date().toISOString(),error:null});
  }catch(err){
    console.error('Signal Console cloud hydrate failed:',err);
    setSyncState({error:err||new Error('Cloud hydrate failed')});
  }finally{
    setSyncState({loading:false});
  }
}

function summarizeLaneActivity(debug){
  const lanes=((debug&&debug.lanes)||[]).filter(Boolean);
  const active=lanes.filter(l=>(Number(l.evidenceCount)||0)>0).length;
  const candidates=lanes.reduce((sum,l)=>sum+(Number(l.candidateCount)||0),0);
  const evidence=lanes.reduce((sum,l)=>sum+(Number(l.evidenceCount)||0),0);
  const laneLabel=active?active+' lane'+(active===1?'':'s'):'no active lanes';
  return laneLabel+' • '+candidates+' source candidates • '+evidence+' evidence pages';
}

// SCORING ENGINE
// ═══════════════════════════════════════════
function recency(sig){
  const d=new Date(sig.published_date||sig.fetched_at||'2024-01-01');
  const days=(Date.now()-d.getTime())/864e5;
  if(days<=14)return 1;if(days<=30)return .9;if(days<=60)return .75;if(days<=90)return .55;if(days<=180)return .3;return .1;
}
function heat(a){
  const sigs=(a.signals||[]).filter(s=>s.status!=='flagged');
  let sc=0;
  for(const s of sigs){
    const base=(s.is_ai||s.ai)?18:12;
    const conf=(s.confidence||.65)>=.9?5:0;
    sc+=(base+conf)*recency(s);
  }
  return Math.min(99,Math.round(sc));
}
function heatCls(h){if(h>=91)return'h-hot';if(h>=75)return'h-warm';if(h>=50)return'h-med';return'h-cool'}
function scoreExplain(a){
  const sigs=(a.signals||[]).filter(s=>s.status!=='flagged');
  const ai=sigs.filter(s=>s.is_ai||s.ai).length;
  const hi=sigs.filter(s=>(s.confidence||0)>=.9).length;
  const avgR=sigs.length?sigs.reduce((s,x)=>s+recency(x),0)/sigs.length:0;
  return`${sigs.length} signals (${ai} AI) | ${hi} high-conf | avg recency ${(avgR*100).toFixed(0)}% | heat ${heat(a)}`;
}
function scoreDetail(a){
  const sigs=(a.signals||[]).filter(s=>s.status!=='flagged');
  let lines=[`Score Breakdown — ${a.name} (${heat(a)})`,''];
  for(const s of sigs.slice(0,8)){
    const base=(s.is_ai||s.ai)?18:12;
    const conf=(s.confidence||.65)>=.9?5:0;
    const r=recency(s);
    const val=((base+conf)*r).toFixed(1);
    lines.push(`+${val}  ${s.headline.slice(0,60)}${s.is_ai?' [AI]':''} (${(r*100).toFixed(0)}% fresh, ${((s.confidence||.65)*100).toFixed(0)}% conf)`);
  }
  lines.push('','Total: '+heat(a)+' / 99');
  return lines.join('\n');
}

function heatBand(h){
  if(h>=91)return'Hot';
  if(h>=75)return'Active';
  if(h>=50)return'Watch';
  return'Low';
}

function getHeatMetrics(a){
  const sigs=(a.signals||[]).filter(s=>s.status!=='flagged');
  const recent=sigs.filter(s=>recency(s)>=.75).length;
  const highConfidence=sigs.filter(s=>(s.confidence||0)>=.9).length;
  const ai=sigs.filter(s=>s.is_ai||s.ai).length;
  const triggers=sigs.filter(s=>s.cat==='trigger_event').length;
  const avgRecency=sigs.length?sigs.reduce((sum,s)=>sum+recency(s),0)/sigs.length:0;
  const h=heat(a);
  return{
    heat:h,
    signalCount:sigs.length,
    recentCount:recent,
    highConfidenceCount:highConfidence,
    aiCount:ai,
    triggerCount:triggers,
    avgRecency:Math.round(avgRecency*100),
    band:heatBand(h)
  };
}

function getAccountExecutionContext(a){
  const name=(a.name||'').toLowerCase();
  const deals=JSON.parse(localStorage.getItem('gtmos_deal_workspaces')||'[]');
  const activeDeal=Array.isArray(deals)?deals.find(d=>d&&(d.accountName||d.account_name||'').toLowerCase()===name&&d.stage!=='closed-won'&&d.stage!=='closed-lost'):null;
  const touches=JSON.parse(localStorage.getItem('gtmos_outbound_touches')||'{"touches":[]}');
  const acctTouches=(touches.touches||[]).filter(t=>(t.account||'').toLowerCase()===name);
  const replied=acctTouches.some(t=>t.outcome==='replied'||t.outcome==='meeting_booked');
  let temp='ice_cold',tempLabel='Ice Cold',tempColor='var(--tx3)';
  if(activeDeal&&activeDeal.stage!=='prospect'){temp='hot';tempLabel='Hot';tempColor='#ef4444';}
  else if(replied||activeDeal){temp='warm';tempLabel='Warm';tempColor='#f59e0b';}
  else if(acctTouches.length>0){temp='cool';tempLabel='Cool';tempColor='#3b82f6';}
  return{activeDeal,acctTouches,replied,temp,tempLabel,tempColor};
}

function getResearchState(a){
  const signalCount=(a.signals||[]).filter(s=>s.status!=='flagged').length;
  if(a&&a._researching==='deep'){
    return{tone:'progress',label:'Deep research running',copy:'Live enrichment is scanning external sources for seller-relevant evidence.'};
  }
  if(a&&a._researching==='ai'){
    return{tone:'progress',label:'AI research running',copy:'Signal Console is generating and scoring fresh signals for this account.'};
  }
  if(a&&a._researchNotice&&a._researchNotice.kind==='error'){
    return{tone:'error',label:'Research failed',copy:a._researchNotice.message};
  }
  if(a&&a._researchNotice&&a._researchNotice.kind==='success'){
    return{tone:'ok',label:'Research updated',copy:a._researchNotice.message};
  }
  if(a&&a._lastEnriched){
    return{tone:'ok',label:'Live research exists',copy:'Last refreshed '+formatRelativeTime(a._lastEnriched)+'.'};
  }
  if(signalCount){
    return{tone:'warn',label:'Signals saved, not refreshed',copy:'This account has saved signals, but no confirmed live refresh in the current workspace.'};
  }
  return{tone:'warn',label:'No live research yet',copy:'Run research once so this account has real seller-ready context.'};
}

function getNextMove(a){
  const metrics=getHeatMetrics(a);
  const ctx=getAccountExecutionContext(a);
  const encName=encodeURIComponent(a.name||'');
  if(!metrics.signalCount){
    return{kind:'research',title:'Run the first research pass',reason:'No seller-ready evidence exists yet for this account.',cta:'Run AI Research'};
  }
  if(ctx.activeDeal&&ctx.activeDeal.stage&&ctx.activeDeal.stage!=='prospect'){
    return{kind:'link',title:'Advance the live deal',reason:'A real deal already exists, so use the latest signals to tighten next-step control.',cta:'Open Deal Workspace',href:'/app/deal-workspace/'};
  }
  if(ctx.replied){
    return{kind:'link',title:'Prep the next live conversation',reason:'This account has already replied, so turn the new context into a sharper agenda.',cta:'Open Call Planner',href:'/app/discovery-agenda/?account='+encName};
  }
  if(ctx.acctTouches.length&&metrics.heat>=50){
    return{kind:'link',title:'Tighten and send the follow-up',reason:'Touch history already exists. Use the new signals to sharpen the next message.',cta:'Generate Follow-Up',href:'/app/outbound-studio/?account='+encName+'&temperature='+ctx.temp};
  }
  if(metrics.heat>=75){
    return{kind:'link',title:'Write the first signal-led touch',reason:'Heat is high enough to justify outbound now.',cta:'Generate First Touch',href:'/app/outbound-studio/?account='+encName+'&temperature='+ctx.temp};
  }
  if(metrics.heat>=50){
    return{kind:'link',title:'Build the angle before outreach',reason:'The account is promising, but the message still needs to be tightened before you reach out.',cta:'Build Message',href:'/app/outbound-studio/?account='+encName+'&temperature='+ctx.temp};
  }
  return{kind:'deepresearch',title:'Run deeper research first',reason:'Current evidence is still too thin or too old to justify outreach with confidence.',cta:'Run Deep Research'};
}

function buildSignalConsoleHealthSnapshot(){
  const accounts=Array.isArray(S.accounts)?S.accounts.slice():[];
  const ranked=accounts.slice().sort((a,b)=>heat(b)-heat(a));
  const hottest=ranked[0]||null;
  const signalCount=accounts.reduce((sum,a)=>sum+((a.signals||[]).filter(s=>s.status!=='flagged').length),0);
  const readyCount=accounts.filter(a=>heat(a)>=75).length;
  const topMetrics=hottest?getHeatMetrics(hottest):null;
  const topCtx=hottest?getAccountExecutionContext(hottest):null;
  const topMove=hottest?getNextMove(hottest):null;
  return {
    capturedAt:new Date().toISOString(),
    accountCount:accounts.length,
    signalCount:signalCount,
    readyCount:readyCount,
    topAccountId:hottest?String(hottest.id||''):'',
    topAccountName:hottest?String(hottest.name||''):'',
    topHeat:topMetrics?Number(topMetrics.heat||0):0,
    topBand:topMetrics?String(topMetrics.band||''):'',
    topSignalCount:topMetrics?Number(topMetrics.signalCount||0):0,
    topHighConfidenceCount:topMetrics?Number(topMetrics.highConfidenceCount||0):0,
    topRecentCount:topMetrics?Number(topMetrics.recentCount||0):0,
    topHasActiveDeal:!!(topCtx&&topCtx.activeDeal),
    topHasReplies:!!(topCtx&&topCtx.replied),
    topNextMoveKind:topMove?String(topMove.kind||''):'',
    topNextMoveTitle:topMove?String(topMove.title||''):'',
    topNextMoveCta:topMove?String(topMove.cta||''):'',
    top3Accounts:ranked.slice(0,3).map(a=>{
      const metrics=getHeatMetrics(a);
      const ctx=getAccountExecutionContext(a);
      const move=getNextMove(a);
      return {
        id:String(a.id||''),
        name:String(a.name||''),
        heat:Number(metrics.heat||0),
        signalCount:Number(metrics.signalCount||0),
        highConfidenceCount:Number(metrics.highConfidenceCount||0),
        recentCount:Number(metrics.recentCount||0),
        hasActiveDeal:!!ctx.activeDeal,
        hasReplies:!!ctx.replied,
        nextMoveKind:String(move.kind||'')
      };
    })
  };
}

// PAIN AUTO-TAGGING
// ═══════════════════════════════════════════
function autoTag(sig){
  const blob=[sig.headline,sig.detail,sig.why_it_matters||sig.why].join(' ').toLowerCase();
  const tags=[];
  for(const[id,p]of Object.entries(PAIN_LIB)){
    if(p.kw.some(k=>blob.includes(k)))tags.push(id);
  }
  return tags.slice(0,4);
}

// ═══════════════════════════════════════════
async function enrichAccount(acct){
  const prompt=`Research "${acct.name}" (ticker: ${acct.ticker||'N/A'}, industry: ${acct.industry||'unknown'}, domain: ${acct.domain||'N/A'}).

Return ONLY a JSON array of 4-6 sales-relevant signals a SaaS salesperson would use to prepare for a cold call. No preamble, no markdown fences — just the JSON array.

Each signal object must have these exact fields:
- "category": one of "ai_transformation", "trigger_event", "pain_point", "internal_intel", "market_position"
- "headline": concise signal title (under 100 chars)
- "detail": 1-2 sentence detail with specifics
- "why_it_matters": why a SaaS seller cares (1-2 sentences, specific to selling)
- "source_url": a REAL verifiable URL (company website, news article, SEC filing). NEVER invent URLs.
- "source_name": short source label (e.g. "SEC Filing", "Reuters", "Company IR")
- "published_date": approximate date as "YYYY-MM" format
- "confidence": 0.0 to 1.0 based on source reliability
- "is_ai": true if signal relates to AI/ML/automation, false otherwise

PRIORITIZE: AI initiatives, leadership changes, acquisitions, compliance issues, earnings signals, restructurings.
Focus on events from the last 6 months. If you can't find verifiable current info, return fewer signals rather than fabricating.`;

  const resp=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      tools:[{type:"web_search_20250305",name:"web_search"}],
      messages:[{role:"user",content:prompt}]
    })
  });
  const data=await resp.json();
  // Extract text from response blocks
  const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
  // Try to parse JSON from the text
  const jsonMatch=text.match(/\[[\s\S]*\]/);
  if(!jsonMatch)throw new Error('No JSON array in response');
  const clean=jsonMatch[0].replace(/```json|```/g,'').trim();
  const signals=JSON.parse(clean);
  if(!Array.isArray(signals))throw new Error('Response is not an array');
  // Validate and normalize
  return signals.filter(s=>s.headline&&s.source_url&&s.source_url.startsWith('http')).map(s=>({
    id:rid(),
    cat:s.category||'market_position',
    headline:s.headline.slice(0,120),
    detail:s.detail||'',
    why:s.why_it_matters||'',
    url:s.source_url,
    source_name:s.source_name||'Research',
    published_date:s.published_date||today().slice(0,7),
    confidence:Math.max(Math.min(s.confidence||.7,1),0),
    is_ai:!!s.is_ai,
    fetched_at:new Date().toISOString(),
    origin:'researched',
    status:'unverified',
    pain_tags:autoTag(s)
  }));
}

async function doEnrich(acctId,btn){
  if(remaining()<=0){alert('Daily research limit reached ('+MAX_DAILY+'). Resets at midnight.');return}
  const acct=S.accounts.find(a=>a.id===acctId);if(!acct)return;
  acct._researching='ai';
  applyResearchNotice(acct,'progress','AI research is generating seller-ready signals for this account.');
  try{
    const sigs=await enrichAccount(acct);
    addUsage(1);
    // Dedupe by headline similarity
    const existing=new Set((acct.signals||[]).map(s=>s.headline.toLowerCase().slice(0,50)));
    const fresh=sigs.filter(s=>!existing.has(s.headline.toLowerCase().slice(0,50)));
    acct.signals=[...fresh,...(acct.signals||[])];
    acct.lastEnrichedAt=new Date().toISOString();
    acct._lastEnriched=acct.lastEnrichedAt;
    acct.updated_at=new Date().toISOString();
    save(S);
    await persistSignalConsoleAccount(acct);
    if(fresh.length){
      applyResearchNotice(acct,'success',fresh.length+' new signals added | heat '+heat(acct)+' | researched just now',5000);
    }else{
      applyResearchNotice(acct,'success','Research complete | no net-new signals | heat '+heat(acct),5000);
    }
  }catch(e){
    console.error('Enrich failed:',e);
    applyResearchNotice(acct,'error','AI research failed | '+String((e&&e.message)||'Try again'),7000);
  }finally{
    delete acct._researching;
    renderGrid();
  }
}

async function enrichAll(){
  const visible=getVisible();
  const todo=visible.filter(a=>{
    if(!a.lastEnrichedAt)return true;
    return(Date.now()-new Date(a.lastEnrichedAt).getTime())>864e5;
  }).slice(0,20);
  if(!todo.length){alert('All visible accounts were enriched within 24h.');return}
  if(!confirm(`Research ${todo.length} accounts (~${todo.length} API calls). Continue?`))return;
  const btn=document.getElementById('btnEnrichAll');
  let refreshed=0,failures=0;
  for(let i=0;i<todo.length;i++){
    btn.textContent=`${i+1}/${todo.length}...`;
    if(remaining()<=0){btn.textContent='Enrich All';alert('Daily limit reached after '+(i)+' accounts.');return}
    try{await doEnrich(todo[i].id,null);refreshed+=1}catch{failures+=1}
    if(i<todo.length-1)await new Promise(r=>setTimeout(r,2000));
  }
  btn.textContent='Enrich All';
  render();
  alert('Research complete. Refreshed '+refreshed+' account'+(refreshed===1?'':'s')+(failures?'; '+failures+' failed.':'')+'.');
}

function handleCSVFile(e){
  const file=e.target.files[0];if(!file)return;
  if(file.size>2*1024*1024){alert('File too large (max 2MB)');return}
  Papa.parse(file,{header:true,skipEmptyLines:true,complete:r=>{
    csvData=r.data.slice(0,500);

    if(!cols.length){alert('No columns found');return}
    // Preview

    let html='<table class="preview-table"><tr>'+cols.slice(0,5).map(c=>'<th>'+esc(c)+'</th>').join('')+'</tr>';
    csvData.slice(0,3).forEach(row=>{html+='<tr>'+cols.slice(0,5).map(c=>'<td>'+esc((row[c]||'').slice(0,40))+'</td>').join('')+'</tr>'});
    html+='</table><p style="font-size:.7rem;color:var(--tx3)">'+csvData.length+' rows found</p>';
    prev.innerHTML=html;

    const nameCol=cols.find(c=>/company|name|account|firm|org/i.test(c))||cols[0];
    const domCol=cols.find(c=>/website|url|domain|web/i.test(c))||'';
    const indCol=cols.find(c=>/industry|vertical|sector/i.test(c))||'';
    const mapDiv=document.getElementById('csvMapping');mapDiv.style.display='block';
    const opts=c=>'<option value="">— skip —</option>'+cols.map(col=>`<option value="${esc(col)}" ${col===c?'selected':''}>${esc(col)}</option>`).join('');
    document.getElementById('csvColName').innerHTML=opts(nameCol);
    document.getElementById('csvColDomain').innerHTML=opts(domCol);
    document.getElementById('csvColInd').innerHTML=opts(indCol);
    const impBtn=document.getElementById('csvImportBtn');impBtn.style.display='block';
    impBtn.onclick=importCSV;
  }});
}

function importCSV(){
  if(!csvData||!csvData.length)return;
  const nameCol=document.getElementById('csvColName').value;
  if(!nameCol){alert('Company Name column required');return}
  const domCol=document.getElementById('csvColDomain').value;
  const indCol=document.getElementById('csvColInd').value;
  const batchId='batch_'+rid();
  const existingNames=new Set(S.accounts.map(a=>a.name.toLowerCase()));
  const existingDoms=new Set(S.accounts.map(a=>(a.domain||'').toLowerCase().replace(/^www\./,'')).filter(Boolean));
  let added=0,skipped=0;
  csvData.forEach(row=>{
    const name=(row[nameCol]||'').trim();if(!name)return;
    let domain=domCol?(row[domCol]||'').trim().replace(/^https?:\/\//,'').replace(/^www\./,'').replace(/\/.*$/,''):'';
    if(existingNames.has(name.toLowerCase())||(domain&&existingDoms.has(domain.toLowerCase()))){skipped++;return}
    S.accounts.push({
      id:rid(),name,domain,
      industry:indCol?(row[indCol]||'').trim():'',
      ticker:'',sector:'',revenue:'',employees:'',hq:'',linkedin:'',
      fortune_rank:null,origin:'uploaded',batch_id:batchId,
      signals:[],created_at:new Date().toISOString()
    });
    existingNames.add(name.toLowerCase());
    if(domain)existingDoms.add(domain.toLowerCase());
    added++;
  });
  // Save batch
  const batches=readScopedUiJson(LS_BATCHES,[]);
  batches.push({id:batchId,name:`Upload ${new Date().toLocaleDateString()}`,uploadedAt:new Date().toISOString(),count:added});
  writeScopedUiJson(LS_BATCHES,batches);
  S.activeBatch=batchId;
  save(S);hideModal();render();
  if(added>0)persistSignalConsoleAccounts(S.accounts);
  if(added>0&&confirm(`Imported ${added} accounts (${skipped} duplicates skipped). Enrich them now with live research?`)){
    S.mode='surgical';render();enrichAll();
  }
}

    accts.forEach(a=>{
      rows.push([a.name,a.ticker||'',a.industry||'',a.domain||'',heat(a),(a.signals||[]).filter(s=>s.is_ai).length,(a.signals||[]).length,(a.signals||[])[0]?.headline||'']);

  }else if(fmt==='outreach'){
    const rows=[['Account Name','Custom Field 1 (Signal)','Custom Field 2 (Why It Matters)','Custom Field 3 (Source URL)']];
    accts.forEach(a=>{const s=(a.signals||[])[0];if(s)rows.push([a.name,s.headline,s.why||s.why_it_matters||'',s.url||''])});

function genBrief(a){
  const h=heat(a);
  const sigs=(a.signals||[]).filter(s=>s.status!=='flagged');
  const top3=sigs.sort((x,y)=>(y.confidence||0)*recency(y)-(x.confidence||0)*recency(x)).slice(0,3);
  let t=`PRE-CALL INTEL BRIEF — ${a.name}${a.ticker?' ('+a.ticker+')':''}\n${'═'.repeat(50)}\n`;
  t+=`Industry: ${a.industry||'—'} · ${a.sector||''}\nRevenue: ${a.revenue||'—'} | Employees: ${a.employees||'—'} | HQ: ${a.hq||'—'}\nHeat: ${h}/99 — ${h>=91?'HOT':h>=75?'ACTIVE':h>=50?'WATCH':'LOW'}\n\n`;
  t+=`▸ TOP SIGNALS\n${'─'.repeat(40)}\n`;
  top3.forEach((s,i)=>{
    t+=`${i+1}. ${s.is_ai?'[AI] ':''}${s.headline}\n   ${s.detail||''}\n   💡 ${s.why||s.why_it_matters||''}\n   📎 ${s.source_name||''} | ${s.published_date||''} | ${Math.round((s.confidence||0)*100)}% conf\n   ${s.url||''}\n\n`;
  });
  t+=`▸ DISCOVERY QUESTIONS\n${'─'.repeat(40)}\n`;
  top3.forEach(s=>{
    if(s.cat==='pain_point')t+=`- "How are you currently handling ${s.headline.toLowerCase().includes('supply')?'the supply chain constraints':'this challenge'}?"\n`;
    else if(s.cat==='trigger_event')t+=`- "I saw the ${s.headline.split(':')[0].toLowerCase()} — how is that affecting your team\'s priorities?"\n`;
    else if(s.cat==='ai_transformation')t+=`- "With your AI initiatives, what\'s the biggest infrastructure challenge right now?"\n`;
    else t+=`- "What\'s driving the biggest urgency in your org right now?"\n`;
  });
  t+=`\nGenerated: ${new Date().toISOString().slice(0,16)} | Signal Console v4`;
  return t;
}

function getVisible(){
  let a=S.accounts;
  if(S.mode==='active')a=a.filter(x=>heat(x)>=75);
  if(S.mode==='surgical')a=a.filter(x=>x.batch_id===S.activeBatch);
  if(S.mode==='ai_trends')a=a.filter(x=>x.fortune_rank&&x.fortune_rank<=100&&(x.signals||[]).some(s=>s.is_ai));
  if(S.industry!=='all')a=a.filter(x=>x.industry===S.industry);
  if(S.catFilter!=='all')a=a.filter(x=>(x.signals||[]).some(s=>s.cat===S.catFilter));
  if(S.painFilter!=='all')a=a.filter(x=>(x.signals||[]).some(s=>(s.pain_tags||[]).includes(S.painFilter)));
  if(S.aiOnly)a=a.filter(x=>(x.signals||[]).some(s=>s.is_ai));
  if(S.search){const q=S.search.toLowerCase();a=a.filter(x=>[x.name,x.ticker,x.industry,x.sector,...(x.signals||[]).map(s=>s.headline+' '+s.detail)].join(' ').toLowerCase().includes(q))}
  return a.sort((x,y)=>heat(y)-heat(x));
}

async function runDeepResearch(acctId,button){
  const acct=S.accounts.find(a=>a.id===acctId);
  if(!acct)return;
  acct._researching='deep';
  const statusEl=document.getElementById('deep-status-'+acctId);

  const baseUrl=resolveEnrichmentBaseUrl();
  const endpoint=baseUrl+'/enrich';
  const phases=buildDeepResearchPhases();
  let phaseIdx=0;
  const updatePhase=()=>{
    if(!statusEl)return;
    statusEl.style.display='block';
    statusEl.style.color='#a855f7';
    statusEl.innerHTML='⚡ '+phases[Math.min(phaseIdx,phases.length-1)]+' <b>'+esc(acct.name)+'</b>';
  };

  if(button){
    button.disabled=true;
    button.innerHTML='<span class="enriching-badge">Researching...</span>';
  }

  updatePhase();
  const phaseTimer=setInterval(()=>{
    phaseIdx++;
    if(phaseIdx<phases.length)updatePhase();
  },6000);

  try{
    const headers=await getEnrichmentHeaders();
    const response=await fetch(endpoint,{
      method:'POST',
      headers,
      body:JSON.stringify({
        name:acct.name,
        domain:acct.domain||null,
        industry:acct.industry||null,
        sector:acct.sector||null,
        ticker:acct.ticker||null
      })
    });

    let data=null;
    try{data=await response.json()}catch(_err){data=null}
    if(!response.ok)throw new Error((data&&data.error)||('Server returned '+response.status));
    if(data&&data.error)throw new Error(data.error);

    const existingHeadlines=new Set((acct.signals||[]).map(s=>(s.headline||'').toLowerCase().slice(0,40)));
    const newSignals=(data&&Array.isArray(data.signals)?data.signals:[]).filter(s=>!existingHeadlines.has((s.headline||'').toLowerCase().slice(0,40))).map(normalizeSignalItem);
    acct.signals=[...newSignals,...(acct.signals||[])];
    acct._heat=Math.max(Number(data&&data.heat||0)||0,Number(acct._heat||0)||0);

    if(data&&data.info){
      if(data.info.industry&&data.info.industry!=='Unknown')acct.industry=data.info.industry;
      if(data.info.revenue&&data.info.revenue!=='Unknown')acct.revenue=data.info.revenue;
      if(data.info.employees&&data.info.employees!=='Unknown')acct.employees=data.info.employees;
      if(data.info.hq&&data.info.hq!=='Unknown')acct.hq=data.info.hq;
      if(data.info.sector&&data.info.sector!=='Unknown')acct.sector=data.info.sector;
    }

    acct._lastEnriched=(data&&data.enrichedAt)||new Date().toISOString();
    acct.updated_at=new Date().toISOString();
    save(S);
    await persistSignalConsoleAccount(acct);

    const laneSummary=summarizeLaneActivity(data&&data.debug);
    if(newSignals.length){
      applyResearchNotice(acct,'success',newSignals.length+' new signals added | '+laneSummary+' | '+((data&&data.elapsed)||'done'),5000);
    }else{
      applyResearchNotice(acct,'success','Research complete | no net-new signals | '+laneSummary+' | '+((data&&data.elapsed)||'done'),5000);
    }
  }catch(err){
    const msg=String((err&&err.message)||'Enrichment failed');
    const lower=msg.toLowerCase();
    const hint=lower.indexOf('failed to fetch')>=0?' | service unreachable at '+baseUrl:lower.indexOf('401')>=0?' | sign in again or verify hosted auth config':'';
    applyResearchNotice(acct,'error','Deep research failed | '+msg+hint,7000);
  }finally{
    clearInterval(phaseTimer);
    delete acct._researching;
    renderGrid();
  }
}

  grid.querySelectorAll('[data-scoredetail]').forEach(b=>b.onclick=e=>{e.stopPropagation();const acct=S.accounts.find(a=>a.id===b.dataset.scoredetail);if(acct)alert(scoreDetail(acct))});

  // ⚡ DEEP RESEARCH — Browserbase enrichment
  grid.querySelectorAll('[data-deepresearch]').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    runDeepResearch(b.dataset.deepresearch,b);
    return;
    const acctId=b.dataset.deepresearch;
    const acct=S.accounts.find(a=>a.id===acctId);
    if(!acct)return;
    const statusEl=document.getElementById('deep-status-'+acctId);
    if(!statusEl)return;

    // Show loading
    b.disabled=true;
    b.innerHTML='<span class="enriching-badge">Researching...</span>';
    statusEl.style.display='block';
    statusEl.innerHTML='⚡ Connecting to Browserbase... Launching 3 parallel research sessions for <b>'+esc(acct.name)+'</b>';

    const phases=['⚡ Searching Google News...','⚡ Scanning company website + careers...','⚡ Extracting strategic intelligence...','⚡ Processing signals...'];
    let phaseIdx=0;
    const phaseTimer=setInterval(()=>{phaseIdx++;if(phaseIdx<phases.length)statusEl.innerHTML=phases[phaseIdx]},8000);

    fetch(resolveEnrichmentBaseUrl()+'/enrich',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        name:acct.name,
        domain:acct.domain||null,
        industry:acct.industry||null,
        sector:acct.sector||null,
        ticker:acct.ticker||null
      })
    })
    .then(r=>{if(!r.ok)throw new Error('Server returned '+r.status);return r.json()})
    .then(data=>{
      clearInterval(phaseTimer);
      if(data.error)throw new Error(data.error);

      // Merge new signals (avoid duplicates by headline)
      const existingHeadlines=new Set((acct.signals||[]).map(s=>(s.headline||'').toLowerCase().slice(0,40)));
      const newSignals=(data.signals||[]).filter(s=>!existingHeadlines.has((s.headline||'').toLowerCase().slice(0,40)));
      acct.signals=[...newSignals,...(acct.signals||[])]; // New signals first

      // Update heat score
      if(data.heat&&data.heat>=(acct._heat||0))acct._heat=data.heat;

      // Update company info if we got it
      if(data.info){
        if(data.info.industry&&data.info.industry!=='Unknown')acct.industry=data.info.industry;
        if(data.info.revenue&&data.info.revenue!=='Unknown')acct.revenue=data.info.revenue;
        if(data.info.employees&&data.info.employees!=='Unknown')acct.employees=data.info.employees;
        if(data.info.hq&&data.info.hq!=='Unknown')acct.hq=data.info.hq;
        if(data.info.sector&&data.info.sector!=='Unknown')acct.sector=data.info.sector;
      }

      acct._lastEnriched=data.enrichedAt;
      save(S);

      statusEl.innerHTML='✓ <b>'+newSignals.length+' new signals</b> added from live web research ('+data.elapsed+')';
      statusEl.style.color='#4a9e6e';
      setTimeout(()=>{statusEl.style.display='none';statusEl.style.color='#a855f7'},4000);
      b.disabled=false;
      b.innerHTML='⚡ Deep Research';
      renderGrid();
    })
    .catch(err=>{
      clearInterval(phaseTimer);
      statusEl.innerHTML='✗ '+esc(err.message)+(err.message.includes('Failed to fetch')?' — is the enrichment service reachable?':'');
      statusEl.style.color='#c05a52';
      b.disabled=false;
      b.innerHTML='⚡ Deep Research';
      setTimeout(()=>{statusEl.style.display='none';statusEl.style.color='#a855f7'},6000);
    });
  });
}

// E7: Recommended Play card — temperature auto-detection + channel/CTA recommendation
function renderResearchStatus(a){
  const state=getResearchState(a);
  const color=state.tone==='ok'?'#4a9e6e':state.tone==='error'?'#c05a52':state.tone==='progress'?'#a855f7':'#e0a030';
  return `<div id="deep-status-${a.id}" style="display:block;padding:8px 16px;border-bottom:1px solid var(--bdr);font-size:.72rem;font-family:var(--mono);color:${color};background:rgba(168,85,247,0.03);">${esc(state.label)} | ${esc(state.copy)}</div>`;
}

function renderRecPlay(a){
  const ctx=getAccountExecutionContext(a);
  const recs={
    ice_cold:{channel:'Email',cta:'Give-to-Get (no ask)',asset:'Industry brief or benchmark'},
    cool:{channel:'Email + LinkedIn',cta:'Insight share',asset:'Case study or one-pager'},
    warm:{channel:'Phone + Email',cta:'Meeting request',asset:'Custom PoC proposal'},
    hot:{channel:'Phone (direct)',cta:'Next step confirmation',asset:'Business case or ROI model'}
  };
  const rec=recs[ctx.temp]||recs.ice_cold;
  const move=getNextMove(a);
  const encName=encodeURIComponent(a.name||'');
  return`<div style="padding:10px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:rgba(212,165,116,0.03);">
    <div style="font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);white-space:nowrap;">Recommended Play</div>
    <span style="font-size:.68rem;padding:2px 8px;border-radius:20px;font-weight:600;color:${ctx.tempColor};background:rgba(255,255,255,0.04);border:1px solid ${ctx.tempColor}33;">${ctx.tempLabel}</span>
    <span style="font-size:.7rem;color:var(--tx2);">${esc(rec.channel)} | ${esc(rec.cta)}</span>
    <span style="font-size:.65rem;color:var(--tx3);">Asset: ${esc(rec.asset)}</span>
    <div style="flex-basis:100%;font-size:.72rem;color:var(--tx2);line-height:1.45;">${esc(move.title)} | ${esc(move.reason)}</div>
    <div style="margin-left:auto;display:flex;gap:4px;">
      ${renderNextMoveButton(a,move)}
      <a href="${buildSignalRoomHref('/app/cold-call-studio/?account='+encName,a.name,'Cold Call Studio')}" class="btn btn-sm" style="font-size:.6rem;padding:3px 8px;text-decoration:none;">Prep Call</a>
    </div>
  </div>`;
}

function renderDetail(a){
  const tab=S.tab[a.id]||'all';
  const allSigs=(a.signals||[]);
  const tabList=[['all','All',allSigs.length],...Object.entries(CATS).map(([k,v])=>[k,v.l,allSigs.filter(s=>s.cat===k).length]).filter(([,,n])=>n>0)];
  const sigs=tab==='all'?allSigs:allSigs.filter(s=>s.cat===tab);
  const sorted=[...sigs].sort((x,y)=>{
    if(x.status==='flagged'&&y.status!=='flagged')return 1;
    if(x.status!=='flagged'&&y.status==='flagged')return -1;
    return((y.confidence||0)*recency(y))-((x.confidence||0)*recency(x));
  });

  const researchLinks=[
    a.ticker?[secUrl(a.name),'SEC Filings']:null,
    [gNews(a.name,''),'Google News'],
    [gNews(a.name,'AI'),'AI News'],
    a.linkedin?[`https://www.linkedin.com/company/${a.linkedin}/`,'LinkedIn']:null,
    [`https://www.google.com/search?q=%22${encodeURIComponent(a.name)}%22+earnings+2025`,'Earnings'],
    a.domain?[`https://crt.sh/?q=%25.${a.domain}&output=json`,'SSL Certs']:null,
  ].filter(Boolean);

  return`
<div class="detail">
  <div class="detail-actions">
    <button class="btn btn-gold btn-sm" data-enrich="${a.id}" ${a._researching?'disabled':''}>${a._researching==='ai'?'Researching...':'AI Research'}</button>
    <button class="btn btn-sm" data-deepresearch="${a.id}" ${a._researching?'disabled':''} style="background:rgba(168,85,247,0.1);border-color:rgba(168,85,247,0.3);color:#a855f7;">${a._researching==='deep'?'Researching...':'Deep Research'}</button>
    <button class="btn btn-sm" data-brief="${a.id}">Copy Brief</button>
    <button class="btn btn-sm" data-copysigs="${a.id}">Signals</button>
    <button class="btn btn-sm" data-scoredetail="${a.id}">Why ${heat(a)}?</button>
    <span style="margin-left:auto;font-family:var(--mono);font-size:.6rem;color:var(--tx3)">${a._lastEnriched?`live ${esc(formatRelativeTime(a._lastEnriched))} | `:''}${scoreExplain(a)}</span>
  </div>
  ${renderResearchStatus(a)}
  ${renderRecPlay(a)}
  <div class="detail-research">
    <span style="font-size:.6rem;color:var(--tx4);font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:3px 0">Research:</span>
    ${researchLinks.map(([u,l])=>`<a class="rlink" href="${esc(u)}" target="_blank" rel="noopener">↗ ${l}</a>`).join('')}
  </div>
  ${renderHeatExplainability(a)}
  <div class="detail-tabs">
    ${tabList.map(([k,l,n])=>`<div class="dtab ${tab===k?'on':''}" data-dtab="${a.id}|${k}">${l}<small>${n}</small></div>`).join('')}
  </div>
  <div class="detail-body">
    ${sorted.length?sorted.map(s=>{
      const ci=CATS[s.cat]||{};const r=recency(s);const stale=r<.3;const flagged=s.status==='flagged';
      const ageDays=Math.round((Date.now()-new Date(s.published_date||s.fetched_at||'2024-01-01').getTime())/864e5);
      const ageLabel=ageDays<=30?'':ageDays<=90?'aging':'stale';
      return`
      <div class="sig ${stale&&!flagged?'stale':''} ${flagged?'flagged':''}">
        <div class="sig-actions">
          <button class="sig-vbtn ${s.status==='verified'?'verified':''}" data-verify="${a.id}|${s.id}" title="Verify">✓</button>
          <button class="sig-vbtn ${s.status==='flagged'?'flag':''}" data-flag="${a.id}|${s.id}" title="Flag">⚑</button>
        </div>
        <div class="sig-top">
          <div class="sig-dot ${ci.d||''}"></div>
          <div class="sig-body">
            <div class="sig-hl">${esc(s.headline)}${s.is_ai?'<span class="sig-ai">AI</span>':''}</div>
            <div class="sig-detail">${esc(s.detail)}</div>
            ${(s.why||s.why_it_matters)?`<details style="margin-top:4px;"><summary style="font-size:.68rem;color:var(--tx3);cursor:pointer;opacity:.6;">Why it matters</summary><div class="sig-why">💡 ${esc(s.why||s.why_it_matters||'')}</div></details>`:''}
            <div class="sig-foot">
              <span class="sig-src">📎 ${esc(s.source_name||'')} ${s.url?`· <a href="${esc(s.url)}" target="_blank" rel="noopener">Source →</a>`:''}</span>
              <span class="sig-conf">${Math.round((s.confidence||0)*100)}% conf</span>
              ${ageLabel?`<span class="sig-age">${ageLabel}</span>`:''}
              <span class="sig-src">${esc(s.published_date||'')}</span>
              ${s.status==='verified'?'<span style="color:var(--green);font-size:.6rem">✓ verified</span>':''}
            </div>
            ${(s.pain_tags||[]).length?`<div class="sig-tags">${s.pain_tags.map(t=>PAIN_LIB[t]?`<span class="sig-tag">${PAIN_LIB[t].l}</span>`:'').join('')}</div>`:''}
          </div>
        </div>
      </div>`;
    }).join(''):'<div style="color:var(--tx3);padding:16px">No signals in this category.</div>'}
  </div>
  <div class="brief-bar">
    <button class="btn btn-gold btn-sm" data-brief="${a.id}">📋 Copy Pre-Call Brief</button>
    <button class="btn btn-sm" data-copysigs="${a.id}">Copy Signals Only</button>
  </div>
</div>`;
}
