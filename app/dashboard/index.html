<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Antaeus GTM OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <style>
        .np-risk-card{background:var(--bg-secondary);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:18px;border-left:3px solid rgba(239,68,68,0.4);transition:border-color 0.2s;}
        .np-risk-card:hover{border-color:rgba(239,68,68,0.6);}
        .np-risk-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:12px;}
        .np-risk-name{font-weight:700;font-size:0.92rem;color:var(--text-primary);}
        .np-risk-meta{font-size:0.72rem;color:var(--text-muted);}
        .np-risk-score{font-size:0.62rem;padding:2px 7px;border-radius:var(--radius-full);font-weight:700;background:rgba(239,68,68,0.12);color:#ef4444;white-space:nowrap;}
        .np-risk-narrative{font-size:0.82rem;color:var(--text-tertiary);line-height:1.5;margin-bottom:10px;}
        .np-risk-links{display:flex;gap:8px;flex-wrap:wrap;}
        .np-risk-link{font-size:0.68rem;color:var(--brand-gold);text-decoration:none;font-weight:600;}
        .np-risk-link:hover{text-decoration:underline;}
        .np-move{padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
        .np-move:first-child{padding-top:0;}
        .np-move:last-child{border-bottom:none;padding-bottom:0;}
        .np-move-num{font-family:var(--font-serif);font-size:1rem;color:var(--brand-gold);float:left;margin-right:10px;line-height:1.3;}
        .np-move-action{font-size:0.88rem;color:var(--text-secondary);line-height:1.5;}
        .np-move-reason{font-size:0.75rem;color:var(--text-muted);margin-top:3px;font-style:italic;}
        .np-move-link{font-size:0.68rem;color:var(--brand-gold);text-decoration:none;font-weight:600;margin-top:4px;display:inline-block;}
        .np-move-link:hover{text-decoration:underline;}
        .np-backup{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px;padding:16px 18px;border-radius:var(--radius-lg);border:1px solid rgba(59,130,246,0.22);background:linear-gradient(135deg,rgba(59,130,246,0.08),rgba(59,130,246,0.03));}
        .np-backup.warn{border-color:rgba(245,158,11,0.28);background:linear-gradient(135deg,rgba(245,158,11,0.12),rgba(245,158,11,0.04));}
        .np-backup-copy{flex:1;min-width:260px;}
        .np-backup-title{font-size:0.82rem;font-weight:700;color:var(--text-primary);margin-bottom:4px;}
        .np-backup-sub{font-size:0.76rem;color:var(--text-muted);line-height:1.5;}
        .np-backup-toast{position:fixed;right:20px;top:20px;z-index:9999;max-width:360px;padding:12px 14px;border-radius:10px;border:1px solid rgba(245,158,11,0.35);background:rgba(245,158,11,0.14);color:#fbbf24;box-shadow:0 10px 32px rgba(0,0,0,0.35);font-size:0.82rem;line-height:1.4;opacity:0;transform:translateY(-8px);transition:opacity 0.2s ease, transform 0.2s ease;pointer-events:none;}
        .np-backup-toast.show{opacity:1;transform:translateY(0);}
        .np-lifecycle{margin-bottom:16px;padding:20px 22px;border-radius:var(--radius-lg);border:1px solid rgba(96,165,250,0.22);background:linear-gradient(135deg,rgba(59,130,246,0.1),rgba(59,130,246,0.04));}
        .np-lifecycle-top{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:12px;flex-wrap:wrap;}
        .np-lifecycle-kicker{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:#93c5fd;font-weight:700;margin-bottom:6px;}
        .np-lifecycle-title{font-family:var(--font-serif);font-size:1.1rem;color:var(--text-primary);margin-bottom:6px;}
        .np-lifecycle-copy{font-size:0.84rem;color:var(--text-secondary);line-height:1.6;max-width:620px;}
        .np-lifecycle-score{min-width:120px;padding:12px 14px;border-radius:14px;background:rgba(15,23,42,0.28);border:1px solid rgba(255,255,255,0.06);text-align:center;}
        .np-lifecycle-score span{display:block;font-family:var(--font-serif);font-size:1.6rem;color:#eff6ff;line-height:1;}
        .np-lifecycle-score small{display:block;margin-top:6px;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:#93c5fd;font-weight:700;}
        .np-lifecycle-rhythm{padding:12px 14px;border-radius:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);font-size:0.8rem;color:var(--text-tertiary);line-height:1.6;margin-bottom:14px;}
        .np-lifecycle-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
        .np-lifecycle-milestones{display:flex;flex-wrap:wrap;gap:8px;}
        .np-lifecycle-pill{display:inline-flex;align-items:center;padding:7px 10px;border-radius:999px;border:1px solid rgba(148,163,184,0.22);background:rgba(148,163,184,0.08);color:var(--text-muted);font-size:0.72rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
        .np-lifecycle-pill.done{border-color:rgba(34,197,94,0.25);background:rgba(34,197,94,0.12);color:#bbf7d0;}
        .dash-panel-title{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);font-weight:700;display:flex;align-items:center;gap:8px;}
        .dash-panel-title .dot{width:8px;height:8px;border-radius:50%;}
        .dash-panel-title .dot.red{background:#ef4444;}
        .dash-panel-title .dot.gold{background:var(--brand-gold);}
        .dash-list-stack{display:grid;gap:12px;}
        .dash-tool-row{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
        .dash-tool-actions{display:flex;gap:8px;flex-wrap:wrap;}
        .command-mode-shell{display:grid;gap:16px;margin-bottom:18px;}
        .command-mode-bar{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;flex-wrap:wrap;padding:16px 18px;border-radius:var(--radius-lg);border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);}
        .command-mode-copy{font-size:0.82rem;color:var(--text-muted);line-height:1.6;max-width:68ch;}
        .command-mode-controls{display:flex;gap:8px;flex-wrap:wrap;}
        .command-mode-btn{appearance:none;border:1px solid rgba(148,163,184,0.22);background:rgba(15,23,42,0.4);color:var(--text-muted);padding:10px 14px;border-radius:999px;font-size:0.72rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:background 0.18s ease,border-color 0.18s ease,color 0.18s ease,transform 0.18s ease;}
        .command-mode-btn:hover{border-color:rgba(212,165,116,0.3);color:var(--text-secondary);transform:translateY(-1px);}
        .command-mode-btn.is-active{background:rgba(212,165,116,0.14);border-color:rgba(212,165,116,0.38);color:var(--brand-gold);}
        .command-delta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;}
        .command-delta-card{display:grid;gap:10px;padding:16px 18px;border-radius:var(--radius-lg);border:1px solid rgba(96,165,250,0.2);background:linear-gradient(135deg,rgba(30,41,59,0.72),rgba(15,23,42,0.86));}
        .command-delta-card strong{font-size:0.82rem;color:var(--text-primary);}
        .command-delta-list{display:grid;gap:8px;margin:0;padding:0;list-style:none;}
        .command-delta-list li{font-size:0.78rem;color:var(--text-tertiary);line-height:1.55;padding-left:14px;position:relative;}
        .command-delta-list li::before{content:'';position:absolute;left:0;top:0.58rem;width:6px;height:6px;border-radius:50%;background:rgba(212,165,116,0.85);}
        .command-spotlight-shell{display:grid;grid-template-columns:minmax(0,1fr) minmax(280px,.48fr);gap:16px;align-items:start;}
        .command-spotlight-main{display:grid;gap:14px;padding:22px 22px 20px;border-radius:22px;border:1px solid rgba(36,113,231,0.12);background:rgba(255,255,255,0.9);box-shadow:0 14px 30px rgba(10,28,64,0.06);}
        .command-spotlight-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;}
        .command-spotlight-metric{font-family:var(--font-serif);font-size:2.3rem;line-height:1;color:var(--accent-blue);}
        .command-spotlight-title{font-family:var(--font-serif);font-size:2rem;line-height:1.02;color:var(--text-primary);max-width:13ch;}
        .command-spotlight-copy{font-size:0.94rem;color:var(--text-secondary);line-height:1.75;max-width:62ch;}
        .command-spotlight-stack{display:grid;gap:10px;}
        .command-spotlight-reward{display:flex;justify-content:flex-start;margin-top:2px;}
        .command-spotlight-reward-btn{appearance:none;display:inline-flex;align-items:center;gap:10px;padding:10px 14px;border-radius:999px;border:1px solid rgba(36,113,231,0.16);background:linear-gradient(135deg,rgba(36,113,231,0.08),rgba(255,255,255,0.92));color:var(--text-primary);font-size:0.76rem;font-weight:700;letter-spacing:0.02em;cursor:pointer;transition:border-color .18s ease,background .18s ease,transform .18s ease,box-shadow .18s ease;}
        .command-spotlight-reward-btn:hover{transform:translateY(-1px);border-color:rgba(36,113,231,0.28);box-shadow:0 10px 24px rgba(10,28,64,0.08);}
        .command-spotlight-reward-btn .reward-kicker{font-size:0.62rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent-blue);}
        .command-spotlight-reward-btn .reward-copy{font-size:0.78rem;font-weight:700;color:var(--text-primary);}
        .command-spotlight-item{appearance:none;display:grid;gap:8px;width:100%;padding:12px 14px;text-align:left;border-radius:16px;border:1px solid rgba(10,28,64,0.08);background:rgba(255,255,255,0.78);cursor:pointer;transition:border-color .18s ease,background .18s ease,transform .18s ease,box-shadow .18s ease;}
        .command-spotlight-item:hover{transform:translateY(-1px);border-color:rgba(36,113,231,0.22);}
        .command-spotlight-item.is-active{border-color:rgba(36,113,231,0.3);background:#fff;box-shadow:0 10px 24px rgba(10,28,64,0.06);}
        .command-spotlight-item-top,.command-spotlight-item-footer{display:flex;justify-content:space-between;gap:10px;align-items:center;}
        .command-spotlight-item-title{font-size:1.05rem;font-weight:700;color:var(--text-primary);line-height:1.25;}
        .command-spotlight-item-rank{font-family:var(--font-serif);font-size:1.15rem;color:var(--accent-blue);line-height:1;}
        .command-spotlight-item-footer{padding-top:10px;border-top:1px solid rgba(10,28,64,0.08);font-size:0.7rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-muted);}
        .command-queue-shell{display:grid;grid-template-columns:minmax(300px,.48fr) minmax(0,.82fr);gap:16px;align-items:start;}
        .command-queue-list{display:grid;gap:10px;}
        .command-queue-item{appearance:none;display:grid;grid-template-columns:34px minmax(0,1fr) auto;gap:12px;align-items:center;width:100%;padding:12px 14px;border-radius:16px;border:1px solid rgba(10,28,64,0.08);background:rgba(255,255,255,0.88);text-align:left;cursor:pointer;transition:border-color .18s ease,background .18s ease,box-shadow .18s ease;}
        .command-queue-item.is-active{border-color:rgba(36,113,231,0.3);background:#fff;box-shadow:0 10px 24px rgba(10,28,64,0.06);}
        .command-queue-rank{font-family:var(--font-serif);font-size:1.55rem;color:var(--accent-blue);line-height:1;}
        .command-queue-body{display:grid;gap:4px;}
        .command-queue-title{font-size:1.08rem;font-weight:700;color:var(--text-primary);line-height:1.14;}
        .command-queue-next{font-size:0.8rem;color:var(--text-muted);line-height:1.45;}
        .command-queue-detail{display:grid;gap:16px;padding:20px 22px;border-radius:22px;border:1px solid rgba(10,28,64,0.08);background:rgba(255,255,255,0.92);box-shadow:0 14px 30px rgba(10,28,64,0.06);}
        .command-queue-detail-title{font-family:var(--font-serif);font-size:2rem;line-height:1.02;color:var(--text-primary);max-width:14ch;}
        .command-queue-detail-copy{font-size:0.94rem;color:var(--text-secondary);line-height:1.75;max-width:54ch;}
        .dashboard-graph-backdrop{position:fixed;inset:0;display:grid;place-items:center;padding:22px;background:rgba(10,28,64,0.48);backdrop-filter:blur(8px);z-index:1800;}
        .dashboard-graph-panel{width:min(1020px,calc(100vw - 44px));max-height:calc(100vh - 44px);overflow:auto;display:grid;gap:18px;padding:24px;border-radius:24px;border:1px solid rgba(10,28,64,0.08);background:rgba(255,255,255,0.98);box-shadow:0 24px 80px rgba(10,28,64,0.24);}
        .dashboard-graph-head{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;flex-wrap:wrap;}
        .dashboard-graph-kicker{font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent-blue);}
        .dashboard-graph-title{font-family:var(--font-serif);font-size:clamp(2rem,3vw,2.8rem);line-height:0.98;color:var(--text-primary);max-width:14ch;margin-top:8px;}
        .dashboard-graph-copy{font-size:0.92rem;line-height:1.75;color:var(--text-secondary);max-width:70ch;margin-top:8px;}
        .dashboard-graph-stage{position:relative;min-height:340px;border-radius:22px;border:1px dashed rgba(36,113,231,0.22);background:linear-gradient(180deg,rgba(36,113,231,0.05),rgba(255,255,255,0.92));overflow:hidden;}
        .dashboard-graph-svg{position:absolute;inset:0;width:100%;height:100%;}
        .dashboard-graph-node{position:absolute;display:grid;gap:8px;width:min(240px,28vw);padding:14px 16px;border-radius:18px;border:1px solid rgba(10,28,64,0.08);background:rgba(255,255,255,0.96);box-shadow:0 12px 30px rgba(10,28,64,0.08);}
        .dashboard-graph-node.state-ready{border-color:rgba(36,113,231,0.18);}
        .dashboard-graph-node.state-live{border-color:rgba(34,197,94,0.18);}
        .dashboard-graph-node.state-risk{border-color:rgba(230,112,30,0.22);}
        .dashboard-graph-node-type{font-size:0.66rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);}
        .dashboard-graph-node-title{font-size:1rem;font-weight:700;line-height:1.2;color:var(--text-primary);}
        .dashboard-graph-node-copy{font-size:0.8rem;line-height:1.55;color:var(--text-secondary);}
        .dashboard-graph-node-metric{font-family:var(--font-mono);font-size:0.7rem;color:var(--accent-blue);text-transform:uppercase;letter-spacing:0.05em;}
        .dashboard-graph-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;}
        .dashboard-graph-summary-card{display:grid;gap:6px;padding:14px 16px;border-radius:18px;border:1px solid rgba(10,28,64,0.08);background:rgba(248,250,252,0.96);}
        .dashboard-graph-summary-card strong{font-size:0.92rem;color:var(--text-primary);}
        .dashboard-graph-summary-card p{font-size:0.8rem;line-height:1.6;color:var(--text-secondary);}
        @media(max-width:980px){.command-spotlight-shell,.command-queue-shell{grid-template-columns:1fr;}}
        @media(max-width:900px){.dashboard-graph-node{position:static;width:auto}.dashboard-graph-stage{display:grid;gap:12px;padding:14px;min-height:auto}.dashboard-graph-svg{display:none;}}
        @media(max-width:800px){.dash-tool-row,.dash-tool-actions{flex-direction:column;align-items:stretch;}}
    </style>
</head>
<body class="command-surface-page command-dashboard-page">
        <script src="/js/app-auth-preflight.js"></script>
<div class="app-container">
        <aside class="app-sidebar">
            <script src="/js/analytics-site-config.js"></script>
    <script src="/js/analytics.js"></script>
            <script src="/js/data-manager.js"></script>
            <script src="/js/nav.js"></script>
        </aside>
        <main class="app-main">
            <header class="app-header">
                <h1 class="page-title">Dashboard</h1>
                <p class="page-subtitle">Morning operating room for the current workspace.</p>
            </header>
            <div class="app-content" style="max-width:1180px;">
                <div id="dashboardShellBand"></div>
                <div class="shell-context-layout">
                    <div class="shell-work-column">
                        <div id="dashboardBootState"></div>
                        <div id="dashContent"></div>
                </div>
                    <aside id="dashboardShellRail"></aside>
                </div>
                <div id="dashboardSheetMount"></div>
                <div id="dashboardGraphMount"></div>
            </div>
        </main>

    <script src="/js/deal-health.js"></script>
    <script src="/js/proof-layer.js"></script>
    <script src="/js/week-one-lifecycle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-config.js"></script>
    <script src="/js/require-auth.js"></script>
    <script src="/js/module-boot-state.js"></script>
<script>
    (function(){
        var dh = window.dealHealth;
        if (!dh) { document.getElementById('dashContent').innerHTML = '<p style="color:var(--text-muted);">deal-health.js not loaded.</p>'; return; }
        var backupToastTimer = null;
        var dashboardSummaryTracked = false;
        var dashboardWeekOneTracked = false;
        var DASHBOARD_MODE_KEY = 'gtmos_dashboard_command_mode';
        var DASHBOARD_ACTIVE_COMMAND_KEY = 'gtmos_dashboard_active_command';
        var DASHBOARD_SNAPSHOT_KEY = 'gtmos_dashboard_command_snapshot';
        var dashboardSheetRegistry = {};
        var dashboardSheetCounter = 0;
        var dashboardSheetActiveKey = null;
        var dashboardGraphPayload = null;
        var dashboardGraphOpen = false;
        var dashboardActiveCommandId = '';
        var DASHBOARD_GATE_LABELS = {
            champion: 'Champion',
            eb: 'Economic buyer',
            usecase: 'Use case',
            impact: 'Business impact',
            process: 'Decision process',
            timeline: 'Timeline',
            competition: 'Competition',
            risks: 'Risks',
            nextstep: 'Next step'
        };

        function escH(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
        function readLS(k,fb){try{return JSON.parse(localStorage.getItem(k))||fb}catch(e){return fb}}
        function writeLS(k, value){ try { localStorage.setItem(k, JSON.stringify(value)); } catch(e){} }
        function getDataManager(){ return window.gtmDataManager || window.dataManager || null; }
        function trackDashboard(name, props){
            if(window.gtmAnalytics && typeof window.gtmAnalytics.track === 'function'){
                window.gtmAnalytics.track(name, Object.assign({ module: 'dashboard' }, props || {}));
            }
        }
        function normalizeDashboardCommandMode(mode) {
            if (mode === 'grid') return 'spotlight';
            return mode === 'spotlight' || mode === 'queue' ? mode : 'brief';
        }
        function getDashboardCommandModeLabel(mode) {
            var normalized = normalizeDashboardCommandMode(mode);
            return normalized.charAt(0).toUpperCase() + normalized.slice(1);
        }
        function syncDashboardCommandModeUrl(mode) {
            try {
                var url = new URL(window.location.href);
                url.searchParams.set('mode', normalizeDashboardCommandMode(mode));
                window.history.replaceState({}, '', url.pathname + url.search + url.hash);
            } catch (error) {}
        }
        function getDashboardCommandMode() {
            try {
                var queryMode = new URLSearchParams(window.location.search).get('mode');
                if (queryMode === 'brief' || queryMode === 'grid' || queryMode === 'spotlight' || queryMode === 'queue') return normalizeDashboardCommandMode(queryMode);
            } catch (error) {}
            return normalizeDashboardCommandMode(localStorage.getItem(DASHBOARD_MODE_KEY));
        }
        function setDashboardCommandMode(mode) {
            var normalized = normalizeDashboardCommandMode(mode);
            localStorage.setItem(DASHBOARD_MODE_KEY, normalized);
            syncDashboardCommandModeUrl(normalized);
        }
        function readDashboardSnapshot() {
            return readLS(DASHBOARD_SNAPSHOT_KEY, null);
        }
        function saveDashboardSnapshot(snapshot) {
            writeLS(DASHBOARD_SNAPSHOT_KEY, snapshot);
        }
        function resetDashboardSheetRegistry() {
            dashboardSheetRegistry = {};
            dashboardSheetCounter = 0;
        }
        function registerDashboardSheet(sheet) {
            if (!sheet) return '';
            var key = 'dashboard-sheet-' + (++dashboardSheetCounter);
            dashboardSheetRegistry[key] = sheet;
            return key;
        }
        function formatDashboardVisit(iso) {
            if (!iso) return 'earlier';
            var date = new Date(iso);
            if (isNaN(date.getTime())) return 'earlier';
            var diff = Date.now() - date.getTime();
            var minutes = Math.max(1, Math.round(diff / 60000));
            if (minutes < 60) return minutes + 'm ago';
            var hours = Math.round(minutes / 60);
            if (hours < 24) return hours + 'h ago';
            var days = Math.round(hours / 24);
            return days + 'd ago';
        }
        function showDashboardBootState(kind, title, text) {
            if (!window.gtmModuleBootState) return;
            window.gtmModuleBootState.show('#dashboardBootState', {
                kind: kind,
                title: title,
                text: text,
                retryLabel: 'Retry Dashboard',
                retryAction: 'retryDashboardBoot'
            });
        }
        function clearDashboardBootState() {
            if (window.gtmModuleBootState) window.gtmModuleBootState.clear('#dashboardBootState');
        }
        function onDashboardBootFailure(error) {
            console.error('Dashboard boot failed:', error);
            trackDashboard('dashboard_boot_failed', {
                message: (error && error.message) ? error.message : 'Dashboard boot failed'
            });
            document.getElementById('dashContent').innerHTML = '';
            showDashboardBootState(
                'error',
                'Dashboard could not finish loading.',

                var input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
                input.onchange = function(e) {
                    var file = e.target.files[0]; if (!file) return;
                    var reader = new FileReader();
                    reader.onload = function(ev) {
                        try {
                            var data = JSON.parse(ev.target.result);
                            if (Array.isArray(data)) {
                                data.forEach(function(item) { localStorage.setItem(item.key, typeof item.value === 'string' ? item.value : JSON.stringify(item.value)); });
                                alert('Imported ' + data.length + ' keys. Refreshing...'); setTimeout(function() { location.reload(); }, 300);
                            }
                        } catch(err) { alert('Import failed: ' + err.message); }
                    };
                    reader.readAsText(file);
                };
                input.click();
            } else if (action === 'delete') {
                if (!confirm('Delete ALL GTM OS data? This cannot be undone.')) return;
                var keys = [];
                for (var i = 0; i < localStorage.length; i++) { var k = localStorage.key(i); if (k && k.indexOf('gtmos_') === 0) keys.push(k); }
                keys.forEach(function(k) { localStorage.removeItem(k); });
                alert('Deleted ' + keys.length + ' keys.'); setTimeout(function() { location.reload(); }, 300);
            }
        };
        window.setDashboardCommandMode = function(mode) {
            mode = normalizeDashboardCommandMode(mode);
            if (mode !== 'brief' && mode !== 'spotlight' && mode !== 'queue') return;
            dashboardSheetActiveKey = null;
            dashboardGraphOpen = false;
            setDashboardCommandMode(mode);
            trackDashboard('dashboard_command_mode_changed', { mode: mode });
            Promise.resolve(render()).catch(onDashboardBootFailure);
        };
        window.setDashboardActiveCommandCard = function(commandId) {
            if (!commandId) return;
            dashboardActiveCommandId = commandId;
            localStorage.setItem(DASHBOARD_ACTIVE_COMMAND_KEY, commandId);
            dashboardSheetActiveKey = null;
            dashboardGraphOpen = false;
            Promise.resolve(render()).catch(onDashboardBootFailure);
        };

        function renderWhenReady() {
            dashboardSummaryTracked = false;
            if (window.gtmShellChrome) {
                window.gtmShellChrome.applyHeader({
                    stateLabel: 'Rebuilding',
                    stateTone: 'ready'
                });
            }
            showDashboardBootState(
                'loading',
                'Loading Dashboard',
                'Rebuilding your workspace summary, command stack, and current Monday operating picture.'
            );
            Promise.resolve(render()).then(function() {
                clearDashboardBootState();
            }).catch(onDashboardBootFailure);
            showBackupReminderToast();
        }

        if (window.__gtmosAuthGatePending && window.requireAuthReady && typeof window.requireAuthReady.then === 'function') {
            window.requireAuthReady.then(renderWhenReady).catch(onDashboardBootFailure);
        } else if (window.__gtmosAuthGatePending) {
            showDashboardBootState(
                'loading',
                'Waiting for auth',
                'Dashboard is waiting for your authenticated workspace before it rebuilds the current command stack.'
            );
            window.addEventListener('gtmos:auth-ready', renderWhenReady, { once: true });
        } else {
            renderWhenReady();
        }
    })();
    </script>
</body>
</html>
