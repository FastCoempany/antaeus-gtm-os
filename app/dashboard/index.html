<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Antaeus GTM OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <style>
        .np-risk-card{background:var(--bg-secondary);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:18px;border-left:3px solid rgba(239,68,68,0.4);transition:border-color 0.2s;}
        .np-risk-card:hover{border-color:rgba(239,68,68,0.6);}
        .np-risk-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:12px;}
        .np-risk-name{font-weight:700;font-size:0.92rem;color:var(--text-primary);}
        .np-risk-meta{font-size:0.72rem;color:var(--text-muted);}
        .np-risk-score{font-size:0.62rem;padding:2px 7px;border-radius:var(--radius-full);font-weight:700;background:rgba(239,68,68,0.12);color:#ef4444;white-space:nowrap;}
        .np-risk-narrative{font-size:0.82rem;color:var(--text-tertiary);line-height:1.5;margin-bottom:10px;}
        .np-risk-links{display:flex;gap:8px;flex-wrap:wrap;}
        .np-risk-link{font-size:0.68rem;color:var(--brand-gold);text-decoration:none;font-weight:600;}
        .np-risk-link:hover{text-decoration:underline;}
        .np-move{padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
        .np-move:first-child{padding-top:0;}
        .np-move:last-child{border-bottom:none;padding-bottom:0;}
        .np-move-num{font-family:var(--font-serif);font-size:1rem;color:var(--brand-gold);float:left;margin-right:10px;line-height:1.3;}
        .np-move-action{font-size:0.88rem;color:var(--text-secondary);line-height:1.5;}
        .np-move-reason{font-size:0.75rem;color:var(--text-muted);margin-top:3px;font-style:italic;}
        .np-move-link{font-size:0.68rem;color:var(--brand-gold);text-decoration:none;font-weight:600;margin-top:4px;display:inline-block;}
        .np-move-link:hover{text-decoration:underline;}
        .np-backup{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px;padding:16px 18px;border-radius:var(--radius-lg);border:1px solid rgba(59,130,246,0.22);background:linear-gradient(135deg,rgba(59,130,246,0.08),rgba(59,130,246,0.03));}
        .np-backup.warn{border-color:rgba(245,158,11,0.28);background:linear-gradient(135deg,rgba(245,158,11,0.12),rgba(245,158,11,0.04));}
        .np-backup-copy{flex:1;min-width:260px;}
        .np-backup-title{font-size:0.82rem;font-weight:700;color:var(--text-primary);margin-bottom:4px;}
        .np-backup-sub{font-size:0.76rem;color:var(--text-muted);line-height:1.5;}
        .np-backup-toast{position:fixed;right:20px;top:20px;z-index:9999;max-width:360px;padding:12px 14px;border-radius:10px;border:1px solid rgba(245,158,11,0.35);background:rgba(245,158,11,0.14);color:#fbbf24;box-shadow:0 10px 32px rgba(0,0,0,0.35);font-size:0.82rem;line-height:1.4;opacity:0;transform:translateY(-8px);transition:opacity 0.2s ease, transform 0.2s ease;pointer-events:none;}
        .np-backup-toast.show{opacity:1;transform:translateY(0);}
        .np-lifecycle{margin-bottom:16px;padding:20px 22px;border-radius:var(--radius-lg);border:1px solid rgba(96,165,250,0.22);background:linear-gradient(135deg,rgba(59,130,246,0.1),rgba(59,130,246,0.04));}
        .np-lifecycle-top{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:12px;flex-wrap:wrap;}
        .np-lifecycle-kicker{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:#93c5fd;font-weight:700;margin-bottom:6px;}
        .np-lifecycle-title{font-family:var(--font-serif);font-size:1.1rem;color:var(--text-primary);margin-bottom:6px;}
        .np-lifecycle-copy{font-size:0.84rem;color:var(--text-secondary);line-height:1.6;max-width:620px;}
        .np-lifecycle-score{min-width:120px;padding:12px 14px;border-radius:14px;background:rgba(15,23,42,0.28);border:1px solid rgba(255,255,255,0.06);text-align:center;}
        .np-lifecycle-score span{display:block;font-family:var(--font-serif);font-size:1.6rem;color:#eff6ff;line-height:1;}
        .np-lifecycle-score small{display:block;margin-top:6px;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:#93c5fd;font-weight:700;}
        .np-lifecycle-rhythm{padding:12px 14px;border-radius:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);font-size:0.8rem;color:var(--text-tertiary);line-height:1.6;margin-bottom:14px;}
        .np-lifecycle-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
        .np-lifecycle-milestones{display:flex;flex-wrap:wrap;gap:8px;}
        .np-lifecycle-pill{display:inline-flex;align-items:center;padding:7px 10px;border-radius:999px;border:1px solid rgba(148,163,184,0.22);background:rgba(148,163,184,0.08);color:var(--text-muted);font-size:0.72rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
        .np-lifecycle-pill.done{border-color:rgba(34,197,94,0.25);background:rgba(34,197,94,0.12);color:#bbf7d0;}
        .dash-panel-title{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);font-weight:700;display:flex;align-items:center;gap:8px;}
        .dash-panel-title .dot{width:8px;height:8px;border-radius:50%;}
        .dash-panel-title .dot.red{background:#ef4444;}
        .dash-panel-title .dot.gold{background:var(--brand-gold);}
        .dash-list-stack{display:grid;gap:12px;}
        .dash-tool-row{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
        .dash-tool-actions{display:flex;gap:8px;flex-wrap:wrap;}
        @media(max-width:800px){.dash-tool-row,.dash-tool-actions{flex-direction:column;align-items:stretch;}}
    </style>
</head>
<body>
        <script src="/js/app-auth-preflight.js"></script>
<div class="app-container">
        <aside class="app-sidebar">
            <script src="/js/analytics-site-config.js"></script>
    <script src="/js/analytics.js"></script>
            <script src="/js/data-manager.js"></script>
            <script src="/js/nav.js"></script>
        </aside>
        <main class="app-main">
            <header class="app-header">
                <h1 class="page-title">Dashboard</h1>
                <p class="page-subtitle">Morning operating room for the current workspace.</p>
            </header>
            <div class="app-content" style="max-width:1180px;">
                <div id="dashboardShellBand"></div>
                <div class="shell-context-layout">
                    <div class="shell-work-column">
                        <div id="dashboardBootState"></div>
                        <div id="dashContent"></div>
                    </div>
                    <aside id="dashboardShellRail"></aside>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/deal-health.js"></script>
    <script src="/js/proof-layer.js"></script>
    <script src="/js/week-one-lifecycle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-config.js"></script>
    <script src="/js/require-auth.js"></script>
    <script src="/js/module-boot-state.js"></script>
<script>
    (function(){
        var dh = window.dealHealth;
        if (!dh) { document.getElementById('dashContent').innerHTML = '<p style="color:var(--text-muted);">deal-health.js not loaded.</p>'; return; }
        var backupToastTimer = null;
        var dashboardSummaryTracked = false;
        var dashboardWeekOneTracked = false;

        function escH(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
        function readLS(k,fb){try{return JSON.parse(localStorage.getItem(k))||fb}catch(e){return fb}}
        function getDataManager(){ return window.gtmDataManager || window.dataManager || null; }
        function trackDashboard(name, props){
            if(window.gtmAnalytics && typeof window.gtmAnalytics.track === 'function'){
                window.gtmAnalytics.track(name, Object.assign({ module: 'dashboard' }, props || {}));
            }
        }
        function showDashboardBootState(kind, title, text) {
            if (!window.gtmModuleBootState) return;
            window.gtmModuleBootState.show('#dashboardBootState', {
                kind: kind,
                title: title,
                text: text,
                retryLabel: 'Retry Dashboard',
                retryAction: 'retryDashboardBoot'
            });
        }
        function clearDashboardBootState() {
            if (window.gtmModuleBootState) window.gtmModuleBootState.clear('#dashboardBootState');
        }
        function onDashboardBootFailure(error) {
            console.error('Dashboard boot failed:', error);
            trackDashboard('dashboard_boot_failed', {
                message: (error && error.message) ? error.message : 'Dashboard boot failed'
            });
            document.getElementById('dashContent').innerHTML = '';
            showDashboardBootState(
                'error',
                'Dashboard could not finish loading.',
                'Antaeus hit a startup failure while rebuilding your workspace summary and Monday command view. Retry once. If it fails again, refresh the page and check whether the current auth session or synced workspace data is unhealthy.'
            );
        }
        window.retryDashboardBoot = function() {
            renderWhenReady();
        };
        function backupStatus(){
            var manager = getDataManager();
            if (!manager || typeof manager.getBackupStatus !== 'function') return null;
            return manager.getBackupStatus();
        }
        function formatBackupDate(iso){
            if(!iso) return 'No backup exported yet.';
            var date = new Date(iso);
            if(isNaN(date.getTime())) return 'Backup export date unavailable.';
            return 'Last offline backup: ' + date.toLocaleString([], { year:'numeric', month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
        }
        function backupBannerHtml(){
            var status = backupStatus();
            if(!status) return '';
            var title = status.needsReminder ? 'Export an offline backup for this workspace.' : 'Keep an offline backup of your synced workspace.';
            var sub = status.needsReminder
                ? 'Cloud sync is live, but you still want a recovery file. Export a fresh JSON backup now.'
                : formatBackupDate(status.lastExportAt);
            return '<div class="np-backup' + (status.needsReminder ? ' warn' : '') + '">' +
                '<div class="np-backup-copy">' +
                '<div class="np-backup-title">' + escH(title) + '</div>' +
                '<div class="np-backup-sub">' + escH(sub) + '</div>' +
                '</div>' +
                '<button class="btn btn-primary" onclick="runDataAction(\'export\')">Export Backup</button>' +
                '</div>';
        }
        function showBackupReminderToast(){
            var manager = getDataManager();
            if (!manager || typeof manager.shouldShowBackupReminder !== 'function' || !manager.shouldShowBackupReminder()) return;
            var node = document.getElementById('backupReminderToast');
            if (!node) {
                node = document.createElement('div');
                node.id = 'backupReminderToast';
                node.className = 'np-backup-toast';
                document.body.appendChild(node);
            }
            node.textContent = 'No recent offline backup detected. Export a fresh workspace backup this week.';
            node.classList.add('show');
            if (typeof manager.markBackupReminderShown === 'function') {
                manager.markBackupReminderShown();
            }
            if (backupToastTimer) clearTimeout(backupToastTimer);
            backupToastTimer = setTimeout(function(){
                node.classList.remove('show');
            }, 3600);
        }

        function dependencyWarningHtml(warnings){
            if (!warnings || !warnings.length) return '';
            return '<div class="np-backup warn">' +
                '<div class="np-backup-copy">' +
                '<div class="np-backup-title">Dashboard is using the best available local view.</div>' +
                '<div class="np-backup-sub">Some synced inputs failed to refresh: ' + escH(warnings.join(', ')) + '. You can keep working, then retry the page when you want a fresh cloud-backed summary.</div>' +
                '</div>' +
                '<button class="btn btn-primary" onclick="location.reload()">Retry Sync</button>' +
                '</div>';
        }

        function buildSignalCounts(accounts) {
            var list = Array.isArray(accounts) ? accounts : [];
            return list.reduce(function(total, account) {
                var next = account && Array.isArray(account.signals) ? account.signals.length : 0;
                return total + next;
            }, 0);
        }

        function buildMotionCounts(summary) {
            var discovery = summary && summary.discovery && summary.discovery.stats ? summary.discovery.stats : {};
            var sequences = summary && summary.sequences ? summary.sequences : {};
            var outboundTouches = sequences.outboundTouches && Array.isArray(sequences.outboundTouches.touches) ? sequences.outboundTouches.touches.length : 0;
            var linkedinActions = sequences.linkedinLog && Array.isArray(sequences.linkedinLog.actions) ? sequences.linkedinLog.actions.length : 0;
            var calls = Number(discovery.totalCalls || 0) || 0;
            return {
                touches: outboundTouches + linkedinActions,
                calls: calls,
                total: outboundTouches + linkedinActions + calls
            };
        }

        function getDashboardStage(context) {
            if (!context.icps && !context.accounts && !context.deals) {
                return {
                    key: 'setup',
                    score: 0,
                    title: 'This dashboard becomes useful once the first operating objects exist.',
                    copy: 'Start with one ICP, then one live account or signal, then one real deal. After that, the dashboard stops being theoretical and starts behaving like a command surface.',
                    stageBadge: 'Setup stage',
                    emptyTitle: 'You have a live workspace, but no command surface yet.',
                    emptyCopy: 'The dashboard needs at least one operating object to brief. Build the first ICP, save one account or signal, then create the first real deal.',
                    actions: [
                        { href: '/app/icp-studio/', label: 'Create first ICP' },
                        { href: '/app/signal-console/', label: 'Find a signal' },
                        { href: '/app/welcome/', label: 'Open Welcome Guide' }
                    ]
                };
            }
            if (context.icps && !context.accounts && !context.deals) {
                return {
                    key: 'targeting',
                    score: 1,
                    title: 'You have targeting truth, but the market is still quiet.',
                    copy: 'The dashboard has ICP context now, but it still needs a live account or signal before it can start behaving like an operating brief.',
                    stageBadge: 'Targeting stage',
                    emptyTitle: 'Your ICP exists. Now give the dashboard live market context.',
                    emptyCopy: 'Save one real account or signal so the command layer can stop looking inward and start reacting to the market.',
                    actions: [
                        { href: '/app/signal-console/', label: 'Save first account' },
                        { href: '/app/territory-architect/', label: 'Shape territory' },
                        { href: '/app/dashboard/', label: 'Retry dashboard' }
                    ]
                };
            }
            if (context.accounts && !context.deals) {
                return {
                    key: 'market',
                    score: 2,
                    title: 'The dashboard can see the market, but it still needs a live deal to reason about.',
                    copy: 'Signals and accounts are useful, but the command layer becomes believable when one real deal object exists with next steps, proof, and risk.',
                    stageBadge: 'Market stage',
                    emptyTitle: 'You have signals. Turn one into a deal.',
                    emptyCopy: 'Create the first live deal so the dashboard can brief risk, coverage, and next moves instead of just setup progress.',
                    actions: [
                        { href: '/app/deal-workspace/', label: 'Create first deal' },
                        { href: '/app/outbound-studio/', label: 'Log first motion' },
                        { href: '/app/signal-console/', label: 'Review accounts' }
                    ]
                };
            }
            return {
                key: 'operating',
                score: 3,
                title: 'The dashboard is now reading a real operating system.',
                copy: 'From here, the job is to keep the upstream modules honest so the morning brief remains useful instead of decorative.',
                stageBadge: 'Operating stage',
                emptyTitle: 'The dashboard has some history, but nothing active to brief right now.',
                emptyCopy: 'Your existing records are real, but there is no current motion to summarize. Add a live deal or fresh motion so the command view has something active to manage.',
                actions: [
                    { href: '/app/deal-workspace/', label: 'Open deal workspace' },
                    { href: '/app/outbound-studio/', label: 'Log first motion' },
                    { href: '/app/settings/', label: 'Backup and settings' }
                ]
            };
        }

        function renderSourceMap(stage, context) {
            var useful = context.icps > 0 ? 1 : 0;
            useful += (context.accounts > 0 || context.signals > 0) ? 1 : 0;
            useful += context.deals > 0 ? 1 : 0;
            useful += context.motions > 0 ? 1 : 0;
            return '<div class="np-source-map">' +
                '<div class="np-source-header">' +
                    '<div><div class="np-source-kicker">Dashboard source logic</div><div class="np-source-title">' + escH(stage.title) + '</div><div class="np-source-copy">' + escH(stage.copy) + '</div></div>' +
                    '<div class="np-source-score"><span>' + useful + '/4</span><small>live input layers</small></div>' +
                '</div>' +
                '<div class="np-source-grid">' +
                    '<div class="np-source-card ' + (context.icps > 0 ? 'live' : 'pending') + '"><strong>ICP Studio</strong><span>' + escH(context.icps > 0 ? context.icps + ' ICP' + (context.icps === 1 ? '' : 's') + ' saved' : 'No ICP truth saved yet') + '</span></div>' +
                    '<div class="np-source-card ' + ((context.accounts > 0 || context.signals > 0) ? 'live' : 'next') + '"><strong>Signals</strong><span>' + escH((context.accounts > 0 || context.signals > 0) ? context.accounts + ' account' + (context.accounts === 1 ? '' : 's') + ' · ' + context.signals + ' signal' + (context.signals === 1 ? '' : 's') : 'No live accounts or signals yet') + '</span></div>' +
                    '<div class="np-source-card ' + (context.deals > 0 ? 'live' : 'next') + '"><strong>Deals</strong><span>' + escH(context.deals > 0 ? context.activeDeals + ' active · ' + context.deals + ' total deal' + (context.deals === 1 ? '' : 's') : 'No live deals yet') + '</span></div>' +
                    '<div class="np-source-card ' + (context.motions > 0 ? 'live' : 'pending') + '"><strong>Motion</strong><span>' + escH(context.motions > 0 ? context.motions + ' motion' + (context.motions === 1 ? '' : 's') + ' logged' : 'No calls or outbound activity logged yet') + '</span></div>' +
                '</div>' +
                '<div class="np-source-stage"><div class="np-source-stage-copy">This dashboard becomes useful when there is at least one ICP, one live account or signal, one real deal, and one logged motion. Until then it should behave like an honest setup coach, not pretend to be a fully informed command room.</div><div class="np-source-stage-badge">' + escH(stage.stageBadge) + '</div></div>' +
            '</div>';
        }

        function renderStageActions(actions) {
            var list = (actions || []).map(function(action, index) {
                return '<a href="' + escH(action.href) + '" class="btn ' + (index === 0 ? 'btn-primary' : 'btn-secondary') + '">' + escH(action.label) + '</a>';
            }).join('');
            return list ? '<div class="shell-empty-actions">' + list + '</div>' : '';
        }

        function getDashboardStageTone(stageKey) {
            if (stageKey === 'setup') return 'thin';
            if (stageKey === 'targeting' || stageKey === 'market') return 'ready';
            return 'live';
        }

        function createDashboardAction(action, tone) {
            if (!action || !action.href) return '';
            return '<a href="' + escH(action.href) + '" class="btn ' + (tone || 'btn-secondary') + '">' + escH(action.label) + '</a>';
        }

        function buildDashboardPrimary(stage, briefing, hotSuggestion) {
            var firstStageAction = (stage.actions || [])[0] || null;
            if (!briefing) {
                return {
                    label: 'First unlock',
                    title: firstStageAction ? firstStageAction.label : 'Build the first operating object',
                    copy: stage.emptyCopy,
                    actions: [
                        firstStageAction ? { href: firstStageAction.href, label: firstStageAction.label } : null,
                        (stage.actions || [])[1] ? { href: stage.actions[1].href, label: stage.actions[1].label } : null
                    ].filter(Boolean),
                    tags: [stage.stageBadge, 'setup truth']
                };
            }

            if (briefing.atRisk && briefing.atRisk.length) {
                var riskDeal = briefing.atRisk[0];
                return {
                    label: 'Now',
                    title: 'Recover ' + riskDeal.name + ' before the week drifts.',
                    copy: dh.dealNarrative(riskDeal),
                    actions: [
                        { href: '/app/future-autopsy/?deal=' + encodeURIComponent(riskDeal.id), label: 'Run Autopsy' },
                        { href: '/app/deal-workspace/?deal=' + encodeURIComponent(riskDeal.id), label: 'Open Deal', tone: 'btn-secondary' }
                    ],
                    tags: ['risk ' + riskDeal.riskScore, (dh.STAGE_LABELS[riskDeal.stage] || riskDeal.stage), riskDeal.staleDays + 'd stale']
                };
            }

            if (hotSuggestion) {
                return {
                    label: 'Now',
                    title: 'Turn ' + hotSuggestion.name + ' into a live motion.',
                    copy: hotSuggestion.reason,
                    actions: [
                        { href: '/app/outbound-studio/', label: 'Build Message' },
                        { href: '/app/signal-console/', label: 'Open Signal Console', tone: 'btn-secondary' }
                    ],
                    tags: ['heat ' + hotSuggestion.heat, hotSuggestion.count + ' hot accounts']
                };
            }

            if (briefing.topMoves && briefing.topMoves.length) {
                var move = briefing.topMoves[0];
                return {
                    label: 'Now',
                    title: move.action,
                    copy: move.reason,
                    actions: [
                        move.dealId
                            ? { href: '/app/deal-workspace/?deal=' + encodeURIComponent(move.dealId), label: move.dealName || 'Open Deal' }
                            : (firstStageAction ? { href: firstStageAction.href, label: firstStageAction.label } : null),
                        { href: '/app/dashboard/', label: 'Stay in Command View', tone: 'btn-secondary' }
                    ].filter(Boolean),
                    tags: [stage.stageBadge, 'command move']
                };
            }

            return {
                label: 'Now',
                title: stage.title,
                copy: stage.copy,
                actions: [firstStageAction ? { href: firstStageAction.href, label: firstStageAction.label } : null].filter(Boolean),
                tags: [stage.stageBadge]
            };
        }

        function buildDashboardLanes(stage, primary, briefing, advisorSuggestion, dependencyWarnings) {
            var nextLane = null;
            if (advisorSuggestion) {
                nextLane = {
                    state: 'Next',
                    title: 'Deploy ' + advisorSuggestion.advisor + ' with a precise ask.',
                    copy: advisorSuggestion.deal + ' is dark and risky. Use Advisor Deploy only after the ask is sharp enough to accelerate a real next step.',
                    meta: ['advisor ready', 'risk ' + advisorSuggestion.riskScore],
                    actions: [{ href: '/app/advisor-deploy/', label: 'Build advisor ask', tone: 'btn-secondary' }]
                };
            } else if (briefing && briefing.topMoves && briefing.topMoves[1]) {
                var move = briefing.topMoves[1];
                nextLane = {
                    state: 'Next',
                    title: move.action,
                    copy: move.reason,
                    meta: ['next move', stage.stageBadge],
                    actions: [
                        move.dealId
                            ? { href: '/app/deal-workspace/?deal=' + encodeURIComponent(move.dealId), label: move.dealName || 'Open Deal', tone: 'btn-secondary' }
                            : (((stage.actions || [])[1]) ? { href: stage.actions[1].href, label: stage.actions[1].label, tone: 'btn-secondary' } : null)
                    ].filter(Boolean)
                };
            } else {
                var stageAction = (stage.actions || [])[1] || (stage.actions || [])[0] || null;
                nextLane = {
                    state: 'Next',
                    title: stageAction ? stageAction.label : 'Keep the system moving',
                    copy: stage.emptyCopy,
                    meta: ['stage follow-through'],
                    actions: stageAction ? [{ href: stageAction.href, label: stageAction.label, tone: 'btn-secondary' }] : []
                };
            }

            var maintainTitle = dependencyWarnings.length
                ? 'Repair trust in the command surface.'
                : (stage.key === 'operating' ? 'Keep the command view honest.' : 'Finish the missing operating layers.');
            var maintainCopy = dependencyWarnings.length

            }

            html += '<section class="shell-section shell-section--subtle">';
            html += '<div class="shell-section-header"><div class="shell-section-heading"><div class="shell-section-kicker">Risk queue</div><div class="shell-section-title">The threads that will quietly decay first</div><div class="shell-section-copy">Treat this as the recovery board. If a deal is dark, vague, or stage-false, fix it before you add more surface area.</div></div></div>';
            if (!riskCards.length) {
                html += '<div class="anchor-note"><strong>No immediate recovery queue.</strong> The active deals are not throwing dark-thread risk right now. Keep the system moving, but stay honest about freshness.</div>';
            } else {
                html += '<div class="anchor-queue">' + riskCards.map(function(card, index) {
                    return renderDashboardQueueCard(card, index, String(index + 1));
                }).join('') + '</div>';
            }
            html += '</section>';

            html += '<section class="shell-section shell-section--subtle">';
            html += '<div class="shell-section-header"><div class="shell-section-heading"><div class="shell-section-kicker">Next moves</div><div class="shell-section-title">What the system wants you to do next</div><div class="shell-section-copy">These are ranked to keep the week legible. The goal is fewer choices, stronger follow-through, and less drift.</div></div></div>';
            if (!moveCards.length) {
                html += '<div class="anchor-note"><strong>No urgent command move.</strong> The workspace is not throwing a forced next step right now, which usually means the current system pressure is under control.</div>';
            } else {
                html += '<div class="anchor-queue">' + moveCards.slice(0, 4).map(function(card, index) {
                    return renderDashboardQueueCard(card, index, String(index + 1));
                }).join('') + '</div>';
            }
            html += '</section>';

            html += '<div class="shell-panel-grid" style="display:none;">';

            html += '<section class="shell-section shell-section--subtle">';
            html += '<div class="shell-section-header"><div class="shell-section-heading"><div class="dash-panel-title"><span class="dot red"></span> What\u2019s At Risk</div><div class="shell-section-copy">Use this queue to pull weak or stale work back into the operating loop before it quietly rots.</div></div></div>';
            if (briefing.atRisk.length === 0) {
                html += '<div class="shell-section-note">No deals at risk. Keep executing.</div>';
            } else {
                html += '<div class="dash-list-stack">';
                briefing.atRisk.slice(0, 3).forEach(function(v) {
                    var narrative = dh.dealNarrative(v);
                    var stageLabel = dh.STAGE_LABELS[v.stage] || v.stage;
                    html += '<div class="np-risk-card">';
                    html += '<div class="np-risk-head"><div><div class="np-risk-name">' + escH(v.name) + '</div>';
                    html += '<div class="np-risk-meta">' + dh.money(v.value) + ' &middot; ' + escH(stageLabel) + ' &middot; ' + v.staleDays + 'd since touch</div>';
                    html += '</div><span class="np-risk-score">Risk ' + v.riskScore + '</span></div>';
                    html += '<div class="np-risk-narrative">' + escH(narrative) + '</div>';
                    html += '<div class="np-risk-links">';
                    html += '<a href="/app/deal-workspace/?deal=' + encodeURIComponent(v.id) + '" class="np-risk-link">&rarr; Open Deal</a>';
                    html += '<a href="/app/future-autopsy/?deal=' + encodeURIComponent(v.id) + '" class="np-risk-link">&rarr; Run Autopsy</a>';
                    html += '</div></div>';
                });
                html += '</div>';
            }
            html += '</section>';

            html += '<section class="shell-section shell-section--subtle">';
            html += '<div class="shell-section-header"><div class="shell-section-heading"><div class="dash-panel-title"><span class="dot gold"></span> Your Moves</div><div class="shell-section-copy">The dashboard should compress the next few operating decisions into one legible queue.</div></div></div>';
            if (briefing.topMoves.length === 0) {
                html += '<div class="shell-section-note">No urgent moves. Pipeline is clean.</div>';
            } else {
                briefing.topMoves.forEach(function(m, i) {
                    html += '<div class="np-move">';
                    html += '<div class="np-move-num">' + (i + 1) + '.</div>';
                    html += '<div style="overflow:hidden;"><div class="np-move-action">' + escH(m.action) + '</div>';
                    html += '<div class="np-move-reason">' + escH(m.reason) + '</div>';
                    if (m.dealId) {
                        html += '<a href="/app/deal-workspace/?deal=' + encodeURIComponent(m.dealId) + '" class="np-move-link">&rarr; ' + escH(m.dealName || 'Open Deal') + '</a>';
                    } else if (m.causeId === 'coverage_gap') {
                        html += '<a href="/app/signal-console/" class="np-move-link">&rarr; Signal Console</a> ';
                        html += '<a href="/app/deal-workspace/" class="np-move-link">&rarr; New Deal</a>';
                    }
                    html += '</div></div>';
                });
            }

            // E5: Outbound recommendation — hot accounts without deals
            var allDealsLS=Array.isArray(deals)?deals.slice():[];
            var dealNames=allDealsLS.map(function(d){return(d.accountName||d.account_name||'').toLowerCase()});
            var hotUnworked=(signalConsoleState.accounts||[]).filter(function(a){
                return(a._heat||0)>=75&&dealNames.indexOf((a.name||'').toLowerCase())===-1;
            });
            if(hotUnworked.length>0&&quota&&cov.ratio<target){
                var topHot=hotUnworked.sort(function(a,b){return(b._heat||0)-(a._heat||0)})[0];
                html+='<div class="np-move" style="border-left:2px solid rgba(168,85,247,0.4);padding-left:12px;margin-top:8px;"><div class="np-move-num" style="color:#a855f7;">\u2605</div><div style="overflow:hidden;"><div class="np-move-action">Start outbound on '+escH(topHot.name)+'</div><div class="np-move-reason">'+hotUnworked.length+' hot account'+(hotUnworked.length>1?'s':'')+' without deals. Coverage below target.</div><a href="/app/outbound-studio/" class="np-move-link">\u2192 Outbound Studio</a> <a href="/app/cold-call-studio/" class="np-move-link">\u2192 Cold Call</a></div></div>';
            }

            // E6: Advisor deployment recommendation
            var advReg=readLS('gtmos_advisor_registry',{advisors:[]});
            var advDep=readLS('gtmos_advisor_deployments',{deployments:[]});
            if((advReg.advisors||[]).length>0&&briefing.atRisk.length>0){
                var advs2=advReg.advisors||[];var deps2=advDep.deployments||[];
                for(var ri=0;ri<Math.min(briefing.atRisk.length,3);ri++){
                    var rd=briefing.atRisk[ri];var rn=(rd.name||'').toLowerCase();
                    var matched=advs2.filter(function(a){return(a.companies||[]).some(function(c){return c.toLowerCase()===rn})});
                    var avail=matched.filter(function(a){var cd={t1:90,t2:30,t3:14,t4:30}[a.tier]||30;var ld=deps2.filter(function(d){return d.advisorId===a.id}).sort(function(x,y){return new Date(y.createdAt)-new Date(x.createdAt)})[0];if(!ld)return true;return Math.floor((Date.now()-new Date(ld.createdAt).getTime())/86400000)>=cd});
                    if(avail.length>0){
                        html+='<div class="np-move" style="border-left:2px solid rgba(212,165,116,0.4);padding-left:12px;margin-top:8px;"><div class="np-move-num" style="color:var(--brand-gold);">\ud83e\udd1d</div><div style="overflow:hidden;"><div class="np-move-action">Deploy '+escH(avail[0].name)+' on '+escH(rd.name)+'</div><div class="np-move-reason">'+rd.staleDays+'d dark, risk '+rd.riskScore+'. Advisor available.</div><a href="/app/advisor-deploy/" class="np-move-link">\u2192 Advisor Deploy</a></div></div>';
                        break;
                    }
                }
            }

            html += '</section>';
            html += '</div>';

            var riskiest = briefing.atRisk.length > 0 ? briefing.atRisk[0] : null;
            html += '<section class="shell-section shell-section--subtle shell-section--compact">';
            html += '<div class="shell-section-header"><div class="shell-section-heading"><div class="shell-section-kicker">Command tools</div><div class="shell-section-title">Turn the brief into action fast</div><div class="shell-section-copy">Use these when you need to move from reading to intervention without changing context.</div></div></div>';
            html += '<div class="anchor-primary-actions">';
            if (riskiest) {
                html += '<a href="/app/future-autopsy/?deal=' + encodeURIComponent(riskiest.id) + '" class="btn btn-primary">Autopsy riskiest deal</a>';
            }
            html += '<button class="btn btn-secondary" onclick="copyMonday()">Copy Monday Review</button>';
            html += '<a href="/app/settings/" class="btn btn-ghost">Open Settings</a>';
            html += '</div>';
            html += '</section>';

            html += '<section class="shell-section shell-section--subtle shell-section--compact" style="display:none;">';
            html += '<div class="dash-tool-row">';
            html += '<div class="shell-section-heading"><div class="shell-section-kicker">Quick actions</div><div class="shell-section-copy">Use these to turn the dashboard from a readout into an operating surface.</div></div>';
            html += '<div class="dash-tool-actions">';
            if (riskiest) {
                html += '<a href="/app/future-autopsy/?deal=' + encodeURIComponent(riskiest.id) + '" class="btn btn-primary">&#128300; Autopsy Riskiest Deal</a>';
            }
            html += '<button class="btn btn-secondary" onclick="copyMonday()">&#128203; Copy Monday Review</button>';
            html += '<a href="/app/settings/" class="btn btn-ghost">&#9881; Settings</a>';
            html += '</div></div></section>';

            document.getElementById('dashContent').innerHTML = html;
        }

        window.copyMonday = function() {
            var vitals = dh.loadAllVitals();
            var quota = dh.loadQuota();
            var seed = dh.loadSeed();
            var briefing = dh.generateBriefing(vitals, quota, seed);
            var txt = briefing.mondayReview;
            trackDashboard('dashboard_monday_review_copy', { total_deals: vitals.length });
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(txt).then(function() { alert('Monday Review copied!'); });
            } else {
                var ta = document.createElement('textarea'); ta.value = txt; ta.style.position = 'fixed'; ta.style.left = '-9999px';
                document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); alert('Monday Review copied!');
            }
        };

        window.runDataAction = function(action) {
            var manager = getDataManager();
            var actionMap = { export: 'exportAll', import: 'importAll', delete: 'deleteAll' };
            var method = actionMap[action] || action;
            trackDashboard('dashboard_data_action_click', { action: action });
            if (manager && typeof manager[method] === 'function') {
                manager[method]();
                if (action === 'delete') setTimeout(render, 500);
                return;
            }
            if (action === 'export') {
                var allKeys = [];
                for (var i = 0; i < localStorage.length; i++) {
                    var k = localStorage.key(i);
                    if (k && k.indexOf('gtmos_') === 0) {
                        try { allKeys.push({ key: k, value: JSON.parse(localStorage.getItem(k)) }); }
                        catch(e) { allKeys.push({ key: k, value: localStorage.getItem(k) }); }
                    }
                }
                var blob = new Blob([JSON.stringify(allKeys, null, 2)], { type: 'application/json' });
                var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = 'gtmos-backup-' + new Date().toISOString().slice(0, 10) + '.json'; a.click();
            } else if (action === 'import') {
                var input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
                input.onchange = function(e) {
                    var file = e.target.files[0]; if (!file) return;
                    var reader = new FileReader();
                    reader.onload = function(ev) {
                        try {
                            var data = JSON.parse(ev.target.result);
                            if (Array.isArray(data)) {
                                data.forEach(function(item) { localStorage.setItem(item.key, typeof item.value === 'string' ? item.value : JSON.stringify(item.value)); });
                                alert('Imported ' + data.length + ' keys. Refreshing...'); setTimeout(function() { location.reload(); }, 300);
                            }
                        } catch(err) { alert('Import failed: ' + err.message); }
                    };
                    reader.readAsText(file);
                };
                input.click();
            } else if (action === 'delete') {
                if (!confirm('Delete ALL GTM OS data? This cannot be undone.')) return;
                var keys = [];
                for (var i = 0; i < localStorage.length; i++) { var k = localStorage.key(i); if (k && k.indexOf('gtmos_') === 0) keys.push(k); }
                keys.forEach(function(k) { localStorage.removeItem(k); });
                alert('Deleted ' + keys.length + ' keys.'); setTimeout(function() { location.reload(); }, 300);
            }
        };

        function renderWhenReady() {
            dashboardSummaryTracked = false;
            if (window.gtmShellChrome) {
                window.gtmShellChrome.applyHeader({
                    stateLabel: 'Rebuilding',
                    stateTone: 'ready'
                });
            }
            showDashboardBootState(
                'loading',
                'Loading Dashboard',
                'Rebuilding your workspace summary, command view, and current Monday operating picture.'
            );
            Promise.resolve(render()).then(function() {
                clearDashboardBootState();
            }).catch(onDashboardBootFailure);
            showBackupReminderToast();
        }

        if (window.__gtmosAuthGatePending && window.requireAuthReady && typeof window.requireAuthReady.then === 'function') {
            window.requireAuthReady.then(renderWhenReady).catch(onDashboardBootFailure);
        } else if (window.__gtmosAuthGatePending) {
            showDashboardBootState(
                'loading',
                'Waiting for auth',
                'Dashboard is waiting for your authenticated workspace before it rebuilds the current command view.'
            );
            window.addEventListener('gtmos:auth-ready', renderWhenReady, { once: true });
        } else {
            renderWhenReady();
        }
    })();
    </script>
