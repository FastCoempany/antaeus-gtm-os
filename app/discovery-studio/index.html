<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discovery Studio | Antaeus GTM OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <style>
        .ds-cat-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:var(--space-lg);align-items:center;}
        #discoveryShellBand{margin-bottom:var(--space-md);}
        .ds-cat-btn{padding:8px 16px;border-radius:var(--radius-full);font-size:0.78rem;font-weight:600;border:1px solid var(--border-default);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.2s;font-family:inherit;}
        .ds-cat-btn:hover{border-color:var(--border-hover);color:var(--text-secondary);}
        .ds-cat-btn.active{border-color:var(--brand-gold);color:var(--brand-gold);background:rgba(212,165,116,0.08);}
        .ds-cat-btn.negotiation{border-color:rgba(245,158,11,0.4);color:#f59e0b;}
        .ds-cat-btn.negotiation.active{background:rgba(245,158,11,0.08);}
        .ds-cat-btn.ai{border-color:rgba(168,85,247,0.4);color:#a855f7;}
        .ds-cat-btn.ai.active{background:rgba(168,85,247,0.08);}
        .ds-bridge{padding:20px 22px;border-radius:var(--radius-xl);border:1px solid rgba(212,165,116,0.18);background:linear-gradient(135deg, rgba(212,165,116,0.1), rgba(59,130,246,0.04));margin-bottom:var(--space-md);}
        .ds-bridge-k{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--brand-gold);font-weight:700;margin-bottom:8px;}
        .ds-bridge-title{font-size:1.08rem;font-weight:700;color:var(--text-primary);margin-bottom:6px;}
        .ds-bridge-copy{font-size:0.84rem;color:var(--text-tertiary);line-height:1.6;margin-bottom:14px;}
        .ds-bridge-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;}
        .ds-bridge-block{padding:14px 16px;border-radius:var(--radius-lg);background:rgba(6,10,18,0.28);border:1px solid rgba(255,255,255,0.06);}
        .ds-bridge-label{font-size:0.64rem;text-transform:uppercase;letter-spacing:0.45px;color:var(--text-muted);font-weight:700;margin-bottom:7px;}
        .ds-bridge-value{font-size:0.8rem;color:var(--text-secondary);line-height:1.55;}
        .ds-framework-guide,.ds-worked-loop{padding:16px 18px;border-radius:var(--radius-lg);border:1px solid var(--border-default);background:var(--bg-secondary);margin-bottom:var(--space-md);}
        .ds-framework-guide-title,.ds-worked-loop-title{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--brand-gold);font-weight:700;margin-bottom:8px;}
        .ds-framework-guide-copy,.ds-worked-loop-copy{font-size:0.82rem;color:var(--text-tertiary);line-height:1.6;margin-bottom:12px;}
        .ds-framework-actions{display:flex;gap:10px;flex-wrap:wrap;}
        .ds-framework-btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 12px;border-radius:var(--radius-full);border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);font:inherit;font-size:0.75rem;font-weight:700;cursor:pointer;}
        .ds-framework-btn:hover{border-color:var(--border-hover);}
        .ds-framework-btn.primary{background:rgba(212,165,116,0.1);border-color:rgba(212,165,116,0.24);color:var(--brand-gold);}
        .ds-worked-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;}
        .ds-worked-item{padding:12px 14px;border-radius:var(--radius-md);background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);}
        .ds-worked-item-k{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.45px;color:var(--text-muted);font-weight:700;margin-bottom:6px;}
        .ds-worked-item-title{font-size:0.8rem;font-weight:700;color:var(--text-secondary);margin-bottom:4px;}
        .ds-worked-item-copy{font-size:0.75rem;color:var(--text-muted);line-height:1.5;}
        .ds-header{padding:20px 0;margin-bottom:var(--space-md);}
        .ds-header-title{font-family:var(--font-serif);font-size:1.4rem;color:var(--text-primary);margin-bottom:4px;}
        .ds-header-desc{font-size:0.85rem;color:var(--text-muted);line-height:1.5;}
        .ds-insight{padding:12px 16px;background:rgba(212,165,116,0.06);border:1px solid rgba(212,165,116,0.15);border-radius:var(--radius-md);font-size:0.82rem;color:var(--text-tertiary);margin:12px 0 20px;line-height:1.5;}
        .ds-insight strong{color:var(--brand-gold);}
        .ds-meta{display:flex;gap:24px;font-size:0.78rem;color:var(--text-muted);margin-bottom:20px;flex-wrap:wrap;}
        .ds-territory{background:var(--bg-secondary);border:1px solid var(--border-default);border-radius:var(--radius-lg);margin-bottom:var(--space-md);overflow:hidden;}
        .ds-territory-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;cursor:pointer;transition:background 0.2s;}
        .ds-territory-head:hover{background:rgba(255,255,255,0.02);}
        .ds-territory-name{font-weight:700;font-size:0.9rem;color:var(--text-primary);display:flex;align-items:center;gap:8px;}
        .ds-territory-name .icon{font-size:1.1rem;}
        .ds-territory-purpose{font-size:0.75rem;color:var(--text-muted);margin-top:2px;}
        .ds-territory-badge{font-size:0.65rem;padding:3px 8px;border-radius:var(--radius-full);font-weight:700;background:rgba(100,116,139,0.12);color:#94a3b8;}
        .ds-territory-badge.worked{background:rgba(34,197,94,0.12);color:#22c55e;}
        .ds-territory-body{display:none;padding:0 20px 20px;border-top:1px solid rgba(255,255,255,0.05);}
        .ds-territory.open .ds-territory-body{display:block;}
        .ds-entry{margin-bottom:16px;}
        .ds-entry-context{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--brand-gold);font-weight:700;margin-bottom:4px;}
        .ds-entry-label{font-weight:600;font-size:0.85rem;color:var(--text-secondary);margin-bottom:4px;}
        .ds-entry-text{font-size:0.85rem;color:var(--text-tertiary);line-height:1.5;padding:10px 14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:var(--radius-md);}
        .ds-entry-sub{font-size:0.72rem;color:var(--text-muted);margin-top:4px;font-style:italic;}
        .ds-response{margin-top:16px;padding:14px;border-radius:var(--radius-md);border:1px solid;}
        .ds-response.green{background:rgba(34,197,94,0.04);border-color:rgba(34,197,94,0.2);}
        .ds-response.yellow{background:rgba(245,158,11,0.04);border-color:rgba(245,158,11,0.2);}
        .ds-response.red{background:rgba(239,68,68,0.04);border-color:rgba(239,68,68,0.2);}
        .ds-response-flag{font-size:0.65rem;text-transform:uppercase;font-weight:700;letter-spacing:0.5px;margin-bottom:4px;}
        .ds-response.green .ds-response-flag{color:#22c55e;}
        .ds-response.yellow .ds-response-flag{color:#f59e0b;}
        .ds-response.red .ds-response-flag{color:#ef4444;}
        .ds-response-label{font-weight:600;font-size:0.85rem;color:var(--text-primary);margin-bottom:4px;}
        .ds-response-text{font-size:0.82rem;color:var(--text-tertiary);line-height:1.5;}
        .ds-move{margin-top:10px;padding:10px 14px;background:rgba(59,130,246,0.05);border:1px solid rgba(59,130,246,0.15);border-radius:var(--radius-md);}
        .ds-move-label{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;color:#3b82f6;font-weight:700;margin-bottom:4px;}
        .ds-move-text{font-size:0.82rem;color:var(--text-secondary);line-height:1.5;}
        .ds-worked-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--radius-full);font-size:0.68rem;font-weight:600;cursor:pointer;border:1px solid var(--border-default);background:transparent;color:var(--text-muted);margin-top:8px;transition:all 0.2s;font-family:inherit;}
        .ds-worked-btn:hover{border-color:rgba(34,197,94,0.3);}
        .ds-worked-btn.checked{background:rgba(34,197,94,0.1);color:#22c55e;border-color:rgba(34,197,94,0.3);}
        .ds-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-sm);margin-bottom:var(--space-lg);}
        .ds-stat{background:var(--bg-secondary);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:14px;text-align:center;}
        .ds-stat-val{font-family:var(--font-serif);font-size:1.3rem;color:var(--text-primary);}
        .ds-stat-label{font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;}
        .ds-first-fold{margin-bottom:var(--space-lg);padding:18px;border:1px solid rgba(255,255,255,0.06);border-radius:16px;background:linear-gradient(180deg, rgba(18,24,42,0.96) 0%, rgba(12,18,33,0.98) 100%);box-shadow:0 22px 44px rgba(0,0,0,0.14);}
        .ds-first-fold #discoveryShellBand{margin-bottom:14px;}
        .ds-first-fold .ds-stats{margin-bottom:var(--space-md);}
        .ds-first-fold .ds-stat{background:none;border:0;border-right:1px solid rgba(255,255,255,0.06);border-radius:0;text-align:left;padding:12px 14px;}
        .ds-first-fold .ds-stat:last-child{border-right:0;}
        .ds-first-meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
        .ds-negot-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius-md);font-size:0.78rem;font-weight:600;background:rgba(245,158,11,0.08);color:#f59e0b;border:1px solid rgba(245,158,11,0.2);margin-bottom:var(--space-md);}
        .ds-boot-card{padding:18px 20px;border-radius:var(--radius-lg);border:1px solid var(--border-default);background:var(--bg-secondary);margin-bottom:var(--space-lg);}
        .ds-boot-card.loading{border-color:rgba(59,130,246,0.25);background:rgba(59,130,246,0.05);}
        .ds-boot-card.error{border-color:rgba(239,68,68,0.28);background:rgba(239,68,68,0.05);}
        .ds-boot-eyebrow{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;font-weight:700;color:var(--text-muted);margin-bottom:8px;}
        .ds-boot-card.loading .ds-boot-eyebrow{color:#60a5fa;}
        .ds-boot-card.error .ds-boot-eyebrow{color:#f87171;}
        .ds-boot-title{font-size:1rem;font-weight:700;color:var(--text-primary);margin-bottom:6px;}
        .ds-boot-text{font-size:0.84rem;color:var(--text-tertiary);line-height:1.6;}
        .ds-boot-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
        .ds-boot-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-full);border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);font:inherit;font-size:0.76rem;font-weight:700;cursor:pointer;}
        .ds-boot-btn:hover{border-color:var(--border-hover);}
        .ds-boot-state{display:none;margin-bottom:var(--space-md);}
        .ds-boot-state.visible{display:block;}
        /* CFO segments */
        .ds-seg{background:var(--bg-secondary);border:1px solid var(--border-default);border-radius:var(--radius-lg);margin-bottom:var(--space-md);overflow:hidden;}
        .ds-seg-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;cursor:pointer;}
        .ds-seg-head:hover{background:rgba(255,255,255,0.02);}
        .ds-seg-title{font-weight:700;font-size:0.9rem;color:var(--text-primary);display:flex;align-items:center;gap:8px;}
        .ds-seg-body{display:none;padding:0 20px 20px;border-top:1px solid rgba(255,255,255,0.05);}
        .ds-seg.open .ds-seg-body{display:block;}
        .ds-seg-card{padding:12px 14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:var(--radius-md);margin-bottom:8px;}
        .ds-seg-card.alt{border-left:3px solid rgba(212,165,116,0.4);}
        .ds-seg-card.warn{border-left:3px solid rgba(239,68,68,0.4);background:rgba(239,68,68,0.03);}
        .ds-seg-card-label{font-weight:600;font-size:0.82rem;color:var(--text-secondary);margin-bottom:4px;}
        .ds-seg-card-text{font-size:0.8rem;color:var(--text-tertiary);line-height:1.5;white-space:pre-line;}
        .ds-watch{margin-top:10px;padding:8px 12px;background:rgba(245,158,11,0.04);border:1px solid rgba(245,158,11,0.12);border-radius:var(--radius-sm);font-size:0.75rem;color:var(--text-muted);}
        .ds-watch strong{color:#f59e0b;}
        @media(max-width:1024px){.ds-bridge-grid,.ds-worked-list,.ds-first-meta{grid-template-columns:1fr 1fr;}}
        @media(max-width:700px){.ds-stats,.ds-bridge-grid,.ds-worked-list,.ds-first-meta{grid-template-columns:1fr;}.ds-cat-bar{gap:4px;}.ds-first-fold{padding:14px;}.ds-first-fold .ds-stat{border-right:0;border-bottom:1px solid rgba(255,255,255,0.06);}.ds-first-fold .ds-stat:last-child{border-bottom:0;}}
    </style>
</head>
<body class="room-wave2 room-discovery-studio">
        <script src="/js/app-auth-preflight.js"></script>
<div class="app-container">
        <aside class="app-sidebar">
            <script src="/js/analytics-site-config.js"></script>
    <script src="/js/analytics.js"></script>
            <script src="/js/data-manager.js"></script>
            <script src="/js/nav.js"></script>
        </aside>
        <main class="app-main">
            <header class="app-header module-header">
                <div class="module-header-title">
                    <div class="shell-header-meta">
                        <span class="shell-header-kicker">Calls family</span>
                        <span class="shell-header-state state-live">Live discovery</span>
                    </div>
                    <h1 class="page-title">Discovery Studio</h1>
                    <p class="page-subtitle">Run live discovery with the right framework instead of memory, generic prompts, or post-call reconstruction.</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary btn-sm" onclick="copyWorked()">&#128203; Copy Worked</button>
                </div>
            </header>
            <div class="app-content" style="max-width:800px;">
                <section class="ds-first-fold">
                    <div class="ds-boot-state" id="bootState"></div>
                    <div class="ds-stats" id="statsBar"></div>
                    <div id="discoveryShellBand"></div>
                    <div class="ds-cat-bar" id="catBar"></div>
                    <div class="ds-first-meta">
                        <div id="frameworkGuide"></div>
                        <div id="workedLoop"></div>
                    </div>
                </section>
                <div id="mainContent"></div>
            </div>
        </main>
    </div>
    <script src="/js/discovery-frameworks.js"></script>
    <script src="/js/proof-layer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-config.js"></script>
    <script src="/js/require-auth.js"></script>
<script>
    (function(){
        function readLS(k,fb){try{return JSON.parse(localStorage.getItem(k))||fb}catch(e){return fb}}
        function readTextLS(k,fb){
            try{
                var raw=localStorage.getItem(k);
                if(!raw)return fb;
                try{
                    var parsed=JSON.parse(raw);
                    if(typeof parsed==='string')return parsed||fb;
                }catch(e){}
                return raw||fb;
            }catch(e){return fb}
        }
        function escH(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
        function buildDiscoveryRoomHref(href, focusObject, roomLabel){
            try{
                var url=new URL(href, window.location.origin);
                url.searchParams.set('returnTo','/app/discovery-studio/');
                url.searchParams.set('returnLabel','Back to Discovery Studio');
                if(focusObject)url.searchParams.set('focusObject',focusObject);
                if(roomLabel)url.searchParams.set('focusRoom',roomLabel);
                url.searchParams.set('fromMode','room');
                url.searchParams.set('fromSurface','discovery-studio');
                return url.pathname+url.search+url.hash;
            }catch(error){
                return href;
            }
        }
        function normalizeDiscoveryCategory(raw){
            var value=(typeof raw==='string'?raw.trim().toLowerCase():'')||'';
            if(!value)return 'cxai';
            if(value==='cx_ai'||value==='cx-ai'||value==='cx/support ai')return 'cxai';
            if(value==='revintel')return 'revenue';
            if(value==='revenue intelligence ai'||value==='revenue intelligence'||value==='revenue intel')return 'revenue';
            if(value==='customer data platform'||value==='data platform'||value==='data platform / cdp / analytics')return 'cdp';
            if(value==='legal ai / compliance'||value==='legal ai'||value==='compliance')return 'legal';
            if(value==='cx ai / support automation'||value==='cx ai'||value==='support automation')return 'cxai';
            if(value==='ai objections'||value==='ai-objections')return 'ai-objections';
            return value;
        }
        function refreshDiscoveryState(){
            currentCat=normalizeDiscoveryCategory(readTextLS('gtmos_product_category','cxai'));
            workedSet=new Set(readLS('gtmos_discovery_worked',[]));
            stats=readLS('gtmos_discovery_stats',{totalCalls:0,advancedCalls:0});
        }
        function renderBootState(kind,title,text){
            var boot=document.getElementById('bootState');
            if(boot){
                boot.className='ds-boot-state visible';
            }
            document.getElementById('statsBar').innerHTML='';
            document.getElementById('discoveryShellBand').innerHTML='';
            document.getElementById('catBar').innerHTML='';
            document.getElementById('frameworkGuide').innerHTML='';
            document.getElementById('workedLoop').innerHTML='';
            var html='<div class="ds-boot-card '+kind+'">';
            html+='<div class="ds-boot-eyebrow">'+(kind==='loading'?'Loading module':'Load failed')+'</div>';
            html+='<div class="ds-boot-title">'+escH(title)+'</div>';
            html+='<div class="ds-boot-text">'+escH(text)+'</div>';
            if(kind==='error'){
                html+='<div class="ds-boot-actions">';
                html+='<button class="ds-boot-btn" type="button" onclick="retryDiscoveryStudioBoot()">Retry Discovery Studio</button>';
                html+='</div>';
            }
            html+='</div>';
            if(boot){
                boot.innerHTML=html;
                document.getElementById('mainContent').innerHTML='';
                return;
            }
            document.getElementById('mainContent').innerHTML=html;
        }
        function clearBootState(){
            var boot=document.getElementById('bootState');
            if(!boot)return;
            boot.className='ds-boot-state';
            boot.innerHTML='';
        }
        async function syncDiscoveryState(){
            if(window.gtmPersistence&&window.gtmPersistence.discovery&&typeof window.gtmPersistence.discovery.save==='function'){
                var saved=await window.gtmPersistence.discovery.save({
                    currentCategory:currentCat,
                    workedIds:Array.from(workedSet),
                    stats:stats,
                    agenda:readLS('gtmos_discovery_agenda',null),
                    handoff:readLS('gtmos_call_handoff',null)
                });
                if(saved&&saved.error)console.error('Discovery sync failed:',saved.error);
                refreshDiscoveryState();
                return saved;
            }
            return {data:null,error:null};
        }

        var discoveryFrameworks=window.DISCOVERY_FRAMEWORKS||{};
        if(discoveryFrameworks.revintel&&!discoveryFrameworks.revenue)discoveryFrameworks.revenue=discoveryFrameworks.revintel;
        if(discoveryFrameworks.revenue&&!discoveryFrameworks.revintel)discoveryFrameworks.revintel=discoveryFrameworks.revenue;
        var currentCat=normalizeDiscoveryCategory(readTextLS('gtmos_product_category','cxai'));
        var workedSet=new Set(readLS('gtmos_discovery_worked',[]));
        var stats=readLS('gtmos_discovery_stats',{totalCalls:0,advancedCalls:0});

        // CFO Negotiation segments data (merged from cfo-negotiation-studio)
        var CFO_SEGMENTS=[
            {id:"roi",icon:"\ud83d\udcca",title:"0. ROI Case Builder",sub:"Make the math undeniable.",items:[
                {label:"Time Saved",text:"Time saved per person/day: [X] hours\nWeekly time saved (team): [X] hours\nAnnual hours recovered: [X] hours\nValue @ $[X]/hr loaded cost: $[X]/year",cls:"card"},
                {label:"Revenue Uplift",text:"1 extra [outcome]/quarter \u00d7 $[X] value \u00d7 [Y] people = $[Z] incremental revenue",cls:"alt"},
                {label:"Accuracy/Quality",text:"[X]% improvement in [metric] = fewer errors, better outcomes, reduced risk",cls:"alt"},
                {label:"Speed to Value",text:"Faster [outcome] = [X] weeks/months of value captured earlier",cls:"alt"}
            ]},
            {id:"reconfirm",icon:"\ud83c\udfaf",title:"1. Value Reconfirmation",sub:"Re-anchor the CFO in the business case. First 3\u20135 minutes.",items:[
                {label:"Bridge from Discovery",text:"Before we dive into the commercial discussion, I want to make sure we\u2019re aligned on the problem we\u2019re solving. Based on my conversations with your team, you\u2019re losing about [X] hours a week to [problem]. That\u2019s roughly $[Y] annually. Is that consistent with what you\u2019re seeing?",cls:"card"},
                {label:"Confirms \u2192 Lock in Value Anchor",text:"Good \u2014 so we agree the problem is real and worth solving. At $[X]/year, you\u2019re investing about [Y]% of the productivity value you\u2019d recover. Most CFOs see that as favorable math.",cls:"alt"},
                {label:"Challenges Numbers \u2192 Defer to Their Number",text:"Fair challenge. What would YOU estimate the burden is? Even if it\u2019s half what we discussed, we\u2019re still talking about significant impact. I\u2019d rather work with your numbers than mine.",cls:"card"},
                {label:"Dismissive \u2192 Redirect to Proof",text:"I\u2019d rather prove it than promise it. What would you need to see to believe this actually works? A pilot? Specific metrics? References from similar companies?",cls:"card"}
            ]},
            {id:"objections",icon:"\ud83d\udee1\ufe0f",title:"2. Objection Handling",sub:"CFOs have predictable objections. Each has a specific counter.",items:[
                {label:"\"Your price is too high\" \u2192 Clarify",text:"Help me understand \u2014 too high compared to what? Budget constraints, competing priorities, or the ROI we discussed? If the ROI math works, what\u2019s the real blocker?",cls:"card"},
                {label:"\"Your price is too high\" \u2192 Reframe",text:"At $[X]/user/month, you\u2019re paying about $[Y] per hour of value delivered. Your people cost you $[Z]+ per hour. Is the concern the absolute number, or that you\u2019re not convinced on the value?",cls:"alt"},
                {label:"\"Match competitor pricing\" \u2192 Flip",text:"Rather than race to the bottom \u2014 if the price were identical, which would you choose and why? That tells me what you actually value.",cls:"card"},

        function getDeals(){
            var deals=readLS('gtmos_deal_workspaces',[]);
            if(!Array.isArray(deals))deals=Object.values(deals||{});
            return deals;
        }

        function getAgendaState(){
            return readLS('gtmos_discovery_agenda',null)||null;
        }

        function getHandoffState(){
            return readLS('gtmos_call_handoff',null)||null;
        }

        function getLinkedDeal(){
            var agenda=getAgendaState();
            var dealId=agenda&&agenda.linkedDeal?agenda.linkedDeal:'';
            if(!dealId)return null;
            return getDeals().find(function(d){return d&&d.id===dealId;})||null;
        }

        function getFrameworkMeta(cat){
            if(cat==='negotiation'){
                return {
                    label:'Negotiation & Procurement',
                    description:'Use this when the deal is commercial now: price pushback, pilot terms, procurement, CFO pressure, or close-plan friction.',
                    oneSessionWin:'Leave with a cleaner commercial move, a real trade, or the next close step scheduled.',
                    goodUse:'Only switch here when the call is already late-stage. Discovery Studio should not become pricing panic too early.'
                };
            }
            if(cat==='ai-objections'){
                return {
                    label:'AI Objections',
                    description:'Use this when the live blocker is trust in the model itself: hallucinations, reliability, accuracy, or human override.',
                    oneSessionWin:'Leave with the right objection path, not a generic defense of AI.',
                    goodUse:'This is a specialist layer. Do not hide in it if the real problem is still vague discovery.'
                };
            }
            var fw=discoveryFrameworks[cat];
            if(!fw){
                return {
                    label:'Discovery Studio',
                    description:'Run better live discovery and log what actually worked.',
                    oneSessionWin:'Surface the right entry, survive the pushback, and leave with a clearer next move.',
                    goodUse:'Use the product framework that matches what you actually sell.'
                };
            }
            return {
                label:fw.label,
                description:fw.description,
                oneSessionWin:'Use the entries to open, the response patterns to survive friction, and only mark moves worked when they actually earned advancement.',
                goodUse:'Stay inside this framework while the conversation is still about pain, workflow, urgency, and qualification.'
            };
        }

                    (t.responses||[]).forEach(function(r){

                            title:r.label,
                            territory:t.name,
                            context:fw.label

                });

                        territory:seg.title,

            var worked=Array.from(workedSet).map(function(id){

                        '<div class="anchor-mini-card"><div class="anchor-mini-label">Advance rate</div><div class="anchor-mini-value">'+advRate+'%</div><div class="anchor-mini-copy">How often the current calls are earning a next step.</div></div>'+
                        '<div class="anchor-mini-card"><div class="anchor-mini-label">Moves worked</div><div class="anchor-mini-value">'+workedSet.size+'</div><div class="anchor-mini-copy">Patterns worth carrying into the next live conversation.</div></div>'+
                        '<div class="anchor-mini-card"><div class="anchor-mini-label">Agenda state</div><div class="anchor-mini-value">'+escH(agendaBand)+'</div><div class="anchor-mini-copy">Call Planner quality should travel into Discovery, not restart here.</div></div>'+
                    '</div>'+
                '</section>';
        }

        window.switchCat=async function(cat){
            currentCat=normalizeDiscoveryCategory(cat);
            localStorage.setItem('gtmos_product_category',JSON.stringify(cat));
            await syncDiscoveryState();
            renderCatBar();
            renderDiscoveryBridge();
            renderFrameworkGuide();
            renderWorkedLoop();
            renderContent();
        };

        function renderContent(){
            if(currentCat==='negotiation'){
                renderNegotiation();
                return;
            }
            var fw=discoveryFrameworks[currentCat];
            if(!fw&&currentCat==='revenue'&&discoveryFrameworks.revintel){
                fw=discoveryFrameworks.revintel;
            }
            if(!fw){
                document.getElementById('mainContent').innerHTML=
                    '<div class="ds-boot-card error">'+
                        '<div class="ds-boot-eyebrow">Framework missing</div>'+
                        '<div class="ds-boot-title">Discovery framework could not be matched.</div>'+
                        '<div class="ds-boot-text">Antaeus could not match the current product category to a discovery framework. Resetting to CX AI will get the module back on-screen.</div>'+
                        '<div class="ds-boot-actions"><button class="ds-boot-btn" type="button" onclick="switchCat(\'cxai\')">Reset to CX AI</button></div>'+
                    '</div>';
                return;
            }
            var buyers=Array.isArray(fw.typicalBuyers)?fw.typicalBuyers:[];
            var metrics=Array.isArray(fw.keyMetrics)?fw.keyMetrics:[];
            var territories=Array.isArray(fw.territories)?fw.territories:[];

            var html='<div class="ds-header"><div class="ds-header-title">'+escH(fw.label)+'</div><div class="ds-header-desc">'+escH(fw.description)+'</div></div>';
            html+='<div class="ds-insight"><strong>\ud83d\udca1 Core Insight:</strong> '+escH(fw.coreInsight)+'</div>';
            html+='<div class="ds-meta"><div><strong>Buyers:</strong> '+escH(buyers.join(', ')||'No buyer list yet')+'</div><div><strong>Metrics:</strong> '+escH(metrics.join(', ')||'No metric list yet')+'</div></div>';

            territories.forEach(function(t,ti){
                var entries=Array.isArray(t&&t.entries)?t.entries:[];
                var responses=Array.isArray(t&&t.responses)?t.responses:[];
                var entryCount=entries.length;
                var responseCount=responses.length;
                var workedInTerritory=0;
                responses.forEach(function(r){if(r&&workedSet.has(r.id))workedInTerritory++;});
                var badge=workedInTerritory>0?'<span class="ds-territory-badge worked">'+workedInTerritory+' worked</span>':'<span class="ds-territory-badge">'+entryCount+' entries, '+responseCount+' responses</span>';
                var openCls=ti===0?' open':'';

                html+='<div class="ds-territory'+openCls+'" data-idx="'+ti+'"><div class="ds-territory-head" onclick="toggleTerritory(this)">';
                html+='<div><div class="ds-territory-name"><span class="icon">'+(t.icon||'\ud83d\udccd')+'</span>'+escH(t.name)+'</div>';
                html+='<div class="ds-territory-purpose">'+escH(t.purpose||'')+'</div></div>';
                html+=badge+'</div>';
                html+='<div class="ds-territory-body">';

                // Gate criteria
                if(t.gateCriteria&&t.gateCriteria.length>0){
                    html+='<div style="margin-bottom:16px;padding:10px 14px;background:rgba(59,130,246,0.04);border:1px solid rgba(59,130,246,0.12);border-radius:8px;font-size:0.78rem;color:var(--text-muted);"><strong style="color:#3b82f6;">Gate Criteria:</strong> '+t.gateCriteria.join(' \u2022 ')+'</div>';
                }

                // Entries
                if(entries.length>0){
                    html+='<div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--brand-gold);font-weight:700;margin-bottom:8px;">Discovery Entries</div>';
                    entries.forEach(function(e){
                        html+='<div class="ds-entry">';
                        if(e.context)html+='<div class="ds-entry-context">'+escH(e.context)+'</div>';
                        html+='<div class="ds-entry-label">'+escH(e.label)+'</div>';
                        html+='<div class="ds-entry-text">'+escH(e.text)+'</div>';
                        if(e.subtext)html+='<div class="ds-entry-sub">'+escH(e.subtext)+'</div>';
                        html+='</div>';
                    });
                }

                // Responses
                if(responses.length>0){
                    html+='<div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:700;margin:20px 0 8px;">Response Patterns</div>';
                    responses.forEach(function(r){
                        html+='<div class="ds-response '+(r.flag||'green')+'">';
                        html+='<div class="ds-response-flag">'+escH(r.type||'')+'</div>';
                        html+='<div class="ds-response-label">'+escH(r.label)+'</div>';
                        html+='<div class="ds-response-text">'+escH(r.text)+'</div>';
                        if(r.meaning)html+='<div style="margin-top:6px;font-size:0.75rem;color:var(--text-muted);"><em>'+escH(r.meaning)+'</em></div>';
                        if(r.move){
                            html+='<div class="ds-move"><div class="ds-move-label">\u279c '+escH(r.move.label||'Next Move')+'</div><div class="ds-move-text">'+escH(r.move.text)+'</div></div>';
                        }
                        if(r.listenFor&&r.listenFor.length>0){
                            r.listenFor.forEach(function(lf){
                                html+='<div style="font-size:0.72rem;color:var(--text-muted);margin-top:4px;">'+escH(lf.signal)+' \u2192 '+escH(lf.action)+'</div>';
                            });
                        }
                        html+='<button class="ds-worked-btn'+(workedSet.has(r.id)?' checked':'')+'" onclick="toggleWorked(\''+r.id+'\',this)">'+(workedSet.has(r.id)?'\u2713 Worked':'Mark worked')+'</button>';
                        html+='</div>';
                    });
                }

                html+='</div></div>';
            });

            document.getElementById('mainContent').innerHTML=html;
        }

        function renderNegotiation(){
            // Check for active negotiation deals
            var deals=readLS('gtmos_deal_workspaces',[]);
            if(!Array.isArray(deals))deals=Object.values(deals||{});
            var negDeals=deals.filter(function(d){return d&&d.stage==='negotiation';});

            var html='<div class="ds-header"><div class="ds-header-title">Negotiation & Procurement</div><div class="ds-header-desc">Structured playbook for CFO conversations, objection handling, and closing. Same territory-based approach as discovery.</div></div>';

            if(negDeals.length>0){
                html+='<div class="ds-negot-badge">\ud83d\udcbc '+negDeals.length+' deal'+(negDeals.length>1?'s':'')+' in negotiation stage</div>';
            }

            CFO_SEGMENTS.forEach(function(seg,si){
                html+='<div class="ds-seg'+(si===0?' open':'')+'" data-seg="'+seg.id+'"><div class="ds-seg-head" onclick="toggleSeg(this)">';
                html+='<div class="ds-seg-title"><span>'+seg.icon+'</span> '+escH(seg.title)+'</div>';
                html+='<span style="font-size:0.72rem;color:var(--text-muted);">'+seg.items.length+' moves</span>';
                html+='</div><div class="ds-seg-body">';
                html+='<div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:12px;">'+escH(seg.sub)+'</div>';

                seg.items.forEach(function(item){
                    var cls=item.cls==='warn'?'warn':item.cls==='alt'?'alt':'';
                    html+='<div class="ds-seg-card '+cls+'"><div class="ds-seg-card-label">'+escH(item.label)+'</div><div class="ds-seg-card-text">'+escH(item.text)+'</div>';
                    html+='<button class="ds-worked-btn'+(workedSet.has(seg.id+'_'+item.label)?' checked':'')+'" onclick="toggleWorked(\''+escH(seg.id+'_'+item.label)+'\',this)">'+(workedSet.has(seg.id+'_'+item.label)?'\u2713 Worked':'Mark worked')+'</button>';
                    html+='</div>';
                });

                if(seg.watch&&seg.watch.length>0){
                    html+='<div style="margin-top:12px;">';
                    seg.watch.forEach(function(w){
                        html+='<div class="ds-watch"><strong>'+escH(w.split(':')[0])+':</strong> '+escH(w.split(':').slice(1).join(':'))+'</div>';
                    });
                    html+='</div>';
                }
                html+='</div></div>';
            });

            document.getElementById('mainContent').innerHTML=html;
        }

        window.toggleTerritory=function(head){head.parentElement.classList.toggle('open');};
        window.toggleSeg=function(head){head.parentElement.classList.toggle('open');};

        window.toggleWorked=async function(id,btn){
            if(workedSet.has(id)){workedSet.delete(id);btn.classList.remove('checked');btn.textContent='Mark worked';}
            else{workedSet.add(id);btn.classList.add('checked');btn.textContent='\u2713 Worked';}
            localStorage.setItem('gtmos_discovery_worked',JSON.stringify(Array.from(workedSet)));
            await syncDiscoveryState();
            renderStats();
            renderWorkedLoop();
        };

        window.copyWorked=function(){
            if(workedSet.size===0){alert('No moves marked as worked yet.');return;}
            var txt='DISCOVERY \u2014 WORKED MOVES\n\n';
            getWorkedMoveDetails(200).forEach(function(item){
                txt+='\u2713 '+item.title+' ['+item.context+' / '+item.territory+']\n';
            });
            navigator.clipboard.writeText(txt).then(function(){alert('Copied '+workedSet.size+' worked moves!');});
        };

        function onDiscoveryStudioBootFailure(error){
            console.error('Discovery Studio boot failed:',error);
            renderBootState(
                'error',
                'Discovery Studio could not load.',
                'The module failed during startup, so Antaeus is showing the failure instead of a blank screen. Retry once. If it fails again, refresh the page and check whether auth or saved workspace data is in a bad state.'
            );
        }

        async function bootDiscoveryStudio(){
            renderBootState(
                'loading',
                'Loading Discovery Studio',
                'Pulling your saved discovery state and rebuilding the current move library.'
            );
            if(window.gtmPersistence&&window.gtmPersistence.discovery&&typeof window.gtmPersistence.discovery.load==='function'){
                var loaded=await window.gtmPersistence.discovery.load();
                if(loaded&&loaded.error)console.error('Discovery load failed:',loaded.error);
            }
            refreshDiscoveryState();
            renderStats();
            renderDiscoveryBridge();
            renderCatBar();
            renderFrameworkGuide();
            renderWorkedLoop();
            renderContent();
            clearBootState();
        }

        window.retryDiscoveryStudioBoot=function(){
            bootDiscoveryStudio().catch(onDiscoveryStudioBootFailure);
        };

        if(window.__gtmosAuthGatePending&&window.requireAuthReady&&typeof window.requireAuthReady.then==='function'){
            window.requireAuthReady.then(bootDiscoveryStudio).catch(onDiscoveryStudioBootFailure);
        }else if(window.__gtmosAuthGatePending){
            renderBootState(
                'loading',
                'Waiting for auth',
                'Discovery Studio is waiting for your authenticated workspace before it rebuilds the current call system.'
            );
            window.addEventListener('gtmos:auth-ready',function(){bootDiscoveryStudio().catch(onDiscoveryStudioBootFailure);},{once:true});
        }else{
            bootDiscoveryStudio().catch(onDiscoveryStudioBootFailure);
        }
    })();
    </script>
</body>
</html>
