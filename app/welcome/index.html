<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Antaeus GTM OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <style>
        .welcome-shell{display:flex;flex-direction:column;gap:24px;max-width:1180px}
        .welcome-hero{position:relative;overflow:hidden;padding:32px;border-radius:20px;border:1px solid rgba(212,165,116,0.18);background:linear-gradient(135deg,rgba(212,165,116,0.08),rgba(59,130,246,0.08) 55%,rgba(255,255,255,0.02));box-shadow:0 18px 40px rgba(0,0,0,0.28)}
        .welcome-hero::after{content:'';position:absolute;top:-80px;right:-40px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(212,165,116,0.18),rgba(212,165,116,0));pointer-events:none}
        .welcome-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:999px;border:1px solid rgba(45,212,191,0.25);background:rgba(45,212,191,0.08);color:var(--brand-teal-light);font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
        .welcome-title{font-size:2.35rem;max-width:760px;margin-bottom:12px}
        .welcome-sub{max-width:760px;color:var(--text-tertiary);font-size:1rem;line-height:1.7;margin-bottom:20px}
        .welcome-progress{max-width:760px;padding:16px 18px;border-radius:16px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);margin-bottom:20px}
        .welcome-progress-title{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--brand-gold);font-weight:700;margin-bottom:8px}
        .welcome-progress-copy{color:var(--text-secondary);font-size:.9rem;line-height:1.65}
        .welcome-hero-meta{display:flex;flex-wrap:wrap;gap:10px;margin:-4px 0 18px}
        .welcome-hero-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);color:var(--text-secondary);font-size:.74rem;font-weight:700;letter-spacing:.04em}
        .welcome-actions{display:flex;flex-wrap:wrap;gap:12px}
        .welcome-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:12px;border:1px solid var(--border-default);background:rgba(255,255,255,0.02);color:var(--text-secondary);font-size:0.92rem;font-weight:700;text-decoration:none;cursor:pointer;transition:all .2s}
        .welcome-btn:hover{transform:translateY(-1px);border-color:rgba(212,165,116,0.36);background:rgba(212,165,116,0.08)}
        .welcome-btn.primary{background:var(--brand-gold);border-color:var(--brand-gold);color:var(--bg-primary)}
        .welcome-btn.primary:hover{background:var(--brand-gold-light)}
        .welcome-grid{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(320px,.9fr);gap:24px;align-items:start}
        .welcome-panel{padding:24px;border-radius:18px;border:1px solid var(--border-default);background:var(--bg-secondary);box-shadow:0 12px 32px rgba(0,0,0,0.22)}
        .welcome-panel-title{font-size:1.35rem;margin-bottom:6px}
        .welcome-panel-sub{color:var(--text-muted);font-size:0.86rem;line-height:1.6;margin-bottom:18px}
        .welcome-stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
        .welcome-stat{padding:16px;border-radius:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05)}
        .welcome-stat-value{font-family:var(--font-serif);font-size:1.6rem;color:var(--text-primary);line-height:1.1}
        .welcome-stat-label{margin-top:6px;font-size:0.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);font-weight:700}
        .welcome-stat-sub{margin-top:4px;font-size:0.74rem;color:var(--text-tertiary);line-height:1.45}
        .welcome-list{display:grid;gap:14px}
        .welcome-card{padding:18px;border-radius:16px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02)}
        .welcome-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:10px}
        .welcome-card-step{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:rgba(212,165,116,0.14);color:var(--brand-gold);font-size:.86rem;font-weight:700;flex-shrink:0}
        .welcome-card-title{font-size:1.02rem;font-weight:700;color:var(--text-primary);line-height:1.35}
        .welcome-card-state{display:inline-flex;align-items:center;justify-content:center;padding:6px 10px;border-radius:999px;border:1px solid rgba(45,212,191,0.2);background:rgba(45,212,191,0.08);color:var(--brand-teal-light);font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
        .welcome-card-body{font-size:.86rem;color:var(--text-tertiary);line-height:1.65;margin-bottom:14px}
        .welcome-card-why{padding:12px 14px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);font-size:.8rem;color:var(--text-secondary);line-height:1.6;margin-bottom:12px}
        .welcome-card-why strong,.welcome-card-unlocks strong{display:block;font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--brand-gold);margin-bottom:5px}
        .welcome-card-unlocks{font-size:.8rem;color:var(--text-muted);line-height:1.6;margin-bottom:12px}
        .welcome-card-meta{display:flex;flex-wrap:wrap;gap:8px 10px;font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:12px}
        .welcome-link-row{display:flex;flex-wrap:wrap;gap:10px}
        .welcome-mini-link{display:inline-flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;border:1px solid rgba(212,165,116,0.22);background:rgba(212,165,116,0.06);color:var(--brand-gold);text-decoration:none;font-size:.8rem;font-weight:700}
        .welcome-mini-link:hover{background:rgba(212,165,116,0.12)}
        .welcome-side-stack{display:grid;gap:18px}
        .welcome-milestones{display:grid;gap:12px}
        .welcome-milestone{display:grid;grid-template-columns:32px minmax(0,1fr);gap:12px;padding:12px 0;border-top:1px solid rgba(255,255,255,0.05)}
        .welcome-milestone:first-child{border-top:none;padding-top:0}
        .welcome-milestone-mark{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.84rem;font-weight:700;background:rgba(100,116,139,0.16);color:var(--text-muted)}
        .welcome-milestone.done .welcome-milestone-mark{background:rgba(34,197,94,0.12);color:#86efac}
        .welcome-milestone.next .welcome-milestone-mark{background:rgba(212,165,116,0.14);color:var(--brand-gold)}
        .welcome-milestone-title{font-size:.92rem;font-weight:700;color:var(--text-primary);line-height:1.35}
        .welcome-milestone-copy{margin-top:4px;font-size:.8rem;color:var(--text-muted);line-height:1.55}
        .welcome-milestone-status{margin-top:6px;font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;font-weight:700;color:var(--text-muted)}
        .welcome-milestone.done .welcome-milestone-status{color:#86efac}
        .welcome-milestone.next .welcome-milestone-status{color:var(--brand-gold)}
        .welcome-checklist{display:grid;gap:12px}
        .welcome-check{display:flex;gap:12px;align-items:flex-start;padding:14px 14px 0 0}
        .welcome-check-num{width:28px;height:28px;border-radius:50%;background:rgba(45,212,191,0.1);color:var(--brand-teal-light);display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;flex-shrink:0}
        .welcome-check-copy{font-size:.84rem;color:var(--text-tertiary);line-height:1.6}
        .welcome-check-copy strong{display:block;color:var(--text-primary);font-size:.9rem;margin-bottom:2px}
        .welcome-resource-list{display:grid;gap:10px}
        .welcome-resource{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02)}
        .welcome-resource h4{font-family:var(--font-sans);font-size:.92rem;font-weight:700;margin-bottom:4px}
        .welcome-resource p{margin:0;color:var(--text-muted);font-size:.8rem;line-height:1.55}
        .welcome-resource a{white-space:nowrap}
        .welcome-state-note{margin-top:10px;font-size:.78rem;color:var(--text-muted)}
        .welcome-sync{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.18);font-size:.74rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#86efac;margin-top:18px}
        .welcome-lifecycle{display:grid;gap:14px}
        .welcome-lifecycle-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
        .welcome-lifecycle-kicker{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--brand-gold);margin-bottom:6px}
        .welcome-lifecycle-title{font-size:1.04rem;font-weight:700;color:var(--text-primary);line-height:1.35}
        .welcome-lifecycle-copy{margin-top:6px;font-size:.84rem;color:var(--text-tertiary);line-height:1.62}
        .welcome-lifecycle-score{display:grid;place-items:center;min-width:82px;padding:12px;border-radius:16px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03)}
        .welcome-lifecycle-score span{font-family:var(--font-serif);font-size:1.45rem;color:var(--text-primary);line-height:1}
        .welcome-lifecycle-score small{margin-top:5px;font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);font-weight:700;text-align:center}
        .welcome-lifecycle-rhythm{padding:14px 16px;border-radius:14px;border:1px solid rgba(45,212,191,0.16);background:rgba(45,212,191,0.06);font-size:.82rem;color:var(--text-secondary);line-height:1.65}
        .welcome-lifecycle-rhythm strong{color:var(--brand-teal-light)}
        .welcome-lifecycle-pills{display:flex;flex-wrap:wrap;gap:8px}
        .welcome-lifecycle-pill{display:inline-flex;align-items:center;padding:8px 10px;border-radius:999px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);font-size:.74rem;color:var(--text-muted);font-weight:700}
        .welcome-lifecycle-pill.done{border-color:rgba(34,197,94,0.2);background:rgba(34,197,94,0.08);color:#86efac}
        .welcome-loading,.welcome-error{padding:32px;text-align:center;color:var(--text-muted)}
        @media(max-width:1100px){.welcome-grid{grid-template-columns:1fr}.welcome-stats{grid-template-columns:repeat(2,minmax(0,1fr))}}
        @media(max-width:720px){.welcome-hero{padding:24px}.welcome-title{font-size:1.85rem}.welcome-stats{grid-template-columns:1fr}.welcome-actions{flex-direction:column}.welcome-btn{width:100%}.welcome-lifecycle-top{flex-direction:column}.welcome-lifecycle-score{width:100%}}
    </style>
</head>
<body>
    <script src="/js/app-auth-preflight.js"></script>
    <div class="app-container">
        <aside class="app-sidebar">
            <script src="/js/analytics-site-config.js"></script>
            <script src="/js/analytics.js"></script>
            <script src="/js/data-manager.js"></script>
            <script src="/js/nav.js"></script>
        </aside>
        <main class="app-main">
            <header class="app-header">
                <h1 class="page-title">Welcome</h1>
                <p class="page-subtitle">Activation corridor for the first real week inside the workspace.</p>
            </header>
            <div class="app-content">
                <div id="welcomeShellBand"></div>
                <div class="welcome-shell" id="welcomeShell">
                    <div class="welcome-loading">Loading your first-session workspace...</div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-config.js"></script>
    <script src="/js/require-auth.js"></script>
    <script>
    (function(){
        var shell = document.getElementById('welcomeShell');
        function trackWelcome(name, props){
            if(window.gtmAnalytics && typeof window.gtmAnalytics.track === 'function'){
                window.gtmAnalytics.track(name, Object.assign({ stage:'welcome' }, props || {}));
            }
        }

        function arr(value){ return Array.isArray(value) ? value : []; }
        function parseJSON(raw, fallback){
            if (raw == null || raw === '') return fallback;
            try { return JSON.parse(raw); } catch (e) { return fallback; }
        }
        function esc(value){ var node = document.createElement('div'); node.textContent = value == null ? '' : String(value); return node.innerHTML; }
        function scopedGet(key, fallback){
            if (window.gtmLocalState && typeof window.gtmLocalState.get === 'function') {
                return window.gtmLocalState.get(key, fallback, { scope: 'user' });
            }
            try { return parseJSON(localStorage.getItem(key), fallback); } catch (e) { return fallback; }
        }
        function pickName(summary){
            var profile = summary && summary.profile ? summary.profile : {};
            var onboarding = summary && summary.onboarding && summary.onboarding.answers ? summary.onboarding.answers : {};
            return profile.full_name || onboarding.companyName || profile.company_name || 'your workspace';
        }
        function getRole(summary){
            var profile = summary && summary.profile ? summary.profile : {};
            var onboarding = summary && summary.onboarding && summary.onboarding.answers ? summary.onboarding.answers : {};
            return profile.role || onboarding.role || 'operator';
        }
        function prettyRole(value){
            var next = String(value || 'operator').replace(/[_-]+/g,' ').trim();
            if (!next) return 'Operator';
            return next.split(/\s+/).map(function(part){
                return part.charAt(0).toUpperCase() + part.slice(1);
            }).join(' ');
        }
        function getActivationContext(){
            var local = scopedGet('gtmos_activation_context', null);
            if (local) return local;
            try { return parseJSON(localStorage.getItem('gtmos_activation_context'), null); } catch (e) { return null; }
        }
        function getBackupStatus(){
            var manager = window.gtmDataManager || window.dataManager || null;
            if (!manager || typeof manager.getBackupStatus !== 'function') return null;
            try { return manager.getBackupStatus(); } catch (e) { return null; }
        }
        function buildCounts(summary){
            var icps = arr(summary && summary.icpAnalytics && summary.icpAnalytics.icps);
            var deals = arr(summary && summary.deals);
            var accounts = arr(summary && summary.signalConsole && summary.signalConsole.accounts);
            var signalCount = accounts.reduce(function(total, account){ return total + arr(account && account.signals).length; }, 0);
            var discoveryStats = summary && summary.discovery && summary.discovery.stats ? summary.discovery.stats : {};
            var touchLog = summary && summary.sequences && summary.sequences.outboundTouches ? summary.sequences.outboundTouches : {};
            var linkedinLog = summary && summary.sequences && summary.sequences.linkedinLog ? summary.sequences.linkedinLog : {};
            return {
                icps: icps.length,
                deals: deals.length,
                accounts: accounts.length,
                signals: signalCount,
                calls: Number(discoveryStats.totalCalls || 0) || 0,
                touches: arr(touchLog.touches).length + arr(linkedinLog.actions).length
            };
        }
        function buildStatCards(counts){
            return [
                { value: counts.icps, label: 'ICPs', sub: counts.icps ? 'Targeting is taking shape.' : 'No saved targeting truth yet.' },
                { value: counts.deals, label: 'Deals', sub: counts.deals ? 'Pipeline data is live.' : 'Dashboard will wake up after the first deal.' },
                { value: counts.signals, label: 'Signals', sub: counts.signals ? 'Real account research exists.' : 'Signal Console has not been used yet.' },
                { value: counts.touches + counts.calls, label: 'Motions', sub: (counts.touches + counts.calls) ? 'Outbound and call history are being captured.' : 'No live motions recorded yet.' }
            ];
        }
        function actionSpec(title, body, href, cta, meta){
            return { title:title, body:body, href:href, cta:cta, meta:meta || [], state:'ready' };
        }
        function buildMilestones(counts){
            var motionCount = counts.touches + counts.calls;
            return [
                { label:'First ICP saved', done:counts.icps > 0, copy:'Targeting truth exists for the rest of the system to compound from.' },
                { label:'First live signal or account saved', done:(counts.accounts > 0 || counts.signals > 0), copy:'Signal Console now has real external context to work from.' },
                { label:'First real deal created', done:counts.deals > 0, copy:'Dashboard, pipeline review, and downstream proof now have something real to brief.' },
                { label:'First motion logged', done:motionCount > 0, copy:'Calls, touches, or LinkedIn actions are being captured instead of living in memory.' }
            ];
        }
        function buildHeroChips(activationContext, roleLabel, counts, lifecycle){
            var chips = [];
            if (activationContext && activationContext.categoryLabel) chips.push(activationContext.categoryLabel);
            if (activationContext && activationContext.buyerLabel) chips.push(activationContext.buyerLabel);
            if (activationContext && activationContext.stageLabel) chips.push(activationContext.stageLabel);
            if (activationContext && activationContext.acvBandLabel) chips.push(activationContext.acvBandLabel);
            if (!chips.length) chips.push(roleLabel + ' activation');
            chips.push(counts.icps + ' ICPs live');
            if (lifecycle && lifecycle.active) chips.push('Week 1 · Day ' + lifecycle.dayNumber);
            return chips.slice(0, 5);
        }
        function buildLifecycleAction(nextAction, roleLabel){
            if (!nextAction || !nextAction.href) return null;
            var isTourAction = nextAction.href === '/app/dashboard/' && /tour/i.test(String(nextAction.label || ''));
            if (isTourAction) {
                return {
                    key:'tour',
                    href:'/app/dashboard/',
                    title:'Run the tour',
                    body:'Use the seeded walkthrough to see how the modules compound before you improvise your own route.',
                    cta:'Open Dashboard Tour',
                    meta:['orientation', roleLabel],
                    why:nextAction.why || 'The first-week story should be legible without needing human explanation.',
                    unlocks:'A faster understanding of the dashboard, core module handoffs, and what should happen next.',
                    state:'ready'
                };
            }
            var map = {
                '/app/welcome/': {
                    key:'welcome',
                    title:'Finish the welcome guide',
                    body:'Lock the first-session path before you scatter into modules.',
                    cta:'Open Welcome Guide',
                    meta:['activation', roleLabel],
                    why:'The first week works best when the app explains itself before you improvise your own route.',
                    unlocks:'A cleaner first-session handoff into dashboard, tour, and next actions.'
                },
                '/app/icp-studio/': {
                    key:'icp',
                    title:'Create your first ICP',
                    body:'Define one sharp wedge so the rest of the system stops operating on guesswork.',
                    cta:'Open ICP Studio',
                    meta:['targeting truth', roleLabel],
                    why:'Without one credible ICP, Signal Console, outbound, and discovery all stay too broad.',
                    unlocks:'Sharper signal research, cleaner outbound, and a dashboard that can brief something real.'
                },
                '/app/signal-console/': {
                    key:'signal',
                    title:'Research one live account',
                    body:'Put one real company into the system so the product starts working from external evidence.',
                    cta:'Open Signal Console',
                    meta:['real account', 'live research'],
                    why:'The app becomes dramatically more believable after the first real account or signal exists.',
                    unlocks:'Heat scoring, next-move logic, and better input for sourcing and outbound.'
                },
                '/app/deal-workspace/': {
                    key:'deal',
                    title:'Create the first live deal',
                    body:'A real opportunity gives the dashboard, autopsy, PoC, and handoff surfaces something honest to reason about.',
                    cta:'Open Deal Workspace',
                    meta:['pipeline truth', 'dashboard unlock'],
                    why:'You do not yet have a real object for deal review, risk logic, or proof planning.',
                    unlocks:'Pipeline review, future autopsy, PoC planning, and a more believable command view.'
                },
                '/app/outbound-studio/': {
                    key:'motion',
                    title:'Log the first live motion',
                    body:'Capture one outbound move or one real call so the workspace starts storing operating memory.',
                    cta:'Open Outbound Studio',
                    meta:['activity trail', 'week one'],
                    why:'The system still needs one real touch or call before it can act like a living motion layer.',
                    unlocks:'Lifecycle credibility, dashboard motion truth, and a clearer operating rhythm.'
                },
                '/app/settings/': {
                    key:'backup',
                    title:'Export the first backup',
                    body:'Make the workspace durable outside this one browser before week one gets messy.',
                    cta:'Open Settings',
                    meta:['durability', 'week one'],
                    why:'The first week is not complete until your workspace can survive refresh, re-login, and bad luck.',
                    unlocks:'Safer experimentation, restore confidence, and a more believable operating system.'
                },
                '/app/dashboard/': {
                    key:'dashboard',
                    title:'Return to the dashboard',
                    body:'Use the command view as the place where the system tells you what matters next.',
                    cta:'Open Dashboard',
                    meta:['operating rhythm', 'daily command view'],
                    why:'By this point the app should start behaving like a morning operating room, not a collection of tools.',
                    unlocks:'Faster daily resets, clearer next moves, and stronger week-one rhythm.'
                },
                '/app/discovery-agenda/': {
                    key:'planner',
                    title:'Prep the next discovery call',
                    body:'Turn an active deal into a credible conversation plan before the call happens.',
                    cta:'Open Call Planner',
                    meta:['call quality', 'active deal'],
                    why:'You already have enough deal truth now that the next call should be structured, not improvised.',
                    unlocks:'A stronger discovery agenda and a cleaner handoff into Discovery Studio.'
                },
                '/app/quota-workback/': {
                    key:'quota',
                    title:'Calibrate quota and targets',
                    body:'Set the system math so your activity expectations match the revenue plan.',
                    cta:'Open Quota Workback',
                    meta:['system math', 'benchmarks'],
                    why:'The workspace still needs numeric pressure so “good” does not stay subjective.',
                    unlocks:'Better readiness context, clearer operating targets, and stronger weekly motion planning.'
                }
            };
            var base = map[nextAction.href];
            if (!base) return null;
            return Object.assign({ href: nextAction.href }, base);
        }
        function actionSpec(key, title, body, href, cta, meta, why, unlocks){
            return {
                key:key,
                title:title,
                body:body,
                href:href,
                cta:cta,
                meta:meta || [],
                why:why || '',
                unlocks:unlocks || '',
                state:'ready'
            };
        }
        function buildWorkspaceFocus(summary, activationContext, roleLabel, counts){
            var lines = [];
            if (activationContext && activationContext.company) lines.push('Workspace tuned for ' + activationContext.company + '.');
            lines.push('Role lens: ' + roleLabel + '.');
            if (activationContext && activationContext.stageLabel) lines.push('Current motion: ' + activationContext.stageLabel + '.');
            if (counts.icps || counts.deals || counts.signals || counts.touches || counts.calls) {
                lines.push('The job now is to turn that setup truth into live operating evidence.');
            } else {
                lines.push('The job now is to add the first operating evidence so the app stops feeling theoretical.');
            }
            return lines.join(' ');
        }
        function buildActivationModel(summary, counts){
            var milestones = buildMilestones(counts);
            var completed = milestones.filter(function(item){ return item.done; }).length;
            var nextIndex = milestones.findIndex(function(item){ return !item.done; });
            var nextMilestone = nextIndex > -1 ? milestones[nextIndex] : null;
            var roleLabel = prettyRole(getRole(summary));
            var headline = '';
            var body = '';

            if (completed === 0) {
                headline = 'The workspace exists, but it still needs first operating truth.';
                body = 'Start with one ICP, then add either a live signal or a real deal so the app stops briefing an empty system.';
            } else if (completed < milestones.length) {
                headline = 'You are moving from setup into a real operating system.';
                body = nextMilestone
                    ? 'Next missing anchor: ' + nextMilestone.label + '. Once that is live, the dashboard and downstream modules get more believable fast.'
                    : 'The remaining work is about depth, not setup.';
            } else {
                headline = 'The activation anchors are live. Now the job is to keep the system honest.';
                body = 'Use dashboard, deal review, proof, and handoff as operating rhythm, not just setup confirmation.';
            }

            return {
                roleLabel: roleLabel,
                milestones: milestones,
                completed: completed,
                total: milestones.length,
                headline: headline,
                body: body
            };
        }
        function buildActions(summary, counts, lifecycle){
            var actions = [];
            var seen = {};
            var roleLabel = prettyRole(getRole(summary));
            function push(action){
                if (!action || !action.href) return;
                var key = action.key || action.href;
                if (seen[key]) return;
                seen[key] = true;
                actions.push(action);
            }

            var lifecycleAction = buildLifecycleAction(lifecycle && lifecycle.active ? lifecycle.nextAction : null, roleLabel);
            if (lifecycleAction && lifecycleAction.href !== '/app/welcome/') push(lifecycleAction);

            if (!counts.icps) push(actionSpec('icp','Create your first ICP','Start with one sharp wedge. Once one ICP exists, Signal Console, outbound, and discovery stop operating on memory.','/app/icp-studio/','Open ICP Studio',['highest leverage', roleLabel],'The rest of the app compounds off targeting truth before it compounds off activity.','Sharper signal research, better sourcing, cleaner outbound, and a more credible dashboard brief.'));
            if (!(counts.accounts || counts.signals)) push(actionSpec('signal','Research one live account','Add or enrich one real company so the workspace starts reflecting external evidence instead of setup answers.','/app/signal-console/','Open Signal Console',['real account','deep research'],'You need one live account before the signal layer can behave like a real intelligence system.','Heat logic, next-move guidance, and better context for sourcing and outbound.'));
            if (!counts.deals) push(actionSpec('deal','Create the first live deal','One real opportunity activates pipeline review, proof planning, and the Monday command view.','/app/deal-workspace/','Open Deal Workspace',['pipeline truth','dashboard unlock'],'Without a real deal, too many later modules are still briefing hypothetical work.','Future autopsy, PoC framework, advisor deployment, and a more honest dashboard.'));
            if (!(counts.touches + counts.calls)) push(actionSpec('motion','Log the first live motion','Capture one outbound touch or one real call so the system starts storing operating memory.','/app/outbound-studio/','Open Outbound Studio',['activity trail','week one'],'Week one should include at least one motion so the workspace stops being only configuration plus objects.','Readiness evidence, better dashboard state, and a clearer operating rhythm.'));

            if (actions.length < 4 && counts.deals) push(actionSpec('planner','Prep the next discovery call','Use Call Planner to turn an active deal into a structured conversation, not a loose note.','/app/discovery-agenda/','Open Call Planner',['call quality','active deal'],'You already have enough deal truth to make the next call more deliberate.','A stronger discovery agenda and a cleaner handoff into Discovery Studio.'));
            if (actions.length < 4 && counts.icps) push(actionSpec('refine-icp','Tighten your targeting layer','Your first ICP exists. Refine it now so the rest of the workflow compounds off a sharper buying pattern.','/app/icp-studio/','Refine ICPs',['recommended','signal quality'],'Second-pass targeting work usually pays for itself faster than adding random new records.','Higher-quality sourcing, clearer signals, and better outbound motion.'));
            if (actions.length < 4 && counts.deals) push(actionSpec('dashboard','Review what the dashboard sees','Use the command surface to check whether the brief matches reality before the week gets noisy.','/app/dashboard/','Open Dashboard',['weekly brief','risk review'],'Once at least one deal exists, the dashboard should become part of the real operating loop.','A more believable command view and better next-step discipline.'));
            if (actions.length < 5) push(actionSpec('quota','Dial in quota and targets','Put your quota math and ACV into the system so “good” stops staying subjective.','/app/quota-workback/','Open Quota Workback',['system math','benchmarks'],'The app becomes more credible when activity and readiness are anchored to actual revenue pressure.','Better weekly targets, clearer benchmarks, and stronger readiness logic.'));
            if (actions.length < 5 && lifecycle && lifecycle.active) push(actionSpec('backup','Export the first backup','Make the workspace durable outside this one browser before the first week gets messy.','/app/settings/','Open Settings',['durability','week one'],'Week one is not complete until the workspace can survive refresh, re-login, and a bad decision.','Safer experimentation and a system that feels durable instead of lucky.'));

            return actions.slice(0,5).map(function(action, index){
                action.state = index === 0 ? 'Now' : (index === 1 ? 'Next' : 'Ready');
                return action;
            });
        }
        function completeWelcome(nextPath){
            trackWelcome('welcome_exit_click', { next_path: nextPath || '/app/dashboard/' });
            if (typeof window.setWelcomeSeen === 'function') {
                try { window.setWelcomeSeen(true); } catch (e) {}
            }
            if (typeof window.clearWorkspaceBootstrapCache === 'function') {
                try { window.clearWorkspaceBootstrapCache(); } catch (e) {}
            }
            window.location.href = nextPath || '/app/dashboard/';
        }
        window.completeWelcome = completeWelcome;

        function actionCard(action, index){
            return '<div class="welcome-card">' +
                '<div class="welcome-card-top">' +
                    '<div style="display:flex;gap:12px;align-items:flex-start;">' +
                        '<div class="welcome-card-step">' + (index + 1) + '</div>' +
                        '<div><div class="welcome-card-title">' + esc(action.title) + '</div></div>' +
                    '</div><div class="welcome-card-state">' + esc(action.state || 'Ready') + '</div>' +
                '</div>' +
                '<div class="welcome-card-body">' + esc(action.body) + '</div>' +
                (action.why ? '<div class="welcome-card-why"><strong>Why this is next</strong>' + esc(action.why) + '</div>' : '') +
                (action.unlocks ? '<div class="welcome-card-unlocks"><strong>This unlocks</strong>' + esc(action.unlocks) + '</div>' : '') +
                '<div class="welcome-card-meta">' + action.meta.map(function(item){ return '<span>' + esc(item) + '</span>'; }).join('') + '</div>' +
                '<div class="welcome-link-row"><a class="welcome-mini-link" href="' + esc(action.href) + '" onclick="completeWelcome(\'' + esc(action.href).replace(/&#39;/g, "'") + '\');return false;">' + esc(action.cta) + ' -></a></div>' +
            '</div>';
        }

        function milestoneCard(item, index, activation){
            var stateClass = item.done ? ' done' : (activation.completed === index ? ' next' : '');
            var stateLabel = item.done ? 'Live' : (activation.completed === index ? 'Next' : 'Pending');
            var marker = item.done ? '✓' : (activation.completed === index ? String(index + 1) : '•');
            return '<div class="welcome-milestone' + stateClass + '">' +
                '<div class="welcome-milestone-mark">' + esc(marker) + '</div>' +
                '<div>' +
                    '<div class="welcome-milestone-title">' + esc(item.label) + '</div>' +
                    '<div class="welcome-milestone-copy">' + esc(item.copy) + '</div>' +
                    '<div class="welcome-milestone-status">' + esc(stateLabel) + '</div>' +
                '</div>' +
            '</div>';
        }
        function lifecyclePanel(lifecycle, primaryAction){
            if (!lifecycle || !lifecycle.active) {
                return '<div class="welcome-panel">' +
                    '<h3 class="welcome-panel-title">Reopen this page when the app feels thin</h3>' +
                    '<div class="welcome-panel-sub">Welcome is not a one-time page. Use it again when the next move feels muddy, the workspace feels hollow, or you want the operating story in one place.</div>' +
                    '<div class="welcome-checklist">' +
                        '<div class="welcome-check"><div class="welcome-check-num">1</div><div class="welcome-check-copy"><strong>Use it as a reset.</strong> Come back here whenever you want the shortest path to the next useful action.</div></div>' +
                        '<div class="welcome-check"><div class="welcome-check-num">2</div><div class="welcome-check-copy"><strong>Use the sidebar return path.</strong> The welcome guide stays available from the shell even after you move into the rest of the app.</div></div>' +
                        '<div class="welcome-check"><div class="welcome-check-num">3</div><div class="welcome-check-copy"><strong>Use support surfaces deliberately.</strong> Methodology, demo lane, and settings are here to orient or recover you, not to replace real work.</div></div>' +
                    '</div>' +
                '</div>';
            }
            return '<div class="welcome-panel">' +
                '<h3 class="welcome-panel-title">First-week operating rhythm</h3>' +
                '<div class="welcome-panel-sub">This is the handoff from signup into actual usage. The app should start teaching you a repeatable rhythm before the first week ends.</div>' +
                '<div class="welcome-lifecycle">' +
                    '<div class="welcome-lifecycle-top">' +
                        '<div><div class="welcome-lifecycle-kicker">Week 1 · Day ' + esc(lifecycle.dayNumber) + '</div><div class="welcome-lifecycle-title">' + esc(lifecycle.guidance.headline) + '</div><div class="welcome-lifecycle-copy">' + esc(lifecycle.guidance.body) + '</div></div>' +
                        '<div class="welcome-lifecycle-score"><span>' + esc(lifecycle.completed) + '/' + esc(lifecycle.total) + '</span><small>milestones live</small></div>' +
                    '</div>' +
                    '<div class="welcome-lifecycle-rhythm"><strong>Return rhythm</strong> ' + esc(lifecycle.guidance.rhythm) + '</div>' +
                    (primaryAction ? '<div class="welcome-card-why"><strong>Primary next move</strong>' + esc(primaryAction.title) + '. ' + esc(primaryAction.why || primaryAction.body) + '</div>' : '') +
                    '<div class="welcome-lifecycle-pills">' + lifecycle.milestones.map(function(item){
                        return '<div class="welcome-lifecycle-pill' + (item.done ? ' done' : '') + '">' + esc(item.label) + '</div>';
                    }).join('') + '</div>' +
                '</div>' +
            '</div>';
        }

        function getWelcomeShellTone(activation, lifecycle){
            if (lifecycle && lifecycle.active) return 'live';
            if (!activation.completed) return 'thin';
            if (activation.completed >= activation.total) return 'ready';
            return 'ready';
        }

        function renderWelcomeShellChrome(activation, primaryAction, lifecycle, counts, roleLabel, focusSummary){
            if (!window.gtmShellChrome) return;
            var tone = getWelcomeShellTone(activation, lifecycle);
            var stateLabel = lifecycle && lifecycle.active
                ? 'Week 1 · Day ' + lifecycle.dayNumber
                : activation.completed + '/' + activation.total + ' anchors live';
            var motionCount = counts.touches + counts.calls;
            window.gtmShellChrome.applyHeader({
                stateLabel: stateLabel,
                stateTone: tone
            });
            window.gtmShellChrome.renderCommandBand('#welcomeShellBand', {
                kicker: 'Activation corridor',
                title: activation.headline,
                copy: focusSummary,
                stateLabel: stateLabel,
                stateTone: tone,
                metrics: [
                    { label: 'Role lens', value: roleLabel },
                    { label: 'Targeting', value: counts.icps ? counts.icps + ' ICP' + (counts.icps === 1 ? '' : 's') + ' live' : 'Need first ICP' },
                    { label: 'Pipeline', value: counts.deals ? counts.deals + ' deal' + (counts.deals === 1 ? '' : 's') + ' live' : 'Need first deal' },
                    { label: 'Motion', value: motionCount ? motionCount + ' logged motion' + (motionCount === 1 ? '' : 's') : 'No motions logged yet' }
                ],
                actions: [
                    {
                        href: primaryAction.href || '/app/dashboard/',
                        label: primaryAction.cta || primaryAction.title || 'Continue to dashboard',
                        tone: 'primary'
                    },
                    { href: '/app/dashboard/', label: 'Open Dashboard' }
                ]
            });
        }

        async function loadWelcome(){
            try {
                var result = await window.gtmPersistence.workspace.loadSummary(null, { force: true });
                var summary = result && result.data ? result.data : {};
                var lifecycle = (window.gtmWeekOneLifecycle && typeof window.gtmWeekOneLifecycle.load === 'function')
                    ? await window.gtmWeekOneLifecycle.load(false).catch(function(error){
                        console.error('Welcome week-one lifecycle load failed:', error);
                        return null;
                    })
                    : null;
                var counts = buildCounts(summary);
                var activationContext = getActivationContext();
                var backup = getBackupStatus();
                var actions = buildActions(summary, counts, lifecycle);
                var activation = buildActivationModel(summary, counts);
                trackWelcome('welcome_loaded', {
                    source: summary && summary.source ? summary.source : 'unknown',
                    icps: counts.icps,
                    deals: counts.deals,
                    signals: counts.signals,
                    motions: counts.touches + counts.calls,
                    suggested_actions: actions.length,
                    activation_complete: activation.completed,
                    activation_total: activation.total,
                    role: activation.roleLabel
                });
                var displayName = pickName(summary);
                var role = prettyRole(getRole(summary));
                var statCards = buildStatCards(counts);
                var heroChips = buildHeroChips(activationContext, role, counts, lifecycle);
                var focusSummary = buildWorkspaceFocus(summary, activationContext, role, counts);
                var primaryAction = actions[0] || actionSpec('dashboard', 'Continue into the dashboard', 'The workspace is already anchored enough to use the command view.', '/app/dashboard/', 'Continue to dashboard', ['command view'], '', '');
                var heroPrimaryHref = primaryAction.href || '/app/dashboard/';
                var heroPrimaryLabel = primaryAction.cta || 'Continue to dashboard';
                var backupNote = backup && backup.hasExport ? 'Offline backup exists.' : 'No offline backup exported yet.';
                renderWelcomeShellChrome(activation, primaryAction, lifecycle, counts, role, focusSummary);

                shell.innerHTML =
                    '<section class="welcome-hero">' +
                        '<div class="welcome-badge">Activation ' + esc(activation.completed) + ' of ' + esc(activation.total) + ' live' + ((lifecycle && lifecycle.active) ? ' · Week 1 Day ' + esc(lifecycle.dayNumber) : '') + '</div>' +
                        '<h2 class="welcome-title">Welcome to the Antaeus app</h2>' +
                        '<p class="welcome-sub">This page should turn a completed signup into a believable operating system. Add one real thread of truth, then let the rest of the app compound from it.</p>' +
                        '<div class="welcome-hero-meta">' + heroChips.map(function(item){ return '<div class="welcome-hero-chip">' + esc(item) + '</div>'; }).join('') + '</div>' +
                        '<div class="welcome-progress"><div class="welcome-progress-title">' + esc(activation.headline) + '</div><div class="welcome-progress-copy">' + esc(activation.body) + '</div></div>' +
                        '<div class="welcome-progress"><div class="welcome-progress-title">Workspace focus</div><div class="welcome-progress-copy">' + esc(focusSummary) + '</div></div>' +
                        '<div class="welcome-actions">' +
                            '<a href="' + esc(heroPrimaryHref) + '" class="welcome-btn primary" onclick="completeWelcome(\'' + esc(heroPrimaryHref).replace(/&#39;/g, "'") + '\');return false;">' + esc(heroPrimaryLabel) + '</a>' +
                            '<a href="/app/dashboard/" class="welcome-btn" onclick="completeWelcome(\'/app/dashboard/\');return false;">Continue to dashboard</a>' +
                            '<a href="/methodology/" class="welcome-btn" onclick="completeWelcome(\'/methodology/\');return false;">Open methodology</a>' +
                        '</div>' +
                        '<div class="welcome-sync">Back to Welcome Guide stays live in the sidebar. ' + esc(backupNote) + '</div>' +
                    '</section>' +
                    '<section class="welcome-grid">' +
                        '<div style="display:grid;gap:24px;">' +
                            '<div class="welcome-panel">' +
                                '<h3 class="welcome-panel-title">What your workspace already knows</h3>' +
                                '<div class="welcome-panel-sub">Signed in as ' + esc(role) + '. Workspace owner: ' + esc(displayName) + '. These counts update from your real persisted state.</div>' +
                                '<div class="welcome-stats">' + statCards.map(function(card){
                                    return '<div class="welcome-stat"><div class="welcome-stat-value">' + esc(card.value) + '</div><div class="welcome-stat-label">' + esc(card.label) + '</div><div class="welcome-stat-sub">' + esc(card.sub) + '</div></div>';
                                }).join('') + '</div>' +
                                '<div class="welcome-state-note">Source: ' + esc(summary && summary.source ? summary.source : 'unknown') + (summary && summary.errors && summary.errors.length ? ' · some modules fell back to cache while loading.' : '') + '</div>' +
                            '</div>' +
                            '<div class="welcome-panel">' +
                                '<h3 class="welcome-panel-title">Your first 3–5 actions</h3>' +
                                '<div class="welcome-panel-sub">Do these in order. Each one makes the rest of the app more believable across sessions, devices, and most importantly...tomorrow morning.</div>' +
                                '<div class="welcome-list">' + actions.map(actionCard).join('') + '</div>' +
                            '</div>' +
                        '</div>' +
                        '<div class="welcome-side-stack">' +
                            lifecyclePanel(lifecycle, primaryAction) +
                            '<div class="welcome-panel">' +
                                '<h3 class="welcome-panel-title">Activation map</h3>' +
                                '<div class="welcome-panel-sub">This is how the workspace becomes real. The states below are computed from what your app has actually saved so far.</div>' +
                                '<div class="welcome-milestones">' + activation.milestones.map(function(item, index){ return milestoneCard(item, index, activation); }).join('') + '</div>' +
                            '</div>' +
                            '<div class="welcome-panel">' +
                                '<h3 class="welcome-panel-title">If you need help or a reset</h3>' +
                                '<div class="welcome-panel-sub">Use these when you want the product story, a safe sample workspace, or a recovery path. They support the operating loop without replacing it.</div>' +
                                '<div class="welcome-resource-list">' +
                                    '<div class="welcome-resource"><div><h4>Methodology hub</h4><p>Public pages that explain the system in plain English.</p></div><a class="welcome-mini-link" href="/methodology/" onclick="completeWelcome(\'/methodology/\');return false;">Open</a></div>' +
                                    '<div class="welcome-resource"><div><h4>Demo lane</h4><p>Load sample data if you want to see a fully populated workspace before building yours.</p></div><a class="welcome-mini-link" href="/demo-seed.html" onclick="completeWelcome(\'/demo-seed.html\');return false;">Explore</a></div>' +
                                    '<div class="welcome-resource"><div><h4>Settings and backup</h4><p>Export an offline copy of your workspace or restore a prior backup.</p></div><a class="welcome-mini-link" href="/app/settings/" onclick="completeWelcome(\'/app/settings/\');return false;">Open</a></div>' +
                                '</div>' +
                                '<div class="welcome-state-note">Use this page again whenever the next move feels unclear. The return path stays available from the sidebar.</div>' +
                            '</div>' +
                        '</div>' +
                    '</section>';
        } catch (error) {
                console.error('Welcome page failed to load workspace summary:', error);
                trackWelcome('welcome_load_error', {
                    message: (error && error.message) ? error.message : 'Welcome failed to load'
                });
                if (window.gtmShellChrome) {
                    window.gtmShellChrome.applyHeader({
                        stateLabel: 'Load issue',
                        stateTone: 'risk'
                    });
                }
                shell.innerHTML = '<div class="welcome-error">Welcome could not load workspace context. <a href="/app/dashboard/" onclick="completeWelcome(\'/app/dashboard/\');return false;">Go straight to dashboard</a>.</div>';
            }
        }

        if (window.__gtmosAuthGatePending) {
            window.addEventListener('gtmos:auth-ready', function(){ loadWelcome(); }, { once: true });
        } else {
            loadWelcome();
        }
    })();
    </script>
</body>
</html>
