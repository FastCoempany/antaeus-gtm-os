<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Antaeus GTM OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <style>
        #welcomeShellBand:empty{display:none}
        .command-welcome-page .app-content{padding-top:24px}
        .welcome-shell{display:grid;gap:0;max-width:none}
        .welcome-commission{display:grid;grid-template-columns:minmax(0,1.12fr) minmax(320px,.88fr);gap:42px;align-items:start}
        .welcome-main,.welcome-side{min-width:0}
        .welcome-main{display:grid;gap:24px;align-content:start}
        .welcome-side{display:grid;gap:18px;align-content:start;padding-top:10px}
        .welcome-topline{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
        .welcome-kicker{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:var(--brand-gold)}
        .welcome-state{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--text-muted)}
        .welcome-display{font-family:'Outfit',var(--font-sans);font-size:clamp(4.4rem,8.2vw,7.6rem);line-height:.88;letter-spacing:-.1em;color:var(--text-primary);max-width:10.5ch}
        .welcome-support{max-width:42rem;font-size:1.03rem;line-height:1.68;color:var(--text-secondary);margin:0}
        .welcome-action-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
        .welcome-inline-link{display:inline-flex;align-items:center;gap:8px;color:var(--accent-blue);font-size:.95rem;font-weight:700}
        .welcome-inline-link:hover{color:var(--text-primary)}
        .welcome-folio-stage{position:relative;min-height:560px;display:grid;place-items:center}
        .welcome-folio-stack{position:relative;width:min(900px,100%);height:510px;perspective:1800px}
        .welcome-leaf{position:absolute;inset:0;border-radius:34px;border:1px solid rgba(10,28,64,0.09);overflow:hidden;box-shadow:0 18px 54px rgba(10,28,64,0.08);padding:30px 32px}
        .welcome-leaf.back{background:linear-gradient(180deg,rgba(239,245,255,0.98) 0%,rgba(255,255,255,0.96) 100%);transform:rotate(-5.3deg) translate(-24px,20px)}
        .welcome-leaf.mid{background:linear-gradient(180deg,rgba(239,249,244,0.98) 0%,rgba(255,255,255,0.96) 100%);transform:rotate(2.8deg) translate(16px,12px)}
        .welcome-leaf.front{background:linear-gradient(180deg,rgba(255,245,238,0.99) 0%,rgba(255,255,255,0.98) 100%);transform:rotate(-1.6deg);box-shadow:0 28px 86px rgba(10,28,64,0.14)}
        .welcome-leaf-top{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:22px}
        .welcome-leaf-kicker{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--text-muted)}
        .welcome-leaf-title{margin-top:8px;font-family:'Outfit',var(--font-sans);font-size:clamp(2.4rem,4.1vw,3.1rem);line-height:.94;letter-spacing:-.07em;max-width:8.8ch}
        .welcome-stamp{width:94px;height:94px;border-radius:50%;border:1px solid rgba(230,112,30,0.22);display:grid;place-items:center;background:rgba(255,255,255,0.62);color:var(--brand-gold);font-size:.64rem;letter-spacing:.18em;text-transform:uppercase;text-align:center;line-height:1.35;font-weight:700;transform:rotate(-12deg)}
        .welcome-leaf-copy{max-width:36ch;font-size:.95rem;line-height:1.58;color:var(--text-secondary)}
        .welcome-folio-grid{margin-top:22px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
        .welcome-folio-cell{min-height:128px;padding:16px 18px;border-radius:24px;background:rgba(255,255,255,0.62);border:1px solid rgba(10,28,64,0.08);display:grid;gap:10px;align-content:start}
        .welcome-folio-cell.locked{position:relative;background:rgba(255,248,244,0.86);border-color:rgba(230,112,30,0.18);box-shadow:inset 0 0 0 1px rgba(230,112,30,0.06)}
        .welcome-folio-cell.locked::after{content:"";position:absolute;right:14px;top:14px;width:24px;height:24px;border-radius:10px;background:linear-gradient(180deg,rgba(255,255,255,0.84),rgba(255,255,255,0.52)),rgba(230,112,30,0.12);border:1px solid rgba(230,112,30,0.18);box-shadow:0 10px 20px rgba(230,112,30,0.08)}
        .welcome-folio-cell.locked::before{content:"";position:absolute;right:21px;top:8px;width:10px;height:8px;border:2px solid rgba(230,112,30,0.52);border-bottom:none;border-radius:8px 8px 0 0}
        .welcome-cell-label{font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:var(--text-muted)}
        .welcome-cell-value{font-size:1.55rem;line-height:1.05;letter-spacing:-.05em;font-weight:700;color:var(--text-primary)}
        .welcome-cell-note{font-size:.82rem;line-height:1.48;color:var(--text-secondary)}
        .welcome-data-rail{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:0;border-top:1px solid rgba(10,28,64,0.1);border-bottom:1px solid rgba(10,28,64,0.1);padding:18px 0}
        .welcome-data-cell{padding:0 18px;border-left:1px solid rgba(10,28,64,0.08)}
        .welcome-data-cell:first-child{padding-left:0;border-left:none}
        .welcome-data-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:var(--text-muted)}
        .welcome-data-value{margin-top:7px;font-family:'Outfit',var(--font-sans);font-size:1.85rem;line-height:1;color:var(--text-primary)}
        .welcome-data-note{margin-top:6px;font-size:.76rem;line-height:1.5;color:var(--text-tertiary)}
        .welcome-week-shell{display:grid;gap:18px;padding:24px 26px 22px;border-radius:32px;background:linear-gradient(180deg,rgba(255,255,255,0.92) 0%,rgba(247,250,255,0.86) 100%);box-shadow:0 18px 46px rgba(10,28,64,0.08)}
        .welcome-week-head{display:grid;gap:10px}
        .welcome-week-kicker{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--brand-gold)}
        .welcome-week-title{max-width:12ch;font-size:1.5rem;line-height:1.08;color:var(--text-primary);font-weight:700}
        .welcome-week-copy{font-size:.9rem;line-height:1.7;color:var(--text-secondary)}
        .welcome-progress-row{display:grid;gap:10px}
        .welcome-progress-copy{display:flex;align-items:center;justify-content:space-between;gap:16px;font-size:.74rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted)}
        .welcome-progress-bar{height:6px;border-radius:999px;background:rgba(10,28,64,0.08);overflow:hidden}
        .welcome-progress-bar span{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--brand-gold) 0%,#f1a25d 100%)}
        .welcome-milestone-list{display:grid;gap:0}
        .welcome-milestone-row{display:grid;grid-template-columns:26px minmax(0,1fr);gap:12px;padding:14px 0;border-top:1px solid rgba(10,28,64,0.08)}
        .welcome-milestone-row:first-child{border-top:none;padding-top:0}
        .welcome-milestone-mark{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:.72rem;font-weight:700;color:var(--text-muted);background:rgba(10,28,64,0.05)}
        .welcome-milestone-row.is-live .welcome-milestone-mark{background:rgba(31,157,85,0.12);color:var(--accent-green)}
        .welcome-milestone-row.is-next .welcome-milestone-mark{background:rgba(230,112,30,0.12);color:var(--brand-gold)}
        .welcome-milestone-title{font-size:.9rem;line-height:1.35;color:var(--text-primary);font-weight:700}
        .welcome-milestone-copy{margin-top:4px;font-size:.78rem;line-height:1.55;color:var(--text-tertiary)}
        .welcome-milestone-status{margin-top:5px;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--text-muted)}
        .welcome-milestone-row.is-live .welcome-milestone-status{color:var(--accent-green)}
        .welcome-milestone-row.is-next .welcome-milestone-status{color:var(--brand-gold)}
        .welcome-side-note{padding:18px 20px;border-radius:24px;background:rgba(255,255,255,0.76);border:1px solid rgba(10,28,64,0.08);box-shadow:0 18px 46px rgba(10,28,64,0.06);display:grid;gap:10px}
        .welcome-side-note strong{font-size:1rem;line-height:1.3;color:var(--text-primary)}
        .welcome-side-note span{font-size:.86rem;line-height:1.6;color:var(--text-secondary)}
        .welcome-footnote{font-size:.78rem;line-height:1.6;color:var(--text-muted)}
        .welcome-loading,.welcome-error{padding:32px;text-align:center;color:var(--text-muted)}
        @media(max-width:1180px){
            .welcome-commission{grid-template-columns:1fr;gap:30px}
            .welcome-week-shell{max-width:700px}
        }
        @media(max-width:860px){
            .command-welcome-page .app-content{padding-top:16px}
            .welcome-display{font-size:clamp(3.2rem,16vw,5.1rem);max-width:100%}
            .welcome-folio-stack{height:760px}
            .welcome-folio-grid{grid-template-columns:1fr}
            .welcome-data-rail{grid-template-columns:repeat(2,minmax(0,1fr));row-gap:18px}
            .welcome-data-cell:nth-child(3){padding-left:0;border-left:none}
        }
    </style>
</head>
<body class="command-surface-page command-welcome-page">
    <script src="/js/app-auth-preflight.js"></script>
    <div class="app-container">
        <aside class="app-sidebar">
            <script src="/js/analytics-site-config.js"></script>
            <script src="/js/analytics.js"></script>
            <script src="/js/data-manager.js"></script>
            <script src="/js/nav.js"></script>
        </aside>
        <main class="app-main">
            <div class="app-content">
                <div id="welcomeShellBand"></div>
                <div class="welcome-shell" id="welcomeShell">
                    <div class="welcome-loading">Loading your first-session workspace...</div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-config.js"></script>
    <script src="/js/require-auth.js"></script>
    <script>
    (function(){
        var shell = document.getElementById('welcomeShell');
        var DASHBOARD_ENTRY_HREF = '/app/dashboard/?mode=spotlight';
        function trackWelcome(name, props){
            if(window.gtmAnalytics && typeof window.gtmAnalytics.track === 'function'){
                window.gtmAnalytics.track(name, Object.assign({ stage:'welcome' }, props || {}));
            }
        }

        function arr(value){ return Array.isArray(value) ? value : []; }
        function parseJSON(raw, fallback){
            if (raw == null || raw === '') return fallback;
            try { return JSON.parse(raw); } catch (e) { return fallback; }
        }
        function esc(value){ var node = document.createElement('div'); node.textContent = value == null ? '' : String(value); return node.innerHTML; }
        function scopedGet(key, fallback){
            if (window.gtmLocalState && typeof window.gtmLocalState.get === 'function') {
                return window.gtmLocalState.get(key, fallback, { scope: 'user' });
            }
            try { return parseJSON(localStorage.getItem(key), fallback); } catch (e) { return fallback; }
        }
        function pickName(summary){
            var profile = summary && summary.profile ? summary.profile : {};
            var onboarding = summary && summary.onboarding && summary.onboarding.answers ? summary.onboarding.answers : {};
            return profile.full_name || onboarding.companyName || profile.company_name || 'your workspace';
        }
        function getRole(summary){
            var profile = summary && summary.profile ? summary.profile : {};
            var onboarding = summary && summary.onboarding && summary.onboarding.answers ? summary.onboarding.answers : {};
            return profile.role || onboarding.role || 'operator';
        }
        function prettyRole(value){
            var next = String(value || 'operator').replace(/[_-]+/g,' ').trim();
            if (!next) return 'Operator';
            return next.split(/\s+/).map(function(part){
                return part.charAt(0).toUpperCase() + part.slice(1);
            }).join(' ');
        }
        function getActivationContext(){
            var local = scopedGet('gtmos_activation_context', null);
            if (local) return local;
            try { return parseJSON(localStorage.getItem('gtmos_activation_context'), null); } catch (e) { return null; }
        }
        function getBackupStatus(){
            var manager = window.gtmDataManager || window.dataManager || null;
            if (!manager || typeof manager.getBackupStatus !== 'function') return null;
            try { return manager.getBackupStatus(); } catch (e) { return null; }
        }
        function buildCounts(summary){
            var icps = arr(summary && summary.icpAnalytics && summary.icpAnalytics.icps);
            var deals = arr(summary && summary.deals);
            var accounts = arr(summary && summary.signalConsole && summary.signalConsole.accounts);
            var signalCount = accounts.reduce(function(total, account){ return total + arr(account && account.signals).length; }, 0);
            var discoveryStats = summary && summary.discovery && summary.discovery.stats ? summary.discovery.stats : {};
            var touchLog = summary && summary.sequences && summary.sequences.outboundTouches ? summary.sequences.outboundTouches : {};
            var linkedinLog = summary && summary.sequences && summary.sequences.linkedinLog ? summary.sequences.linkedinLog : {};
            return {
                icps: icps.length,
                deals: deals.length,
                accounts: accounts.length,
                signals: signalCount,
                calls: Number(discoveryStats.totalCalls || 0) || 0,
                touches: arr(touchLog.touches).length + arr(linkedinLog.actions).length
            };
        }
        function buildStatCards(counts){
            return [
                { value: counts.icps, label: 'ICPs', sub: counts.icps ? 'Targeting is taking shape.' : 'No saved targeting truth yet.' },
                { value: counts.deals, label: 'Deals', sub: counts.deals ? 'Pipeline data is live.' : 'Dashboard will wake up after the first deal.' },
                { value: counts.signals, label: 'Signals', sub: counts.signals ? 'Real account research exists.' : 'Signal Console has not been used yet.' },
                { value: counts.touches + counts.calls, label: 'Motions', sub: (counts.touches + counts.calls) ? 'Outbound and call history are being captured.' : 'No live motions recorded yet.' }
            ];
        }
        function actionSpec(title, body, href, cta, meta){
            return { title:title, body:body, href:href, cta:cta, meta:meta || [], state:'ready' };
        }
        function buildMilestones(counts){
            var motionCount = counts.touches + counts.calls;
            return [
                { label:'First ICP saved', done:counts.icps > 0, copy:'Targeting truth exists for the rest of the system to compound from.' },
                { label:'First live signal or account saved', done:(counts.accounts > 0 || counts.signals > 0), copy:'Signal Console now has real external context to work from.' },
                { label:'First real deal created', done:counts.deals > 0, copy:'Dashboard, pipeline review, and downstream proof now have something real to brief.' },
                { label:'First motion logged', done:motionCount > 0, copy:'Calls, touches, or LinkedIn actions are being captured instead of living in memory.' }
            ];
        }
        function buildHeroChips(activationContext, roleLabel, counts, lifecycle){
            var chips = [];
            if (activationContext && activationContext.categoryLabel) chips.push(activationContext.categoryLabel);
            if (activationContext && activationContext.buyerLabel) chips.push(activationContext.buyerLabel);
            if (activationContext && activationContext.stageLabel) chips.push(activationContext.stageLabel);
            if (activationContext && activationContext.acvBandLabel) chips.push(activationContext.acvBandLabel);
            if (!chips.length) chips.push(roleLabel + ' activation');
            chips.push(counts.icps + ' ICPs live');
            if (lifecycle && lifecycle.active) chips.push('Week 1 · Day ' + lifecycle.dayNumber);
            return chips.slice(0, 5);
        }
        function buildLifecycleAction(nextAction, roleLabel){
            if (!nextAction || !nextAction.href) return null;
            var isTourAction = nextAction.href === DASHBOARD_ENTRY_HREF && /tour/i.test(String(nextAction.label || ''));
            if (isTourAction) {
                return {
                    key:'tour',
                    href:DASHBOARD_ENTRY_HREF,
                    title:'Run the tour',
                    body:'Use the seeded walkthrough to see how the modules compound before you improvise your own route.',
                    cta:'Open Spotlight Tour',
                    meta:['orientation', roleLabel],
                    why:nextAction.why || 'The first-week story should be legible without needing human explanation.',
                    unlocks:'A faster understanding of the dashboard, core module handoffs, and what should happen next.',
                    state:'ready'
                };
            }
            var map = {
                '/app/welcome/': {
                    key:'welcome',
                    title:'Finish the welcome guide',
                    body:'Lock the first-session path before you scatter into modules.',
                    cta:'Open Welcome Guide',
                    meta:['activation', roleLabel],
                    why:'The first week works best when the app explains itself before you improvise your own route.',
                    unlocks:'A cleaner first-session handoff into dashboard, tour, and next actions.'
                },
                '/app/icp-studio/': {
                    key:'icp',
                    title:'Create your first ICP',
                    body:'Define one sharp wedge so the rest of the system stops operating on guesswork.',
                    cta:'Open ICP Studio',
                    meta:['targeting truth', roleLabel],
                    why:'Without one credible ICP, Signal Console, outbound, and discovery all stay too broad.',
                    unlocks:'Sharper signal research, cleaner outbound, and a dashboard that can brief something real.'
                },
                '/app/signal-console/': {
                    key:'signal',
                    title:'Research one live account',
                    body:'Put one real company into the system so the product starts working from external evidence.',
                    cta:'Open Signal Console',
                    meta:['real account', 'live research'],
                    why:'The app becomes dramatically more believable after the first real account or signal exists.',
                    unlocks:'Heat scoring, next-move logic, and better input for sourcing and outbound.'
                },
                '/app/deal-workspace/': {
                    key:'deal',
                    title:'Create the first live deal',
                    body:'A real opportunity gives the dashboard, autopsy, PoC, and handoff surfaces something honest to reason about.',
                    cta:'Open Deal Workspace',
                    meta:['pipeline truth', 'dashboard unlock'],
                    why:'You do not yet have a real object for deal review, risk logic, or proof planning.',
                    unlocks:'Pipeline review, future autopsy, PoC planning, and a more believable command stack.'
                },
                '/app/outbound-studio/': {
                    key:'motion',
                    title:'Log the first live motion',
                    body:'Capture one outbound move or one real call so the workspace starts storing operating memory.',
                    cta:'Open Outbound Studio',
                    meta:['activity trail', 'week one'],
                    why:'The system still needs one real touch or call before it can act like a living motion layer.',
                    unlocks:'Lifecycle credibility, dashboard motion truth, and a clearer operating rhythm.'
                },
                '/app/settings/': {
                    key:'backup',
                    title:'Export the first backup',
                    body:'Make the workspace durable outside this one browser before week one gets messy.',
                    cta:'Open Settings',
                    meta:['durability', 'week one'],
                    why:'The first week is not complete until your workspace can survive refresh, re-login, and bad luck.',
                    unlocks:'Safer experimentation, restore confidence, and a more believable operating system.'
                },
                '/app/dashboard/': {
                    key:'dashboard',
                    title:'Return to Spotlight',
                    body:'Use the command stack as the place where the system tells you what matters next.',
                    cta:'Open Spotlight',
                    meta:['operating rhythm', 'daily command stack'],
                    why:'By this point the app should start behaving like a morning operating room, not a collection of tools.',
                    unlocks:'Faster daily resets, clearer next moves, and stronger week-one rhythm.'
                },
                '/app/discovery-agenda/': {
                    key:'planner',
                    title:'Prep the next discovery call',
                    body:'Turn an active deal into a credible conversation plan before the call happens.',
                    cta:'Open Call Planner',
                    meta:['call quality', 'active deal'],
                    why:'You already have enough deal truth now that the next call should be structured, not improvised.',
                    unlocks:'A stronger discovery agenda and a cleaner handoff into Discovery Studio.'
                },
                '/app/quota-workback/': {
                    key:'quota',
                    title:'Calibrate quota and targets',
                    body:'Set the system math so your activity expectations match the revenue plan.',
                    cta:'Open Quota Workback',
                    meta:['system math', 'benchmarks'],
                    why:'The workspace still needs numeric pressure so “good” does not stay subjective.',
                    unlocks:'Better readiness context, clearer operating targets, and stronger weekly motion planning.'
                }
            };
            var base = map[nextAction.href] || (nextAction.href === DASHBOARD_ENTRY_HREF ? map['/app/dashboard/'] : null);
            if (!base) return null;
            return Object.assign({ href: nextAction.href }, base);
        }
        function actionSpec(key, title, body, href, cta, meta, why, unlocks){
            return {
                key:key,
                title:title,
                body:body,
                href:href,
                cta:cta,
                meta:meta || [],
                why:why || '',
                unlocks:unlocks || '',
                state:'ready'
            };
        }
        function buildWorkspaceFocus(summary, activationContext, roleLabel, counts){
            var lines = [];
            if (activationContext && activationContext.company) lines.push('Workspace tuned for ' + activationContext.company + '.');
            lines.push('Role lens: ' + roleLabel + '.');
            if (activationContext && activationContext.stageLabel) lines.push('Current motion: ' + activationContext.stageLabel + '.');
            if (counts.icps || counts.deals || counts.signals || counts.touches || counts.calls) {
                lines.push('The job now is to turn that setup truth into live operating evidence.');
            } else {
                lines.push('The job now is to add the first operating evidence so the app stops feeling theoretical.');
            }
            return lines.join(' ');
        }
        function buildActivationModel(summary, counts){
            var milestones = buildMilestones(counts);
            var completed = milestones.filter(function(item){ return item.done; }).length;
            var nextIndex = milestones.findIndex(function(item){ return !item.done; });
            var nextMilestone = nextIndex > -1 ? milestones[nextIndex] : null;
            var roleLabel = prettyRole(getRole(summary));
            var headline = '';
            var body = '';

            if (completed === 0) {
                headline = 'The workspace exists, but it still needs first operating truth.';
                body = 'Start with one ICP, then add either a live signal or a real deal so the app stops briefing an empty system.';
            } else if (completed < milestones.length) {
                headline = 'You are moving from setup into a real operating system.';
                body = nextMilestone
                    ? 'Next missing anchor: ' + nextMilestone.label + '. Once that is live, the dashboard and downstream modules get more believable fast.'
                    : 'The remaining work is about depth, not setup.';
            } else {
                headline = 'The activation anchors are live. Now the job is to keep the system honest.';
                body = 'Use dashboard, deal review, proof, and handoff as operating rhythm, not just setup confirmation.';
            }

            return {
                roleLabel: roleLabel,
                milestones: milestones,
                completed: completed,
                total: milestones.length,
                headline: headline,
                body: body
            };
        }
        function buildActions(summary, counts, lifecycle){
            var actions = [];
            var seen = {};
            var roleLabel = prettyRole(getRole(summary));
            function push(action){
                if (!action || !action.href) return;
                var key = action.key || action.href;
                if (seen[key]) return;
                seen[key] = true;
                actions.push(action);
            }

            var lifecycleAction = buildLifecycleAction(lifecycle && lifecycle.active ? lifecycle.nextAction : null, roleLabel);
            if (lifecycleAction && lifecycleAction.href !== '/app/welcome/') push(lifecycleAction);

            if (!counts.icps) push(actionSpec('icp','Create your first ICP','Start with one sharp wedge. Once one ICP exists, Signal Console, outbound, and discovery stop operating on memory.','/app/icp-studio/','Open ICP Studio',['highest leverage', roleLabel],'The rest of the app compounds off targeting truth before it compounds off activity.','Sharper signal research, better sourcing, cleaner outbound, and a more credible dashboard brief.'));
            if (!(counts.accounts || counts.signals)) push(actionSpec('signal','Research one live account','Add or enrich one real company so the workspace starts reflecting external evidence instead of setup answers.','/app/signal-console/','Open Signal Console',['real account','deep research'],'You need one live account before the signal layer can behave like a real intelligence system.','Heat logic, next-move guidance, and better context for sourcing and outbound.'));
            if (!counts.deals) push(actionSpec('deal','Create the first live deal','One real opportunity activates pipeline review, proof planning, and the Monday command stack.','/app/deal-workspace/','Open Deal Workspace',['pipeline truth','dashboard unlock'],'Without a real deal, too many later modules are still briefing hypothetical work.','Future autopsy, PoC framework, advisor deployment, and a more honest dashboard.'));
            if (!(counts.touches + counts.calls)) push(actionSpec('motion','Log the first live motion','Capture one outbound touch or one real call so the system starts storing operating memory.','/app/outbound-studio/','Open Outbound Studio',['activity trail','week one'],'Week one should include at least one motion so the workspace stops being only configuration plus objects.','Readiness evidence, better dashboard state, and a clearer operating rhythm.'));

            if (actions.length < 4 && counts.deals) push(actionSpec('planner','Prep the next discovery call','Use Call Planner to turn an active deal into a structured conversation, not a loose note.','/app/discovery-agenda/','Open Call Planner',['call quality','active deal'],'You already have enough deal truth to make the next call more deliberate.','A stronger discovery agenda and a cleaner handoff into Discovery Studio.'));
            if (actions.length < 4 && counts.icps) push(actionSpec('refine-icp','Tighten your targeting layer','Your first ICP exists. Refine it now so the rest of the workflow compounds off a sharper buying pattern.','/app/icp-studio/','Refine ICPs',['recommended','signal quality'],'Second-pass targeting work usually pays for itself faster than adding random new records.','Higher-quality sourcing, clearer signals, and better outbound motion.'));
            if (actions.length < 4 && counts.deals) push(actionSpec('dashboard','Review what Spotlight sees','Use the command stack to check whether the brief matches reality before the week gets noisy.',DASHBOARD_ENTRY_HREF,'Open Spotlight',['weekly brief','risk review'],'Once at least one deal exists, the dashboard should become part of the real operating loop.','A more believable command stack and better next-step discipline.'));
            if (actions.length < 5) push(actionSpec('quota','Dial in quota and targets','Put your quota math and ACV into the system so “good” stops staying subjective.','/app/quota-workback/','Open Quota Workback',['system math','benchmarks'],'The app becomes more credible when activity and readiness are anchored to actual revenue pressure.','Better weekly targets, clearer benchmarks, and stronger readiness logic.'));
            if (actions.length < 5 && lifecycle && lifecycle.active) push(actionSpec('backup','Export the first backup','Make the workspace durable outside this one browser before the first week gets messy.','/app/settings/','Open Settings',['durability','week one'],'Week one is not complete until the workspace can survive refresh, re-login, and a bad decision.','Safer experimentation and a system that feels durable instead of lucky.'));

            return actions.slice(0,5).map(function(action, index){
                action.state = index === 0 ? 'Now' : (index === 1 ? 'Next' : 'Ready');
                return action;
            });
        }
        function completeWelcome(nextPath){
            trackWelcome('welcome_exit_click', { next_path: nextPath || DASHBOARD_ENTRY_HREF });
            if (typeof window.setWelcomeSeen === 'function') {
                try { window.setWelcomeSeen(true); } catch (e) {}
            }
            if (typeof window.clearWorkspaceBootstrapCache === 'function') {
                try { window.clearWorkspaceBootstrapCache(); } catch (e) {}
            }
            window.location.href = nextPath || DASHBOARD_ENTRY_HREF;
        }
        window.completeWelcome = completeWelcome;

        function actionCard(action, index){
            return '<div class="welcome-card">' +
                '<div class="welcome-card-top">' +
                    '<div style="display:flex;gap:12px;align-items:flex-start;">' +
                        '<div class="welcome-card-step">' + (index + 1) + '</div>' +
                        '<div><div class="welcome-card-title">' + esc(action.title) + '</div></div>' +

                '<div class="welcome-card-body">' + esc(action.body) + '</div>' +

                '<div class="welcome-link-row"><a class="welcome-mini-link" href="' + esc(action.href) + '" onclick="completeWelcome(\'' + esc(action.href).replace(/&#39;/g, "'") + '\');return false;">' + esc(action.cta) + ' -></a></div>' +
            '</div>';
        }

        function renderWelcomePrimaryCard(primaryAction, activation, focusSummary){
            return '<div class="anchor-primary-card">' +
                '<div class="anchor-primary-label">Now</div>' +

                    '<a href="' + esc(primaryAction.href || DASHBOARD_ENTRY_HREF) + '" class="btn btn-primary" onclick="completeWelcome(\'' + esc(primaryAction.href || DASHBOARD_ENTRY_HREF).replace(/&#39;/g, "'") + '\');return false;">' + esc(primaryAction.cta || 'Continue to workspace') + '</a>' +
                    '<a href="' + esc(DASHBOARD_ENTRY_HREF) + '" class="btn btn-secondary" onclick="completeWelcome(\'' + esc(DASHBOARD_ENTRY_HREF).replace(/&#39;/g, "'") + '\');return false;">Open Spotlight</a>' +

        function buildWelcomeLanes(activation, lifecycle, actions){
            var nowAction = actions[0] || null;
            var nextAction = actions[1] || null;
            return [
                {
                    state: 'Now',
                    title: nowAction ? nowAction.title : 'Create the first real operating object.',
                    copy: nowAction ? (nowAction.why || nowAction.body) : activation.body,
                    meta: nowAction && nowAction.meta ? nowAction.meta : ['activation'],
                    actions: nowAction ? [{ href: nowAction.href, label: nowAction.cta || nowAction.title }] : []
                },
                {
                    state: 'Next',
                    title: nextAction ? nextAction.title : 'Make the next downstream layer believable.',
                    copy: nextAction ? (nextAction.why || nextAction.body) : 'After the first move is live, use the next module to add enough truth that the dashboard, deals, and handoff stop sounding theoretical.',
                    meta: nextAction && nextAction.meta ? nextAction.meta : ['compounding'],
                    actions: nextAction ? [{ href: nextAction.href, label: nextAction.cta || nextAction.title, tone: 'btn-secondary' }] : []
                },
                {
                    state: lifecycle && lifecycle.active ? 'Week 1' : 'Keep honest',
                    title: lifecycle && lifecycle.active ? 'Return through Spotlight after each real move.' : 'Use Welcome as a reset, then re-enter through Spotlight.',
                    copy: lifecycle && lifecycle.active
                        ? 'Week 1 stays useful only if you keep returning through command instead of browsing rooms from memory.'

                    actions: [

        }

        function renderWelcomeQueueCard(action, index){
            return '<div class="anchor-queue-card">' +
                '<div class="anchor-queue-top">' +
                    '<div style="display:flex;gap:12px;align-items:flex-start;">' +
                        '<div class="anchor-queue-rank">' + esc(String(index + 1)) + '</div>' +
                        '<div><div class="anchor-queue-title">' + esc(action.title) + '</div></div>' +
                    '</div>' +
                    '<span class="shell-state-pill ' + ((action.state || '').toLowerCase() === 'now' ? 'state-ready' : ((action.state || '').toLowerCase() === 'next' ? 'state-live' : 'state-thin')) + '">' + esc(action.state || 'Ready') + '</span>' +
                '</div>' +
                '<div class="anchor-queue-copy">' + esc(action.body) + '</div>' +
                (action.why ? '<div class="anchor-note"><strong>Why this is next.</strong> ' + esc(action.why) + '</div>' : '') +
                (action.unlocks ? '<div class="anchor-note"><strong>This unlocks.</strong> ' + esc(action.unlocks) + '</div>' : '') +
                '<div class="anchor-queue-meta">' + (action.meta || []).map(function(item){ return '<span>' + esc(item) + '</span>'; }).join('') + '</div>' +
                '<div class="anchor-queue-actions"><a href="' + esc(action.href) + '" class="btn btn-secondary" onclick="completeWelcome(\'' + esc(action.href).replace(/&#39;/g, "'") + '\');return false;">' + esc(action.cta) + '</a></div>' +
            '</div>';
        }

        function milestoneCard(item, index, activation){
            var stateClass = item.done ? ' done' : (activation.completed === index ? ' next' : '');
            var stateLabel = item.done ? 'Live' : (activation.completed === index ? 'Next' : 'Pending');
            var marker = item.done ? '✓' : (activation.completed === index ? String(index + 1) : '•');
            return '<div class="welcome-milestone' + stateClass + '">' +
                '<div class="welcome-milestone-mark">' + esc(marker) + '</div>' +
                '<div>' +
                    '<div class="welcome-milestone-title">' + esc(item.label) + '</div>' +
                    '<div class="welcome-milestone-copy">' + esc(item.copy) + '</div>' +
                    '<div class="welcome-milestone-status">' + esc(stateLabel) + '</div>' +
                '</div>' +
            '</div>';
        }
        function lifecyclePanel(lifecycle, primaryAction){
            if (!lifecycle || !lifecycle.active) {
                return '<section class="shell-rail-card">' +
                    '<div class="shell-rail-kicker">Revisit welcome</div>' +
                    '<div class="shell-rail-title">Reopen this page when the app feels thin</div>' +
                    '<div class="shell-rail-copy">Use Welcome again when the next move feels muddy or the workspace feels hollow.</div>' +
                    '<div class="welcome-checklist">' +
                        '<div class="welcome-check"><div class="welcome-check-num">1</div><div class="welcome-check-copy"><strong>Use it as a reset.</strong> Come back here whenever you want the shortest path to the next useful action.</div></div>' +
                        '<div class="welcome-check"><div class="welcome-check-num">2</div><div class="welcome-check-copy"><strong>Re-enter through command.</strong> Use Spotlight or Week One before opening the room rail.</div></div>' +
                        '<div class="welcome-check"><div class="welcome-check-num">3</div><div class="welcome-check-copy"><strong>Use support surfaces deliberately.</strong> Utilities are for recovery, not for replacing real work.</div></div>' +
                    '</div>' +
                '</section>';
            }
            return '<section class="shell-rail-card">' +
                '<div class="shell-rail-kicker">Week 1</div>' +
                '<div class="shell-rail-title">First-week operating rhythm</div>' +
                '<div class="shell-rail-copy">Use Week One to turn setup into a repeatable rhythm before the first week ends.</div>' +
                '<div class="welcome-lifecycle">' +
                    '<div class="welcome-lifecycle-top">' +
                        '<div><div class="welcome-lifecycle-kicker">Week 1 · Day ' + esc(lifecycle.dayNumber) + '</div><div class="welcome-lifecycle-title">' + esc(lifecycle.guidance.headline) + '</div><div class="welcome-lifecycle-copy">' + esc(lifecycle.guidance.body) + '</div></div>' +
                        '<div class="welcome-lifecycle-score"><span>' + esc(lifecycle.completed) + '/' + esc(lifecycle.total) + '</span><small>milestones live</small></div>' +
                    '</div>' +
                    '<div class="welcome-lifecycle-rhythm"><strong>Return rhythm</strong> ' + esc(lifecycle.guidance.rhythm) + '</div>' +
                    (primaryAction ? '<div class="welcome-card-why"><strong>Primary next move</strong>' + esc(primaryAction.title) + '. ' + esc(primaryAction.why || primaryAction.body) + '</div>' : '') +
                    '<div class="welcome-lifecycle-pills">' + lifecycle.milestones.map(function(item){
                        return '<div class="welcome-lifecycle-pill' + (item.done ? ' done' : '') + '">' + esc(item.label) + '</div>';
                    }).join('') + '</div>' +
                '</div>' +
            '</section>';
        }

        function getWelcomeShellTone(activation, lifecycle){
            if (lifecycle && lifecycle.active) return 'live';
            if (!activation.completed) return 'thin';
            if (activation.completed >= activation.total) return 'ready';
            return 'ready';
        }

        function renderWelcomeShellChrome(activation, primaryAction, lifecycle, counts, roleLabel, focusSummary){
            if (!window.gtmShellChrome) return;
            var tone = getWelcomeShellTone(activation, lifecycle);
            var stateLabel = lifecycle && lifecycle.active
                ? 'Week 1 · Day ' + lifecycle.dayNumber
                : activation.completed + '/' + activation.total + ' anchors live';
            window.gtmShellChrome.applyHeader({
                stateLabel: stateLabel,
                stateTone: tone
            });
            var band = document.getElementById('welcomeShellBand');
            if (band) band.innerHTML = '';
        }

        async function loadWelcome(){
            try {
                var result = await window.gtmPersistence.workspace.loadSummary(null, { force: true });
                var summary = result && result.data ? result.data : {};
                var lifecycle = (window.gtmWeekOneLifecycle && typeof window.gtmWeekOneLifecycle.load === 'function')
                    ? await window.gtmWeekOneLifecycle.load(false).catch(function(error){
                        console.error('Welcome week-one lifecycle load failed:', error);
                        return null;
                    })
                    : null;
                var counts = buildCounts(summary);
                var activationContext = getActivationContext();
                var backup = getBackupStatus();
                var actions = buildActions(summary, counts, lifecycle);
                var activation = buildActivationModel(summary, counts);
                trackWelcome('welcome_loaded', {
                    source: summary && summary.source ? summary.source : 'unknown',
                    icps: counts.icps,
                    deals: counts.deals,
                    signals: counts.signals,
                    motions: counts.touches + counts.calls,
                    suggested_actions: actions.length,
                    activation_complete: activation.completed,
                    activation_total: activation.total,
                    role: activation.roleLabel
                });
                var displayName = pickName(summary);
                var role = prettyRole(getRole(summary));
                var statCards = buildStatCards(counts);
                var focusSummary = buildWorkspaceFocus(summary, activationContext, role, counts);
                var primaryAction = actions[0] || actionSpec('dashboard', 'Continue into Spotlight', 'The workspace is already anchored enough to use the command stack.', DASHBOARD_ENTRY_HREF, 'Continue to Spotlight', ['command stack'], '', '');
                var backupNote = backup && backup.hasExport ? 'Offline backup exists.' : 'No offline backup exported yet.';
                renderWelcomeShellChrome(activation, primaryAction, lifecycle, counts, role, focusSummary);
                var queueActions = actions.slice(1, 5);
                if (!queueActions.length) queueActions = actions.slice(0, 1);
                var progressPercent = activation.total ? Math.max(12, Math.round((activation.completed / activation.total) * 100)) : 0;
                var lifecycleHeadline = lifecycle && lifecycle.active && lifecycle.guidance && lifecycle.guidance.headline
                    ? lifecycle.guidance.headline
                    : 'Make the workspace real before the week drifts.';
                var lifecycleCopy = lifecycle && lifecycle.active && lifecycle.guidance && lifecycle.guidance.body
                    ? lifecycle.guidance.body
                    : 'Welcome should give you the shortest path back into real work, not another stack of orientation cards.';
                var lifecycleRhythm = lifecycle && lifecycle.active && lifecycle.guidance && lifecycle.guidance.rhythm
                    ? lifecycle.guidance.rhythm
                    : 'Return through Spotlight after each real move so the next priority stays legible.';
                var nextMoveCopy = primaryAction.why || primaryAction.body || focusSummary;
                var liveMotions = counts.touches + counts.calls;
                var stateLabel = lifecycle && lifecycle.active
                    ? 'Week 1 · Day ' + lifecycle.dayNumber
                    : activation.completed + ' / ' + activation.total + ' live';
                var backLeafTitle = counts.icps > 0
                    ? 'Targeting truth is already held.'
                    : 'Targeting truth still needs to be written.';
                var midLeafTitle = counts.deals > 0
                    ? 'Deals exist, but they still need external pressure.'
                    : 'The pipeline still needs a first real object.';
                var whereYouAre = (counts.icps > 0 && counts.deals > 0)
                    ? 'Targeting and deals are already live.'
                    : focusSummary;
                var lockedTitle = primaryAction.title || 'Research one live account.';
                var lockedNote = primaryAction.why || primaryAction.body || 'The next act should make the workspace feel externally real.';
                var unlocksCopy = primaryAction.unlocks || 'Heat, ranking, and handoff should sharpen after the next real act is done.';
                shell.innerHTML =
                    '<section class="welcome-commission">' +
                        '<div class="welcome-main">' +
                            '<div class="welcome-topline">' +
                                '<span class="welcome-kicker">Commission Lock</span>' +
                                '<span class="welcome-state">' + esc(stateLabel) + '</span>' +
                            '</div>' +
                            '<div class="welcome-display">Open the live mandate.</div>' +
                            '<p class="welcome-support">' + esc(activation.body) + '</p>' +
                            '<div class="welcome-action-row">' +
                                '<a href="' + esc(primaryAction.href || DASHBOARD_ENTRY_HREF) + '" class="btn btn-primary" onclick="completeWelcome(\'' + esc(primaryAction.href || DASHBOARD_ENTRY_HREF).replace(/&#39;/g, "'") + '\');return false;">' + esc(primaryAction.cta || primaryAction.title || 'Continue') + '</a>' +
                                (((primaryAction.href || DASHBOARD_ENTRY_HREF) !== DASHBOARD_ENTRY_HREF)
                                    ? '<a href="' + esc(DASHBOARD_ENTRY_HREF) + '" class="welcome-inline-link" onclick="completeWelcome(\'' + esc(DASHBOARD_ENTRY_HREF).replace(/&#39;/g, "'") + '\');return false;">Open Spotlight</a>'
                                    : '') +
                            '</div>' +
                            '<div class="welcome-folio-stage">' +
                                '<div class="welcome-folio-stack">' +
                                    '<div class="welcome-leaf back">' +
                                        '<div class="welcome-leaf-kicker">Layer 01</div>' +
                                        '<div class="welcome-leaf-title">' + esc(backLeafTitle) + '</div>' +
                                    '</div>' +
                                    '<div class="welcome-leaf mid">' +
                                        '<div class="welcome-leaf-kicker">Layer 02</div>' +
                                        '<div class="welcome-leaf-title">' + esc(midLeafTitle) + '</div>' +
                                    '</div>' +
                                    '<div class="welcome-leaf front">' +
                                        '<div class="welcome-leaf-top">' +
                                            '<div>' +
                                                '<div class="welcome-leaf-kicker">Active mandate</div>' +
                                                '<div class="welcome-leaf-title">' + esc(lockedTitle) + '</div>' +
                                            '</div>' +
                                            '<div class="welcome-stamp">Week 1<br>Day ' + esc(String((lifecycle && lifecycle.active) ? lifecycle.dayNumber : 1)) + '</div>' +
                                        '</div>' +
                                        '<div class="welcome-leaf-copy">' + esc(lockedNote) + '</div>' +
                                        '<div class="welcome-folio-grid">' +
                                            '<div class="welcome-folio-cell">' +
                                                '<div class="welcome-cell-label">Where you are</div>' +
                                                '<div class="welcome-cell-value">' + esc(whereYouAre) + '</div>' +
                                                '<div class="welcome-cell-note">' + esc(focusSummary) + '</div>' +
                                            '</div>' +
                                            '<div class="welcome-folio-cell locked">' +
                                                '<div class="welcome-cell-label">What is missing</div>' +
                                                '<div class="welcome-cell-value">' + esc(lockedTitle) + '</div>' +
                                                '<div class="welcome-cell-note">' + esc(lockedNote) + '</div>' +
                                            '</div>' +
                                            '<div class="welcome-folio-cell">' +
                                                '<div class="welcome-cell-label">What unlocks next</div>' +
                                                '<div class="welcome-cell-value">' + esc(unlocksCopy) + '</div>' +
                                                '<div class="welcome-cell-note">' + esc(primaryAction.body || nextMoveCopy) + '</div>' +
                                            '</div>' +
                                            '<div class="welcome-folio-cell">' +
                                                '<div class="welcome-cell-label">Return behavior</div>' +
                                                '<div class="welcome-cell-value">Re-enter through Spotlight.</div>' +
                                                '<div class="welcome-cell-note">' + esc(lifecycleRhythm) + '</div>' +
                                            '</div>' +
                                        '</div>' +
                                    '</div>' +
                                '</div>' +
                            '</div>' +
                            '<div class="welcome-data-rail">' + statCards.map(function(card){
                                return '<div class="welcome-data-cell"><div class="welcome-data-label">' + esc(card.label) + '</div><div class="welcome-data-value">' + esc(card.value) + '</div><div class="welcome-data-note">' + esc(card.sub) + '</div></div>';
                            }).join('') + '</div>' +
                            '<div class="welcome-footnote">Role lens: ' + esc(role) + ' · Workspace: ' + esc(displayName) + '. ' + (summary && summary.errors && summary.errors.length ? 'Some modules fell back to cache while loading. ' : '') + esc(backupNote) + '</div>' +
                        '</div>' +
                        '<aside class="welcome-side">' +
                            '<div class="welcome-week-shell">' +
                                '<div class="welcome-week-head">' +
                                    '<div class="welcome-week-kicker">Week One</div>' +
                                    '<div class="welcome-week-title">' + esc(lifecycleHeadline) + '</div>' +
                                    '<div class="welcome-week-copy">' + esc(lifecycleCopy) + '</div>' +
                                '</div>' +
                                '<div class="welcome-progress-row">' +
                                    '<div class="welcome-progress-copy"><span>' + esc(activation.completed) + ' / ' + esc(activation.total) + ' live</span><span>' + esc((lifecycle && lifecycle.active) ? ('day ' + lifecycle.dayNumber) : 'activation') + '</span></div>' +
                                    '<div class="welcome-progress-bar"><span style="width:' + esc(String(progressPercent)) + '%"></span></div>' +
                                '</div>' +
                                '<div class="welcome-milestone-list">' + activation.milestones.map(function(item, index){
                                    var rowClass = item.done ? ' is-live' : (activation.completed === index ? ' is-next' : '');
                                    var rowState = item.done ? 'Live' : (activation.completed === index ? 'Next' : 'Pending');
                                    var marker = item.done ? '✓' : (activation.completed === index ? String(index + 1) : '·');
                                    return '<div class="welcome-milestone-row' + rowClass + '">' +
                                        '<div class="welcome-milestone-mark">' + esc(marker) + '</div>' +
                                        '<div><div class="welcome-milestone-title">' + esc(item.label) + '</div><div class="welcome-milestone-copy">' + esc(item.copy) + '</div><div class="welcome-milestone-status">' + esc(rowState) + '</div></div>' +
                                    '</div>';
                                }).join('') + '</div>' +
                            '</div>' +
                            '<div class="welcome-side-note">' +
                                '<strong>One lock keeps the file provisional.</strong>' +
                                '<span>' + esc(primaryAction.title || 'The next move') + ' is the single missing act that turns this from setup into operating authority.</span>' +
                            '</div>' +
                            '<div class="welcome-side-note">' +
                                '<strong>After the lock breaks</strong>' +
                                '<span>' + esc(unlocksCopy) + '</span>' +
                            '</div>' +
                        '</aside>' +
                    '</section>';
        } catch (error) {
                console.error('Welcome page failed to load workspace summary:', error);
                trackWelcome('welcome_load_error', {
                    message: (error && error.message) ? error.message : 'Welcome failed to load'
                });
                if (window.gtmShellChrome) {
                    window.gtmShellChrome.applyHeader({
                        stateLabel: 'Load issue',
                        stateTone: 'risk'
                    });
                }
                shell.innerHTML = '<div class="welcome-error">Welcome could not load workspace context. <a href="' + esc(DASHBOARD_ENTRY_HREF) + '" onclick="completeWelcome(\'' + esc(DASHBOARD_ENTRY_HREF).replace(/&#39;/g, "'") + '\');return false;">Go straight to Spotlight</a>.</div>';
            }
        }

        if (window.__gtmosAuthGatePending) {
            window.addEventListener('gtmos:auth-ready', function(){ loadWelcome(); }, { once: true });
        } else {
            loadWelcome();
        }
    })();
    </script>
