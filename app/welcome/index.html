<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Antaeus GTM OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <style>
        .welcome-shell{display:flex;flex-direction:column;gap:24px;max-width:1180px}
        .welcome-hero{position:relative;overflow:hidden;padding:32px;border-radius:20px;border:1px solid rgba(212,165,116,0.18);background:linear-gradient(135deg,rgba(212,165,116,0.08),rgba(59,130,246,0.08) 55%,rgba(255,255,255,0.02));box-shadow:0 18px 40px rgba(0,0,0,0.28)}
        .welcome-hero::after{content:'';position:absolute;top:-80px;right:-40px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(212,165,116,0.18),rgba(212,165,116,0));pointer-events:none}
        .welcome-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:999px;border:1px solid rgba(45,212,191,0.25);background:rgba(45,212,191,0.08);color:var(--brand-teal-light);font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
        .welcome-title{font-size:2.35rem;max-width:760px;margin-bottom:12px}
        .welcome-sub{max-width:760px;color:var(--text-tertiary);font-size:1rem;line-height:1.7;margin-bottom:20px}
        .welcome-actions{display:flex;flex-wrap:wrap;gap:12px}
        .welcome-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:12px;border:1px solid var(--border-default);background:rgba(255,255,255,0.02);color:var(--text-secondary);font-size:0.92rem;font-weight:700;text-decoration:none;cursor:pointer;transition:all .2s}
        .welcome-btn:hover{transform:translateY(-1px);border-color:rgba(212,165,116,0.36);background:rgba(212,165,116,0.08)}
        .welcome-btn.primary{background:var(--brand-gold);border-color:var(--brand-gold);color:var(--bg-primary)}
        .welcome-btn.primary:hover{background:var(--brand-gold-light)}
        .welcome-grid{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(320px,.9fr);gap:24px;align-items:start}
        .welcome-panel{padding:24px;border-radius:18px;border:1px solid var(--border-default);background:var(--bg-secondary);box-shadow:0 12px 32px rgba(0,0,0,0.22)}
        .welcome-panel-title{font-size:1.35rem;margin-bottom:6px}
        .welcome-panel-sub{color:var(--text-muted);font-size:0.86rem;line-height:1.6;margin-bottom:18px}
        .welcome-stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
        .welcome-stat{padding:16px;border-radius:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05)}
        .welcome-stat-value{font-family:var(--font-serif);font-size:1.6rem;color:var(--text-primary);line-height:1.1}
        .welcome-stat-label{margin-top:6px;font-size:0.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);font-weight:700}
        .welcome-stat-sub{margin-top:4px;font-size:0.74rem;color:var(--text-tertiary);line-height:1.45}
        .welcome-list{display:grid;gap:14px}
        .welcome-card{padding:18px;border-radius:16px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02)}
        .welcome-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:10px}
        .welcome-card-step{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:rgba(212,165,116,0.14);color:var(--brand-gold);font-size:.86rem;font-weight:700;flex-shrink:0}
        .welcome-card-title{font-size:1.02rem;font-weight:700;color:var(--text-primary);line-height:1.35}
        .welcome-card-body{font-size:.86rem;color:var(--text-tertiary);line-height:1.65;margin-bottom:14px}
        .welcome-card-meta{display:flex;flex-wrap:wrap;gap:8px 10px;font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:12px}
        .welcome-link-row{display:flex;flex-wrap:wrap;gap:10px}
        .welcome-mini-link{display:inline-flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;border:1px solid rgba(212,165,116,0.22);background:rgba(212,165,116,0.06);color:var(--brand-gold);text-decoration:none;font-size:.8rem;font-weight:700}
        .welcome-mini-link:hover{background:rgba(212,165,116,0.12)}
        .welcome-side-stack{display:grid;gap:18px}
        .welcome-checklist{display:grid;gap:12px}
        .welcome-check{display:flex;gap:12px;align-items:flex-start;padding:14px 14px 0 0}
        .welcome-check-num{width:28px;height:28px;border-radius:50%;background:rgba(45,212,191,0.1);color:var(--brand-teal-light);display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;flex-shrink:0}
        .welcome-check-copy{font-size:.84rem;color:var(--text-tertiary);line-height:1.6}
        .welcome-check-copy strong{display:block;color:var(--text-primary);font-size:.9rem;margin-bottom:2px}
        .welcome-resource-list{display:grid;gap:10px}
        .welcome-resource{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02)}
        .welcome-resource h4{font-family:var(--font-sans);font-size:.92rem;font-weight:700;margin-bottom:4px}
        .welcome-resource p{margin:0;color:var(--text-muted);font-size:.8rem;line-height:1.55}
        .welcome-resource a{white-space:nowrap}
        .welcome-state-note{margin-top:10px;font-size:.78rem;color:var(--text-muted)}
        .welcome-sync{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.18);font-size:.74rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#86efac;margin-top:18px}
        .welcome-loading,.welcome-error{padding:32px;text-align:center;color:var(--text-muted)}
        @media(max-width:1100px){.welcome-grid{grid-template-columns:1fr}.welcome-stats{grid-template-columns:repeat(2,minmax(0,1fr))}}
        @media(max-width:720px){.welcome-hero{padding:24px}.welcome-title{font-size:1.85rem}.welcome-stats{grid-template-columns:1fr}.welcome-actions{flex-direction:column}.welcome-btn{width:100%}}
    </style>
</head>
<body>
    <script src="/js/app-auth-preflight.js"></script>
    <div class="app-container">
        <aside class="app-sidebar">
            <script src="/js/analytics-site-config.js"></script>
            <script src="/js/analytics.js"></script>
            <script src="/js/data-manager.js"></script>
            <script src="/js/nav.js"></script>
        </aside>
        <main class="app-main">
            <header class="app-header">
                <h1 class="page-title">Welcome</h1>
            </header>
            <div class="app-content">
                <div class="welcome-shell" id="welcomeShell">
                    <div class="welcome-loading">Loading your first-session workspace...</div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-config.js"></script>
    <script src="/js/require-auth.js"></script>
    <script>
    (function(){
        var shell = document.getElementById('welcomeShell');

        function arr(value){ return Array.isArray(value) ? value : []; }
        function esc(value){ var node = document.createElement('div'); node.textContent = value == null ? '' : String(value); return node.innerHTML; }
        function pickName(summary){
            var profile = summary && summary.profile ? summary.profile : {};
            var onboarding = summary && summary.onboarding && summary.onboarding.answers ? summary.onboarding.answers : {};
            return profile.full_name || onboarding.companyName || profile.company_name || 'your workspace';
        }
        function getRole(summary){
            var profile = summary && summary.profile ? summary.profile : {};
            var onboarding = summary && summary.onboarding && summary.onboarding.answers ? summary.onboarding.answers : {};
            return profile.role || onboarding.role || 'operator';
        }
        function buildCounts(summary){
            var icps = arr(summary && summary.icpAnalytics && summary.icpAnalytics.icps);
            var deals = arr(summary && summary.deals);
            var accounts = arr(summary && summary.signalConsole && summary.signalConsole.accounts);
            var signalCount = accounts.reduce(function(total, account){ return total + arr(account && account.signals).length; }, 0);
            var discoveryStats = summary && summary.discovery && summary.discovery.stats ? summary.discovery.stats : {};
            var touchLog = summary && summary.sequences && summary.sequences.outboundTouches ? summary.sequences.outboundTouches : {};
            var linkedinLog = summary && summary.sequences && summary.sequences.linkedinLog ? summary.sequences.linkedinLog : {};
            return {
                icps: icps.length,
                deals: deals.length,
                accounts: accounts.length,
                signals: signalCount,
                calls: Number(discoveryStats.totalCalls || 0) || 0,
                touches: arr(touchLog.touches).length + arr(linkedinLog.actions).length
            };
        }
        function buildStatCards(counts){
            return [
                { value: counts.icps, label: 'ICPs', sub: counts.icps ? 'Targeting is taking shape.' : 'No saved targeting truth yet.' },
                { value: counts.deals, label: 'Deals', sub: counts.deals ? 'Pipeline data is live.' : 'Dashboard will wake up after the first deal.' },
                { value: counts.signals, label: 'Signals', sub: counts.signals ? 'Real account research exists.' : 'Signal Console has not been used yet.' },
                { value: counts.touches + counts.calls, label: 'Motions', sub: (counts.touches + counts.calls) ? 'Outbound and call history are being captured.' : 'No live motions recorded yet.' }
            ];
        }
        function actionSpec(title, body, href, cta, meta){
            return { title:title, body:body, href:href, cta:cta, meta:meta || [] };
        }
        function buildActions(summary, counts){
            var actions = [];
            if (!counts.icps) actions.push(actionSpec('Create your first ICP','Start with targeting truth. Once one ICP exists, Signal Console, outbound, and the dashboard stop operating on memory.','/app/icp-studio/','Open ICP Studio',['highest leverage','5 min']));
            if (!counts.signals) actions.push(actionSpec('Research one live account','Add or enrich one account in Signal Console so the workspace starts reflecting real external intelligence.','/app/signal-console/','Open Signal Console',['deep research','real signals']));
            if (!counts.deals) actions.push(actionSpec('Create the first live deal','One real opportunity activates the weekly briefing, risk logic, and next-step coaching across the app.','/app/deal-workspace/','Open Deal Workspace',['pipeline truth','dashboard unlock']));
            if (!counts.calls) actions.push(actionSpec('Prep the next discovery call','Open the call planner or Discovery Studio and capture your next agenda, framework, or handoff.','/app/discovery-agenda/','Open Call Planner',['call quality','capture, not memory']));
            if (!counts.touches) actions.push(actionSpec('Log one outbound motion','Capture a real angle, touch, or LinkedIn action so the workspace becomes a working system, not just setup.','/app/outbound-studio/','Open Outbound Studio',['activity trail','cross-device']));

            if (actions.length < 4 && counts.icps) actions.push(actionSpec('Tighten your targeting layer','Your ICP base exists. Refine it now so the rest of the workflow compounds off sharper segmentation.','/app/icp-studio/','Refine ICPs',['recommended','signal quality']));
            if (actions.length < 4 && counts.deals) actions.push(actionSpec('Review what the dashboard sees','Use the dashboard as command center once at least one live deal exists. Confirm the brief matches reality.','/app/dashboard/','Open Dashboard',['weekly brief','risk review']));
            if (actions.length < 4) actions.push(actionSpec('Dial in quota and targets','Put your quota math and ACV into the system so activity targets and readiness stay anchored to numbers.','/app/quota-workback/','Open Quota Workback',['system math','benchmarks']));
            return actions.slice(0,5);
        }
        function welcomeStage(counts){
            if (!counts.icps && !counts.deals && !counts.signals) return 'First session';
            if (counts.deals || counts.signals) return 'Workspace taking shape';
            return 'Setup in motion';
        }
        function completeWelcome(nextPath){
            if (typeof window.setWelcomeSeen === 'function') {
                try { window.setWelcomeSeen(true); } catch (e) {}
            }
            if (typeof window.clearWorkspaceBootstrapCache === 'function') {
                try { window.clearWorkspaceBootstrapCache(); } catch (e) {}
            }
            window.location.href = nextPath || '/app/dashboard/';
        }
        window.completeWelcome = completeWelcome;

        function actionCard(action, index){
            return '<div class="welcome-card">' +
                '<div class="welcome-card-top">' +
                    '<div style="display:flex;gap:12px;align-items:flex-start;">' +
                        '<div class="welcome-card-step">' + (index + 1) + '</div>' +
                        '<div><div class="welcome-card-title">' + esc(action.title) + '</div></div>' +
                    '</div>' +
                '</div>' +
                '<div class="welcome-card-body">' + esc(action.body) + '</div>' +
                '<div class="welcome-card-meta">' + action.meta.map(function(item){ return '<span>' + esc(item) + '</span>'; }).join('') + '</div>' +
                '<div class="welcome-link-row"><a class="welcome-mini-link" href="' + esc(action.href) + '" onclick="completeWelcome(\'' + esc(action.href).replace(/&#39;/g, "'") + '\');return false;">' + esc(action.cta) + ' -></a></div>' +
            '</div>';
        }

        async function loadWelcome(){
            try {
                var result = await window.gtmPersistence.workspace.loadSummary(null, { force: true });
                var summary = result && result.data ? result.data : {};
                var counts = buildCounts(summary);
                var actions = buildActions(summary, counts);
                var stage = welcomeStage(counts);
                var displayName = pickName(summary);
                var role = getRole(summary);
                var statCards = buildStatCards(counts);
                var accountSyncText = (summary && summary.source && summary.source.indexOf('supabase') === 0)
                    ? 'Workspace sync is live. Anything you add here should survive refresh, re-login, and device changes.'
                    : 'Workspace is available, but some modules are still reading from local cache right now.';

                shell.innerHTML =
                    '<section class="welcome-hero">' +
                        '<div class="welcome-badge">First session corridor · ' + esc(stage) + '</div>' +
                        '<h2 class="welcome-title">You are in the right place. Antaeus is ready to become the working system behind ' + esc(displayName) + '.</h2>' +
                        '<p class="welcome-sub">This page exists to turn a completed signup into a real workspace. Start with the next few actions below, then move into the dashboard once the app has at least one ICP, one live motion, and one real deal or signal.</p>' +
                        '<div class="welcome-actions">' +
                            '<a href="/app/dashboard/" class="welcome-btn primary" onclick="completeWelcome(\'/app/dashboard/\');return false;">Continue to dashboard</a>' +
                            '<a href="/app/icp-studio/" class="welcome-btn" onclick="completeWelcome(\'/app/icp-studio/\');return false;">Start with ICP Studio</a>' +
                            '<a href="/methodology/" class="welcome-btn" onclick="completeWelcome(\'/methodology/\');return false;">Open methodology</a>' +
                        '</div>' +
                        '<div class="welcome-sync">Account sync live · ' + esc(accountSyncText) + '</div>' +
                    '</section>' +
                    '<section class="welcome-grid">' +
                        '<div style="display:grid;gap:24px;">' +
                            '<div class="welcome-panel">' +
                                '<h3 class="welcome-panel-title">What your workspace already knows</h3>' +
                                '<div class="welcome-panel-sub">Signed in as ' + esc(role) + '. These are the real counts loaded from your persisted workspace right now.</div>' +
                                '<div class="welcome-stats">' + statCards.map(function(card){
                                    return '<div class="welcome-stat"><div class="welcome-stat-value">' + esc(card.value) + '</div><div class="welcome-stat-label">' + esc(card.label) + '</div><div class="welcome-stat-sub">' + esc(card.sub) + '</div></div>';
                                }).join('') + '</div>' +
                                '<div class="welcome-state-note">Source: ' + esc(summary && summary.source ? summary.source : 'unknown') + (summary && summary.errors && summary.errors.length ? ' · some modules fell back to cache while loading.' : '') + '</div>' +
                            '</div>' +
                            '<div class="welcome-panel">' +
                                '<h3 class="welcome-panel-title">Your first 3–5 actions</h3>' +
                                '<div class="welcome-panel-sub">Use these in order. Each one makes the rest of the app more believable across sessions, devices, and tomorrow morning.</div>' +
                                '<div class="welcome-list">' + actions.map(actionCard).join('') + '</div>' +
                            '</div>' +
                        '</div>' +
                        '<div class="welcome-side-stack">' +
                            '<div class="welcome-panel">' +
                                '<h3 class="welcome-panel-title">What happens next</h3>' +
                                '<div class="welcome-panel-sub">This is the corridor from account creation into a durable operating system.</div>' +
                                '<div class="welcome-checklist">' +
                                    '<div class="welcome-check"><div class="welcome-check-num">1</div><div class="welcome-check-copy"><strong>Capture targeting truth.</strong>Your first ICP becomes the reference layer for discovery, signals, and outbound.</div></div>' +
                                    '<div class="welcome-check"><div class="welcome-check-num">2</div><div class="welcome-check-copy"><strong>Give the dashboard live inputs.</strong>Add one deal or one enriched account so the system has something real to brief.</div></div>' +
                                    '<div class="welcome-check"><div class="welcome-check-num">3</div><div class="welcome-check-copy"><strong>Start recording motion.</strong>Calls, touches, and notes turn the app from setup into memory that compounds.</div></div>' +
                                    '<div class="welcome-check"><div class="welcome-check-num">4</div><div class="welcome-check-copy"><strong>Move to command mode.</strong>Once the basics exist, use the dashboard as your home base and let the modules feed it.</div></div>' +
                                '</div>' +
                            '</div>' +
                            '<div class="welcome-panel">' +
                                '<h3 class="welcome-panel-title">Quick links</h3>' +
                                '<div class="welcome-panel-sub">Use these if you want context before you start entering data.</div>' +
                                '<div class="welcome-resource-list">' +
                                    '<div class="welcome-resource"><div><h4>Methodology hub</h4><p>Public pages that explain the system in plain English.</p></div><a class="welcome-mini-link" href="/methodology/" onclick="completeWelcome(\'/methodology/\');return false;">Open</a></div>' +
                                    '<div class="welcome-resource"><div><h4>Demo lane</h4><p>Load sample data if you want to see a fully populated workspace before building yours.</p></div><a class="welcome-mini-link" href="/demo-seed.html" onclick="completeWelcome(\'/demo-seed.html\');return false;">Explore</a></div>' +
                                    '<div class="welcome-resource"><div><h4>Settings and backup</h4><p>Export an offline copy of your workspace or restore a prior backup.</p></div><a class="welcome-mini-link" href="/app/settings/" onclick="completeWelcome(\'/app/settings/\');return false;">Open</a></div>' +
                                '</div>' +
                            '</div>' +
                        '</div>' +
                    '</section>';
            } catch (error) {
                console.error('Welcome page failed to load workspace summary:', error);
                shell.innerHTML = '<div class="welcome-error">Welcome could not load workspace context. <a href="/app/dashboard/" onclick="completeWelcome(\'/app/dashboard/\');return false;">Go straight to dashboard</a>.</div>';
            }
        }

        if (window.__gtmosAuthGatePending) {
            window.addEventListener('gtmos:auth-ready', function(){ loadWelcome(); }, { once: true });
        } else {
            loadWelcome();
        }
    })();
    </script>
</body>
</html>
