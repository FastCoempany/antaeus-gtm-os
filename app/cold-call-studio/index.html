<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cold Call Studio | Antaeus GTM OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <style>

:root{--bg:#07080a;--surface:#0f1117;--surface2:#161920;--surface3:#1c1f28;--border:#252830;--border-light:#2e3240;--text:#dfe1e6;--text-dim:#8b8fa3;--text-muted:#5c6073;--gold:#c99a2e;--gold-dim:#a07b24;--gold-glow:rgba(201,154,46,0.12);--blue:#4a9eff;--blue-dim:#2a6bbf;--green:#34d399;--green-dim:rgba(52,211,153,0.12);--red:#ef4444;--red-dim:rgba(239,68,68,0.1);--amber:#f59e0b;--amber-dim:rgba(245,158,11,0.1);--radius:8px;--radius-lg:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:15px;}
body{font-family:'Public Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.55;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(201,154,46,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(201,154,46,0.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.topbar{position:sticky;top:var(--cold-call-shell-offset,0px);z-index:38;background:rgba(7,8,10,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 24px;min-height:52px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.topbar-left{display:flex;align-items:center;gap:14px;min-width:0;}
.topbar-ctx{font-size:0.8rem;color:var(--text-dim);min-width:0;}
.topbar-ctx strong{color:var(--text);font-weight:600;}
.topbar-right{display:flex;align-items:center;gap:16px;flex-shrink:0;}
.cold-shell-band{padding:18px 24px 0;border-bottom:1px solid rgba(255,255,255,0.04);background:linear-gradient(180deg,rgba(15,17,23,0.7),rgba(15,17,23,0));}
.cold-shell-band .shell-command-band{margin:0;}
.timer{font-family:'Space Mono',monospace;font-size:1rem;color:var(--text-muted);min-width:60px;text-align:center;transition:color 0.3s;}
.timer.on{color:var(--green);}.timer.warn{color:var(--amber);}.timer.danger{color:var(--red);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.phases{display:flex;align-items:center;gap:4px;}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--border-light);transition:all 0.3s;}
.pdot.active{background:var(--gold);box-shadow:0 0 6px var(--gold);}
.pdot.done{background:var(--green);}
.app{position:relative;z-index:1;display:grid;grid-template-columns:1fr 320px;gap:0;min-height:calc(100vh - 52px);}
.main{padding:24px 28px 80px;overflow-y:auto;}
.side{border-left:1px solid var(--border);background:var(--surface);padding:18px;overflow-y:auto;}
.stage-phase{font-family:'Space Mono',monospace;font-size:0.65rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:5px;}
.stage-title{font-size:1.5rem;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:3px;}
.stage-sub{font-size:0.85rem;color:var(--text-dim);margin-bottom:20px;}
.script{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
.script-lbl{font-family:'Space Mono',monospace;font-size:0.6rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:10px;}
.script-txt{font-size:1rem;line-height:1.7;color:var(--text);}
.script-txt em{color:var(--gold);font-style:normal;font-weight:500;}
.coach{background:rgba(74,158,255,0.04);border:1px solid rgba(74,158,255,0.12);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;}
.coach-lbl{font-family:'Space Mono',monospace;font-size:0.58rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--blue-dim);margin-bottom:6px;}
.coach-txt{font-size:0.85rem;color:var(--text-dim);line-height:1.6;}
.coach-txt strong{color:var(--text);font-weight:600;}
.resp-section{margin-top:24px;}
.resp-lbl{font-family:'Space Mono',monospace;font-size:0.6rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}
.resp-grid{display:flex;flex-direction:column;gap:7px;}
.resp-btn{display:flex;align-items:flex-start;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;cursor:pointer;transition:all 0.15s;text-align:left;color:var(--text);font-family:inherit;font-size:0.88rem;line-height:1.5;width:100%;}
.resp-btn:hover{background:var(--surface3);border-color:var(--border-light);transform:translateX(3px);}
.tone{width:7px;height:7px;border-radius:50%;margin-top:6px;flex-shrink:0;}
.tone-g{background:var(--green);box-shadow:0 0 5px rgba(52,211,153,0.4);}
.tone-a{background:var(--amber);box-shadow:0 0 5px rgba(245,158,11,0.4);}
.tone-r{background:var(--red);box-shadow:0 0 5px rgba(239,68,68,0.4);}
.resp-prospect{font-weight:500;}
.resp-hint{font-size:0.75rem;color:var(--text-muted);margin-top:2px;}
.counter{background:var(--surface);border:1px solid var(--gold-dim);border-left:3px solid var(--gold);border-radius:var(--radius);padding:20px;margin-top:12px;margin-bottom:12px;animation:slideIn 0.2s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.counter-lbl{font-family:'Space Mono',monospace;font-size:0.58rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:8px;}
.counter-txt{font-size:0.98rem;line-height:1.7;color:var(--text);margin-bottom:12px;}
.counter-txt em{color:var(--gold);font-style:normal;font-weight:500;}
.counter-why{font-size:0.8rem;color:var(--text-dim);line-height:1.6;padding-top:10px;border-top:1px solid var(--border);}
.counter-why strong{color:var(--blue);font-weight:600;}
.adv-btn{display:inline-flex;align-items:center;gap:6px;background:var(--gold);color:var(--bg);border:none;border-radius:var(--radius);padding:9px 18px;font-family:inherit;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.15s;margin-top:8px;}
.adv-btn:hover{background:#daa830;transform:translateY(-1px);}
.adv-btn.sec{background:var(--surface3);color:var(--text);border:1px solid var(--border-light);}
.adv-btn.sec:hover{background:var(--border);}
.adv-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
/* Sidebar panels */
.spanel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.spanel-title{font-family:'Space Mono',monospace;font-size:0.55rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:10px;}
.spanel-title.blue{color:var(--blue-dim);}
.spanel-title.green{color:rgba(52,211,153,0.7);}
.spanel-title.red{color:rgba(239,68,68,0.7);}
.srow{display:flex;justify-content:space-between;padding:4px 0;font-size:0.78rem;border-bottom:1px solid rgba(255,255,255,0.03);}
.srow:last-child{border-bottom:none;}
.srow-l{color:var(--text-dim);}.srow-v{color:var(--text);font-weight:600;font-family:'Space Mono',monospace;font-size:0.75rem;}
.srow-v.gold{color:var(--gold);}.srow-v.green{color:var(--green);}
.obj-chip{display:inline-block;background:var(--surface3);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:0.72rem;color:var(--text-dim);cursor:pointer;transition:all 0.15s;margin:2px;}
.obj-chip:hover{border-color:var(--gold-dim);color:var(--gold);background:var(--gold-glow);}
.nav-btn{text-align:left;background:transparent;border:1px solid transparent;color:var(--text-dim);padding:5px 9px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:0.75rem;transition:all 0.15s;width:100%;display:block;}
.nav-btn:hover{background:var(--surface3);}
.nav-btn.cur{background:var(--gold-glow);border-color:var(--gold-dim);color:var(--gold);font-weight:600;}
/* Overlay */
.overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);padding:52px 24px 24px;overflow-y:auto;}
.overlay.on{display:block;}
.modal{max-width:680px;margin:32px auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;animation:slideIn 0.2s ease;position:relative;}
.modal-close{position:absolute;top:14px;right:14px;background:var(--surface3);border:1px solid var(--border);color:var(--text-dim);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{color:var(--text);background:var(--border);}
/* Briefing */
.brief-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.brief-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.brief-title{font-size:0.68rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px;}
.brief-title.gold{color:var(--gold-dim);}.brief-title.blue{color:var(--blue-dim);}.brief-title.green{color:rgba(52,211,153,0.7);}.brief-title.red{color:rgba(239,68,68,0.7);}
.brief-list{list-style:none;}
.brief-list li{font-size:0.82rem;color:var(--text-dim);padding:3px 0 3px 12px;position:relative;line-height:1.5;}
.brief-list li::before{content:'▸';position:absolute;left:0;color:var(--text-muted);}
.brief-list li strong{color:var(--text);font-weight:500;}
.brief-full{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.dial-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px 20px;background:var(--gold);color:var(--bg);border:none;border-radius:var(--radius);font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.15s;letter-spacing:0.04em;}
.dial-btn:hover{background:#daa830;transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,154,46,0.25);}
.dial-btn.sec{background:var(--surface3);color:var(--text);border:1px solid var(--border-light);}
.dial-btn.sec:hover{background:var(--border);box-shadow:none;}
.cold-first-fold{padding:0 0 16px;border-bottom:1px solid rgba(255,255,255,0.05);background:linear-gradient(180deg,rgba(15,19,28,0.72) 0%,rgba(10,13,20,0.24) 100%);}
.cold-first-fold .topbar{position:sticky;top:var(--cold-call-shell-offset,0px);border-bottom:1px solid rgba(255,255,255,0.05);background:rgba(7,8,10,0.88);}
.cold-first-fold .cold-shell-band{padding-top:16px;border-bottom:none;}
.cold-first-fold #coldCallHealthPanel{padding:0 24px;margin-top:16px;}
/* VM */
.vm-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;}
/* Postcard */
.postcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:12px;}
.postcard-title{font-size:0.88rem;font-weight:600;color:var(--text);margin-bottom:6px;}
.email-tpl{font-family:'Space Mono',monospace;font-size:0.75rem;line-height:1.8;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;white-space:pre-wrap;margin-top:8px;}
.mode-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:16px;}
.mode-kicker{font-family:'Space Mono',monospace;font-size:0.58rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:8px;}
.mode-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:6px;}
.mode-copy{font-size:0.82rem;color:var(--text-dim);line-height:1.6;}
.mode-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.mode-pill{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;border:1px solid var(--border-light);font-size:0.68rem;font-weight:700;color:var(--text-dim);}
.mode-pill.active{color:var(--gold);border-color:var(--gold-dim);background:var(--gold-glow);}
.mode-pill.live{color:var(--green);border-color:rgba(52,211,153,0.35);background:rgba(52,211,153,0.08);}
.capture-grid{display:grid;gap:8px;}
.capture-label{display:block;font-size:0.66rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;}
.capture-input,.capture-select,.capture-textarea{width:100%;padding:9px 10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:0.8rem;font-family:inherit;}
.capture-textarea{min-height:72px;resize:vertical;line-height:1.5;}
.capture-input:focus,.capture-select:focus,.capture-textarea:focus{outline:none;border-color:var(--gold-dim);}
.feedback-card{background:rgba(52,211,153,0.05);border:1px solid rgba(52,211,153,0.18);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;}
.feedback-title{font-size:0.82rem;font-weight:700;color:var(--text);margin-bottom:5px;}
.feedback-copy{font-size:0.78rem;color:var(--text-dim);line-height:1.55;}
.feedback-copy strong{color:var(--text);font-weight:600;}
/* Outcome selector */
.outcome-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:16px;}
.outcome-btn{padding:8px 16px;border-radius:var(--radius);font-size:0.78rem;font-weight:600;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);cursor:pointer;font-family:inherit;transition:all 0.12s;}
.outcome-btn:hover{border-color:var(--border-light);color:var(--text);}
.outcome-btn.sel{border-color:var(--gold);color:var(--gold);background:var(--gold-glow);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@media(max-width:900px){.app{grid-template-columns:1fr;}.side{border-left:none;border-top:1px solid var(--border);max-height:none;}.brief-grid{grid-template-columns:1fr;}.topbar-ctx{display:none;}}

    </style>
</head>

<script>

(function(){
// ── UTILS ──
function readLS(k,fb){try{return JSON.parse(localStorage.getItem(k))||fb}catch(e){return fb}}
function syncDocToCloud(key,data){
    if(!(window.gtmPersistence&&window.gtmPersistence.docs&&typeof window.gtmPersistence.docs.save==='function'))return;
    if(!window.gtmPersistence.docs.has(key))return;
    window.gtmPersistence.docs.save(key,data).catch(function(error){console.error('Cold Call Studio sync failed for',key,error);});
}
function writeLS(k,v){localStorage.setItem(k,JSON.stringify(v));syncDocToCloud(k,v)}
function escH(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function buildColdCallRoomHref(href, focusObject, roomLabel){
    try{
        var url=new URL(href, window.location.origin);
        url.searchParams.set('returnTo','/app/cold-call-studio/');
        url.searchParams.set('returnLabel','Back to Cold Call Studio');
        if(focusObject)url.searchParams.set('focusObject',focusObject);
        if(roomLabel)url.searchParams.set('focusRoom',roomLabel);
        url.searchParams.set('fromMode','room');
        url.searchParams.set('fromSurface','cold-call-studio');
        return url.pathname+url.search+url.hash;
    }catch(error){
        return href;
    }
}
function uid(){return 'call_'+Date.now()+'_'+Math.random().toString(36).substr(2,5)}
var signalConsoleAccounts=[];

async function syncSignalConsoleAccounts(){
    if(window.gtmPersistence&&window.gtmPersistence.signalConsole&&typeof window.gtmPersistence.signalConsole.load==='function'){
        var loaded=await window.gtmPersistence.signalConsole.load();
        if(loaded&&loaded.error)console.error('Signal Console load failed:',loaded.error);
        if(loaded&&loaded.data&&Array.isArray(loaded.data.accounts)){
            signalConsoleAccounts=loaded.data.accounts.slice();
            return loaded;
        }
    }
    var fallback=readLS('gtmos_sc_v4',{accounts:[]});
    signalConsoleAccounts=(fallback.accounts||[]).slice();
    return {data:{accounts:signalConsoleAccounts},error:null};
}

var PHASE_NAMES=['PREP','GATE','OPEN','HOOK','ENGAGE','VALUE','CLOSE','POST'];

// ── ACCOUNT DATA ──
var selectedAccount=null;
var accountData=null;

// ── DYNAMIC SCRIPT HELPERS ──
function getCompanyName(){return(readLS('gtmos_playbook',{})).company||'[Your Company]'}
function getAccountSignal(){
    if(!accountData)return'';
    return accountData.signals&&accountData.signals[0]?accountData.signals[0].headline:'';
}
function getProofPoints(){
    // Read from playbook or use generic
    var pb=readLS('gtmos_playbook',{});
    return pb.proof_points||['companies at their scale','comparable organizations'];
}
function biz(n){var d=new Date();while(n>0){d.setDate(d.getDate()+1);if([0,6].indexOf(d.getDay())===-1)n--;}return new Intl.DateTimeFormat('en-US',{weekday:'short',month:'short',day:'numeric'}).format(d)}

// ── CALL FLOW DATA ──
// Dynamic — scripts reference account data via functions
function buildFlow(){
    var acctName=selectedAccount||'[Company]';
    var signal=getAccountSignal()||'recent activity at '+acctName;
    var co=getCompanyName();

    return {
pre_call:{phase:0,title:'Pre-Call Intel Brief',sub:'Study this. Then dial.',type:'briefing'},
gatekeeper:{phase:1,title:'Gatekeeper',sub:'Get through — don\'t pitch the assistant',
    script:'Hi — I\'m trying to reach <em>[Name]</em>. Is this the best line for them?',
    coaching:'Be brief, be direct, sound like you belong. Don\'t explain why you\'re calling. Say "trying to reach" — not "looking to speak with."',
    responses:[
        {id:'gk1',label:'"Let me transfer you"',tone:'g',hint:'You\'re through',counter:'Great, thank you.',why:'<strong>Transition:</strong> Take a breath during the transfer. Reset energy. Stand up.',next:'opener'},
        {id:'gk2',label:'"What is this regarding?"',tone:'a',hint:'Standard question',counter:'It\'s about a '+signal.toLowerCase().substring(0,40)+' project we\'re working on with a few companies in their space. They\'ll know — I\'ll be brief.',why:'<strong>Why:</strong> "Project" implies relationship. "They\'ll know" creates social pressure. "I\'ll be brief" preempts.',next:'opener'},
        {id:'gk3',label:'"Not available"',tone:'a',hint:'Blocked, not hostile',counter:'Understood. Is there a better window — mornings or end of day? I\'ll try back then.',why:'Ask for their pattern, not access. If they give a time, call exactly then.',next:'voicemail'},
        {id:'gk4',label:'"Send an email"',tone:'r',hint:'Deflection',counter:'Happy to — what\'s the best email? And just so I can reference it when I follow up, what\'s your name?',why:'Comply but collect intel — their name + the email. Call back in 48 hours.',next:'voicemail'},
        {id:'gk5',label:'Voicemail',tone:'r',hint:'No live person',counter:null,next:'voicemail'}
    ]
},
opener:{phase:2,title:'The Opener',sub:'First 8 seconds — earn permission to continue',
    script:'Hey <em>[Name]</em>, this is [Your Name] with '+escH(co)+' — I know I\'m an interruption. Do you have 30 seconds so I can tell you why I called, and you can decide if it\'s worth continuing?',
    coaching:'<strong>(1)</strong> First name — it\'s a cold call, not a board meeting. <strong>(2)</strong> "I know I\'m an interruption" disarms. <strong>(3)</strong> "You can decide" gives control. Medium pace, low tone. Sound worth listening to.',
    responses:[
        {id:'op1',label:'"Yeah, go ahead"',tone:'g',hint:'Green light',counter:null,next:'hook'},

        {id:'op4',label:'"No sales calls"',tone:'r',hint:'Wall — they\'ve done this before',counter:'Respect that. I\'ll skip the sales part. One question: how does your team currently handle '+signal.toLowerCase().substring(0,30)+'? Because at most companies your size, the answer makes people uncomfortable.',why:'Reframes from sales to operational question. Impossible to ignore if the pain is real.',next:'hook_hostile'},

hook:{phase:3,title:'The Hook',sub:'15 seconds — create a reason to keep listening',
    script:'Here\'s why I called you specifically. '+escH(acctName)+' is dealing with <em>'+escH(signal)+'</em> and we\'ve seen companies at your scale lose significant money because the systems aren\'t set up to handle it. We\'ve solved this for companies like yours — the question is whether it\'s worth 20 minutes to see if the same math works for '+escH(acctName)+'.',
    coaching:'Hit: <strong>(1)</strong> You know their world — the signal is real. <strong>(2)</strong> Named the pain. <strong>(3)</strong> Social proof at scale. <strong>(4)</strong> Low-commitment ask. Deliver standing up, slightly slower than natural.',
    responses:[
        {id:'hk1',label:'"Tell me more"',tone:'g',hint:'Engaged — leaning in',counter:null,next:'engage'},
        {id:'hk2',label:'"We handle that internally"',tone:'a',hint:'Status quo defense',counter:'Most companies your size do have systems for this. The question is whether those systems can do [specific capability your product offers] — because that\'s where the gap lives. Is that a gap you\'re seeing, or have you genuinely closed it?',why:'Validated their investment, then introduced a capability they don\'t have. Challenge wrapped in respect.',next:'engage'},
        {id:'hk3',label:'"Not interested"',tone:'r',hint:'Brush-off — haven\'t hung up',counter:'Fair. Can I ask — not interested in the concept, or just another vendor call? Because if your team has already solved '+signal.toLowerCase().substring(0,30)+', I\'ll hang up. But if it\'s a gap, it\'s costing '+escH(acctName)+' real money.',why:'Separates reflexive from substantive rejection. The conditional bet is high-confidence.',next:'value_drop'},
        {id:'hk4',label:'"We use [Competitor]"',tone:'a',hint:'Incumbent vendor',counter:'Good — you should keep using them. We don\'t replace that system. We sit on top. We make the data they store actually actionable in ways they can\'t today. Does your current setup do [specific capability]?',why:'"You should keep them" eliminates replacement threat. Then describe what they don\'t have.',next:'engage'},
        {id:'hk5',label:'"I\'ve got 2 minutes"',tone:'a',hint:'Time constraint — respect it',counter:'Perfect, I\'ll fit in one. Here\'s the math: companies at your scale typically [key metric / savings]. We\'ve done it for [proof companies]. Same profile as '+escH(acctName)+'. Worth 20 minutes to see if the math applies?',why:'Compressed value with real numbers. Close is low-commitment.',next:'close'},
        {id:'hk6',label:'"Send me an email"',tone:'r',hint:'Want off the phone',counter:'Happy to. But instead of a generic email, what if I send a one-page analysis specific to '+escH(acctName)+' and we schedule 15 minutes for me to walk through it? '+biz(2)+' or '+biz(4)+'?',why:'Upgraded from spam to value. Binary day forces scheduling, not interest decision.',next:'close'}

hook_hostile:{phase:3,title:'Hook — Hostile Track',sub:'They said no to selling. You\'re having a conversation now.',
    script:'You asked about '+signal.toLowerCase().substring(0,40)+'. Now listen. Whatever they answer, respond to THAT.',
    coaching:'You are no longer selling. Match their energy. The goal is a 60-second peer conversation — not a pitch. The pitch comes later through the back door.',
    responses:[
        {id:'hh1',label:'"Too long" / "It depends" / "It\'s a mess"',tone:'g',hint:'Admitted the problem',counter:'That\'s exactly what we hear everywhere. We built something that fixes it — [1 sentence about your product]. Companies like [proof company] went from [before] to [after]. Look — I know you didn\'t sign up for a sales call. But if that resonated, I\'d rather come see the actual problem and tell you honestly if this applies. No slides. Just a working session. Would that be useful?',why:'Validated frustration. Specific proof. On-site framed as working session.',next:'close'},
        {id:'hh2',label:'"It\'s fine, we have processes"',tone:'a',hint:'Deflection — unlikely true',counter:'If genuinely solved, that\'s rare and impressive. Quick litmus test: can your team do [specific capability] in under a minute today? If yes, I\'ll hang up.',why:'Compliments without sarcasm. Litmus test is impossible to say yes to.',next:'value_drop'},
        {id:'hh3',label:'"Gotta go" / *click*',tone:'r',hint:'Call ended',counter:null,why:'<strong>What to do:</strong> Send a 3-line email within 1 hour: "I was the cold call you cut short. Here\'s why in two sentences: [value prop]. If timing is ever less terrible, I\'m at [number]." 2-week follow-up cadence.',next:'post_call'},

engage:{phase:4,title:'Engage',sub:'Micro-discovery in 60 seconds — converse, don\'t interrogate',
    script:'Let me give you the quick version and then ask one thing. '+escH(co)+' helps companies like '+escH(acctName)+' [1-2 sentences about what you do, specific to their signal/pain]. The one thing I\'d ask: <em>how is your team currently handling [core operational question related to signal]?</em>',

value_drop:{phase:5,title:'Value Drop',sub:'Account-specific ROI — make the math undeniable',
    script:'Let me give you the math that matters. At '+escH(acctName)+'\'s scale, here\'s what we typically see:\n\n<em>[Key metric 1]</em>: [current state] → [future state]. For a team your size, that\'s [quantified impact].\n\n<em>[Key metric 2]</em>: [proof company] found [specific savings]. Similar profile to '+escH(acctName)+'.\n\nThat\'s the case. The question is whether it applies to your specific [division/workflow/operation].',
    coaching:'Drop specific names, numbers, and proof. If you\'ve researched a named executive at the prospect, reference them naturally.',
    responses:[
        {id:'vd1',label:'"How would this work for us?"',tone:'g',hint:'Strong buying signal — close',counter:null,next:'close'},
        {id:'vd2',label:'"Impressive numbers"',tone:'g',hint:'Processing — it landed',counter:'They\'re real numbers from real companies. That\'s why I\'m pushing for a deeper look — I want to give you an honest assessment of whether the math is $X or $Y for '+escH(acctName)+'. Can we set that up?',why:'"Honest assessment" and "whether" signal you\'re investigating, not assuming.',next:'close'},
        {id:'vd3',label:'"Sounds expensive"',tone:'a',hint:'Cost reflex',counter:'Relative to the savings, not even close. But I\'d be irresponsible quoting on a cold call. What I can say: ROI payback for our clients is typically under 6 months. The real question is what\'s the current cost of [their pain]? That\'s what you\'re paying today.',why:'Defer responsibly. Reframe from "your cost" to "the problem\'s cost."',next:'close'},
        {id:'vd4',label:'"I\'d need to involve others"',tone:'g',hint:'Multi-threading — this is GOOD',counter:'Exactly right. The best version of a first meeting includes [relevant roles]. Who would you pull in? I\'ll make the conversation relevant to everyone from minute one.',why:'They just did your multi-threading for you.',next:'close'},
        {id:'vd5',label:'"Every vendor says this"',tone:'r',hint:'Vendor fatigue',counter:'You should be skeptical. Here\'s what\'s different: [key differentiator in 1 sentence]. If it doesn\'t work on your actual data, you\'ll know in a pilot. I\'m asking for 20 minutes, not a commitment.',why:'"You should be skeptical" validates them. Bet on the product.',next:'close'}
    ]
},
close:{phase:6,title:'The Close',sub:'Ask for the meeting. Specific. Direct.',
    script:'Here\'s what I\'d suggest: I\'ll [come to your facility / set up a Zoom] with [relevant team member]. We\'ll spend 20 minutes looking at your [specific area], and give you an honest read on whether this applies. No slides unless you want them. <em>Does '+biz(2)+' or '+biz(4)+' work better?</em>',
    coaching:'Binary choice avoids "let me check my calendar." On-site signals seriousness. "If not a fit, I\'ll stop calling" shows confidence.',
    responses:[
        {id:'cl1',label:'"Yeah, [day] works"',tone:'g',hint:'MEETING BOOKED',counter:null,next:'confirm'},
        {id:'cl2',label:'"Let me think about it"',tone:'a',hint:'Soft stall',counter:'Totally understand. I\'ll send a one-page brief specific to '+escH(acctName)+' — take a look, and I\'ll follow up '+biz(3)+'. Sound fair?',why:'Value + specific follow-up date. "Sound fair?" is nearly impossible to refuse.',next:'post_call'},
        {id:'cl3',label:'"Zoom first?"',tone:'a',hint:'Lower commitment — take it',counter:'Absolutely. 20 minutes, I\'ll show you [core demo/capability], and we can talk about a deeper look. '+biz(1)+' or '+biz(3)+' afternoon?',why:'Don\'t fight the Zoom. Take the meeting. The on-site comes later.',next:'confirm'},
        {id:'cl4',label:'"Need to check with my team"',tone:'a',hint:'Multi-stakeholder',counter:'Makes sense. I\'ll put together a 2-minute summary your team can review — so you\'re not selling internally yourself. I\'ll follow up '+biz(5)+'. Who else would be in the room?',why:'Shareable artifact + specific date + multi-threading.',next:'post_call'},
        {id:'cl5',label:'"Call me next quarter"',tone:'r',hint:'Delay tactic',counter:'I hear you. Two things: '+signal.toLowerCase().substring(0,30)+' isn\'t waiting for next quarter. And the companies who got the biggest wins started with a 20-minute assessment, not a 6-month project. What if we do the assessment now, and you decide timing after?',why:'External urgency + tiny ask reframe.',next:'post_call'},
        {id:'cl6',label:'"No, not interested" (final)',tone:'r',hint:'Real no — respect it',counter:'Respect that. Last thing: if '+signal.toLowerCase().substring(0,25)+' ever becomes urgent — my number is [Your Name] at '+escH(co)+'. I\'ll send one email with my info. No follow-ups unless you reach out. Fair?',why:'Accepted no. Planted seeds for future recall. Differentiated from every vendor who ignores rejection.',next:'post_call'}
    ]

confirm:{phase:6,title:'Confirm the Meeting',sub:'Lock details — they prevent ghosting',
    script:'Great. Let me confirm: <em>[Day, Time]</em>. I\'ll bring [team member]. Can you tell me:\n\n<em>1.</em> Who else should be in the room?\n<em>2.</em> Visitor registration process?\n<em>3.</em> Best email for the calendar invite?\n\nI\'ll send confirmation today with a short agenda.',
    coaching:'Every detail confirmed reduces no-show chance. "Who else" starts multi-threading. Send calendar invite within 1 hour.',
    responses:[{id:'cf1',label:'Gives details / confirms',tone:'g',hint:'Meeting locked',counter:'Perfect. Looking forward to it. I know cold calls aren\'t anyone\'s favorite — I\'ll make sure the meeting is worth it.',why:'Self-aware, human, ends with a promise. Stop talking before they change their mind.',next:'post_call'}]
},
voicemail:{phase:1,title:'Voicemail',sub:'Under 25 seconds. Curiosity, not a pitch.',type:'voicemail'},

// ── STATE ──
var S={stage:'pre_call',timerOn:false,timerStart:null,timerInterval:null,expanded:null,donePhases:new Set()};
var FLOW={};
var LAST_OUTCOME=null;

function readCapture(){
    var state=readLS('gtmos_cold_call_quick_capture',{});
    return Object.assign({
        accountName:'',
        contactName:'',
        contactTitle:'',
        objectionKey:'',
        callbackDate:'',
        notes:''
    },state||{});
}

function writeCapture(next){
    localStorage.setItem('gtmos_cold_call_quick_capture',JSON.stringify(next||{}));
}

function syncCaptureAccount(){
    var state=readCapture();
    if(state.accountName!==selectedAccount){
        state.accountName=selectedAccount||'';
        state.contactName='';
        state.contactTitle='';
        state.objectionKey='';
        state.callbackDate='';
        state.notes='';
        writeCapture(state);
    }
    return state;
}

function getStageMode(stageKey){
    if(stageKey==='pre_call')return 'pre';
    if(stageKey==='post_call')return 'post';
    return 'live';
}

function getModeMeta(stageKey){
    var mode=getStageMode(stageKey);
    if(mode==='pre'){
        return {
            label:'Pre-call mode',
            title:'Get the brief tight before you dial.',
            copy:'Use this mode to pick the right account, understand the signal, and enter the call with a specific objective instead of generic courage.'
        };
    }
    if(mode==='post'){
        return {
            label:'Post-call mode',
            title:'Capture the truth while it is still fresh.',
            copy:'What happened on the call should become the next move, not a vague memory. Log the outcome, note the objection, and decide the follow-up now.'
        };
    }
    return {
        label:'Live-call mode',
        title:'Run the state machine without losing the room.',
        copy:'Use the script as a track, not a monologue. Match the response, capture the signal, and move the call toward one concrete next step.'
    };
}

function getRecentCallStats(){
    var data=readLS('gtmos_cold_call_log',{calls:[]})||{calls:[]};
    var calls=Array.isArray(data.calls)?data.calls:[];
    return {
        total:calls.length,
        booked:calls.filter(function(c){return c.outcome==='meeting_booked';}).length,
        callbacks:calls.filter(function(c){return c.outcome==='callback_scheduled';}).length,
        referrals:calls.filter(function(c){return c.outcome==='referral';}).length
    };
}

function getOutcomeFeedback(outcome){
    var map={
        meeting_booked:{title:'Meeting booked',copy:'Move immediately into confirmation and agenda prep. The call worked because it produced a real next meeting, not vague interest.'},
        callback_scheduled:{title:'Callback scheduled',copy:'Treat the callback like a real commitment. Lock the exact date, then bring a tighter angle or asset into the next touch.'},
        referral:{title:'Referral earned',copy:'Reference the internal handoff quickly. This is how cold calling compounds into a warmer next thread.'},
        voicemail:{title:'Voicemail only',copy:'The learning is still real. Decide the exact next email or second dial now while the account is still mentally active.'},
        rejected:{title:'Hard no',copy:'Capture the objection honestly. The value now is pattern intelligence for the next account, not pretending this was a maybe.'},
        hung_up:{title:'Hung up',copy:'Record what likely triggered resistance, then choose whether the next move is email, LinkedIn, or a later re-entry.'},
        no_answer:{title:'No answer',copy:'No answer still belongs in the cadence. Use the note field to decide the next day and channel before you move on.'}
    };
    return map[outcome]||null;
}

function renderModeBridge(){
    var meta=getModeMeta(S.stage);
    var mode=getStageMode(S.stage);
    return '<div class="mode-card"><div class="mode-kicker">'+meta.label+'</div><div class="mode-title">'+meta.title+'</div><div class="mode-copy">'+meta.copy+'</div><div class="mode-pills"><span class="mode-pill'+(mode==='pre'?' active':'')+'">Pre-call</span><span class="mode-pill'+(mode==='live'?' active live':'')+'">Live-call</span><span class="mode-pill'+(mode==='post'?' active':'')+'">Post-call</span></div></div>';
}

function renderColdCallShellBand(){
    var node=document.getElementById('coldCallShellBand');
    if(!node)return;
    var stage=FLOW[S.stage];
    var meta=getModeMeta(S.stage);
    var mode=getStageMode(S.stage);
    var signal=getAccountSignal()||'No live signal linked yet.';
    var focus=selectedAccount?selectedAccount+(accountData&&accountData._heat?' · heat '+accountData._heat:''):'No account selected';
    var nextMove=S.stage==='pre_call'
        ? 'Select the account, study the brief, and decide whether the first route is prospect, assistant, or voicemail.'
        : S.stage==='post_call'
            ? 'Log the real outcome now while the call is fresh, then turn it into the next scheduled move.'
            : 'Keep the live call moving. Use the response tree without losing the outcome you are trying to earn.';
    var stateTone=selectedAccount?(mode==='live'?'live':'ready'):'thin';
    var stateLabel=selectedAccount?(meta&&meta.label?meta.label:'Call mode'):'Needs account';
    if(window.gtmShellChrome){
        window.gtmShellChrome.renderCommandBand('#coldCallShellBand',{
            kicker:'Live call system',
            title:meta.title,
            copy:meta.copy,
            stateLabel:stateLabel,
            stateTone:stateTone,
            metrics:[
                {label:'Focus account',value:focus},
                {label:'Top signal',value:signal},
                {label:'Call state',value:(stage&&stage.sub)||'Prep the next cold call.'},
                {label:'Next move',value:nextMove}
            ],
            actions:[
                {label:'Reset to Brief',action:'goTo("pre_call")',tone:'primary'},
                {label:'Open Signal Console',href:buildColdCallRoomHref('/app/signal-console/',selectedAccount||'Cold call prep','Signal Console')}
            ]
        });
        return;
    }
    node.innerHTML=renderModeBridge();
}

function syncColdCallShellOffset(){
    var host=document.querySelector('.app-main');
    var header=host&&host.querySelector('.app-header');
    if(!host)return;
    host.style.setProperty('--cold-call-shell-offset',header?(header.offsetHeight+'px'):'0px');
}

function initAccountSelector(){
    var accounts=signalConsoleAccounts.slice().sort(function(a,b){return(b._heat||0)-(a._heat||0)});
    // Render account selection in the pre-call brief
    return accounts;
}

// ── TIMER ──
function startTimer(){if(S.timerOn)return;S.timerOn=true;S.timerStart=Date.now();S.timerInterval=setInterval(tickTimer,1000)}
function tickTimer(){if(!S.timerStart)return;var el=Math.floor((Date.now()-S.timerStart)/1000);var m=Math.floor(el/60);var s=el%60;var t=document.getElementById('timer');t.textContent=m+':'+String(s).padStart(2,'0');t.className='timer on';if(el>180)t.className='timer warn';if(el>300)t.className='timer danger'}
function stopTimer(){clearInterval(S.timerInterval);S.timerOn=false}

window.setCallCaptureField=function(field,value){
    var state=syncCaptureAccount();
    state[field]=value;
    writeCapture(state);
    renderSidebar();
};

// ── NAVIGATION ──
function goTo(id){
    if(!id||!FLOW[id])return;
    var prev=FLOW[S.stage];if(prev)S.donePhases.add(prev.phase);
    S.stage=id;S.expanded=null;
    if(id!=='pre_call'&&id!=='voicemail'&&id!=='post_call')startTimer();
    render();
    document.querySelector('.main').scrollTo(0,0);
}
window.goTo=goTo;

function toggleResp(rid){S.expanded=S.expanded===rid?null:rid;render()}
window.toggleResp=toggleResp;

function showObj(key){
    var o=OBJECTIONS[key];if(!o)return;
    document.getElementById('objModal').innerHTML='<button class="modal-close" onclick="closeObj()">✕</button><div class="stage-phase">OBJECTION HANDLER</div><div class="stage-title" style="font-size:1.15rem;margin-bottom:14px;">'+o.label+'</div><div class="script"><div class="script-lbl">YOUR RESPONSE</div><div class="script-txt">'+o.response+'</div></div><div class="coach"><div class="coach-lbl">WHY THIS WORKS</div><div class="coach-txt">'+o.why+'</div></div><button class="adv-btn sec" onclick="closeObj()">← Back to Call</button>';
    document.getElementById('objOverlay').classList.add('on');
}
window.showObj=showObj;
function closeObj(){document.getElementById('objOverlay').classList.remove('on')}
window.closeObj=closeObj;

function renderColdCallWorkspaceHealth(){
    var node=document.getElementById('coldCallHealthPanel');
    if(!node)return;
    var stats=getRecentCallStats();
    var capture=syncCaptureAccount();
    var mode=getStageMode(S.stage);
    var signal=getAccountSignal();
    var compounded=[];
    var weakLinks=[];
    var accountCallCount=stats.total;
    if(selectedAccount){
        var data=readLS('gtmos_cold_call_log',{calls:[]})||{calls:[]};
        var calls=Array.isArray(data.calls)?data.calls:[];
        accountCallCount=calls.filter(function(call){return call.accountName===selectedAccount;}).length;
    }

    if(selectedAccount){
        compounded.push('<div class="workspace-health-item"><strong>The call is anchored to a live account.</strong> '+escH(selectedAccount)+' is now the named operating target instead of a generic list pull.</div>');
    }
    if(accountData&&Number(accountData._heat||0)>=70){
        compounded.push('<div class="workspace-health-item"><strong>The account already has temperature.</strong> Heat '+escH(String(accountData._heat))+' means the call is not entering a cold vacuum.</div>');
    }

    }
    if(!compounded.length){
        compounded.push('<div class="workspace-health-item"><strong>The room can already hold a live call state.</strong> The next gain is turning that state into a named account and real outcome loop.</div>');
    }

    if(!selectedAccount){
        weakLinks.push('<div class="workspace-health-item"><strong>No account is selected yet.</strong> Cold Call Studio gets thin fast if the operator dials before the target is named.</div>');
    }
    if(selectedAccount&&!signal){
        weakLinks.push('<div class="workspace-health-item"><strong>The signal anchor is still weak.</strong> The call is running on script discipline more than on live account evidence.</div>');
    }
    if(mode==='post'&&!LAST_OUTCOME){
        weakLinks.push('<div class="workspace-health-item"><strong>The last call has not been logged.</strong> Post-call mode only compounds if the outcome is captured while it is still fresh.</div>');

        weakLinks.push('<div class="workspace-health-item"><strong>The callback is not yet contextualized.</strong> Locking a date without a note still leaves the next touch underbuilt.</div>');
    }
    if(!weakLinks.length){
        weakLinks.push('<div class="workspace-health-item"><strong>No single weak link is dominating the room.</strong> Keep the outcome loop honest, but the call system is reading credibly.</div>');
    }

            '<div class="shell-section-header">'+
                '<div class="shell-section-heading">'+
                    '<div class="shell-section-kicker">Workspace health</div>'+
                    '<div class="shell-section-title">See what is compounding and what is still weak.</div>'+
                    '<div class="shell-section-copy workspace-health-copy">Cold Call Studio should show whether live call repetition is becoming a real operating loop or still resting on isolated scripts.</div>'+
                '</div>'+
            '</div>'+
            '<div class="workspace-health-metrics">'+
                '<div class="workspace-health-metric"><div class="workspace-health-label">Call posture</div><div class="workspace-health-value workspace-health-value--sans">'+escH(mode==='pre'?'Prep mode':mode==='post'?'Post-call mode':'Live-call mode')+'</div><div class="workspace-health-subcopy">'+escH(selectedAccount||'Need account')+'</div></div>'+

window.logCall=function(outcome){
    var data=readLS('gtmos_cold_call_log',{calls:[]});
    data.calls.push({
        id:uid(),accountName:selectedAccount||'',contactName:'',contactTitle:'',
        outcome:outcome,meetingDate:null,referralName:null,callbackDate:null,
        phasesReached:Array.from(S.donePhases).map(function(i){return PHASE_NAMES[i]}),
        objectionsHandled:[],
        duration:S.timerStart?Math.floor((Date.now()-S.timerStart)/1000):0,
        notes:'',dealId:null,createdAt:new Date().toISOString()
    });
    writeLS('gtmos_cold_call_log',data);
    // Also merge into discovery stats
    var disco=readLS('gtmos_discovery_stats',{totalCalls:0,advancedCalls:0});
    disco.totalCalls=(disco.totalCalls||0)+1;
    if(outcome==='meeting_booked')disco.advancedCalls=(disco.advancedCalls||0)+1;
    writeLS('gtmos_discovery_stats',disco);
    // Highlight selected
    document.querySelectorAll('.outcome-btn').forEach(function(b){b.classList.remove('sel')});
    event.target.classList.add('sel');
    // Prompt deal creation
    if(outcome==='meeting_booked'&&selectedAccount){
        if(confirm('Meeting booked! Create a deal for '+selectedAccount+'?')){
            var deal={id:'deal_'+Date.now(),accountName:selectedAccount,value:0,stage:'prospect',nextStep:'First meeting',nextStepDate:null,created_at:new Date().toISOString(),updated_at:new Date().toISOString()};
            if(window.gtmPersistence&&window.gtmPersistence.deals&&typeof window.gtmPersistence.deals.save==='function'){
                window.gtmPersistence.deals.save(deal).catch(function(error){console.error('Cold Call Studio deal sync failed:',error);});
            }else{
                var deals=readLS('gtmos_deal_workspaces',[]);
                deals.push(deal);
                writeLS('gtmos_deal_workspaces',deals);
            }
            alert('Deal created in Deal Workspace.');
        }
    }
};

window.selectAccount=function(name){
    selectedAccount=name;
    accountData=signalConsoleAccounts.find(function(a){return a.name===name})||null;
    LAST_OUTCOME=null;
    document.getElementById('topCtx').innerHTML=name?'<strong>'+escH(name)+'</strong>'+(accountData&&accountData._heat?' - heat '+accountData._heat:''):'Select an account';
    syncCaptureAccount();
    FLOW=buildFlow();
    render();
};

renderVoicemail=function(){

utton class="adv-btn" onclick="goTo(\'post_call\')">Post-Call -></button></div>';

oach-txt"><strong>Same day:</strong> One email - contact info + one case study. Nothing else.<br><strong>Day 30:</strong> Value touch - relevant article, no ask.<br><strong>Day 60:</strong> Second value touch - new case study.<br><strong>Day 90:</strong> Final check-in: "Last note. If [trigger] resurfaces, I\'m here."</div></div><div class="postcard"><div class="postcard-title">Log This Call</div><div class="outcome-bar" id="outcomeBar">'+['meeting_booked','callback_scheduled','referral','voicemail','rejected','hung_up','no_answer'].map(function(o){return '<button class="outcome-btn" onclick="logCall(event,\''+o+'\')">'+o.replace(/_/g,' ')+'</button>'}).join('')+'</div></div><button class="adv-btn sec" onclick="goTo(\'pre_call\')" style="margin-top:12px;">Reset</button>';

window.logCall=function(event,outcome){
    var capture=syncCaptureAccount();
    var data=readLS('gtmos_cold_call_log',{calls:[]});
    data.calls.push({
        id:uid(),
        accountName:selectedAccount||'',
        contactName:capture.contactName||'',
        contactTitle:capture.contactTitle||'',
        outcome:outcome,
        meetingDate:outcome==='meeting_booked'?new Date().toISOString():null,
        referralName:outcome==='referral'?(capture.contactName||null):null,
        callbackDate:capture.callbackDate||null,
        phasesReached:Array.from(S.donePhases).map(function(i){return PHASE_NAMES[i]}),
        objectionsHandled:capture.objectionKey?[capture.objectionKey]:[],
        duration:S.timerStart?Math.floor((Date.now()-S.timerStart)/1000):0,
        notes:capture.notes||'',
        dealId:null,
        createdAt:new Date().toISOString()
    });
    LAST_OUTCOME=outcome;
    writeLS('gtmos_cold_call_log',data);
    var disco=readLS('gtmos_discovery_stats',{totalCalls:0,advancedCalls:0});
    disco.totalCalls=(disco.totalCalls||0)+1;
    if(outcome==='meeting_booked')disco.advancedCalls=(disco.advancedCalls||0)+1;
    writeLS('gtmos_discovery_stats',disco);
    if(event&&event.currentTarget){
        var buttons=document.querySelectorAll('.outcome-btn');
        buttons.forEach(function(b){b.classList.remove('sel');});
        event.currentTarget.classList.add('sel');
    }
    renderSidebar();
    if(outcome==='meeting_booked'&&selectedAccount){
        if(confirm('Meeting booked! Create a deal for '+selectedAccount+'?')){
            var deal={
                id:'deal_'+Date.now(),
                accountName:selectedAccount,
                value:0,
                stage:'prospect',
                nextStep:'First meeting',
                nextStepDate:capture.callbackDate||null,
                primaryContact:capture.contactName||'',
                created_at:new Date().toISOString(),
                updated_at:new Date().toISOString()
            };
            if(window.gtmPersistence&&window.gtmPersistence.deals&&typeof window.gtmPersistence.deals.save==='function'){
                window.gtmPersistence.deals.save(deal).catch(function(error){console.error('Cold Call Studio deal sync failed:',error);});
            }else{
                var deals=readLS('gtmos_deal_workspaces',[]);
                deals.push(deal);
                writeLS('gtmos_deal_workspaces',deals);
            }
            alert('Deal created in Deal Workspace.');
        }
    }
};

renderStandard=function(stage){
    var M=document.getElementById('mainArea');
    var rhtml='';
    if(stage.responses&&stage.responses.length){
        rhtml='<div class="resp-section"><div class="resp-lbl">What they might say - click for your response</div><div class="resp-grid">';
        stage.responses.forEach(function(r){
            var exp=S.expanded===r.id;
            var chtml='';
            if(exp){
                if(r.counter){
                    chtml='<div class="counter"><div class="counter-lbl">YOUR RESPONSE</div><div class="counter-txt">'+r.counter+'</div>'+(r.why?'<div class="counter-why">'+r.why+'</div>':'')+(r.next?'<div class="adv-row"><button class="adv-btn" onclick="event.stopPropagation();goTo(\''+r.next+'\')">Continue -> '+((FLOW[r.next]||{}).title||'Next')+'</button></div>':'')+'</div>';
                } else if(r.why){
                    chtml='<div class="counter"><div class="counter-txt">'+r.why+'</div>'+(r.next?'<div class="adv-row"><button class="adv-btn" onclick="event.stopPropagation();goTo(\''+r.next+'\')">Continue -></button></div>':'')+'</div>';
                } else if(r.next){
                    chtml='<div class="adv-row" style="margin-top:10px;"><button class="adv-btn" onclick="event.stopPropagation();goTo(\''+r.next+'\')">Continue -> '+((FLOW[r.next]||{}).title||'Next')+'</button></div>';
                }
            }
            rhtml+='<div><button class="resp-btn" onclick="toggleResp(\''+r.id+'\')" style="'+(exp?'border-color:var(--gold-dim);background:var(--surface3);':'')+'"><div class="tone tone-'+r.tone+'"></div><div><div class="resp-prospect">'+r.label+'</div>'+(r.hint?'<div class="resp-hint">'+r.hint+'</div>':'')+'</div></button>'+chtml+'</div>';
        });
        rhtml+='</div></div>';
    }
    M.innerHTML='<div style="margin-bottom:20px;"><div class="stage-phase">PHASE '+stage.phase+' - '+PHASE_NAMES[stage.phase]+'</div><div class="stage-title">'+stage.title+'</div><div class="stage-sub">'+stage.sub+'</div></div>'+(stage.script?'<div class="script"><div class="script-lbl">YOUR SCRIPT</div><div class="script-txt">'+stage.script.replace(/\n/g,'<br>')+'</div></div>':'')+(stage.coaching?'<div class="coach"><div class="coach-lbl">COACHING</div><div class="coach-txt">'+stage.coaching+'</div></div>':'')+rhtml;
};

function showColdCallBootState(kind,title,text){
    if(!window.gtmModuleBootState)return;
    window.gtmModuleBootState.show('#mainArea',{
        kind:kind,
        title:title,
        text:text,
        retryLabel:'Retry Cold Call Studio',
        retryAction:'retryColdCallBoot'
    });
}
function onColdCallBootFailure(error){
    console.error('Cold Call Studio boot failed:',error);
    document.getElementById('topCtx').textContent='Cold Call Studio failed to load';
    document.getElementById('sideArea').innerHTML='';
    showColdCallBootState(
        'error',
        'Cold Call Studio could not load.',
        'The call workflow failed during startup, so Antaeus is showing the failure instead of a dead dial screen. Retry once. If it fails again, refresh the page and verify your workspace session is still healthy.'
    );
}
window.retryColdCallBoot=function(){
    bootColdCallStudio().catch(onColdCallBootFailure);
};
async function bootColdCallStudio(){
    showColdCallBootState(
        'loading',
        'Loading Cold Call Studio',
        'Pulling your current accounts, rebuilding the call flow, and preparing the live objection paths.'
    );
    if(window.gtmPersistence&&window.gtmPersistence.docs&&typeof window.gtmPersistence.docs.load==='function'){
        await window.gtmPersistence.docs.load({keys:['gtmos_cold_call_log']}).catch(function(error){console.error('Cold Call Studio docs preload failed:',error);});
    }
    await syncSignalConsoleAccounts();
    var params=new URLSearchParams(window.location.search);
    if(params.get('account')){
        var match=signalConsoleAccounts.find(function(a){return a.name===params.get('account')});
        if(match){selectedAccount=match.name;accountData=match;}
    }
    FLOW=buildFlow();
    render();
}

if(window.__gtmosAuthGatePending&&window.requireAuthReady&&typeof window.requireAuthReady.then==='function'){
    window.requireAuthReady.then(bootColdCallStudio).catch(onColdCallBootFailure);
}else if(window.__gtmosAuthGatePending){
    showColdCallBootState(
        'loading',
        'Waiting for auth',
        'Cold Call Studio is waiting for your authenticated workspace before it builds the call flow.'
    );
    window.addEventListener('gtmos:auth-ready',function(){bootColdCallStudio().catch(onColdCallBootFailure);},{once:true});
}else{
    bootColdCallStudio().catch(onColdCallBootFailure);
}

window.addEventListener('resize',syncColdCallShellOffset);
syncColdCallShellOffset();
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeObj()});

})();
