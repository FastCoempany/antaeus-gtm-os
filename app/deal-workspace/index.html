<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deal Workspace | Antaeus GTM OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <style>
        body.room-deal-workspace .app-main{background:radial-gradient(circle at 100% 0%, rgba(230,112,30,0.05), transparent 24%),radial-gradient(circle at 0% 0%, rgba(36,113,231,0.05), transparent 28%),linear-gradient(180deg,#fbfcff 0%,#f3f7fc 100%);}
        body.room-deal-workspace .app-content{max-width:1240px;margin-inline:auto;}
        .dw-app-content{display:grid;gap:22px;}
        .dw-board-body{display:grid;gap:18px;}
        .dw-lower-stack{display:grid;gap:18px;padding-bottom:18px;}
        .dw-bridge{background:linear-gradient(135deg, rgba(212,165,116,0.1), rgba(59,130,246,0.04));border:1px solid rgba(212,165,116,0.18);border-radius:var(--radius-xl);padding:22px;margin-bottom:var(--space-md);}
        .dw-bridge-k{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--brand-gold);font-weight:700;margin-bottom:8px;}
        .dw-bridge-title{font-size:1.08rem;font-weight:700;color:var(--text-primary);margin-bottom:6px;}
        .dw-bridge-copy{font-size:0.84rem;color:var(--text-tertiary);line-height:1.6;margin-bottom:14px;}
        .dw-bridge-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;}
        .dw-bridge-block{padding:14px 16px;border-radius:var(--radius-lg);background:rgba(6,10,18,0.28);border:1px solid rgba(255,255,255,0.06);}
        .dw-bridge-label{font-size:0.64rem;text-transform:uppercase;letter-spacing:0.45px;color:var(--text-muted);font-weight:700;margin-bottom:7px;}
        .dw-bridge-value{font-size:0.8rem;color:var(--text-secondary);line-height:1.55;}
        .dw-bridge-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
        .dw-bridge-btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 12px;border-radius:var(--radius-full);border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);font:inherit;font-size:0.75rem;font-weight:700;cursor:pointer;}
        .dw-bridge-btn:hover{border-color:var(--border-hover);}
        .dw-bridge-btn.primary{background:rgba(212,165,116,0.1);border-color:rgba(212,165,116,0.24);color:var(--brand-gold);}
        .dw-first-fold{display:grid;gap:18px;margin-bottom:var(--space-lg);}
        .dw-diagnosis-stage{position:relative;overflow:hidden;display:grid;gap:18px;padding:30px 0 24px;border-bottom:1px solid rgba(10,28,64,0.08);}
        .dw-diagnosis-stage::after{content:'';position:absolute;inset:auto 0 -120px auto;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle, rgba(230,112,30,0.08), rgba(230,112,30,0));pointer-events:none;}
        .dw-diagnosis-grid{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(300px,0.82fr);gap:24px;align-items:start;position:relative;z-index:1;}
        .dw-diagnosis-kicker{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--brand-gold);margin-bottom:12px;}
        .dw-diagnosis-headline{font-size:clamp(2.8rem,5.6vw,5.4rem);line-height:0.92;letter-spacing:-0.05em;color:var(--text-primary);max-width:9ch;font-weight:500;}
        .dw-diagnosis-copy{max-width:56ch;margin-top:14px;font-size:0.94rem;line-height:1.7;color:var(--text-secondary);}
        .dw-diagnosis-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;}
        .dw-diagnosis-note{display:grid;gap:6px;margin-top:18px;padding-top:14px;border-top:1px solid rgba(10,28,64,0.08);}
        .dw-diagnosis-note-label{font-size:0.64rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);}
        .dw-diagnosis-note-copy{font-size:0.84rem;line-height:1.6;color:var(--text-secondary);max-width:56ch;}
        .dw-diagnosis-dock{display:grid;gap:12px;}
        .dw-diagnosis-target{display:grid;gap:10px;padding:16px 18px;border-radius:20px;border:1px solid rgba(10,28,64,0.08);background:rgba(255,255,255,0.9);box-shadow:none;}
        .dw-diagnosis-target-label{font-size:0.66rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--brand-gold);}
        .dw-diagnosis-target-title{font-size:1.16rem;font-weight:700;line-height:1.3;color:var(--text-primary);}
        .dw-diagnosis-target-copy{font-size:0.84rem;line-height:1.65;color:var(--text-secondary);}
        .dw-diagnosis-target-meta{display:flex;gap:8px;flex-wrap:wrap;}
        .dw-diagnosis-pill{display:inline-flex;align-items:center;justify-content:center;padding:6px 10px;border-radius:999px;border:1px solid rgba(10,28,64,0.08);background:rgba(248,250,252,0.96);font-size:0.68rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-muted);}
        .dw-diagnosis-pill.is-risk{border-color:rgba(230,112,30,0.2);color:#e6701e;background:rgba(230,112,30,0.08);}
        .dw-diagnosis-register{display:grid;gap:0;padding:0 2px;}
        .dw-diagnosis-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;align-items:end;padding:12px 0;border-bottom:1px solid rgba(10,28,64,0.08);}
        .dw-diagnosis-row:first-child{padding-top:0;}
        .dw-diagnosis-row:last-child{border-bottom:0;padding-bottom:0;}
        .dw-diagnosis-row-label{font-size:0.66rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);}
        .dw-diagnosis-row-copy{margin-top:4px;font-size:0.76rem;line-height:1.5;color:var(--text-tertiary);}
        .dw-diagnosis-row-value{font-family:var(--font-serif);font-size:1.28rem;line-height:1;color:var(--text-primary);text-align:right;}
        .dw-board-shell{display:grid;gap:14px;margin-bottom:var(--space-lg);}
        .dw-board-bar{display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap;padding:4px 0 14px;border-bottom:1px solid rgba(10,28,64,0.08);}
        .dw-board-bar-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
        .dw-board-kicker{font-size:0.66rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--brand-gold);}
        .dw-board-filter{display:inline-flex;align-items:center;gap:10px;padding:9px 14px;border-radius:999px;border:1px solid rgba(10,28,64,0.08);background:rgba(255,255,255,0.84);}
        .dw-board-filter-label{font-size:0.64rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);}
        .dw-board-filter select{padding:0;border:0;background:transparent;color:var(--text-primary);font-size:0.86rem;font-weight:600;font-family:inherit;}
        .dw-board-filter select:focus{outline:none;}
        .dw-board-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
        .dw-filter-count{font-size:0.76rem;color:var(--text-muted);}
        .dw-stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:0;padding-bottom:2px;border-bottom:1px solid rgba(10,28,64,0.08);}
        .dw-stat{display:grid;gap:4px;padding:0 18px 0 0;border-right:1px solid rgba(10,28,64,0.08);text-align:left;background:none;border-radius:0;}
        .dw-stat:last-child{border-right:0;padding-right:0;}
        .dw-stat-val{font-family:var(--font-serif);font-size:1.5rem;color:var(--text-primary);line-height:1;}
        .dw-stat-label{font-size:0.66rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;font-weight:700;}
        .dw-stat-copy{font-size:0.76rem;color:var(--text-tertiary);line-height:1.5;}
        .dw-recovery{background:transparent;border:0;border-radius:0;padding:0;margin-bottom:0;}
        .dw-recovery-head{font-size:0.64rem;text-transform:uppercase;letter-spacing:0.24em;color:var(--brand-gold);font-weight:700;margin-bottom:6px;}
        .dw-recovery-title{font-size:0.92rem;font-weight:700;color:var(--text-primary);margin-bottom:4px;}
        .dw-recovery-copy{font-size:0.78rem;color:var(--text-tertiary);line-height:1.5;margin-bottom:10px;}
        .dw-recovery-list{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
        .dw-recovery-item{padding:10px 12px;border-radius:16px;background:rgba(255,255,255,0.76);border:1px solid rgba(10,28,64,0.08);}
        .dw-recovery-item:last-child{border-right:0;}
        .dw-recovery-item-title{font-size:0.8rem;font-weight:700;color:var(--text-secondary);margin-bottom:4px;}
        .dw-recovery-item-copy{font-size:0.75rem;color:var(--text-muted);line-height:1.5;}
        .dw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:var(--space-md);}
        .dw-intervention-board{display:grid;gap:16px;}
        .dw-rail-shell{display:grid;gap:18px;padding:20px 0 14px;border-radius:0;border:0;background:transparent;box-shadow:none;}
        .dw-rail-header{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:16px;align-items:end;padding-bottom:12px;border-bottom:1px solid rgba(10,28,64,0.08);}
        .dw-rail-header-main{display:grid;gap:6px;}
        .dw-rail-kicker{font-size:0.66rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#e6701e;}
        .dw-rail-title{font-size:1.32rem;line-height:1.05;letter-spacing:-0.04em;font-weight:700;color:#0a1c40;}
        .dw-rail-copy{max-width:52ch;font-size:0.78rem;line-height:1.55;color:#5f7594;}
        .dw-rail-readouts{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
        .dw-rail-pill{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:34px;padding:0 12px;border-radius:12px;background:transparent;border:1px solid rgba(10,28,64,0.12);font-weight:700;color:#0a1c40;}
        .dw-rail-pill span{font-size:0.66rem;letter-spacing:0.14em;text-transform:uppercase;color:#8b9cb4;font-weight:700;}
        .dw-rail-layout{display:grid;gap:14px;}
        .dw-rail-lane{display:grid;grid-template-columns:124px minmax(0,1fr);gap:16px;align-items:start;padding:10px 0;border-top:1px solid rgba(10,28,64,0.08);}
        .dw-rail-lane:first-of-type{border-top:0;padding-top:0;}
        .dw-rail-lane-label{display:grid;gap:6px;padding-top:8px;}
        .dw-rail-lane-state{font-size:0.66rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#e6701e;}
        .dw-rail-lane-copy{font-size:0.74rem;line-height:1.5;color:#6b7f9a;}
        .dw-ticket-stack{display:grid;gap:12px;}
        .dw-rail-ticket{display:grid;grid-template-columns:6px minmax(0,1fr);gap:14px;align-items:start;padding:12px 14px;border-radius:16px;background:transparent;border:1px solid rgba(10,28,64,0.12);box-shadow:none;}
        .dw-rail-ticket:hover{background:rgba(255,255,255,0.55);}
        .dw-rail-ticket-edge{width:6px;height:100%;border-radius:999px;}
        .dw-rail-ticket-edge.risk{background:#e6701e;}
        .dw-rail-ticket-edge.proof{background:#2471e7;}
        .dw-rail-ticket-edge.motion{background:#2d7a4b;}
        .dw-rail-ticket-main{display:grid;gap:10px;}
        .dw-rail-ticket-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;}
        .dw-rail-ticket-name{font-size:1.05rem;line-height:1.05;letter-spacing:-0.04em;font-weight:700;color:#0a1c40;}
        .dw-rail-ticket-value{font-family:var(--font-serif);font-size:1.32rem;line-height:1;color:#0a1c40;white-space:nowrap;}
        .dw-rail-ticket-detail{display:flex;gap:10px;flex-wrap:wrap;}
        .dw-rail-ticket-detail span{font-size:0.66rem;letter-spacing:0.14em;text-transform:uppercase;color:#8b9cb4;font-weight:700;}
        .dw-rail-ticket-copy{font-size:0.76rem;line-height:1.55;color:#10274f;}
        .dw-rail-ticket-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding-top:2px;}
        .dw-rail-ticket-link,.dw-reserve-link{border:0;background:none;padding:0;font:inherit;color:#2471e7;font-weight:700;cursor:pointer;}
        .dw-rail-ticket-ghost{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:0 12px;border-radius:12px;border:1px solid rgba(10,28,64,0.1);background:rgba(255,255,255,0.84);font:inherit;font-size:0.78rem;font-weight:700;color:#0a1c40;cursor:pointer;}
        .dw-rail-reserve{display:flex;gap:8px;flex-wrap:wrap;padding:4px 0 0 142px;}
        .dw-reserve-tag{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:12px;background:transparent;border:1px dashed rgba(10,28,64,0.16);font-size:0.7rem;font-weight:700;color:#0a1c40;cursor:pointer;}
        .dw-reserve-tag span{font-size:0.62rem;letter-spacing:0.14em;text-transform:uppercase;color:#8b9cb4;font-weight:700;}
        .dw-rail-empty{padding:26px 0 8px;font-size:0.94rem;line-height:1.6;color:#5f7594;}
        /* Card */
        .dw-card{background:var(--bg-secondary);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:20px;transition:all 0.2s;cursor:pointer;position:relative;}
        .dw-card:hover{border-color:var(--border-hover);transform:translateY(-2px);}
        .dw-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
        .dw-card-name-row{display:flex;align-items:center;gap:8px;}
        .dw-momentum{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
        .dw-momentum.strong{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,0.4);}
        .dw-momentum.neutral{background:#f59e0b;box-shadow:0 0 6px rgba(245,158,11,0.3);}
        .dw-momentum.stalling{background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,0.4);}
        .dw-card-name{font-weight:700;font-size:1rem;color:var(--text-primary);}
        .dw-card-value{font-family:var(--font-serif);font-size:1.1rem;color:var(--accent-green);flex-shrink:0;}
        .dw-card-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
        .dw-card-stage{font-size:0.68rem;padding:3px 8px;border-radius:var(--radius-full);font-weight:600;display:inline-block;}
        .dw-card-stage.prospect{background:rgba(100,116,139,0.15);color:#94a3b8;}
        .dw-card-stage.discovery{background:rgba(59,130,246,0.15);color:#3b82f6;}
        .dw-card-stage.evaluation{background:rgba(168,85,247,0.15);color:#a855f7;}
        .dw-card-stage.poc{background:rgba(245,158,11,0.15);color:#f59e0b;}
        .dw-card-stage.negotiation{background:rgba(212,165,116,0.15);color:#d4a574;}
        .dw-card-stage.verbal{background:rgba(6,182,212,0.15);color:#06b6d4;}
        .dw-card-stage.closed-won{background:rgba(34,197,94,0.15);color:#22c55e;}
        .dw-card-stage.closed-lost{background:rgba(239,68,68,0.15);color:#ef4444;}
        .dw-card-days{font-size:0.65rem;color:var(--text-muted);}
        .dw-card-days.warn{color:#f59e0b;}
        .dw-card-days.crit{color:#ef4444;}
        .dw-card-close{font-size:0.65rem;color:var(--text-muted);}
        .dw-card-close.overdue{color:#ef4444;font-weight:600;}
        .dw-card-forecast{font-size:0.6rem;padding:2px 6px;border-radius:var(--radius-full);font-weight:600;border:1px solid;}
        .dw-card-forecast.commit{background:rgba(34,197,94,0.08);color:#22c55e;border-color:rgba(34,197,94,0.2);}
        .dw-card-forecast.bestCase{background:rgba(59,130,246,0.08);color:#3b82f6;border-color:rgba(59,130,246,0.2);}
        .dw-card-forecast.upside{background:rgba(168,85,247,0.08);color:#a855f7;border-color:rgba(168,85,247,0.2);}
        .dw-card-forecast.pipeline{background:rgba(100,116,139,0.08);color:#94a3b8;border-color:rgba(100,116,139,0.2);}
        .dw-card-qual{font-size:0.62rem;padding:2px 7px;border-radius:var(--radius-full);font-weight:700;border:1px solid;}
        .dw-card-qual.strong{background:rgba(34,197,94,0.08);color:#22c55e;border-color:rgba(34,197,94,0.2);}
        .dw-card-qual.workable{background:rgba(245,158,11,0.08);color:#f59e0b;border-color:rgba(245,158,11,0.2);}
        .dw-card-qual.thin{background:rgba(239,68,68,0.08);color:#ef4444;border-color:rgba(239,68,68,0.2);}
        .dw-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
        .dw-chip{font-size:0.62rem;padding:2px 7px;border-radius:var(--radius-full);font-weight:600;border:0;font-family:inherit;cursor:pointer;}
        .dw-chip.filled{background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.2);}
        .dw-chip.empty{background:rgba(255,255,255,0.03);color:var(--text-muted);border:1px solid var(--border-default);cursor:pointer;}
        .dw-chip.empty:hover{border-color:var(--border-hover);}
        .dw-chip.thread{background:rgba(59,130,246,0.08);color:#3b82f6;border:1px solid rgba(59,130,246,0.2);}
        .dw-chip.thread.warn{background:rgba(239,68,68,0.08);color:#ef4444;border-color:rgba(239,68,68,0.2);}
        .dw-recovery-tag{font-size:0.65rem;color:#f59e0b;margin-top:8px;font-weight:600;}
        .dw-next{font-size:0.8rem;color:var(--text-tertiary);border-top:1px solid rgba(255,255,255,0.05);padding-top:8px;margin-top:6px;}
        .dw-next strong{color:var(--text-secondary);}
        .dw-next-date{font-size:0.7rem;margin-left:6px;padding:1px 6px;border-radius:var(--radius-full);font-weight:600;}
        .dw-next-date.future{background:rgba(34,197,94,0.08);color:#22c55e;}
        .dw-next-date.overdue{background:rgba(239,68,68,0.1);color:#ef4444;}
        .dw-linked{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
        .dw-link-badge{font-size:0.6rem;padding:2px 6px;border-radius:var(--radius-full);text-decoration:none;border:1px solid;}
        .dw-link-badge.signal{background:rgba(59,130,246,0.08);color:#3b82f6;border-color:rgba(59,130,246,0.2);}
        .dw-link-badge.autopsy{background:rgba(168,85,247,0.08);color:#a855f7;border-color:rgba(168,85,247,0.2);}
        .dw-link-badge:hover{opacity:0.8;}
        /* Intel expand */
        .dw-intel{display:none;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.06);}
        .dw-card.expanded .dw-intel{display:block;}
        .dw-intel-section{margin-bottom:10px;}
        .dw-intel-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:700;margin-bottom:3px;}
        .dw-intel-value{font-size:0.8rem;color:var(--text-secondary);line-height:1.4;}
        .dw-intel-edit{font-size:0.7rem;color:var(--brand-gold);cursor:pointer;text-decoration:none;float:right;background:none;border:0;padding:0;font-family:inherit;}
        .dw-intel-edit:hover{text-decoration:underline;}
        .dw-empty{text-align:center;padding:60px 24px;color:var(--text-muted);}
        .dw-empty a{color:var(--brand-gold);}
        /* Modal */
        .dw-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center;}
        .dw-modal-overlay.active{display:flex;}
        .dw-modal{background:var(--bg-secondary);border:1px solid var(--border-default);border-radius:var(--radius-xl);padding:32px;max-width:540px;width:92%;max-height:88vh;overflow-y:auto;}
        .dw-modal-title{font-family:var(--font-serif);font-size:1.3rem;color:var(--text-primary);margin-bottom:20px;}
        .dw-modal-field{margin-bottom:14px;}
        .dw-modal-field label{display:block;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-secondary);margin-bottom:5px;}
        .dw-modal-field input,.dw-modal-field select,.dw-modal-field textarea{width:100%;padding:10px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--border-default);border-radius:8px;color:var(--text-primary);font-size:0.88rem;font-family:inherit;}
        .dw-modal-field input:focus,.dw-modal-field select:focus,.dw-modal-field textarea:focus{outline:none;border-color:var(--brand-gold);}
        .dw-modal-field textarea{min-height:50px;resize:vertical;}
        .dw-modal-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
        .dw-modal-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
        .dw-modal-actions{display:flex;justify-content:space-between;margin-top:24px;}
        .dw-modal-btn{padding:10px 20px;border-radius:8px;font-weight:700;cursor:pointer;border:none;font-family:inherit;font-size:0.85rem;}
        .dw-modal-btn.primary{background:var(--brand-gold);color:var(--bg-primary);}

            <!--
                Wave 6 — flag-based cutover to /deal-workspace/ Preact rebuild.
                When the Posthog feature flag `room_deal_workspace_v2` is ON
                for the current user, redirect to the new room (Waves 1-5:
                intervention rail, recovery queue, 9-field health modal,
                Supabase persistence, realtime, filter chips, snapshot
                publishing). Otherwise the legacy room renders normally.

                Skip-redirect escape hatch: ?demo=1 or ?qa=1 in the URL keeps
                the legacy room loading. Used by the CI Playwright smoke
                tests + the demo-seed bootstrap path, neither of which
                should jump into the new room.

                posthog.onFeatureFlags fires once after Posthog's flag fetch
                returns. If the SDK didn't initialize (env vars missing,
                anonymous browser, etc.) the callback never fires and the
                legacy room renders normally.

                Ref: deliverables/adr/adr-002-phase-2-data-architecture-rescope-2026-04-24.md §6 Phase 4
            -->
            <script>
                (function(){
                    var qs = window.location.search || "";
                    if (qs.indexOf("demo=1") !== -1 || qs.indexOf("qa=1") !== -1) {
                        return;
                    }
                    function maybeRedirect() {
                        if (typeof posthog === "undefined" || !posthog.onFeatureFlags) {
                            return false;
                        }
                        posthog.onFeatureFlags(function () {
                            if (posthog.isFeatureEnabled("room_deal_workspace_v2")) {
                                var hash = window.location.hash || "";
                                window.location.replace("/deal-workspace/" + qs + hash);
                            }
                        });
                        return true;
                    }
                    // Fast path — Posthog already loaded (warm cache, repeat visit).
                    if (maybeRedirect()) return;
                    // Cold path — wait for analytics.js to dispatch gtmos:posthog-ready
                    // after the Posthog SDK script's onload fires + posthog.init runs.
                    window.addEventListener("gtmos:posthog-ready", maybeRedirect, { once: true });
                })();
            </script>

        function uid(){

        function daysBetween(a,b){var x=new Date(a),y=b?new Date(b):new Date();if(isNaN(x)||isNaN(y))return 0;return Math.floor((y-x)/86400000);}
        function fmtDate(d){if(!d)return'';try{return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}catch(e){return d;}}
        function isOverdue(d){if(!d)return false;try{return new Date(d+'T23:59:59')<new Date();}catch(e){return false;}}
        function isThisQuarter(d){if(!d)return false;var now=new Date(),qStart=new Date(now.getFullYear(),Math.floor(now.getMonth()/3)*3,1),qEnd=new Date(qStart);qEnd.setMonth(qEnd.getMonth()+3);var dt=new Date(d+'T00:00:00');return dt>=qStart&&dt<qEnd;}

        var DEAL_ROOM_HEALTH_KEY='gtmos_deal_room_health';
        var STAGE_LABELS={prospect:'Prospect',discovery:'Discovery',evaluation:'Solution Fit',poc:'PoC / Pilot',negotiation:'Negotiation',verbal:'Verbal Commit','closed-won':'Closed Won','closed-lost':'Closed Lost'};
        var STAGE_ORDER={prospect:0,discovery:1,evaluation:2,poc:3,negotiation:4,verbal:5,'closed-won':6,'closed-lost':7};
        var STAGE_PROB={prospect:0,discovery:0.10,evaluation:0.25,poc:0.50,negotiation:0.75,verbal:0.90,'closed-won':1,'closed-lost':0};
        var LOSS_LABELS={competitor:'Lost to Competitor',no_decision:'No Decision / Status Quo',budget:'Budget Killed',champion_left:'Champion Left / Reorg',timing:'Timing / Not Now'};
        var ROLES=['champion','eb','technical','legal','exec_sponsor','end_user'];
        var ROLE_LABELS={champion:'Champion',eb:'Economic Buyer',technical:'Technical Eval',legal:'Legal / Procurement',exec_sponsor:'Exec Sponsor',end_user:'End User'};

        // --- Stage history ---
        function getStageHistory(){return readLS('gtmos_deal_stage_history',{});}
        function logStageChange(dealId,fromStage,toStage){
            var hist=getStageHistory();
            if(!hist[dealId])hist[dealId]=[];
            hist[dealId].push({from:fromStage,to:toStage,at:new Date().toISOString()});
            writeLS('gtmos_deal_stage_history',hist);
        }
        function daysInCurrentStage(deal){
            var hist=getStageHistory();
            var entries=hist[deal.id]||[];
            var lastEntry=null;
            for(var i=entries.length-1;i>=0;i--){if(entries[i].to===deal.stage){lastEntry=entries[i];break;}}
            if(lastEntry)return daysBetween(lastEntry.at);
            return daysBetween(deal.created_at||deal.updated_at);
        }

        // --- Momentum auto-compute ---
        function computeMomentum(deal){
            if(deal.momentum)return deal.momentum;
            var stale=daysBetween(deal.updated_at||deal.created_at);
            if(stale<=3)return'strong';
            if(stale<=7)return'neutral';
            return'stalling';
        }

        // --- Threading depth ---
        function threadingDepth(deal){
            var sh=deal.stakeholders||[];
            var engaged=sh.filter(function(s){return s.engaged;}).length;
            var roles=new Set();sh.forEach(function(s){if(s.role)roles.add(s.role);});
            // Also count champion/EB from intel fields
            if(deal.champion&&!roles.has('champion')){roles.add('champion');engaged++;}
            if(deal.economicBuyer&&!roles.has('eb')){roles.add('eb');engaged++;}
            return{engaged:engaged,total:6,roles:roles.size};
        }

        // --- Load/save ---
        function loadDeals(){
            var raw=readLS(KEY,[]);
            if(!Array.isArray(raw)){raw=Object.keys(raw||{}).map(function(id){var d=raw[id];if(!d.id)d.id=id;return d;});}
            return raw.filter(Boolean);
        }

                if(loaded&&loaded.error)console.error('Deal sync failed:',loaded.error);

                var loaded=await window.gtmPersistence.signalConsole.load();

                if(loaded&&loaded.data&&Array.isArray(loaded.data.accounts)){
                    signalConsoleAccounts=loaded.data.accounts.slice();
                    return loaded;
                }
            }
            var fallback=readLS('gtmos_sc_v4',{accounts:[]});
            signalConsoleAccounts=(fallback.accounts||[]).slice();
            return {data:{accounts:signalConsoleAccounts},error:null};
        }

        function getQualification(deal){
            var threading=threadingDepth(deal);
            var checks=[
                {label:'Champion',met:!!deal.champion,copy:'Someone internal is carrying the deal.'},
                {label:'Economic buyer',met:!!deal.economicBuyer,copy:'The owner of the money is named.'},
                {label:'Use case',met:!!deal.useCase,copy:'The buying event is concrete, not abstract.'},
                {label:'Pain',met:!!deal.pain,copy:'The cost of doing nothing is written down.'},
                {label:'Process',met:!!deal.decisionProcess,copy:'The approval path is visible.'},
                {label:'Next step',met:!!deal.nextStep&&!!deal.nextStepDate,copy:'A dated next move exists.'},
                {label:'Threading',met:threading.engaged>=2,copy:'At least 2 engaged stakeholders are in play.'}
            ];
            var score=checks.reduce(function(sum,c){return sum+(c.met?Math.floor(100/checks.length):0);},0);
            if(score>100)score=100;
            var band=score>=82?'strong':score>=58?'workable':'thin';
            var bandLabel=band==='strong'?'Strong':'workable'===band?'Workable':'Thin';
            var next='Name the champion and date the next step first.';
            if(!deal.champion)next='Name the champion before calling this deal healthy.';
            else if(!deal.economicBuyer)next='Identify the economic buyer before the deal graduates.';
            else if(!(deal.nextStep&&deal.nextStepDate))next='Put a dated next step on the deal immediately.';
            else if(!deal.decisionProcess&&(STAGE_ORDER[deal.stage]||0)>=2)next='Document the decision process before evaluation turns into drift.';
            else if(threading.engaged<2)next='Thread at least one more stakeholder into the deal.';
            else next='Qualification is credible enough to run a real pipeline review.';
            return {score:score,band:band,bandLabel:bandLabel,checks:checks,next:next,threading:threading};
        }

        function getRecoveryReason(deal){
            if(deal.stage==='closed-won'||deal.stage==='closed-lost')return '';
            if(!deal.nextStep||!deal.nextStepDate)return 'No dated next step';
            if(isOverdue(deal.nextStepDate))return 'Next step overdue';
            if(daysBetween(deal.updated_at||deal.created_at)>=14)return 'No movement in 14+ days';
            if(getQualification(deal).band==='thin'&&(STAGE_ORDER[deal.stage]||0)>=2)return 'Qualification too thin for stage';
            return '';
        }

        function getRecoveryMoves(deals){
            return deals.filter(function(d){return !!getRecoveryReason(d);}).slice(0,3).map(function(d){
                return {
                    id:d.id,
                    account:d.accountName||'Unnamed deal',
                    reason:getRecoveryReason(d),
                    move:!d.nextStep?'Add a dated next step now.'
                        : isOverdue(d.nextStepDate)?'Reset the thread and get the next step re-anchored.'
                        : getQualification(d).band==='thin'?'Fill champion / EB / process before pushing the stage.'
                        :'Re-open the account and force a real status check.'
                };
            });
        }

        function getDealRecoveryCauseId(reason){
            if(reason==='No dated next step')return'no_nextstep';
            if(reason==='Next step overdue')return'next_step_overdue';
            if(reason==='No movement in 14+ days')return'stage_stuck';
            if(reason==='Qualification too thin for stage')return'truth_debt';
            return'';
        }

        function filterDeals(deals){

                var isClosed=d.stage==='closed-won'||d.stage==='closed-lost';
                if(f==='active')return !isClosed;
                if(f==='closed')return isClosed;
                if(f==='at-risk'){
                    if(isClosed)return false;
                    var stale=daysBetween(d.updated_at||d.created_at)>=7;
                    var noNext=!d.nextStepDate;
                    var overdueClose=d.closeDate&&isOverdue(d.closeDate);
                    return stale||noNext||overdueClose;
                }
                if(f==='stalled'){
                    if(isClosed)return false;
                    return daysBetween(d.updated_at||d.created_at)>=7;
                }
                if(f==='this-quarter'){
                    return !isClosed&&isThisQuarter(d.closeDate);
                }
                return true;
            });

        function getDealPressureScore(deal){
            var qual=getQualification(deal);
            var recoveryReason=getRecoveryReason(deal);
            var stale=daysBetween(deal.updated_at||deal.created_at);
            var score=Number(deal.value||0)/1000;
            if(recoveryReason==='No dated next step')score+=220;
            else if(recoveryReason==='Next step overdue')score+=180;
            else if(recoveryReason==='Qualification too thin for stage')score+=160;
            else if(recoveryReason==='No movement in 14+ days')score+=120;
            if(qual.band==='thin')score+=90;
            else if(qual.band==='workable')score+=40;
            if(!deal.champion)score+=32;
            if(threadingDepth(deal).engaged<2)score+=24;
            score+=Math.min(stale,60);
            return score;
        }

        function getRailTokens(deal){
            var qual=getQualification(deal);
            var recoveryReason=getRecoveryReason(deal);
            var stale=daysBetween(deal.updated_at||deal.created_at);
            var riskToken='Tracked';
            if(recoveryReason==='No dated next step')riskToken='No next step';
            else if(recoveryReason==='Next step overdue')riskToken='Overdue';
            else if(recoveryReason==='Qualification too thin for stage')riskToken='Stage drift';
            else if(recoveryReason==='No movement in 14+ days')riskToken='Stalled';
            else if(qual.band==='thin')riskToken='Thin qual';

            var proofToken=qual.band==='strong'?'Proof locked':qual.band==='workable'?'Proof workable':'Proof thin';
            var motionToken=deal.nextStepDate
                ? (isOverdue(deal.nextStepDate)?'Late move':computeMomentum(deal)==='strong'?'Live move':stale+'d stale')
                : 'Undated';

            return [riskToken,proofToken,motionToken];
        }

        function getRailNarrative(deal){
            var qual=getQualification(deal);
            var recoveryReason=getRecoveryReason(deal);
            if(recoveryReason==='No dated next step')return'Add a dated next step before trusting this stage.';
            if(recoveryReason==='Next step overdue')return'Reset the thread and re-anchor the next move immediately.';
            if(recoveryReason==='Qualification too thin for stage')return'Fill champion, buyer, and process before letting the board promote this case.';
            if(recoveryReason==='No movement in 14+ days')return'This case has gone quiet long enough to distort the board.';
            if(qual.band==='thin')return'Qualification is still softer than the stage story being told here.';
            if(computeMomentum(deal)==='strong')return'There is live movement here, but it still needs disciplined follow-through.';
            return'Keep the next move dated and the board stays believable.';
        }

        function renderInterventionTicket(deal,lane){
            var tokens=getRailTokens(deal);
            var tone=getRailTone(deal);
            var matched=signalConsoleAccounts.find(function(a){return a.name&&deal.accountName&&a.name.toLowerCase()===deal.accountName.toLowerCase();});
            var autopsyHref=buildDealRoomHref('/app/future-autopsy/?deal='+encodeURIComponent(deal.id),deal.accountName,'Future Autopsy');
            var signalHref=matched?buildDealRoomHref('/app/signal-console/',deal.accountName,'Signal Console'):'';
            var actionLabel=lane==='Now'?'Recover now':lane==='Next'?'Stress-test':'Review';
            return '<article class="dw-rail-ticket">'+
                '<div class="dw-rail-ticket-edge '+escH(tone)+'"></div>'+
                '<div class="dw-rail-ticket-main">'+
                    '<div class="dw-rail-ticket-top">'+
                        '<div>'+
                            '<div class="dw-rail-ticket-name">'+escH(deal.accountName||'Unnamed deal')+'</div>'+
                            '<div class="dw-rail-ticket-detail">'+tokens.map(function(token){return '<span>'+escH(token)+'</span>';}).join('')+'</div>'+
                        '</div>'+
                        '<div class="dw-rail-ticket-value">'+escH(fmtN(deal.value||0))+'</div>'+
                    '</div>'+
                    '<div class="dw-rail-ticket-copy">'+escH(getRailNarrative(deal))+'</div>'+
                    '<div class="dw-rail-ticket-actions">'+

                        '<button class="dw-rail-ticket-ghost" type="button" data-dw-action="edit-deal" data-deal-id="'+escH(deal.id)+'">Edit deal</button>'+
                        (signalHref?'<a class="dw-rail-ticket-link" href="'+signalHref+'">Signal console</a>':'')+
                    '</div>'+
                '</div>'+
            '</article>';
        }

        function renderReserveTag(deal){
            var qual=getQualification(deal);
            var recoveryReason=getRecoveryReason(deal);
            var label='Reserve';
            if(recoveryReason==='No dated next step')label='No next step';
            else if(recoveryReason==='Next step overdue')label='Late move';
            else if(recoveryReason==='Qualification too thin for stage'||qual.band==='thin')label='Thin proof';
            else if(recoveryReason==='No movement in 14+ days')label='Stalled';
            else if(computeMomentum(deal)==='strong')label='Live';
            else label=STAGE_LABELS[deal.stage]||'Reserve';
            return '<button class="dw-reserve-tag" type="button" data-dw-action="edit-deal" data-deal-id="'+escH(deal.id)+'"><span>'+escH(label)+'</span>'+escH(deal.accountName||'Unnamed deal')+'</button>';
        }

        function renderInterventionRail(deals,allDeals){
            var filterControl=document.getElementById('viewFilter');
            var currentFilter=filterControl?filterControl.value:'all';
            var activePool=deals.filter(function(deal){return deal.stage!=='closed-won'&&deal.stage!=='closed-lost';});
            var sourcePool=(activePool.length?activePool:deals).slice().sort(function(a,b){return getDealPressureScore(b)-getDealPressureScore(a);});
            var now=sourcePool.filter(function(deal){return !!getRecoveryReason(deal);}).slice(0,2);
            if(!now.length&&sourcePool.length)now=sourcePool.slice(0,1);
            var usedIds=new Set(now.map(function(deal){return String(deal.id);}));
            var next=sourcePool.filter(function(deal){return !usedIds.has(String(deal.id));}).slice(0,1);
            next.forEach(function(deal){usedIds.add(String(deal.id));});
            var reserve=deals.filter(function(deal){return !usedIds.has(String(deal.id));}).sort(function(a,b){return getDealPressureScore(b)-getDealPressureScore(a);});
            var reserveVisible=reserve.slice(0,6);
            var reserveHidden=Math.max(0,reserve.length-reserveVisible.length);
            var filteredPipeline=activePool.reduce(function(sum,deal){return sum+Number(deal.value||0);},0);

            return '<section class="dw-rail-shell">'+
                '<div class="dw-rail-header">'+
                    '<div class="dw-rail-header-main">'+
                        '<div class="dw-rail-kicker">Board control</div>'+
                        '<div class="dw-rail-title">Intervention rail</div>'+
                        '<div class="dw-rail-copy">Only the cases that can change the week.</div>'+
                    '</div>'+
                    '<div class="dw-rail-readouts">'+
                        '<div class="dw-rail-pill"><span>Filter</span>'+escH(getFilterLabel(currentFilter))+'</div>'+
                        '<div class="dw-rail-pill"><span>Active</span>'+escH(String(now.length+next.length))+'</div>'+
                        '<div class="dw-rail-pill"><span>Bench</span>'+escH(String(reserve.length))+'</div>'+
                        '<div class="dw-rail-pill"><span>Pipeline</span>'+escH(fmtN(filteredPipeline))+'</div>'+
                    '</div>'+
                '</div>'+
                '<div class="dw-rail-layout">'+
                    '<div class="dw-rail-lane">'+
                        '<div class="dw-rail-lane-label">'+
                            '<div class="dw-rail-lane-state">Now</div>'+
                            '<div class="dw-rail-lane-copy">Fix now.</div>'+
                        '</div>'+
                        '<div class="dw-ticket-stack">'+
                            (now.length?now.map(function(deal){return renderInterventionTicket(deal,'Now');}).join(''):'<div class="dw-rail-empty">No case is currently demanding immediate intervention under this filter.</div>')+
                        '</div>'+
                    '</div>'+
                    '<div class="dw-rail-lane">'+
                        '<div class="dw-rail-lane-label">'+
                            '<div class="dw-rail-lane-state">Next</div>'+
                            '<div class="dw-rail-lane-copy">Second priority.</div>'+
                        '</div>'+
                        '<div class="dw-ticket-stack">'+
                            (next.length?next.map(function(deal){return renderInterventionTicket(deal,'Next');}).join(''):'<div class="dw-rail-empty">No secondary case has earned the next slot yet.</div>')+
                        '</div>'+
                    '</div>'+
                    '<div class="dw-rail-lane">'+
                        '<div class="dw-rail-lane-label">'+
                            '<div class="dw-rail-lane-state">Keep honest</div>'+
                            '<div class="dw-rail-lane-copy">Visible reserve.</div>'+
                        '</div>'+
                        '<div class="dw-rail-reserve">'+
                            reserveVisible.map(function(deal){return renderReserveTag(deal);}).join('')+
                            (reserveHidden?'<button class="dw-reserve-tag" type="button" data-dw-action="show-all"><span>More</span>+'+escH(String(reserveHidden))+' in reserve</button>':'')+
                        '</div>'+
                    '</div>'+
                '</div>'+
            '</section>';
        }

                if(d.pain)intelHtml+='<div class="dw-intel-section"><div class="dw-intel-label">Pain Points</div><div class="dw-intel-value">'+escH(d.pain)+'</div></div>';

                        intelHtml+='<div style="font-size:0.78rem;color:var(--text-secondary);padding:3px 0;">'+(s.engaged?'\u2713':'\u25cb')+' '+escH(s.name||'')+' <span style="color:var(--text-muted);">'+escH(ROLE_LABELS[s.role]||s.role||'')+(s.title?' \u2022 '+escH(s.title):'')+'</span></div>';
                    });

                if(d.lossNotes)intelHtml+='<div class="dw-intel-section"><div class="dw-intel-label">Loss Notes</div><div class="dw-intel-value">'+escH(d.lossNotes)+'</div></div>';
                intelHtml+='<button type="button" class="dw-intel-edit" data-dw-action="edit-deal" data-deal-id="'+escH(d.id)+'">Edit deal &rarr;</button></div>';

                // Card meta row: stage + risk indicator (simplified for card face)
                var metaHtml='<div class="dw-card-meta">';

                metaHtml+='</div>';

                // Detail row — visible only when card is expanded (moved from card face)

                    detailHtml+='<div style="font-size:0.72rem;margin-bottom:6px;"><span class="dw-card-forecast '+d.forecastCategory+'">'+escH(d.forecastCategory==='bestCase'?'Best Case':d.forecastCategory.charAt(0).toUpperCase()+d.forecastCategory.slice(1))+'</span></div>';

                detailHtml+='</div>';

                return '<div class="dw-card'+(isClosed?' closed':'')+'" data-id="'+d.id+'">'+
                    '<div class="dw-card-head"><div class="dw-card-name-row">'+(mom?'<span class="dw-momentum '+mom+'"></span>':'')+
                    '<div class="dw-card-name">'+escH(d.accountName||'Unnamed')+'</div></div>'+
                    '<div class="dw-card-value">'+fmtN(d.value||0)+'</div></div>'+

        window.toggleCard=function(el){el.classList.toggle('expanded');var det=el.querySelector('.dw-card-detail');if(det)det.style.display=det.style.display==='none'?'block':'none';};

        function bindDealWorkspaceUi(){
            if(document.body.__dwUiBound)return;
            document.body.__dwUiBound=true;

            document.addEventListener('click',function(event){
                var modalActionNode=event.target.closest('[data-dw-modal-action]');
                if(modalActionNode){
                    var modalAction=modalActionNode.getAttribute('data-dw-modal-action');
                    if(modalAction==='close'){
                        closeModal();
                        return;
                    }
                    if(modalAction==='save'){
                        saveDeal();
                        return;
                    }
                    if(modalAction==='delete'){
                        deleteDeal();
                        return;
                    }
                }

                var lossActionNode=event.target.closest('[data-dw-loss-action]');
                if(lossActionNode){
                    var lossAction=lossActionNode.getAttribute('data-dw-loss-action');
                    if(lossAction==='skip'){
                        skipLossReason();
                        return;
                    }
                    if(lossAction==='save'){
                        saveLossReason();
                        return;
                    }
                }

                var actionNode=event.target.closest('[data-dw-action]');
                if(actionNode){
                    var action=actionNode.getAttribute('data-dw-action');
                    var dealId=actionNode.getAttribute('data-deal-id');
                    if(action==='queue'){
                        setDealWorkspaceFilter('at-risk',{scrollToGrid:actionNode.getAttribute('data-dw-scroll')==='1'});
                        return;
                    }
                    if(action==='new-deal'){
                        openModal();
                        return;
                    }
                    if(action==='edit-deal'){
                        openModal(dealId);
                        return;
                    }
                    if(action==='show-all'){
                        setDealWorkspaceFilter('all');
                        return;
                    }
                    if(action==='add-stakeholder'){
                        addStakeholder();
                        return;
                    }
                    if(action==='remove-stakeholder'){
                        removeStakeholder(Number(actionNode.getAttribute('data-sh-index')));
                        return;
                    }
                }

                var lossOptionNode=event.target.closest('.dw-loss-option[data-loss-option]');
                if(lossOptionNode){
                    syncLossOptionSelection(lossOptionNode.getAttribute('data-loss-option')||'');
                    return;
                }

                var cardNode=event.target.closest('.dw-card[data-id]');
                if(cardNode){
                    if(event.target.closest('a,button,input,select,textarea,label'))return;
                    window.toggleCard(cardNode);
                }
            });

            document.addEventListener('change',function(event){
                if(event.target&&event.target.matches('#viewFilter[data-dw-filter]')){
                    render();
                    return;
                }
                if(event.target&&event.target.matches('[data-sh-field][data-sh-index]')){
                    var field=event.target.getAttribute('data-sh-field');
                    var index=Number(event.target.getAttribute('data-sh-index'));
                    var value=field==='engaged'?!!event.target.checked:event.target.value;
                    updateStakeholderField(index,field,value);
                    return;
                }
                if(event.target&&event.target.matches('input[name="lossReason"]')){
                    syncLossOptionSelection(event.target.value||'');
                }
            });

            document.addEventListener('input',function(event){
                if(event.target&&event.target.id==='mValue'){
                    fmtC(event.target);
                }
            });
        }

        function renderStakeholders(){

        function addStakeholder(){
            var usedRoles=new Set(tempStakeholders.map(function(s){return s.role;}));
            var nextRole=ROLES.find(function(r){return !usedRoles.has(r);})||'champion';
            tempStakeholders.push({name:'',title:'',role:nextRole,engaged:false});
            renderStakeholders();
        }
        function updateStakeholderField(i,field,val){
            if(tempStakeholders[i])tempStakeholders[i][field]=val;
            renderStakeholders();
        }
        function removeStakeholder(i){
            tempStakeholders.splice(i,1);
            renderStakeholders();
        }

        // --- Open modal ---
        window.openModal=function(dealId){
            document.getElementById('dealModal').classList.add('active');
            var d=dealId?loadDeals().find(function(x){return x.id===dealId;}):null;
            document.getElementById('modalTitle').textContent=d?'Edit Deal':'New Deal';
            document.getElementById('createGuide').innerHTML=d
                ? '<strong>Good review means:</strong> keep the stage honest, keep the next step dated, and keep qualification stronger than the forecast category.'
                : '<strong>Good deal record means:</strong> account, value, stage, next step, and the first qualification truth. Do not leave this as a name-only shell.';
            document.getElementById('editId').value=d?d.id:'';
            document.getElementById('editPrevStage').value=d?d.stage||'prospect':'';
            document.getElementById('mAccount').value=d?d.accountName||'':'';
            document.getElementById('mValue').value=d?Number(d.value||0).toLocaleString():'';
            document.getElementById('mStage').value=d?d.stage||'prospect':'prospect';
            document.getElementById('mNext').value=d?d.nextStep||'':'';
            document.getElementById('mNextDate').value=d?d.nextStepDate||'':'';
            document.getElementById('mClose').value=d?d.closeDate||'':'';
            document.getElementById('mForecast').value=d?d.forecastCategory||'pipeline':'pipeline';
            document.getElementById('mMomentum').value=d?d.momentum||'':'';
            document.getElementById('mChamp').value=d?d.champion||'':'';
            document.getElementById('mEB').value=d?d.economicBuyer||'':'';
            document.getElementById('mUseCase').value=d?d.useCase||'':'';
            document.getElementById('mPain').value=d?d.pain||'':'';
            document.getElementById('mComp').value=d?d.competition||'':'';
            document.getElementById('mProcess').value=d?d.decisionProcess||'':'';
            document.getElementById('mNotes').value=d?d.notes||'':'';
            document.getElementById('deleteBtn').style.display=d?'inline-block':'none';
            tempStakeholders=d&&d.stakeholders?JSON.parse(JSON.stringify(d.stakeholders)):[];
            renderStakeholders();
            if(!d){
                applyStageDefaults(true);
            }
        };

        window.closeModal=function(){document.getElementById('dealModal').classList.remove('active');};
        document.getElementById('dealModal').addEventListener('click',function(e){if(e.target===this)closeModal();});

        // --- Pending loss reason state ---
        var pendingLossDealId=null;

        function syncLossOptionSelection(selectedValue){
            document.querySelectorAll('.dw-loss-option').forEach(function(option){
                var matches=option.getAttribute('data-loss-option')===selectedValue;
                option.classList.toggle('selected',!!matches);
                var input=option.querySelector('input[name="lossReason"]');
                if(input)input.checked=!!matches;
            });
        }

        window.saveDeal=async function(){
            var account=document.getElementById('mAccount').value.trim();
            if(!account){alert('Account name is required.');return;}
            var deals=loadDeals();
            var editId=document.getElementById('editId').value;
            var prevStage=document.getElementById('editPrevStage').value;
            var deal=editId?deals.find(function(d){return d.id===editId;}):null;
            var isNew=!deal;
            if(isNew){deal={id:uid(),created_at:new Date().toISOString()};deals.push(deal);}

            deal.accountName=account;
            deal.value=Number((document.getElementById('mValue').value||'0').replace(/[^0-9]/g,''));
            var newStage=document.getElementById('mStage').value;
            deal.nextStep=document.getElementById('mNext').value.trim();
            deal.nextStepDate=document.getElementById('mNextDate').value;
            deal.closeDate=document.getElementById('mClose').value;
            deal.forecastCategory=document.getElementById('mForecast').value;
            deal.momentum=document.getElementById('mMomentum').value;
            deal.champion=document.getElementById('mChamp').value.trim();
            deal.economicBuyer=document.getElementById('mEB').value.trim();
            deal.useCase=document.getElementById('mUseCase').value.trim();
            deal.pain=document.getElementById('mPain').value.trim();
            deal.competition=document.getElementById('mComp').value.trim();
            deal.decisionProcess=document.getElementById('mProcess').value.trim();
            deal.notes=document.getElementById('mNotes').value.trim();
            deal.stakeholders=tempStakeholders.filter(function(s){return s.name||s.role;});
            deal.updated_at=new Date().toISOString();
            if(!deal.nextStep)deal.nextStep=suggestNextStepByStage(newStage);
            if(!deal.nextStepDate&&newStage!=='closed-won'&&newStage!=='closed-lost'){
                var suggested=new Date();
                suggested.setDate(suggested.getDate()+(newStage==='prospect'?3:newStage==='discovery'?4:newStage==='evaluation'?5:newStage==='poc'?7:5));
                deal.nextStepDate=suggested.toISOString().slice(0,10);
            }
            if(!deal.closeDate&&newStage!=='closed-won'&&newStage!=='closed-lost'){
                var close=new Date();
                close.setDate(close.getDate()+(newStage==='prospect'?45:newStage==='discovery'?35:newStage==='evaluation'?28:newStage==='poc'?21:newStage==='negotiation'?14:7));
                deal.closeDate=close.toISOString().slice(0,10);
            }

            // Stage change tracking
            if(prevStage&&prevStage!==newStage){
                logStageChange(deal.id,prevStage,newStage);
            } else if(isNew&&newStage!=='prospect'){
                logStageChange(deal.id,'',newStage);
            }
            deal.stage=newStage;
            deal.stageHistory=(getStageHistory()[deal.id]||[]).slice();

            saveDeals(deals);

            if(window.gtmPersistence&&window.gtmPersistence.deals&&typeof window.gtmPersistence.deals.save==='function'){
                var saved=await window.gtmPersistence.deals.save(deal);
                if(saved&&saved.error){
                    console.error('Deal cloud save failed:',saved.error);
                    alert('Cloud save failed: '+((saved.error&&saved.error.message)||'Unknown error'));
                    return;
                }
            }

            closeModal();

            // If closed-lost and no loss reason yet, show loss modal
            if(newStage==='closed-lost'&&prevStage!=='closed-lost'&&!deal.lossReason){
                pendingLossDealId=deal.id;
                document.getElementById('lossModal').classList.add('active');
                syncLossOptionSelection('');
                document.getElementById('lossNotes').value='';
            }

            render();
        };

        window.saveLossReason=async function(){
            var selected=document.querySelector('input[name="lossReason"]:checked');
            if(!selected){alert('Please select a reason.');return;}
            var deals=loadDeals();
            var deal=deals.find(function(d){return d.id===pendingLossDealId;});
            if(deal){
                deal.lossReason=selected.value;
                deal.lossNotes=document.getElementById('lossNotes').value.trim();
                saveDeals(deals);
                if(window.gtmPersistence&&window.gtmPersistence.deals&&typeof window.gtmPersistence.deals.save==='function'){
                    deal.stageHistory=(getStageHistory()[deal.id]||[]).slice();
                    var saved=await window.gtmPersistence.deals.save(deal);
                    if(saved&&saved.error){
                        console.error('Loss reason sync failed:',saved.error);
                        alert('Cloud save failed: '+((saved.error&&saved.error.message)||'Unknown error'));
                        return;
                    }
                }
            }
            document.getElementById('lossModal').classList.remove('active');
            pendingLossDealId=null;
            render();
        };

        window.skipLossReason=function(){
            document.getElementById('lossModal').classList.remove('active');
            pendingLossDealId=null;
        };

        window.deleteDeal=async function(){
            if(!confirm('Delete this deal?'))return;
            var editId=document.getElementById('editId').value;
            var deals=loadDeals().filter(function(d){return d.id!==editId;});
            saveDeals(deals);
            if(window.gtmPersistence&&window.gtmPersistence.deals&&typeof window.gtmPersistence.deals.remove==='function'){
                var removed=await window.gtmPersistence.deals.remove(editId);
                if(removed&&removed.error){
                    console.error('Deal delete failed:',removed.error);
                    alert('Delete failed: '+((removed.error&&removed.error.message)||'Unknown error'));
                    return;
                }
            }
            closeModal();
            render();
        };

        // URL param: pre-open a deal
        var urlDeal=new URLSearchParams(window.location.search).get('deal');
        bindDealWorkspaceUi();
        function showDealWorkspaceBootState(kind,title,text){
            if(!window.gtmModuleBootState)return;
            window.gtmModuleBootState.show('#dwBootState',{
                kind:kind,
                title:title,
                text:text,
                retryLabel:'Retry Deal Workspace',
                retryAction:'retryDealWorkspaceBoot'
            });
        }
        function clearDealWorkspaceBootState(){
            if(window.gtmModuleBootState)window.gtmModuleBootState.clear('#dwBootState');
        }
        function onDealWorkspaceBootFailure(error){
            console.error('Deal Workspace boot failed:',error);
            document.getElementById('dwBridge').innerHTML='';
            document.getElementById('recoveryPanel').innerHTML='';
            document.getElementById('dealGrid').innerHTML='';
            document.getElementById('dealEmpty').innerHTML='';
            showDealWorkspaceBootState(
                'error',
                'Deal Workspace could not load.',
                'Antaeus failed while rebuilding your deals or syncing account context. Retry once. If it fails again, refresh the page and check whether your synced deal data or current auth session is unhealthy.'
            );
        }
        window.retryDealWorkspaceBoot=function(){
            bootDealWorkspace().catch(onDealWorkspaceBootFailure);
        };
        async function bootDealWorkspace(){
            showDealWorkspaceBootState(
                'loading',
                'Loading Deal Workspace',
                'Pulling deals and connected account context before the board comes online.'
            );
            document.getElementById('dwBridge').innerHTML='';
            document.getElementById('recoveryPanel').innerHTML='';
            await syncSignalConsoleAccounts();
            await syncDealsFromCloud();
            clearDealWorkspaceBootState();
            render();
            if(urlDeal){openModal(urlDeal);}
        }

        document.getElementById('mStage').addEventListener('change',function(){
            if(!document.getElementById('editId').value)applyStageDefaults(false);
        });

        if(window.__gtmosAuthGatePending&&window.requireAuthReady&&typeof window.requireAuthReady.then==='function'){
            window.requireAuthReady.then(bootDealWorkspace).catch(onDealWorkspaceBootFailure);
        }else if(window.__gtmosAuthGatePending){
            showDealWorkspaceBootState(
                'loading',
                'Waiting for auth',
                'Deal Workspace is waiting for your authenticated workspace before it rebuilds the current board.'
            );
            window.addEventListener('gtmos:auth-ready',function(){bootDealWorkspace().catch(onDealWorkspaceBootFailure);},{once:true});
        }else{
            bootDealWorkspace().catch(onDealWorkspaceBootFailure);
        }
    })();
    </script>
</body>
</html>
