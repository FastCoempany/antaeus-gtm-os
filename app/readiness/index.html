<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="robots" content="noindex" />
<meta http-equiv="refresh" content="0; url=/dashboard/?readiness=1" />
<title>Redirecting to /dashboard/</title>
<link rel="canonical" href="/dashboard/" />
<script>
// Phase 5.A Wave 4: the legacy Readiness Score room was retired and
// rebuilt as an overlay drawer anchored on the Dashboard topbar
// (canon §4.17). Old bookmarks + emailed links land on the Dashboard;
// the ?readiness=1 hint is reserved for the boot to auto-open the
// drawer (wire-up follows in a focused PR if needed).
(function () {
  try {
    var qs = window.location.search || "";
    var sep = qs ? qs + "&" : "?";
    var hash = window.location.hash || "";
    window.location.replace("/dashboard/" + sep + "readiness=1" + hash);
  } catch (e) {
    /* meta-refresh handles the fallback */
  }
})();
</script>
</head>
<body>
<p>Redirecting to <a href="/dashboard/?readiness=1">the Dashboard</a>.</p>
</body>
</html>
