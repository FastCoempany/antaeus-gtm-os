<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Readiness Score | Antaeus GTM OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <style>
        .hero-score-wrap { text-align:center; padding:40px 0 32px; }
        .hero-ring { width:140px; height:140px; margin:0 auto 16px; position:relative; }
        .hero-ring svg { transform:rotate(-90deg); }
        .hero-ring-val { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--font-serif); font-size:2.8rem; color:var(--text-primary); }
        .hero-verdict { font-size:1rem; color:var(--text-tertiary); margin-bottom:8px; }
        .hero-sub { font-size:0.8rem; color:var(--text-muted); max-width:500px; margin:0 auto; }
        .score-story { display:grid; grid-template-columns:1.05fr 0.95fr; gap:16px; margin-bottom:28px; }
        .story-card { background:var(--bg-secondary); border:1px solid var(--border-default); border-radius:var(--radius-lg); padding:18px 20px; }
        .story-kicker { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--brand-gold); font-weight:700; margin-bottom:10px; }
        .story-title { font-family:var(--font-serif); font-size:1.28rem; color:var(--text-primary); margin:0 0 8px; }
        .story-copy { font-size:0.82rem; color:var(--text-tertiary); line-height:1.55; margin:0; }
        .story-meta { display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; }
        .story-chip { display:inline-flex; align-items:center; padding:6px 10px; border-radius:999px; border:1px solid rgba(212,165,116,0.16); background:rgba(212,165,116,0.06); color:var(--brand-gold); font-size:0.72rem; font-weight:700; }
        .story-chip.good { color:#22c55e; border-color:rgba(34,197,94,0.22); background:rgba(34,197,94,0.08); }
        .story-chip.warn { color:#f59e0b; border-color:rgba(245,158,11,0.22); background:rgba(245,158,11,0.08); }
        .story-chip.bad { color:#ef4444; border-color:rgba(239,68,68,0.22); background:rgba(239,68,68,0.08); }
        .story-list { display:flex; flex-direction:column; gap:10px; margin-top:12px; }
        .story-row { display:flex; justify-content:space-between; gap:12px; padding:10px 12px; border-radius:var(--radius-md); background:rgba(255,255,255,0.03); border:1px solid var(--border-default); }
        .story-row strong { color:var(--text-primary); font-size:0.82rem; display:block; margin-bottom:3px; }
        .story-row span { color:var(--text-muted); font-size:0.74rem; line-height:1.45; display:block; }
        .story-row em { color:var(--brand-gold); font-style:normal; font-size:0.72rem; font-weight:700; white-space:nowrap; align-self:flex-start; }
        .actions-title { font-size:0.75rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--brand-gold); font-weight:700; margin:32px 0 16px; display:flex; align-items:center; gap:8px; }
        .action-card { display:flex; gap:16px; align-items:flex-start; padding:16px 20px; background:var(--bg-secondary); border:1px solid var(--border-default); border-radius:var(--radius-lg); margin-bottom:10px; transition:all 0.2s; }
        .action-card:hover { border-color:var(--border-hover); }
        .action-card.done { opacity:0.5; border-color:rgba(34,197,94,0.3); }
        .action-card.done .action-check { background:rgba(34,197,94,0.2); color:#22c55e; }
        .action-check { width:32px; height:32px; border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:0.85rem; background:rgba(255,255,255,0.04); color:var(--text-muted); }
        .action-body { flex:1; }
        .action-label { font-weight:600; font-size:0.9rem; color:var(--text-primary); margin-bottom:2px; }
        .action-desc { font-size:0.8rem; color:var(--text-muted); line-height:1.4; }
        .action-link { display:inline-block; margin-top:6px; font-size:0.78rem; color:var(--brand-gold); text-decoration:none; font-weight:600; }
        .action-link:hover { text-decoration:underline; }
        .action-pts { font-family:var(--font-serif); font-size:0.85rem; color:var(--brand-gold); font-weight:700; white-space:nowrap; }
        .action-meta { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
        .action-tag { display:inline-flex; align-items:center; padding:4px 8px; border-radius:999px; background:rgba(255,255,255,0.04); color:var(--text-muted); font-size:0.68rem; font-weight:700; letter-spacing:0.03em; }
        .dim-section { margin-top:32px; }
        .dim-section-title { font-size:0.75rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); font-weight:700; padding:8px 0; margin-bottom:4px; }
        .dim-bar-wrap { border-bottom:1px solid rgba(255,255,255,0.04); padding:8px 0; }
        .dim-bar { display:flex; align-items:center; gap:12px; cursor:pointer; }
        .dim-label { font-size:0.82rem; color:var(--text-secondary); width:120px; flex-shrink:0; font-weight:600; display:flex; align-items:center; gap:4px; }
        .dim-track { flex:1; height:6px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
        .dim-fill { height:100%; border-radius:3px; transition:width 0.4s ease; }
        .dim-score { font-size:0.78rem; color:var(--text-muted); width:50px; text-align:right; }
        .dim-help { color:var(--text-muted); font-size:0.62rem; opacity:0.5; font-weight:700; background:rgba(255,255,255,0.05); width:14px; height:14px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; }
        .dim-bar:hover .dim-help { opacity:1; color:var(--brand-gold); background:rgba(212,165,116,0.1); }
        .dim-breakdown { display:none; padding:6px 0 6px 132px; }
        .dim-breakdown.open { display:block; }
        .dim-crit { display:flex; justify-content:space-between; padding:2px 0; font-size:0.7rem; }
        .dim-crit-label { color:var(--text-muted); display:flex; align-items:center; gap:4px; }
        .dim-crit-check { font-size:0.65rem; }
        .dim-crit-check.met { color:#22c55e; }
        .dim-crit-check.unmet { color:var(--text-muted); opacity:0.4; }
        .dim-crit-pts { font-weight:600; font-size:0.65rem; }
        .dim-crit-pts.met { color:#22c55e; }
        .dim-crit-pts.unmet { color:var(--text-muted); opacity:0.4; }
        .readiness-first-fold{margin-bottom:var(--space-lg);padding:18px;border:1px solid rgba(255,255,255,0.06);border-radius:16px;background:linear-gradient(180deg, rgba(18,24,42,0.96) 0%, rgba(12,18,33,0.98) 100%);box-shadow:0 22px 44px rgba(0,0,0,0.14);}
        .readiness-first-fold #readinessShellBand{margin-bottom:16px;}
        .readiness-first-fold .hero-score-wrap{padding:28px 0 24px;}
        .readiness-first-fold .score-story{margin-bottom:0;}
        .readiness-first-fold #readinessSystemHealth{margin-top:16px;}
        @media(max-width:900px){ .score-story{grid-template-columns:1fr;} }
        @media(max-width:700px){ .readiness-first-fold{padding:14px;} }
    </style>
</head>
<body class="room-wave2 room-readiness">
        <script src="/js/app-auth-preflight.js"></script>
<div class="app-container">
        <aside class="app-sidebar">
            <script src="/js/analytics-site-config.js"></script>
    <script src="/js/analytics.js"></script>
            <script src="/js/data-manager.js"></script>
            <script src="/js/nav.js"></script>
        </aside>
        <main class="app-main">
            <header class="app-header module-header">
                <div class="module-header-title">
                    <div class="shell-header-meta">
                        <span class="shell-header-kicker">System family</span>
                        <span class="shell-header-state state-ready">Hiring readiness</span>
                    </div>
                    <h1 class="page-title">Readiness Score</h1>
                    <p class="page-subtitle">Measure whether the system is really ready for the first sales hire instead of relying on founder confidence or isolated wins.</p>
                </div>
            </header>
            <div class="app-content" style="max-width:680px;">
                <section class="readiness-first-fold">
                <div id="readinessShellBand"></div>
                <div class="hero-score-wrap" id="heroWrap"></div>
                <div class="score-story" id="scoreStory"></div>
                <div id="readinessSystemHealth"></div>
                </section>
                <div class="actions-title">Highest-impact moves to improve your score</div>
                <div id="actionsList"></div>
                <div class="dim-section">
                    <div class="dim-section-title">Score breakdown — click any dimension to see criteria</div>
                    <div id="dimBreakdown"></div>
                </div>
                <div id="hireReadiness"></div>
            </div>
        </main>
    </div>
    <script src="/js/deal-health.js"></script>
    <script src="/js/proof-layer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-config.js"></script>
    <script src="/js/require-auth.js"></script>
<script>
    (async function(){
        function readLS(k,fb){try{return JSON.parse(localStorage.getItem(k))||fb}catch(e){return fb}}
        async function syncSignalConsoleState(){
            if(window.gtmPersistence&&window.gtmPersistence.signalConsole&&typeof window.gtmPersistence.signalConsole.load==='function'){
                var loaded=await window.gtmPersistence.signalConsole.load();
                if(loaded&&loaded.error)console.error('Signal Console load failed:',loaded.error);
                if(loaded&&loaded.data)return loaded.data;
            }
            return readLS('gtmos_sc_v4',{accounts:[]});
        }

        if(window.__gtmosAuthGatePending&&window.requireAuthReady&&typeof window.requireAuthReady.then==='function'){
            try{await window.requireAuthReady;}catch(e){}
        }

        // ══════════════════════════════════════════════════════
        // DATA READS
        // ══════════════════════════════════════════════════════
        var playbook=readLS('gtmos_playbook',{});
        var thinIcp=readLS('gtmos_icp_analytics',{icps:[],totalWorked:0});
        var seed=readLS('gtmos_outbound_seed',{});
        var disco=readLS('gtmos_discovery_stats',{totalCalls:0,advancedCalls:0});
        var agenda=readLS('gtmos_discovery_agenda',{});
        var angles=readLS('gtmos_angles',[]);
        var allDeals=readLS('gtmos_deal_workspaces',[]);
        if(!Array.isArray(allDeals))allDeals=Object.values(allDeals||{});
        var scData=await syncSignalConsoleState();
        var scAccounts=(scData.accounts||[]).length;
        // NEW reads — Phase A
        var autopsyLog=readLS('gtmos_autopsy_log_v1',[]);
        var discoveryWorked=readLS('gtmos_discovery_worked',{});
        var stageHistory=readLS('gtmos_deal_stage_history',{});
        var outboundTouches=readLS('gtmos_outbound_touches',{touches:[]});
        var coldCallLog=readLS('gtmos_cold_call_log',{calls:[]});
        var linkedinLog=readLS('gtmos_linkedin_log',{actions:[]});
        var advisorRegistry=readLS('gtmos_advisor_registry',{advisors:[]});
        var advisorDeps=readLS('gtmos_advisor_deployments',{deployments:[]});
        var handoffExport=readLS('gtmos_handoff_exported',null);
        var pocData=readLS('gtmos_poc_data',{pocs:[]});             // D3: PoC Framework

        // ══════════════════════════════════════════════════════
        // COMPUTED VALUES
        // ══════════════════════════════════════════════════════
        var icpCount=(thinIcp.icps||[]).length;
        var activeDeals=allDeals.filter(function(d){return d&&d.stage!=='closed-won'&&d.stage!=='closed-lost'});
        var wins=0,losses=0,hasLossReasons=false;
        allDeals.forEach(function(d){if(d&&d.stage==='closed-won')wins++;if(d&&d.stage==='closed-lost'){losses++;if(d.lossReason)hasLossReasons=true;}});

        // A2: Discovery worked moves
        var workedMoveCount=0,workedTerritorySet={};
        if(typeof discoveryWorked==='object'&&discoveryWorked!==null){
            Object.keys(discoveryWorked).forEach(function(k){
                var v=discoveryWorked[k];
                if(v===true||v==='true'){workedMoveCount++;var parts=k.split('_');if(parts.length>1)workedTerritorySet[parts[0]]=true;}
                else if(typeof v==='object'&&v!==null){Object.keys(v).forEach(function(mk){if(v[mk]){workedMoveCount++;var parts=mk.split('_');if(parts.length>1)workedTerritorySet[parts[0]]=true;}})}
            });
        }
        var workedTerritoryCount=Object.keys(workedTerritorySet).length;

        // A3: Avg cycle time
        var hasStageVelocity=false,avgCycleDays=null;
        var closedWonDeals=allDeals.filter(function(d){return d&&d.stage==='closed-won'});
        if(closedWonDeals.length>0){
            var cycleTimes=[];
            closedWonDeals.forEach(function(d){
                var h=stageHistory[d.id]||[];
                if(Array.isArray(h)&&h.length>=2){
                    var f=new Date(h[0].date||h[0].ts||h[0].timestamp);
                    var l=new Date(h[h.length-1].date||h[h.length-1].ts||h[h.length-1].timestamp);
                    if(!isNaN(f)&&!isNaN(l)){var dd=Math.round((l-f)/86400000);if(dd>0)cycleTimes.push(dd);}
                }
                if(cycleTimes.length===0&&d.created_at){
                    var c=new Date(d.created_at),u=new Date(d.updated_at||d.closedDate||Date.now());
                    if(!isNaN(c)&&!isNaN(u)){var dd2=Math.round((u-c)/86400000);if(dd2>0)cycleTimes.push(dd2);}
                }
            });
            if(cycleTimes.length>0){hasStageVelocity=true;avgCycleDays=Math.round(cycleTimes.reduce(function(a,b){return a+b},0)/cycleTimes.length);}
        }

        // A4: Avg stakeholder threading
        var avgThreading=0;
        if(activeDeals.length>0){
            var totalEng=0;
            activeDeals.forEach(function(d){var s=d.stakeholders||[];totalEng+=s.filter(function(x){return x&&(x.engaged||x.status==='engaged')}).length});
            avgThreading=Math.round(totalEng/activeDeals.length*10)/10;
        }

        // A5: Outbound aggregates
        var touchCount=(outboundTouches.touches||[]).length;
        var touchReplied=(outboundTouches.touches||[]).filter(function(t){return t.outcome==='replied'||t.outcome==='meeting_booked'}).length;
        var touchResponseRate=touchCount>0?Math.round(touchReplied/touchCount*100):0;
        var coldCallCount=(coldCallLog.calls||[]).length;
        var linkedinCount=(linkedinLog.actions||[]).length;
        var channelsUsed=0;
        if(touchCount>0)channelsUsed++;if(coldCallCount>0)channelsUsed++;if(linkedinCount>0)channelsUsed++;
        var angleReplies=angles.filter(function(a){return a&&a.payload&&a.payload.got_reply}).length;

        // A6: Advisor aggregates
        var advisorCount=(advisorRegistry.advisors||[]).length;
        var depCount=(advisorDeps.deployments||[]).length;

        // A1: Autopsy count
        var autopsyRuns=Array.isArray(autopsyLog)?autopsyLog.length:typeof autopsyLog==='object'&&autopsyLog!==null?Object.keys(autopsyLog).length:0;

        // D3: PoC aggregates
        var pocPocs=(pocData.pocs||[]);
        var pocCount=pocPocs.length;
        var pocConverted=pocPocs.filter(function(p){return p.outcome==='converted'}).length;
        var pocHasOutcomes=pocPocs.some(function(p){return p.outcome==='converted'||p.outcome==='not_converted'});

        // Playbook fields/checks
        var pbFields=0;
        Object.values(playbook.fields||{}).forEach(function(v){if(typeof v==='string'&&v.trim())pbFields++});
        var pbChecks=playbook.checks?Object.values(playbook.checks).filter(Boolean).length:0;

        // Coverage
        var covRatio=0;
        if(window.dealHealth&&seed.annual_quota){covRatio=window.dealHealth.computeCoverage(allDeals,Number(seed.annual_quota)).ratio||0;}

        // ══════════════════════════════════════════════════════
        // DIMENSION SCORING — REBALANCED WITH CRITERIA TRACKING
        // ══════════════════════════════════════════════════════
        var dims=[
            {name:'ICP',score:0,max:20,color:'#06b6d4',criteria:[]},
            {name:'Discovery',score:0,max:20,color:'#3b82f6',criteria:[]},
            {name:'Outreach',score:0,max:20,color:'#a855f7',criteria:[]},
            {name:'Deals',score:0,max:20,color:'#22c55e',criteria:[]},
            {name:'Playbook',score:0,max:20,color:'#f59e0b',criteria:[]}
        ];
        var dimMeta={
            ICP:{module:'ICP Studio',link:'/app/icp-studio/',explain:'Your targeting wedge and who the team should actually sell to.'},
            Discovery:{module:'Discovery Studio',link:'/app/discovery-studio/',explain:'Proof that calls are creating pattern recognition instead of founder improvisation.'},
            Outreach:{module:'Outbound Studio',link:'/app/outbound-studio/',explain:'The volume, channels, and responses needed to make pipeline creation believable.'},
            Deals:{module:'Deal Workspace',link:'/app/deal-workspace/',explain:'Whether pipeline, stage movement, and closed-loop learning are real yet.'},
            Playbook:{module:'Playbook',link:'/app/founding-gtm/',explain:'How systematized the motion is for the next hire, not just the founder.'}
        };
        function aw(dim,pts,label,met){if(met)dims[dim].score+=pts;dims[dim].criteria.push({label:label,pts:pts,met:met})}

        // ICP (20)
        aw(0,5,'1+ ICP profile created',icpCount>=1);
        aw(0,3,'3+ ICP profiles',icpCount>=3);
        aw(0,3,'ICP profiles worked in live calls',(thinIcp.totalWorked||0)>0);
        aw(0,3,'Company + ACV set in Playbook',!!(playbook.company&&playbook.acv));
        aw(0,3,'5+ Signal Console accounts',scAccounts>=5);
        aw(0,3,'10+ Signal Console accounts',scAccounts>=10);
        dims[0].score=Math.min(20,dims[0].score);

        // Discovery (20) — A2 added
        aw(1,3,'1+ discovery call logged',disco.totalCalls>=1);
        aw(1,2,'5+ discovery calls',disco.totalCalls>=5);
        aw(1,2,'10+ discovery calls',disco.totalCalls>=10);
        var advRate=disco.totalCalls>0?Math.round((disco.advancedCalls||0)/disco.totalCalls*100):0;
        aw(1,3,'Advance rate \u226530%',advRate>=30);
        var gates=(agenda.gates||[]).filter(Boolean).length;
        aw(1,2,'2+ qualification gates checked',gates>=2);
        aw(1,2,'All 4 gates checked',gates===4);
        aw(1,2,'5+ discovery moves worked',workedMoveCount>=5);
        aw(1,2,'Moves across 2+ territories',workedTerritoryCount>=2);
        dims[1].score=Math.min(20,dims[1].score);

        // Outreach (20) — A5 added
        aw(2,3,'Quota set',!!seed.annual_quota);
        aw(2,2,'1+ outbound angle saved',angles.length>=1);
        aw(2,1,'5+ angles',angles.length>=5);
        aw(2,2,'Replies tracked',angleReplies>0||touchReplied>0);
        aw(2,2,'Signal Console accounts 3+',scAccounts>=3);
        aw(2,2,'10+ outbound touches logged',touchCount>=10);
        aw(2,2,'Response rate \u226510%',touchResponseRate>=10);
        aw(2,2,'2+ outbound channels used',channelsUsed>=2);
        aw(2,2,'5+ cold calls logged',coldCallCount>=5);
        dims[2].score=Math.min(20,dims[2].score);

        // Deals (20) — A1, A3, A4, A6 added
        aw(3,2,'1+ active deal',activeDeals.length>=1);
        aw(3,2,'3+ active deals',activeDeals.length>=3);
        aw(3,2,'1+ closed deal',(wins+losses)>=1);
        aw(3,1,'3+ closed deals',(wins+losses)>=3);
        aw(3,1,'Both wins and losses',wins>0&&losses>0);
        aw(3,1,'Loss reasons captured',hasLossReasons);
        aw(3,2,'Coverage \u22653\u00d7',covRatio>=3);
        aw(3,1,'Coverage \u22654\u00d7',covRatio>=4);
        aw(3,2,'Stage velocity documented',hasStageVelocity);
        aw(3,2,'Avg \u22652 engaged stakeholders/deal',avgThreading>=2);
        aw(3,1,'1+ Future Autopsy run',autopsyRuns>=1);
        aw(3,1,'3+ autopsies',autopsyRuns>=3);
        // D3: PoC outcomes
        aw(3,1,'PoC with outcome tracked',pocHasOutcomes);
        dims[3].score=Math.min(20,dims[3].score);

        // Playbook (20) — A7, A8
        aw(4,2,'Company name set',!!playbook.company);
        aw(4,2,'ACV set',!!playbook.acv);
        aw(4,1,'Stage set',!!playbook.stage);
        aw(4,3,'3+ fields populated',pbFields>=3);
        aw(4,2,'6+ fields',pbFields>=6);
        aw(4,2,'10+ fields',pbFields>=10);
        aw(4,2,'2+ checks completed',pbChecks>=2);
        aw(4,2,'Notes substantive (100+ chars)',!!(playbook.notes&&String(playbook.notes).trim().length>100));
        aw(4,2,'Handoff Kit exported',!!handoffExport);
        dims[4].score=Math.min(20,dims[4].score);

        // ══════════════════════════════════════════════════════
        // TOTAL
        // ══════════════════════════════════════════════════════
        var total=dims.reduce(function(s,d){return s+d.score},0);
        total=Math.min(100,total);
        var sortedDims=dims.slice().sort(function(a,b){return b.score-a.score;});
        var strongestDim=sortedDims[0];
        var weakestDim=sortedDims[sortedDims.length-1];
        var topMisses=[];
        dims.forEach(function(d){
            d.criteria.filter(function(c){return !c.met;}).forEach(function(c){
                topMisses.push({dimension:d.name,module:dimMeta[d.name].module,link:dimMeta[d.name].link,label:c.label,pts:c.pts});
            });
        });
        topMisses.sort(function(a,b){return b.pts-a.pts;});
        var momentumDims=dims.filter(function(d){return d.score>=14;}).length;
        var scoreTone=total>=80?'good':total>=55?'warn':'bad';
        var scoreSummary='The score rises only when live evidence lands across ICP, discovery, outbound, deals, and playbook. Right now '+momentumDims+' of 5 dimensions are carrying real weight. '+weakestDim.name+' is the main drag on the system.';

        // Hero ring
        var circ=2*Math.PI*58;
        var offset=circ-(total/100)*circ;
        var color=total>=80?'#22c55e':total>=50?'#3b82f6':total>=25?'#2dd4bf':'#64748b';
        var verdict=total>=80?'Ready to hand off':total>=50?'Hire-ready with guardrails':total>=25?'Building, not ready':'You are the sales system';
        if(window.gtmShellChrome){
            window.gtmShellChrome.applyHeader({
                family:'System',
                stateLabel:verdict,
                stateTone:total>=80?'live':total>=50?'ready':'risk'
            });
            window.gtmShellChrome.renderCommandBand('#readinessShellBand',{
                kicker:'Readiness verdict',
                title:'How close the system is to handing real revenue work to the next hire.',
                copy:'This score only rises when live evidence lands across ICP, discovery, outreach, deals, and the handoff kit. It should tell you what is strong, what is weak, and what unlock changes the number fastest.',
                stateLabel:verdict,
                stateTone:total>=80?'live':total>=50?'ready':'risk',
                metrics:[
                    {label:'Score',value:total+'/100'},
                    {label:'Strongest dimension',value:strongestDim.name+' '+strongestDim.score+'/'+strongestDim.max},
                    {label:'Weakest dimension',value:weakestDim.name+' '+weakestDim.score+'/'+weakestDim.max},
                    {label:'Top unlock',value:topMisses[0]?topMisses[0].label:'Keep selling and refining'}
                ],
                actions:[
                    {label:'Open '+(topMisses[0]?topMisses[0].module:'Playbook'),action:'location.href=\"'+(topMisses[0]?topMisses[0].link:'/app/founding-gtm/')+'\"',tone:'primary'}
                ]
            });
        }

        var heroWrap=document.getElementById('heroWrap');
        heroWrap.className='shell-stack';
        heroWrap.innerHTML=
            '<section class="anchor-stage">'+
                '<div class="anchor-stage-grid">'+
                    '<div>'+
                        '<div class="anchor-eyebrow">Hire-readiness verdict</div>'+
                        '<div class="anchor-headline anchor-headline--wide">'+verdict+'</div>'+
                        '<div class="anchor-support">'+scoreSummary+'</div>'+
                        '<div class="anchor-chip-row">'+
                            '<span class="anchor-chip">'+total+'/100 readiness</span>'+
                            '<span class="anchor-chip">Strongest: '+strongestDim.name+'</span>'+
                            '<span class="anchor-chip">Weakest: '+weakestDim.name+'</span>'+
                        '</div>'+
                        '<div class="anchor-primary-card">'+
                            '<div class="anchor-primary-label">Top unlock</div>'+
                            '<div class="anchor-primary-title">'+(topMisses[0]?topMisses[0].label:'Keep compounding the system')+'</div>'+
                            '<div class="anchor-primary-copy">'+(topMisses[0]?topMisses[0].dimension+' is leaving points on the table. Fix this inside '+topMisses[0].module+'.':'The system is carrying real weight now. Keep pressure-testing the live path.')+'</div>'+
                            '<div class="anchor-primary-actions">'+
                                '<a class="btn btn-primary" href="'+(topMisses[0]?topMisses[0].link:'/app/founding-gtm/')+'">Open '+(topMisses[0]?topMisses[0].module:'Playbook')+'</a>'+
                            '</div>'+
                        '</div>'+
                    '</div>'+
                    '<div class="anchor-mini-grid">'+
                        '<div class="anchor-mini-card"><div class="anchor-mini-label">Readiness score</div><div class="hero-ring"><svg width="140" height="140" viewBox="0 0 140 140"><circle cx="70" cy="70" r="58" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8"/><circle cx="70" cy="70" r="58" fill="none" stroke="'+color+'" stroke-width="8" stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'"/></svg><div class="hero-ring-val">'+total+'</div></div><div class="anchor-mini-copy">Computed from live module evidence only.</div></div>'+
                        '<div class="anchor-mini-card"><div class="anchor-mini-label">Strongest dimension</div><div class="anchor-mini-value anchor-mini-value--sans">'+strongestDim.name+' '+strongestDim.score+'/'+strongestDim.max+'</div><div class="anchor-mini-copy">This is the part of the system carrying the most real proof right now.</div></div>'+
                        '<div class="anchor-mini-card"><div class="anchor-mini-label">Weakest dimension</div><div class="anchor-mini-value anchor-mini-value--sans">'+weakestDim.name+' '+weakestDim.score+'/'+weakestDim.max+'</div><div class="anchor-mini-copy">This is the main drag on the score and the handoff confidence.</div></div>'+
                        '<div class="anchor-mini-card"><div class="anchor-mini-label">Operating rule</div><div class="anchor-mini-value anchor-mini-value--sans">Live evidence beats theory</div><div class="anchor-mini-copy">The score should move when the real operating system improves, not when copy gets prettier.</div></div>'+
                    '</div>'+
                '</div>'+
            '</section>';

        document.getElementById('scoreStory').innerHTML=
            '<section class="shell-section shell-section--compact">'+
                '<div class="shell-section-header"><div class="shell-section-heading"><div class="shell-section-kicker">Biggest unlocks</div><div class="shell-section-title">What changes this score fastest.</div><div class="shell-section-copy">Do the highest-leverage moves first. Readiness should be driven by better live behavior, not more internal explanation.</div></div></div>'+
                '<div class="anchor-queue">'+
                    topMisses.slice(0,3).map(function(m,index){
                        return '<div class="anchor-queue-card"><div class="anchor-queue-top"><div class="anchor-queue-rank">'+(index+1)+'</div><div><div class="anchor-queue-title">'+m.label+'</div><div class="anchor-queue-copy">'+m.dimension+' is leaving points on the table. Fix this inside '+m.module+'.</div></div></div><div class="anchor-queue-meta"><span>+'+m.pts+' pts</span><span>'+m.dimension+'</span></div><div class="anchor-queue-actions"><a class="btn '+(index===0?'btn-primary':'btn-secondary')+'" href="'+m.link+'">Open '+m.module+'</a></div></div>';
                    }).join('')+
                '</div>'+
            '</section>';

        // ══════════════════════════════════════════════════════
        // ACTIONS — all unmet criteria + linked module actions, sorted by pts
        // ══════════════════════════════════════════════════════
        (function renderReadinessSystemHealth(){
            var node=document.getElementById('readinessSystemHealth');
            if(!node)return;
            var compounded=[];
            var weakLinks=[];
            var proofCount=wins + (handoffExport?1:0) + (advisorCount>=1&&depCount>=1?1:0);

            if(momentumDims>=3){
                compounded.push('<div class="workspace-health-item"><strong>Multiple dimensions are carrying real weight.</strong> '+momentumDims+' of 5 readiness dimensions are now backed by live evidence instead of founder confidence alone.</div>');
            }
            if(strongestDim){
                compounded.push('<div class="workspace-health-item"><strong>'+strongestDim.name+' is acting as the current proof anchor.</strong> This is the part of the operating system that already behaves most like something a new hire could inherit.</div>');
            }
            if(!compounded.length){
                compounded.push('<div class="workspace-health-item"><strong>The system has an early proof base.</strong> The score is still fragile, but the room can already show what is carrying real weight and what is still too early.</div>');
            }

            if(weakestDim){
                weakLinks.push('<div class="workspace-health-item"><strong>'+weakestDim.name+' is still the main drag on handoff confidence.</strong> Until it improves, the system will keep depending on founder interpretation too heavily.</div>');
            }
            if(topMisses[0]){
                weakLinks.push('<div class="workspace-health-item"><strong>The top unlock is still unresolved.</strong> '+topMisses[0].label+' is the fastest way to change the readiness posture from here.</div>');
            }
            if(!weakLinks.length){
                weakLinks.push('<div class="workspace-health-item"><strong>No single fragility is dominating the score.</strong> Keep compounding the operating system, but the handoff logic is behaving credibly right now.</div>');
            }

            node.innerHTML=
                '<section class="shell-section shell-section--compact workspace-health">'+
                    '<div class="shell-section-header">'+
                        '<div class="shell-section-heading">'+
                            '<div class="shell-section-kicker">System health</div>'+
                            '<div class="shell-section-title">See what is carrying the system and what is still fragile.</div>'+
                            '<div class="shell-section-copy workspace-health-copy">Readiness should reveal whether the system can be inherited, not just whether the score looks better than last week.</div>'+
                        '</div>'+
                    '</div>'+
                    '<div class="workspace-health-metrics">'+
                        '<div class="workspace-health-metric"><div class="workspace-health-label">System posture</div><div class="workspace-health-value workspace-health-value--sans">'+verdict+'</div><div class="workspace-health-subcopy">'+total+'/100 readiness</div></div>'+
                        '<div class="workspace-health-metric"><div class="workspace-health-label">Dimensions live</div><div class="workspace-health-value">'+momentumDims+'/5</div><div class="workspace-health-subcopy">Dimensions carrying real operating evidence.</div></div>'+
                        '<div class="workspace-health-metric"><div class="workspace-health-label">Top drag</div><div class="workspace-health-value workspace-health-value--sans">'+(weakestDim?weakestDim.name:'None')+'</div><div class="workspace-health-subcopy">Main source of handoff fragility right now.</div></div>'+
                        '<div class="workspace-health-metric"><div class="workspace-health-label">Reference proof</div><div class="workspace-health-value">'+proofCount+'</div><div class="workspace-health-subcopy">'+wins+' won, '+(handoffExport?1:0)+' exported, '+((advisorCount>=1&&depCount>=1)?1:0)+' advisor loop.</div></div>'+
                    '</div>'+
                    '<div class="workspace-health-grid">'+
                        '<div class="workspace-health-panel"><div class="workspace-health-panel-title">Carrying the system</div><div class="workspace-health-list">'+compounded.slice(0,2).join('')+'</div></div>'+
                        '<div class="workspace-health-panel"><div class="workspace-health-panel-title">Still fragile</div><div class="workspace-health-list">'+weakLinks.slice(0,2).join('')+'</div></div>'+
                    '</div>'+
                '</section>';
        })();

        var actions=[];
        // Module-linked actions (with deep links)
        if(icpCount===0)actions.push({pts:5,label:'Add your first ICP profile',desc:'Define who you sell to.',link:'/app/icp-studio/',lt:'ICP Studio'});
        else if(icpCount<3)actions.push({pts:3,label:'Add '+(3-icpCount)+' more ICP profiles',desc:'Multiple ICPs unlock comparison.',link:'/app/icp-studio/',lt:'ICP Studio'});
        if(!seed.annual_quota)actions.push({pts:3,label:'Set your quota and deal size',desc:'Powers all pipeline math.',link:'/app/quota-workback/',lt:'Quota Workback'});
        if(scAccounts<5)actions.push({pts:3,label:'Add '+(5-scAccounts)+' Signal Console accounts',desc:'Account intelligence layer.',link:'/app/signal-console/',lt:'Signal Console'});
        if(disco.totalCalls===0)actions.push({pts:3,label:'Log a discovery call',desc:'Patterns emerge after 5+.',link:'/app/discovery-studio/',lt:'Discovery Studio'});
        if(activeDeals.length===0)actions.push({pts:2,label:'Create your first deal',desc:'Pipeline tracking starts here.',link:'/app/deal-workspace/',lt:'Deal Workspace'});
        if(touchCount===0)actions.push({pts:2,label:'Log outbound touches',desc:'Track volume and response rates.',link:'/app/outbound-studio/',lt:'Outbound Studio'});
        if(coldCallCount===0)actions.push({pts:2,label:'Log cold calls',desc:'Make call activity visible.',link:'/app/cold-call-studio/',lt:'Cold Call Studio'});
        if(autopsyRuns===0)actions.push({pts:1,label:'Run a Future Autopsy',desc:'Pipeline rigor earns Deals points.',link:'/app/future-autopsy/',lt:'Future Autopsy'});
        if(advisorCount===0)actions.push({pts:1,label:'Register an advisor',desc:'Track advisory relationships.',link:'/app/advisor-deploy/',lt:'Advisor Deploy'});
        if(!handoffExport)actions.push({pts:2,label:'Export the Handoff Kit',desc:'Strongest hire-readiness signal.',link:'/app/founding-gtm/',lt:'Playbook'});
        if(workedMoveCount<5)actions.push({pts:2,label:'Work '+(5-workedMoveCount)+' more discovery moves',desc:'Practice techniques in live calls.',link:'/app/discovery-studio/',lt:'Discovery Studio'});
        if(channelsUsed<2)actions.push({pts:2,label:'Use a 2nd outbound channel',desc:'Email + call or LinkedIn.',link:'/app/outbound-studio/',lt:'Outbound Studio'});
        // Hire readiness big-ticket items
        if(wins<2)actions.push({pts:12,label:'Close '+(2-wins)+' more deal'+(wins===1?'':'s'),desc:'+12 to Hire Readiness. Referenceable logos.',link:'/app/deal-workspace/',lt:'Deal Workspace'});
        if(channelsUsed<2||touchCount<5)actions.push({pts:10,label:'Build multi-channel outbound',desc:'+10 to Hire Readiness. 2+ channels, 5+ touches.',link:'/app/outbound-studio/',lt:'Outbound Studio'});

        actions.sort(function(a,b){return b.pts-a.pts});
        // Dedupe
        var seen={};actions=actions.filter(function(a){if(seen[a.label])return false;seen[a.label]=true;return true});

        if(actions.length>0){
            document.getElementById('actionsList').innerHTML=actions.slice(0,7).map(function(a){
                return '<div class="action-card"><div class="action-check">\u25CB</div><div class="action-body"><div class="action-label">'+a.label+'</div><div class="action-desc">'+a.desc+'</div><div class="action-meta"><span class="action-tag">'+a.lt+'</span><span class="action-tag">Score unlock +'+a.pts+'</span></div>'+(a.link?'<a class="action-link" href="'+a.link+'">'+a.lt+' \u2192</a>':'')+'</div><div class="action-pts">+'+a.pts+'</div></div>';
            }).join('');
        } else {
            document.getElementById('actionsList').innerHTML='<div class="action-card done"><div class="action-check">\u2713</div><div class="action-body"><div class="action-label" style="color:#22c55e;">All core actions complete</div><div class="action-desc">Keep selling and refining.</div></div></div>';
        }

        // ══════════════════════════════════════════════════════
        // DIMENSION BARS WITH BREAKDOWN (A9)
        // ══════════════════════════════════════════════════════
        var dh='';
        dims.forEach(function(d,i){
            var pct=Math.round(d.score/d.max*100);
            dh+='<div class="dim-bar-wrap"><div class="dim-bar" onclick="toggleDB('+i+')"><div class="dim-label">'+d.name+' <span class="dim-help">?</span></div><div class="dim-track"><div class="dim-fill" style="width:'+pct+'%;background:'+d.color+'"></div></div><div class="dim-score">'+d.score+'/'+d.max+'</div></div>';
            dh+='<div class="dim-breakdown" id="db'+i+'">';
            d.criteria.forEach(function(c){
                dh+='<div class="dim-crit"><span class="dim-crit-label"><span class="dim-crit-check '+(c.met?'met':'unmet')+'">'+(c.met?'\u2713':'\u25cb')+'</span> '+c.label+'</span><span class="dim-crit-pts '+(c.met?'met':'unmet')+'">'+(c.met?'+'+c.pts:'0')+'/'+c.pts+'</span></div>';
            });
            dh+='</div></div>';
        });
        document.getElementById('dimBreakdown').innerHTML=dh;
        window.toggleDB=function(i){var e=document.getElementById('db'+i);if(e)e.classList.toggle('open')};

        // ══════════════════════════════════════════════════════
        // HIRE READINESS — REBALANCED + NEW CRITERIA
        // ══════════════════════════════════════════════════════
        if(window.dealHealth){
            var hs=0,hc=[];
            function ha(pts,label,met){if(met)hs+=pts;hc.push({text:label+(met?'':' (+'+pts+')'),done:met,pts:pts})}

            ha(12,'2+ closed-won deals (referenceable logos)',wins>=2);
            var lp=window.dealHealth.lossPatterns(window.dealHealth.loadAllVitals());
            ha(10,'Documented loss patterns (3+ analyzed)',!!(lp&&lp.total>=3));
            ha(10,'Pipeline coverage \u22653\u00d7',covRatio>=3);
            var pbSec=0;if(playbook.company)pbSec++;if(playbook.acv)pbSec++;if(pbFields>=3)pbSec++;if(pbChecks>=2)pbSec++;
            ha(8,'Playbook 3+ populated sections',pbSec>=3);
            ha(8,'3+ ICP profiles',icpCount>=3);
            ha(5,'3+ discovery calls logged',disco.totalCalls>=3);
            var perf=window.dealHealth.performanceMetrics(window.dealHealth.loadAllVitals());
            ha(5,'Win rate data exists'+(perf.winRate!==null?' ('+perf.winRate+'%)':''),perf.winRate!==null);
            ha(10,'Multi-channel outbound with data',channelsUsed>=2&&touchCount>=5);
            ha(5,'Quota + ACV benchmarks set',!!(seed.annual_quota&&seed.acv_band));
            ha(5,'Playbook notes substantive',!!(playbook.notes&&String(playbook.notes).trim().length>100));
            ha(5,'Avg deal cycle documented'+(avgCycleDays!==null?' ('+avgCycleDays+'d)':''),hasStageVelocity);
            ha(5,'Stakeholder threading \u22653/deal',avgThreading>=3);
            ha(5,'Handoff Kit exported',!!handoffExport);
            ha(5,'Advisor relationships deployed',advisorCount>=1&&depCount>=1);
            ha(2,'Future Autopsy discipline (3+ runs)',autopsyRuns>=3);
            // D3: PoC conversion
            ha(3,'PoC conversion documented',pocHasOutcomes&&pocConverted>=1);

            hs=Math.min(100,hs);
            var hcol=hs>=80?'#22c55e':hs>=50?'#3b82f6':hs>=25?'#f59e0b':'#64748b';
            var hv=hs>=80?'Ready to hire. The playbook is documented, the pipeline is real, and the process is repeatable.':hs>=50?'Close, but gaps remain. A new hire would need heavy founder support in the first 90 days.':hs>=25?'Not ready. The founder is still the sales system. Document what\u2019s working before hiring.':'Too early. Close more deals and build the playbook first.';

            var hh='<div style="margin-top:var(--space-xl);border-top:1px solid var(--border-default);padding-top:var(--space-lg);">';
            hh+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;"><div style="font-family:var(--font-serif);font-size:1.8rem;color:'+hcol+';">'+hs+'</div><div><div style="font-weight:700;font-size:0.85rem;color:var(--text-primary);">Hire Readiness</div><div style="font-size:0.78rem;color:var(--text-muted);">Can you hand this off to a new GTM hire?</div></div></div>';
            hh+='<div style="font-size:0.82rem;color:var(--text-tertiary);margin-bottom:16px;line-height:1.5;">'+hv+'</div>';
            // Sort: unmet by pts desc first, then met
            hc.sort(function(a,b){if(a.done===b.done)return b.pts-a.pts;return a.done?1:-1});
            hc.forEach(function(c){
                hh+='<div style="display:flex;gap:8px;align-items:flex-start;padding:5px 0;font-size:0.82rem;"><span style="color:'+(c.done?'#22c55e':'var(--text-muted)')+';flex-shrink:0;">'+(c.done?'\u2713':'\u25cb')+'</span><span style="color:'+(c.done?'var(--text-secondary)':'var(--text-muted)')+';">'+c.text+'</span></div>';
            });
            hh+='</div>';
            document.getElementById('hireReadiness').innerHTML=hh;
        }

        var readinessSnapshot={
            score:total,
            verdict:verdict,
            strongestDimension:strongestDim?strongestDim.name:null,
            weakestDimension:weakestDim?weakestDim.name:null,
            dimensions:dims.map(function(d){
                return {
                    name:d.name,
                    score:d.score,
                    max:d.max,
                    met:d.criteria.filter(function(c){return c.met;}).length,
                    unmet:d.criteria.filter(function(c){return !c.met;}).length
                };
            }),
            topActions:actions.slice(0,5).map(function(a){
                return {label:a.label, pts:a.pts, module:a.lt, link:a.link||''};
            }),
            updatedAt:new Date().toISOString()
        };
        localStorage.setItem('gtmos_readiness_snapshot',JSON.stringify(readinessSnapshot));
        if(window.gtmPersistence&&window.gtmPersistence.docs&&typeof window.gtmPersistence.docs.save==='function'){
            window.gtmPersistence.docs.save('gtmos_readiness_snapshot',readinessSnapshot).catch(function(error){
                console.error('Readiness snapshot sync failed:',error);
            });
        }
    })();
    </script>
</body>
</html>
