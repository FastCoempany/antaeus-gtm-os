<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Planner | Antaeus GTM OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@400;500;600;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <style>
        .cp-search{display:flex;gap:12px;margin-bottom:var(--space-xl);align-items:flex-end;}
        #plannerShellBand{margin-bottom:var(--space-lg);}
        .cp-search-field{flex:1;}
        .cp-search-field label{display:block;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-secondary);margin-bottom:6px;}
        .cp-search-field input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid var(--border-default);border-radius:var(--radius-lg);color:var(--text-primary);font-size:1rem;font-family:inherit;}
        .cp-search-field input:focus{outline:none;border-color:var(--brand-gold);}
        .cp-persona-pick{display:flex;gap:6px;flex-wrap:wrap;}
        .cp-persona-btn{padding:8px 14px;border-radius:var(--radius-full);font-size:0.78rem;font-weight:600;border:1px solid var(--border-default);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.2s;}
        .cp-persona-btn:hover{border-color:var(--border-hover);color:var(--text-secondary);}
        .cp-persona-btn.active{border-color:var(--brand-gold);color:var(--brand-gold);background:rgba(212,165,116,0.08);}
        .cp-bridge{background:linear-gradient(135deg, rgba(212,165,116,0.12), rgba(59,130,246,0.05));border:1px solid rgba(212,165,116,0.18);border-radius:var(--radius-xl);padding:22px;margin-bottom:var(--space-lg);}
        .cp-bridge-k{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--brand-gold);font-weight:700;margin-bottom:8px;}
        .cp-bridge-title{font-size:1.12rem;font-weight:700;color:var(--text-primary);margin-bottom:6px;}
        .cp-bridge-copy{font-size:0.88rem;color:var(--text-tertiary);line-height:1.6;margin-bottom:16px;}
        .cp-bridge-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;}
        .cp-bridge-block{padding:14px 16px;border-radius:var(--radius-lg);background:rgba(6,10,18,0.28);border:1px solid rgba(255,255,255,0.06);}
        .cp-bridge-label{font-size:0.64rem;text-transform:uppercase;letter-spacing:0.45px;color:var(--text-muted);font-weight:700;margin-bottom:7px;}
        .cp-bridge-value{font-size:0.82rem;color:var(--text-secondary);line-height:1.55;}
        .cp-quality{background:var(--bg-secondary);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:var(--space-md);}
        .cp-quality-top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap;margin-bottom:12px;}
        .cp-quality-head{display:flex;flex-direction:column;gap:4px;}
        .cp-quality-k{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:700;}
        .cp-quality-title{font-size:1rem;font-weight:700;color:var(--text-primary);}
        .cp-quality-copy{font-size:0.84rem;color:var(--text-tertiary);line-height:1.55;max-width:520px;}
        .cp-band{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius-full);font-size:0.76rem;font-weight:700;border:1px solid rgba(255,255,255,0.08);}
        .cp-band.credible{background:rgba(34,197,94,0.1);color:#4ade80;border-color:rgba(34,197,94,0.24);}
        .cp-band.workable{background:rgba(245,158,11,0.1);color:#fbbf24;border-color:rgba(245,158,11,0.24);}
        .cp-band.thin{background:rgba(239,68,68,0.1);color:#f87171;border-color:rgba(239,68,68,0.24);}
        .cp-gates{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:12px;}
        .cp-gate{padding:12px 14px;border-radius:var(--radius-md);border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);}
        .cp-gate.met{border-color:rgba(34,197,94,0.22);background:rgba(34,197,94,0.07);}
        .cp-gate-miss{border-color:rgba(239,68,68,0.18);background:rgba(239,68,68,0.05);}
        .cp-gate-title{font-size:0.8rem;font-weight:700;color:var(--text-secondary);margin-bottom:4px;}
        .cp-gate-copy{font-size:0.77rem;color:var(--text-muted);line-height:1.5;}
        .cp-next{font-size:0.82rem;color:var(--brand-gold);font-weight:600;}
        .cp-agenda{display:none;animation:fadeUp 0.3s ease;}
        .cp-agenda.visible{display:block;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .cp-context{background:var(--bg-secondary);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:20px;margin-bottom:var(--space-md);}
        .cp-context-title{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--brand-gold);font-weight:700;margin-bottom:10px;}
        .cp-context-row{display:flex;gap:16px;flex-wrap:wrap;}
        .cp-context-item{font-size:0.82rem;color:var(--text-tertiary);}
        .cp-context-item strong{color:var(--text-secondary);}
        .cp-signal-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:var(--radius-full);font-size:0.7rem;font-weight:600;background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.2);margin-top:8px;}
        .cp-section{background:var(--bg-secondary);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:20px;margin-bottom:var(--space-md);}
        .cp-section-title{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
        .cp-section-title .num{width:20px;height:20px;border-radius:50%;background:rgba(212,165,116,0.15);color:var(--brand-gold);display:inline-flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;}
        .cp-question{padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.88rem;color:var(--text-secondary);line-height:1.5;}
        .cp-question:last-child{border-bottom:none;}
        .cp-question em{color:var(--text-muted);font-size:0.78rem;}
        .cp-opener{font-size:0.9rem;color:var(--text-primary);line-height:1.5;padding:12px 16px;background:rgba(212,165,116,0.06);border:1px solid rgba(212,165,116,0.15);border-radius:var(--radius-md);}
        .cp-outcome{display:flex;gap:10px;margin-top:var(--space-lg);}
        .cp-outcome-btn{flex:1;padding:14px;border-radius:var(--radius-lg);font-weight:700;font-size:0.85rem;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s;}
        .cp-outcome-btn.advance{background:rgba(34,197,94,0.12);color:#22c55e;border:1px solid rgba(34,197,94,0.3);}
        .cp-outcome-btn.advance:hover{background:rgba(34,197,94,0.2);}
        .cp-outcome-btn.noadvance{background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.2);}
        .cp-outcome-btn.noshow{background:rgba(100,116,139,0.1);color:#94a3b8;border:1px solid rgba(100,116,139,0.2);}
        .cp-customize summary{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);cursor:pointer;font-weight:700;padding:12px 0;}
        .cp-customize .cp-field{margin-bottom:12px;}
        .cp-customize .cp-field label{display:block;font-size:0.72rem;font-weight:600;color:var(--text-secondary);margin-bottom:4px;}
        .cp-customize .cp-field input,.cp-customize .cp-field textarea{width:100%;padding:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border-default);border-radius:8px;color:var(--text-primary);font-size:0.85rem;font-family:inherit;}
        .cp-customize .cp-field textarea{min-height:60px;resize:vertical;}
        .cp-handoff{background:var(--bg-secondary);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:var(--space-md);}
        .cp-handoff-head{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--brand-gold);font-weight:700;margin-bottom:8px;}
        .cp-handoff-title{font-size:0.96rem;font-weight:700;color:var(--text-primary);margin-bottom:6px;}
        .cp-handoff-copy{font-size:0.82rem;color:var(--text-tertiary);line-height:1.55;margin-bottom:14px;}
        .cp-handoff-actions{display:flex;gap:10px;flex-wrap:wrap;}
        .cp-handoff-btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:var(--radius-full);border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);font:inherit;font-size:0.78rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
        .cp-handoff-btn:hover{border-color:var(--border-hover);}
        .cp-handoff-btn.primary{background:rgba(212,165,116,0.12);border-color:rgba(212,165,116,0.24);color:var(--brand-gold);}
        .cp-boot-state{display:none;margin-bottom:var(--space-md);padding:16px 18px;border-radius:var(--radius-lg);border:1px solid var(--border-default);background:var(--bg-secondary);}
        .cp-boot-state.visible{display:block;}
        .cp-boot-state.loading{border-color:rgba(59,130,246,0.25);background:rgba(59,130,246,0.05);}
        .cp-boot-state.error{border-color:rgba(239,68,68,0.28);background:rgba(239,68,68,0.05);}
        .cp-boot-eyebrow{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;font-weight:700;color:var(--text-muted);margin-bottom:8px;}
        .cp-boot-state.loading .cp-boot-eyebrow{color:#60a5fa;}
        .cp-boot-state.error .cp-boot-eyebrow{color:#f87171;}
        .cp-boot-title{font-size:0.95rem;font-weight:700;color:var(--text-primary);margin-bottom:6px;}
        .cp-boot-text{font-size:0.84rem;color:var(--text-tertiary);line-height:1.6;}
        .cp-boot-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
        .cp-boot-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-full);border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);font:inherit;font-size:0.76rem;font-weight:700;cursor:pointer;}
        .cp-boot-btn:hover{border-color:var(--border-hover);}
        .cp-first-fold{margin-bottom:var(--space-lg);padding:18px;border:1px solid rgba(255,255,255,0.06);border-radius:16px;background:linear-gradient(180deg, rgba(18,24,42,0.96) 0%, rgba(12,18,33,0.98) 100%);box-shadow:0 22px 44px rgba(0,0,0,0.14);}
        .cp-first-fold #plannerShellBand{margin-bottom:16px;}
        .cp-agenda-top{display:grid;grid-template-columns:minmax(0,1.08fr) minmax(0,0.92fr);gap:12px;margin-bottom:var(--space-md);}
        .cp-agenda-top .cp-quality,.cp-agenda-top .cp-context{margin-bottom:0;}
        @media (max-width: 1024px){
            .cp-bridge-grid,.cp-gates,.cp-agenda-top{grid-template-columns:1fr 1fr;}
        }
        @media (max-width: 720px){
            .cp-bridge-grid,.cp-gates,.cp-agenda-top{grid-template-columns:1fr;}
            .cp-search,.cp-outcome{flex-direction:column;}
            .cp-outcome-btn{width:100%;}
            .cp-first-fold{padding:14px;}
        }
        :root{
            --cp-bg:#eef4fb;
            --cp-panel:rgba(255,255,255,0.78);
            --cp-panel-strong:rgba(255,255,255,0.92);
            --cp-line:rgba(10,28,64,0.1);
            --cp-line-strong:rgba(10,28,64,0.16);
            --cp-text:#0a1c40;
            --cp-muted:#6f84a5;
            --cp-blue:#2471e7;
            --cp-orange:#e6701e;
            --cp-green:#2d7a4b;
            --cp-red:#c44b45;
            --cp-shadow:0 24px 64px rgba(10,28,64,0.09);
        }
        body.room-call-planner .app-main{
            background:
                radial-gradient(circle at 0% 0%, rgba(36,113,231,0.09), transparent 24%),
                radial-gradient(circle at 100% 0%, rgba(230,112,30,0.07), transparent 20%),
                linear-gradient(180deg,#fbfdff 0%, var(--cp-bg) 100%);
        }
        body.room-call-planner .module-header-title{max-width:900px;}
        .cp-app-content{max-width:1520px;margin:0 auto;padding-bottom:40px;}
        .cp-room{position:relative;display:grid;gap:24px;padding:12px 0 18px;}
        .cp-boot-state{
            display:none;
            padding:16px 18px;
            border-radius:22px;
            border:1px solid var(--cp-line);
            background:var(--cp-panel-strong);
            box-shadow:var(--cp-shadow);
        }
        .cp-boot-state.visible{display:block;}
        .cp-boot-state.loading{border-color:rgba(36,113,231,0.22);background:rgba(36,113,231,0.07);}
        .cp-boot-state.error{border-color:rgba(196,75,69,0.24);background:rgba(196,75,69,0.06);}
        .cp-boot-eyebrow{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.28em;font-weight:700;color:var(--cp-muted);margin-bottom:8px;}
        .cp-boot-state.loading .cp-boot-eyebrow{color:var(--cp-blue);}
        .cp-boot-state.error .cp-boot-eyebrow{color:var(--cp-red);}
        .cp-boot-title{font-size:0.96rem;font-weight:700;color:var(--cp-text);margin-bottom:6px;}
        .cp-boot-text{font-size:0.84rem;line-height:1.65;color:var(--cp-muted);}
        .cp-boot-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
        .cp-boot-btn{
            display:inline-flex;
            align-items:center;
            gap:6px;
            padding:9px 14px;
            border-radius:999px;
            border:1px solid var(--cp-line);
            background:#fff;
            color:var(--cp-text);
            font:inherit;
            font-size:0.76rem;
            font-weight:700;
            cursor:pointer;
        }
        .cp-hero{
            display:grid;
            grid-template-columns:minmax(0,1fr) auto;
            gap:20px;
            align-items:end;
            padding:4px 0 12px;
            border-bottom:1px solid var(--cp-line);
        }
        .cp-hero-kicker{font-size:0.68rem;letter-spacing:0.3em;text-transform:uppercase;font-weight:700;color:var(--cp-orange);margin-bottom:10px;}
        .cp-hero-title{
            margin:0;
            font-size:clamp(2.8rem,5vw,5.4rem);
            line-height:0.92;
            letter-spacing:-0.08em;
            font-family:"Outfit",sans-serif;
            font-weight:700;
            color:var(--cp-text);
            max-width:10ch;
        }
        .cp-hero-copy{margin:14px 0 0;max-width:44ch;font-size:1rem;line-height:1.65;color:var(--cp-muted);}
        .cp-hero-status{display:grid;gap:10px;justify-items:end;align-content:end;}
        .cp-band{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            min-height:38px;
            padding:0 14px;
            border-radius:999px;
            border:1px solid var(--cp-line);
            background:rgba(255,255,255,0.82);
            font-size:0.72rem;
            letter-spacing:0.2em;
            text-transform:uppercase;
            font-weight:700;
        }
        .cp-band.credible{color:var(--cp-green);border-color:rgba(45,122,75,0.22);background:rgba(45,122,75,0.08);}
        .cp-band.workable{color:var(--cp-orange);border-color:rgba(230,112,30,0.22);background:rgba(230,112,30,0.08);}
        .cp-band.thin{color:var(--cp-red);border-color:rgba(196,75,69,0.22);background:rgba(196,75,69,0.08);}
        .cp-hero-context{font-size:0.76rem;letter-spacing:0.22em;text-transform:uppercase;font-weight:700;color:var(--cp-muted);}
        .cp-pressure-shell{
            display:grid;
            grid-template-columns:minmax(290px,0.88fr) minmax(480px,1.18fr) minmax(300px,0.86fr);
            gap:26px;
            align-items:start;
        }
        .cp-witness-column,.cp-sequence-column,.cp-route-column{min-width:0;}
        .cp-witness-panel{
            display:grid;
            gap:16px;
            padding:22px;
            border-radius:30px;
            border:1px solid var(--cp-line);
            background:var(--cp-panel-strong);
            box-shadow:var(--cp-shadow);
        }
        .cp-dossier{display:grid;gap:16px;}
        .cp-dossier-head{
            display:grid;
            grid-template-columns:minmax(0,1fr) auto;
            gap:18px;
            align-items:start;
            padding-bottom:16px;
            border-bottom:1px solid var(--cp-line);
        }
        .cp-dossier-kicker{font-size:0.68rem;letter-spacing:0.28em;text-transform:uppercase;font-weight:700;color:var(--cp-muted);margin-bottom:10px;}
        .cp-dossier-name{
            margin:0;
            font-size:clamp(1.9rem,3vw,3.4rem);
            line-height:0.94;
            letter-spacing:-0.08em;
            font-family:"Outfit",sans-serif;
            font-weight:700;
            color:var(--cp-text);
        }
        .cp-dossier-meta{margin-top:10px;font-size:0.92rem;line-height:1.55;color:var(--cp-muted);}
        .cp-score-pill{
            display:grid;
            justify-items:center;
            gap:4px;
            min-width:84px;
            padding:12px 10px;
            border-radius:22px;
            border:1px solid var(--cp-line);
            background:#fff;
        }
        .cp-score-pill span{font-size:0.64rem;letter-spacing:0.22em;text-transform:uppercase;font-weight:700;}
        .cp-score-pill strong{font-size:1.8rem;line-height:1;font-family:"Outfit",sans-serif;font-weight:700;}
        .cp-score-pill.credible span,.cp-score-pill.credible strong{color:var(--cp-green);}
        .cp-score-pill.workable span,.cp-score-pill.workable strong{color:var(--cp-orange);}
        .cp-score-pill.thin span,.cp-score-pill.thin strong{color:var(--cp-red);}
        .cp-dossier-lines{display:grid;gap:0;}
        .cp-dossier-line{
            display:grid;
            grid-template-columns:110px minmax(0,1fr);
            gap:14px;
            align-items:start;
            padding:11px 0;
            border-bottom:1px solid var(--cp-line);
        }
        .cp-dossier-line:last-child{border-bottom:none;}
        .cp-dossier-label{font-size:0.68rem;letter-spacing:0.24em;text-transform:uppercase;font-weight:700;color:var(--cp-muted);padding-top:3px;}
        .cp-dossier-value{font-size:0.9rem;line-height:1.58;color:var(--cp-text);}
        .cp-dossier-note{font-size:0.82rem;line-height:1.6;color:var(--cp-muted);padding-top:4px;border-top:1px solid var(--cp-line);}
        .cp-field{display:grid;gap:7px;}
        .cp-field-label{font-size:0.68rem;letter-spacing:0.24em;text-transform:uppercase;font-weight:700;color:var(--cp-muted);}
        .cp-field input,.cp-field select,.cp-field textarea{
            width:100%;
            padding:13px 15px;
            border-radius:18px;
            border:1px solid var(--cp-line);
            background:rgba(255,255,255,0.84);
            color:var(--cp-text);
            font:inherit;
            font-size:0.96rem;
        }
        .cp-field textarea{min-height:96px;resize:vertical;}
        .cp-field input:focus,.cp-field select:focus,.cp-field textarea:focus{
            outline:none;
            border-color:rgba(36,113,231,0.35);
            box-shadow:0 0 0 4px rgba(36,113,231,0.08);
        }
        .cp-persona-pick{display:flex;flex-wrap:wrap;gap:8px;}
        .cp-persona-btn{
            padding:8px 14px;
            border-radius:999px;
            font-size:0.78rem;
            font-weight:700;
            letter-spacing:0.02em;
            border:1px solid var(--cp-line);
            background:rgba(255,255,255,0.78);
            color:var(--cp-muted);
            cursor:pointer;
            transition:all 0.2s ease;
        }
        .cp-persona-btn:hover{border-color:var(--cp-line-strong);color:var(--cp-text);}
        .cp-persona-btn.active{border-color:rgba(230,112,30,0.28);color:var(--cp-orange);background:rgba(230,112,30,0.08);}
        .cp-agenda{
            display:grid;
            gap:0;
            padding:22px 24px;
            border-radius:32px;
            border:1px solid var(--cp-line);
            background:var(--cp-panel-strong);
            box-shadow:var(--cp-shadow);
        }
        .cp-sequence-intro{display:grid;gap:14px;padding-bottom:18px;border-bottom:1px solid var(--cp-line);}
        .cp-sequence-kicker{font-size:0.68rem;letter-spacing:0.28em;text-transform:uppercase;font-weight:700;color:var(--cp-muted);}
        .cp-sequence-title{font-size:1.52rem;line-height:1.1;letter-spacing:-0.05em;font-weight:700;color:var(--cp-text);max-width:18ch;}
        .cp-sequence-copy{font-size:0.92rem;line-height:1.62;color:var(--cp-muted);max-width:58ch;}
        .cp-sequence-next{font-size:0.84rem;line-height:1.55;color:var(--cp-orange);font-weight:700;}
        .cp-gate-list{display:grid;gap:0;}
        .cp-gate-row{
            display:grid;
            grid-template-columns:minmax(0,1fr) auto;
            gap:12px;
            align-items:start;
            padding:12px 0;
            border-bottom:1px solid var(--cp-line);
        }
        .cp-gate-row:last-child{border-bottom:none;}
        .cp-gate-label{font-size:0.8rem;font-weight:700;color:var(--cp-text);margin-bottom:4px;}
        .cp-gate-copy{font-size:0.78rem;line-height:1.55;color:var(--cp-muted);}
        .cp-gate-state{font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;font-weight:700;padding-top:3px;}
        .cp-gate-row.met .cp-gate-state{color:var(--cp-green);}
        .cp-gate-row.miss .cp-gate-state{color:var(--cp-red);}
        .cp-strip{
            display:grid;
            grid-template-columns:34px 108px minmax(0,1fr);
            gap:16px;
            align-items:start;
            padding:18px 0;
            border-bottom:1px solid var(--cp-line);
        }
        .cp-strip:last-child{border-bottom:none;}
        .cp-strip-label{padding-top:4px;font-size:0.68rem;letter-spacing:0.26em;text-transform:uppercase;font-weight:700;color:var(--cp-muted);}
        .cp-strip-body{min-width:0;}
        .cp-strip-title{font-size:1.38rem;line-height:1.08;letter-spacing:-0.04em;font-weight:700;color:var(--cp-text);margin-bottom:8px;}
        .cp-strip-copy{font-size:1rem;line-height:1.62;color:var(--cp-text);}
        .cp-strip-note{margin-top:8px;font-size:0.82rem;line-height:1.58;color:var(--cp-muted);}
        .cp-question-list{display:grid;gap:12px;}
        .cp-question-row{display:grid;grid-template-columns:28px minmax(0,1fr);gap:12px;align-items:start;}
        .cp-question-num{font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;color:var(--cp-blue);padding-top:3px;}
        .cp-question-copy{font-size:0.98rem;line-height:1.58;color:var(--cp-text);}
        .cp-route-column{display:grid;gap:18px;}
        .cp-route-dock{
            display:grid;
            gap:0;
            padding:20px 22px;
            border-radius:28px;
            border:1px solid var(--cp-line);
            background:var(--cp-panel-strong);
            box-shadow:var(--cp-shadow);
        }
        .cp-route-head{display:grid;gap:8px;padding-bottom:14px;border-bottom:1px solid var(--cp-line);margin-bottom:2px;}
        .cp-route-kicker{font-size:0.68rem;letter-spacing:0.28em;text-transform:uppercase;font-weight:700;color:var(--cp-muted);}
        .cp-route-title{font-size:1.24rem;line-height:1.14;letter-spacing:-0.04em;font-weight:700;color:var(--cp-text);}
        .cp-route-copy{font-size:0.86rem;line-height:1.58;color:var(--cp-muted);}
        .cp-route-row{
            display:grid;
            grid-template-columns:28px minmax(0,1fr) auto;
            gap:14px;
            align-items:start;
            padding:16px 0;
            border-bottom:1px solid var(--cp-line);
        }
        .cp-route-row:last-child{border-bottom:none;}
        .cp-route-row-label{font-size:0.68rem;letter-spacing:0.24em;text-transform:uppercase;font-weight:700;color:var(--cp-muted);margin-bottom:6px;}
        .cp-route-row-title{font-size:1rem;line-height:1.3;font-weight:700;color:var(--cp-text);margin-bottom:6px;}
        .cp-route-row-copy{font-size:0.84rem;line-height:1.58;color:var(--cp-muted);}
        .cp-route-action{
            min-height:40px;
            padding:0 14px;
            border-radius:999px;
            border:1px solid var(--cp-line);
            background:#fff;
            color:var(--cp-text);
            font:inherit;
            font-size:0.76rem;
            font-weight:700;
            cursor:pointer;
            white-space:nowrap;
        }
        .cp-route-action.primary{border-color:rgba(45,122,75,0.22);background:rgba(45,122,75,0.08);color:var(--cp-green);}
        .cp-outcome-panel{
            display:grid;
            gap:12px;
            padding:20px 22px;
            border-radius:28px;
            border:1px solid var(--cp-line);
            background:var(--cp-panel-strong);
            box-shadow:var(--cp-shadow);
        }
        .cp-outcome-title{font-size:0.68rem;letter-spacing:0.28em;text-transform:uppercase;font-weight:700;color:var(--cp-muted);}
        .cp-outcome-copy{font-size:0.86rem;line-height:1.58;color:var(--cp-muted);}
        .cp-outcome{display:grid;gap:10px;}
        .cp-outcome-btn{
            width:100%;
            min-height:48px;
            padding:12px 16px;
            border-radius:18px;
            border:1px solid var(--cp-line);
            background:#fff;
            color:var(--cp-text);
            font:inherit;
            font-size:0.86rem;
            font-weight:700;
            text-align:left;
            cursor:pointer;
        }
        .cp-outcome-btn.advance{border-color:rgba(45,122,75,0.22);background:rgba(45,122,75,0.08);color:var(--cp-green);}
        .cp-outcome-btn.noadvance{border-color:rgba(196,75,69,0.22);background:rgba(196,75,69,0.08);color:var(--cp-red);}
        .cp-outcome-btn.noshow{border-color:rgba(111,132,165,0.24);background:rgba(111,132,165,0.08);color:#58729a;}
        .cp-customize{
            padding:18px 22px 20px;
            border-radius:28px;
            border:1px solid var(--cp-line);
            background:var(--cp-panel-strong);
            box-shadow:var(--cp-shadow);
        }
        .cp-customize summary{cursor:pointer;list-style:none;font-size:0.72rem;letter-spacing:0.26em;text-transform:uppercase;font-weight:700;color:var(--cp-muted);}
        .cp-customize summary::-webkit-details-marker{display:none;}
        .cp-customize-body{display:grid;gap:14px;margin-top:14px;}
        .cp-mark{width:22px;height:22px;position:relative;flex:0 0 auto;}
        .cp-mark--person::before{content:"";position:absolute;left:5px;top:1px;width:10px;height:10px;border-radius:50%;border:2px solid var(--cp-blue);}
        .cp-mark--person::after{content:"";position:absolute;left:3px;bottom:1px;width:14px;height:9px;border-radius:10px 10px 7px 7px;border:2px solid var(--cp-blue);border-top:0;}
        .cp-mark--reason::before{content:"";position:absolute;inset:2px;border-radius:50%;background:rgba(230,112,30,0.12);border:1px solid rgba(230,112,30,0.18);}
        .cp-mark--reason::after{content:"!";position:absolute;inset:0;display:grid;place-items:center;font-size:16px;font-weight:700;color:var(--cp-orange);}
        .cp-mark--probe::before{content:"";position:absolute;left:10px;top:3px;width:2px;height:16px;background:var(--cp-blue);border-radius:999px;}
        .cp-mark--probe::after{content:"";position:absolute;left:3px;top:10px;width:16px;height:2px;background:var(--cp-blue);border-radius:999px;}
        .cp-mark--advance::before{content:"";position:absolute;left:3px;top:3px;width:16px;height:16px;border-radius:5px;border:1px solid rgba(196,75,69,0.18);background:rgba(196,75,69,0.1);transform:rotate(14deg);}
        .cp-mark--advance::after{content:"";position:absolute;left:10px;top:5px;width:2px;height:8px;background:var(--cp-red);box-shadow:0 10px 0 0 var(--cp-red);}
        .cp-mark--route::before{content:"";position:absolute;left:4px;top:10px;width:13px;height:2px;background:var(--cp-green);border-radius:999px;}
        .cp-mark--route::after{content:"";position:absolute;right:3px;top:6px;width:8px;height:8px;border-top:2px solid var(--cp-green);border-right:2px solid var(--cp-green);transform:rotate(45deg);}
        .cp-mark--copy::before,.cp-mark--copy::after{content:"";position:absolute;border-radius:5px;border:1px solid rgba(36,113,231,0.24);width:12px;height:14px;}
        .cp-mark--copy::before{left:4px;top:5px;background:#fff;}
        .cp-mark--copy::after{left:8px;top:3px;background:rgba(36,113,231,0.08);}
        @media (max-width: 1320px){
            .cp-pressure-shell{grid-template-columns:minmax(280px,0.92fr) minmax(0,1.1fr);}
            .cp-route-column{grid-column:1 / -1;grid-template-columns:repeat(3,minmax(0,1fr));align-items:start;}
        }
        @media (max-width: 980px){
            .cp-pressure-shell{grid-template-columns:1fr;}
            .cp-route-column{grid-template-columns:1fr;}
            .cp-hero{grid-template-columns:1fr;}
            .cp-hero-status{justify-items:start;}
        }
        @media (max-width: 720px){
            .cp-app-content{padding-bottom:24px;}
            .cp-agenda,.cp-witness-panel,.cp-route-dock,.cp-outcome-panel,.cp-customize{padding:18px;border-radius:24px;}
            .cp-dossier-head,.cp-strip,.cp-route-row{grid-template-columns:1fr;}
            .cp-score-pill{justify-self:start;}
            .cp-dossier-line{grid-template-columns:1fr;gap:6px;}
            .cp-strip-label{padding-top:0;}
        }
    </style>
</head>
<body class="room-wave2 room-call-planner">

<div class="app-container">

<script src="/js/workspace-guard.js"></script>

        </aside>
        <main class="app-main">
            <header class="app-header module-header">
                <div class="module-header-title">
                    <div class="shell-header-meta">
                        <span class="shell-header-kicker">Calls family</span>
                        <span class="shell-header-state state-live">Meeting prep</span>
                    </div>

                                <div class="cp-field">
                                    <label class="cp-field-label" for="searchInput">Who are you calling?</label>
                                    <input type="text" id="searchInput" placeholder="Jane Smith or paste LinkedIn URL..." oninput="onSearch(this.value)">
                                </div>
                                <div class="cp-field">
                                    <div class="cp-field-label">Persona</div>
                                    <div class="cp-persona-pick" id="personaPick">

                                        <button class="cp-persona-btn" data-p="ops" onclick="setPer(this)">Ops / Support</button>

    <script src="/js/proof-layer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    (function(){
        function readLS(k,fb){try{return JSON.parse(localStorage.getItem(k))||fb}catch(e){return fb}}
        function escH(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
        function buildPlannerRoomHref(href, focusObject, roomLabel){
            try{
                var url=new URL(href, window.location.origin);
                url.searchParams.set('returnTo','/app/discovery-agenda/');
                url.searchParams.set('returnLabel','Back to Call Planner');
                if(focusObject)url.searchParams.set('focusObject',focusObject);
                if(roomLabel)url.searchParams.set('focusRoom',roomLabel);
                url.searchParams.set('fromMode','room');
                url.searchParams.set('fromSurface','call-planner');
                return url.pathname+url.search+url.hash;
            }catch(error){
                return href;
            }
        }
        function renderBootState(kind,title,text){
            var node=document.getElementById('bootState');
            if(!node)return;
            node.className='cp-boot-state visible '+kind;
            var html='<div class="cp-boot-eyebrow">'+(kind==='loading'?'Loading module':'Load failed')+'</div>';
            html+='<div class="cp-boot-title">'+escH(title)+'</div>';
            html+='<div class="cp-boot-text">'+escH(text)+'</div>';
            document.getElementById('plannerHealthPanel').innerHTML='';
            if(kind==='error'){
                html+='<div class="cp-boot-actions">';
                html+='<button class="cp-boot-btn" type="button" onclick="retryDiscoveryAgendaBoot()">Retry Call Planner</button>';
                html+='</div>';
            }
            node.innerHTML=html;
        }
        function clearBootState(){
            var node=document.getElementById('bootState');
            if(!node)return;
            node.className='cp-boot-state';
            node.innerHTML='';
        }

        var persona='cxo';
        var contactName='';
        var matchedAccount=null;
        var signalConsoleAccounts=[];

        async function syncSignalConsoleAccounts(){
            if(window.gtmPersistence&&window.gtmPersistence.signalConsole&&typeof window.gtmPersistence.signalConsole.load==='function'){
                var loaded=await window.gtmPersistence.signalConsole.load();
                if(loaded&&loaded.error)console.error('Signal Console load failed:',loaded.error);
                if(loaded&&loaded.data&&Array.isArray(loaded.data.accounts)){
                    signalConsoleAccounts=loaded.data.accounts.slice();
                    return loaded;
                }
            }
            var fallback=readLS('gtmos_sc_v4',{accounts:[]});
            signalConsoleAccounts=(fallback.accounts||[]).slice();
            return {data:{accounts:signalConsoleAccounts},error:null};
        }

        // Persona question banks
        var questionBank={
            cxo:[
                '"From where you sit, what\'s the biggest operational bottleneck right now?"',
                '"How are you thinking about the build vs. buy decision for [area]?"',
                '"What would need to be true for this to become a priority this quarter?"'
            ],
            vp:[
                '"Walk me through how your team handles [process] today."',
                '"Where are you losing the most time or quality in that workflow?"',
                '"If you could fix one thing about your current stack, what would it be?"'
            ],
            ops:[
                '"What does a typical day look like for your team?"',
                '"How much manual work is involved in [process]?"',
                '"What have you tried before to fix this?"'
            ],
            it:[
                '"What does your current architecture look like for [area]?"',
                '"What are the integration requirements that would make or break this?"',
                '"How does your team evaluate new tools from a security standpoint?"'
            ],
            finance:[
                '"How are you currently tracking the ROI on your [area] investments?"',
                '"What does the approval process look like for a purchase at this level?"',
                '"What would make this a clear yes from a financial perspective?"'
            ],
            revops:[
                '"What does your current tech stack look like end-to-end?"',
                '"Where are the biggest gaps in data flow between teams?"',
                '"How are you measuring pipeline efficiency today?"'
            ]
        };

        var personaLabels={cxo:'C-Suite Executive',vp:'VP / Director',ops:'Operations Leader',it:'IT / Engineering Leader',finance:'Finance Leader',revops:'RevOps Leader'};

        var dealSelect=document.getElementById('linkDeal');
        function getDeals(){
            var deals=readLS('gtmos_deal_workspaces',[]);
            if(!Array.isArray(deals))deals=Object.values(deals||{});
            return deals;
        }
        function populateDealDropdown(){
            var deals=getDeals();
            dealSelect.innerHTML='<option value="">-- No deal linked --</option>';
            deals.forEach(function(d){
                var opt=document.createElement('option');
                opt.value=d.id;
                opt.textContent=(d.accountName||'Unnamed')+' - $'+Number(d.value||0).toLocaleString();
                dealSelect.appendChild(opt);
            });
        }

        function getLinkedDeal(){
            var id=dealSelect&&dealSelect.value?dealSelect.value:'';
            if(!id)return null;
            return getDeals().find(function(d){return d&&d.id===id;})||null;
        }

        function getAgendaQuality(){
            var notes=((document.getElementById('customNotes')||{}).value||'').trim();
            var linkedin=((document.getElementById('linkedinUrl')||{}).value||'').trim();
            var linkedDeal=getLinkedDeal();
            var hasSignal=!!(matchedAccount&&matchedAccount.signals&&matchedAccount.signals.length);
            var hasContext=!!matchedAccount||!!linkedin;
            var gates=[
                {label:'Real person selected',met:contactName.length>=2,copy:'There is a named human or LinkedIn profile behind the plan.',weight:20},
                {label:'Persona is chosen',met:!!persona,copy:'The questions are tuned to a concrete buyer lens.',weight:10},
                {label:'Account context is present',met:hasContext,copy:'Signal Console match or LinkedIn profile gives the call a real target.',weight:20},
                {label:'Why-now angle exists',met:hasSignal||notes.length>=20,copy:'There is either a live signal or enough custom context to justify the meeting.',weight:25},
                {label:'Advancement path is linked',met:!!linkedDeal,copy:'A deal is attached so the call can move into pipeline truth instead of dying as notes.',weight:25}
            ];
            var score=gates.reduce(function(sum,gate){return sum+(gate.met?gate.weight:0);},0);
            if(matchedAccount&&matchedAccount._heat>=85)score=Math.min(100,score+5);
            var band=score>=85?'credible':score>=65?'workable':'thin';
            var bandLabel=band==='credible'?'Credible':'workable'===band?'Workable':'Thin';
            var next='Link a real deal before the call so advancement can land somewhere durable.';
            if(!contactName.length)next='Choose the actual human first. A vague target gives you a vague call.';
            else if(!hasContext)next='Add the LinkedIn profile or match the account in Signal Console so the agenda has real context.';
            else if(!(hasSignal||notes.length>=20))next='Capture a real why-now angle before the meeting starts.';
            else if(!linkedDeal)next='Link the call to the in-flight deal before you run it.';
            else next='You have a credible agenda. Run the call, then move straight into Discovery Studio and Deal Workspace.';
            return {
                score:score,
                band:band,
                bandLabel:bandLabel,
                gates:gates,
                next:next,
                linkedDeal:linkedDeal,
                notes:notes,
                linkedin:linkedin,
                hasSignal:hasSignal
            };
        }

        function getCurrentCompany(quality){
            return (matchedAccount&&matchedAccount.name)||(quality&&quality.linkedDeal&&(quality.linkedDeal.accountName||quality.linkedDeal.name))||'No account context yet';
        }

        function getTopSignalHeadline(){
            return (matchedAccount&&matchedAccount.signals&&matchedAccount.signals[0]&&matchedAccount.signals[0].headline)||'';
        }

        function getAdvanceAsk(quality){
            var linkedDeal=quality.linkedDeal;
            var ask=linkedDeal
                ? 'Leave with a dated next step and a named internal owner on '+(linkedDeal.accountName||'the linked deal')+'.'
                : 'Leave with a dated next step and then attach the result to a real deal before the day ends.';
            var note=quality.hasSignal
                ? 'The live pressure is already visible. Convert it into an owned move.'
                : (quality.notes.length>=20
                    ? 'Manual context is doing the why-now work. Make the ask specific enough to survive the handoff.'
                    : 'If the reason now is still vague, the advance ask will sound vague too.');
            return {ask:ask,note:note};
        }

        function getAgendaBriefText(){
            var quality=getAgendaQuality();
            var company=getCurrentCompany(quality);
            var topSignal=getTopSignalHeadline();
            var advance=getAdvanceAsk(quality);
            var qs=questionBank[persona]||questionBank.cxo;
            var lines=[
                'Call Planner Brief',
                'Contact: '+(contactName||'No person selected'),
                'Persona: '+(personaLabels[persona]||'No persona'),
                'Company: '+company,
                quality.linkedDeal ? 'Linked deal: '+(quality.linkedDeal.accountName||quality.linkedDeal.name||'Linked deal') : 'Linked deal: none',
                '',
                'Opener:',
                (topSignal ? 'I noticed '+topSignal.toLowerCase()+' and wanted to understand how that is changing priorities on your side.' : 'Thanks for making time. I wanted to start with how your team is handling this workflow today and where the handoff is breaking.'),
                '',
                'Reason now:',
                (topSignal || quality.notes || 'No durable why-now angle yet.'),
                '',
                'Probe questions:'
            ];
            qs.forEach(function(q,index){
                lines.push((index+1)+'. '+q.replace(/^"|"$/g,''));
            });
            lines.push('');
            lines.push('Advance ask:');
            lines.push(advance.ask);
            lines.push(advance.note);
            return lines.join('\n');
        }

        function renderPlannerBridge(){
            var node=document.getElementById('plannerShellBand');
            if(!node)return;
            var quality=getAgendaQuality();
            var company=getCurrentCompany(quality);
            var stateTone=quality.band==='credible'?'live':quality.band==='workable'?'ready':'risk';
            var heroTitle=contactName.length>=2
                ? 'Build the call so '+contactName+' reveals the real pressure.'
                : 'Choose the real person before you script the call.';
            var heroCopy=contactName.length>=2
                ? 'One person. One reason now. Three probes. One advance ask. Then route the truth forward.'
                : 'The room should not build a generic meeting. Start with the actual human, then let the pressure script tighten around that witness.';
            if(window.gtmShellChrome&&typeof window.gtmShellChrome.applyHeader==='function'){
                window.gtmShellChrome.applyHeader({
                    family:'Calls',
                    stateLabel:quality.bandLabel,
                    stateTone:stateTone
                });
            }
            node.innerHTML=
                '<section class="cp-hero">'+
                    '<div>'+
                        '<div class="cp-hero-kicker">Pressure script</div>'+
                        '<h2 class="cp-hero-title">'+escH(heroTitle)+'</h2>'+
                        '<p class="cp-hero-copy">'+escH(heroCopy)+'</p>'+
                    '</div>'+
                    '<div class="cp-hero-status">'+
                        '<span class="cp-band '+quality.band+'">'+escH(quality.bandLabel)+' · '+quality.score+'/100</span>'+
                        '<div class="cp-hero-context">'+escH(company)+'</div>'+
                    '</div>'+
                '</section>';
        }

        function renderAgendaQuality(){
            var node=document.getElementById('qualityBlock');
            if(!node)return;
            var quality=getAgendaQuality();
            var gateHtml=quality.gates.map(function(gate){
                return '<div class="cp-gate-row '+(gate.met?'met':'miss')+'">'+
                    '<div>'+
                        '<div class="cp-gate-label">'+escH(gate.label)+'</div>'+
                        '<div class="cp-gate-copy">'+escH(gate.copy)+'</div>'+
                    '</div>'+
                    '<div class="cp-gate-state">'+(gate.met?'Met':'Missing')+'</div>'+
                '</div>';
            }).join('');
            node.innerHTML=
                '<div class="cp-sequence-intro">'+
                    '<div class="cp-sequence-kicker">Pressure sequence</div>'+
                    '<div class="cp-sequence-title">Interrogate in this order.</div>'+
                    '<div class="cp-sequence-copy">Good agenda means the meeting can actually advance: the person is clear, the reason now is credible, and the result has somewhere durable to land.</div>'+
                    '<div class="cp-sequence-next">Next move: '+escH(quality.next)+'</div>'+
                    '<div class="cp-gate-list">'+gateHtml+'</div>'+
                '</div>';
        }

        function renderAgendaHandoff(){
            var node=document.getElementById('handoffBlock');
            if(!node)return;
            var quality=getAgendaQuality();
            var dealLabel=quality.linkedDeal?'Open linked deal':'Open Deal Workspace';
            var dealCopy=quality.linkedDeal
                ? 'Record the changed owner, dated next step, and proof on '+(quality.linkedDeal.accountName||'the linked deal')+'.'
                : 'Create or attach the deal landing spot so the call does not die as notes.';
            node.innerHTML=
                '<section class="cp-route-dock">'+
                    '<div class="cp-route-head">'+
                        '<div class="cp-route-kicker">Route the truth forward</div>'+
                        '<div class="cp-route-title">Do not let the script die in prep.</div>'+
                        '<div class="cp-route-copy">The room should already know where the live conversation goes next, where the deal changes get written, and how the portable brief leaves the page.</div>'+
                    '</div>'+
                    '<div class="cp-route-row">'+
                        '<div class="cp-mark cp-mark--route"></div>'+
                        '<div>'+
                            '<div class="cp-route-row-label">Discovery Studio</div>'+
                            '<div class="cp-route-row-title">Run the live conversation.</div>'+
                            '<div class="cp-route-row-copy">Carry the opener, the probes, and the pressure note straight into the room.</div>'+
                        '</div>'+
                        '<button class="cp-route-action primary" type="button" onclick="openDiscoveryRun()">Open Discovery</button>'+
                    '</div>'+
                    '<div class="cp-route-row">'+
                        '<div class="cp-mark cp-mark--advance"></div>'+
                        '<div>'+
                            '<div class="cp-route-row-label">Deal Workspace</div>'+
                            '<div class="cp-route-row-title">Record what changed in the deal.</div>'+
                            '<div class="cp-route-row-copy">'+escH(dealCopy)+'</div>'+
                        '</div>'+
                        '<button class="cp-route-action" type="button" onclick="openLinkedDealWorkspace()">'+escH(dealLabel)+'</button>'+
                    '</div>'+
                    '<div class="cp-route-row">'+
                        '<div class="cp-mark cp-mark--copy"></div>'+
                        '<div>'+
                            '<div class="cp-route-row-label">Portable brief</div>'+
                            '<div class="cp-route-row-title">Take the call script with you.</div>'+
                            '<div class="cp-route-row-copy">Copy the current opener, reason-now angle, probes, and advance ask into wherever the meeting actually runs.</div>'+
                        '</div>'+
                        '<button class="cp-route-action" type="button" onclick="copyAgendaBrief()">Copy agenda</button>'+
                    '</div>'+
                '</section>';
        }

        function renderPlannerWorkspaceHealth(){
            var node=document.getElementById('plannerHealthPanel');
            if(!node)return;
            var quality=getAgendaQuality();
            var company=getCurrentCompany(quality);
            var linkedDeal=quality.linkedDeal;
            var topSignal=getTopSignalHeadline();
            var metaParts=[];
            if(persona)metaParts.push(personaLabels[persona]);
            if(company&&company!=='No account context yet')metaParts.push(company);
            if(linkedDeal)metaParts.push('$'+Number(linkedDeal.value||0).toLocaleString()+' '+String(linkedDeal.stage||'prospect').replace(/-/g,' '));
            var support=matchedAccount
                ? 'Signal-backed account matched.'
                : (quality.linkedin ? 'LinkedIn context is carrying the account layer.' : 'No signal-backed account matched yet.');
            var linkLine=linkedDeal
                ? (linkedDeal.accountName||linkedDeal.name||'Linked deal')+' is attached for the handoff.'
                : 'No deal attached yet.';
            var signalLine=topSignal
                ? topSignal
                : (quality.notes.length>=20 ? 'Using manual notes until a live signal is attached.' : 'No live reason-now signal is visible yet.');
            var noteText=!matchedAccount&&!quality.linkedin
                ? 'Match the account in Signal Console or add LinkedIn context so the script stops guessing.'
                : 'The witness rail should know who the call is for, why now matters, and where the result lands.';
            node.innerHTML=
                '<div class="cp-dossier">'+
                    '<div class="cp-dossier-head">'+
                        '<div>'+
                            '<div class="cp-dossier-kicker">Selected contact</div>'+
                            '<h2 class="cp-dossier-name">'+escH(contactName||'Choose the human.')+'</h2>'+
                            '<div class="cp-dossier-meta">'+escH(metaParts.join(' · ')||'The agenda becomes credible only after the actual witness is named.')+'</div>'+
                        '</div>'+
                        '<div class="cp-score-pill '+quality.band+'"><span>'+escH(quality.bandLabel)+'</span><strong>'+quality.score+'</strong></div>'+
                    '</div>'+
                    '<div class="cp-dossier-lines">'+
                        '<div class="cp-dossier-line"><div class="cp-dossier-label">Account</div><div class="cp-dossier-value">'+escH(support)+'</div></div>'+
                        '<div class="cp-dossier-line"><div class="cp-dossier-label">Reason now</div><div class="cp-dossier-value">'+escH(signalLine)+'</div></div>'+
                        '<div class="cp-dossier-line"><div class="cp-dossier-label">Advance path</div><div class="cp-dossier-value">'+escH(linkLine)+'</div></div>'+
                    '</div>'+
                    '<div class="cp-dossier-note">'+escH(noteText)+'</div>'+
                '</div>';
        }

        function getAgendaSnapshot(){
            var quality=getAgendaQuality();
            return {
                contact:contactName,
                company:matchedAccount?matchedAccount.name:(quality.linkedDeal?quality.linkedDeal.accountName:''),
                persona:persona,
                linkedDeal:quality.linkedDeal?quality.linkedDeal.id:'',
                gates:quality.gates.map(function(g){return !!g.met;}),
                gateDetails:quality.gates.map(function(g){return {label:g.label,met:!!g.met,copy:g.copy};}),
                score:quality.score,
                band:quality.bandLabel,
                nextMove:quality.next,
                signalHeadline:(quality.hasSignal&&matchedAccount&&matchedAccount.signals[0])?matchedAccount.signals[0].headline:'',
                customNotes:quality.notes,
                linkedinUrl:quality.linkedin,
                preparedAt:new Date().toISOString()
            };
        }

        async function persistAgendaState(outcomeType){
            var stats=readLS('gtmos_discovery_stats',{totalCalls:0,advancedCalls:0});
            var agenda=getAgendaSnapshot();
            localStorage.setItem('gtmos_discovery_agenda',JSON.stringify(agenda));
            var handoff={
                contact:agenda.contact,
                outcome:outcomeType||'planned',
                timestamp:new Date().toISOString(),
                linkedDeal:agenda.linkedDeal||null,
                company:agenda.company||'',
                persona:agenda.persona,
                logType:outcomeType?'call_outcome':'call_plan',
                summary:outcomeType?('Discovery call - '+outcomeType):'Discovery plan ready',
                agendaScore:agenda.score,
                agendaBand:agenda.band,
                nextMove:agenda.nextMove
            };
            localStorage.setItem('gtmos_call_handoff',JSON.stringify(handoff));

            if(window.gtmPersistence&&window.gtmPersistence.discovery){
                if(typeof window.gtmPersistence.discovery.save==='function'){
                    var synced=await window.gtmPersistence.discovery.save({
                        currentCategory:(function(){try{return JSON.parse(localStorage.getItem('gtmos_product_category'))||'cxai'}catch(e){return localStorage.getItem('gtmos_product_category')||'cxai'}})(),
                        workedIds:readLS('gtmos_discovery_worked',[]),
                        stats:stats,
                        agenda:agenda,
                        handoff:handoff
                    });
                    if(synced&&synced.error)console.error('Discovery agenda sync failed:',synced.error);
                }
                if(outcomeType&&typeof window.gtmPersistence.discovery.logCall==='function'){
                    var logged=await window.gtmPersistence.discovery.logCall(handoff);
                    if(logged&&logged.error)console.error('Discovery call log failed:',logged.error);
                }
            }
            return {agenda:agenda,handoff:handoff};
        }

        window.setPer=function(btn){
            document.querySelectorAll('.cp-persona-btn').forEach(function(b){b.classList.remove('active');});
            btn.classList.add('active');
            persona=btn.dataset.p;
            buildAgenda();
        };

        window.onSearch=function(val){
            contactName=val.trim();
            matchedAccount=null;
            if(contactName.length>=2){
                signalConsoleAccounts.forEach(function(a){
                    if(contactName.toLowerCase().indexOf(a.name.toLowerCase())!==-1 || a.name.toLowerCase().indexOf(contactName.toLowerCase())!==-1){
                        matchedAccount=a;
                    }
                });
            }
            buildAgenda();
        };

        window.refreshCallPlanner=function(){
            buildAgenda();
        };

        function buildAgenda(){
            document.getElementById('agenda').classList.add('visible');
            renderPlannerBridge();
            renderPlannerWorkspaceHealth();
            renderAgendaQuality();
            var qs=questionBank[persona]||questionBank.cxo;
            var quality=getAgendaQuality();
            var topSignal=getTopSignalHeadline();
            var openerScript=topSignal
                ? 'I noticed '+topSignal.toLowerCase()+' and wanted to understand how that is changing priorities on your side.'
                : 'Thanks for making time. I wanted to start with how your team is handling this workflow today and where the handoff is breaking.';
            document.getElementById('openerBlock').innerHTML=
                '<div class="cp-strip-title">Open from the operating burden.</div>'+
                '<div class="cp-strip-copy">'+escH(openerScript)+'</div>'+
                '<div class="cp-strip-note">The opener should name a real burden fast enough that the meeting stops sounding generic.</div>';

            var whyNowTitle=topSignal
                ? 'Live pressure is already visible.'
                : (quality.notes.length>=20 ? 'Manual context is carrying the why-now.' : 'The why-now is still thin.');
            var whyNowCopy=topSignal
                ? topSignal
                : (quality.notes.length>=20 ? quality.notes : 'Use Signal Console or manual notes to justify why this meeting should happen now, not vaguely later.');
            var whyNowNote=topSignal
                ? 'Use the signal, not abstract curiosity, to justify the meeting.'
                : 'The call will stay soft until the reason now is concrete.';
            document.getElementById('whyNowBlock').innerHTML=
                '<div class="cp-strip-title">'+escH(whyNowTitle)+'</div>'+
                '<div class="cp-strip-copy">'+escH(whyNowCopy)+'</div>'+
                '<div class="cp-strip-note">'+escH(whyNowNote)+'</div>';

            document.getElementById('questionsBlock').innerHTML=
                '<div class="cp-strip-title">Ask only what the meeting can carry.</div>'+
                '<div class="cp-strip-note">Three probes are enough if they surface ownership, authority, and timing.</div>'+
                '<div class="cp-question-list">'+qs.map(function(q,index){
                    return '<div class="cp-question-row"><div class="cp-question-num">0'+(index+1)+'</div><div class="cp-question-copy">'+escH(q.replace(/^\"|\"$/g,''))+'</div></div>';
                }).join('')+'</div>';

            var advance=getAdvanceAsk(quality);
            document.getElementById('advanceBlock').innerHTML=
                '<div class="cp-strip-title">Leave with a move the board can trust.</div>'+
                '<div class="cp-strip-copy">'+escH(advance.ask)+'</div>'+
                '<div class="cp-strip-note">'+escH(advance.note)+'</div>';

            renderAgendaHandoff();
        }

        window.copyAgendaBrief=function(){
            var briefText=getAgendaBriefText();
            if(navigator.clipboard&&navigator.clipboard.writeText){
                navigator.clipboard.writeText(briefText).then(function(){
                    alert('Agenda brief copied.');
                }).catch(function(){
                    alert(briefText);
                });
                return;
            }
            alert(briefText);
        };

        window.logOutcome=async function(type){
            var stats=readLS('gtmos_discovery_stats',{totalCalls:0,advancedCalls:0});
            stats.totalCalls=(stats.totalCalls||0)+1;
            if(type==='advanced')stats.advancedCalls=(stats.advancedCalls||0)+1;
            localStorage.setItem('gtmos_discovery_stats',JSON.stringify(stats));
            await persistAgendaState(type);
            alert('Call logged: '+type.replace('-',' ')+'. Discovery stats updated.');
        };

        window.openDiscoveryRun=async function(){
            await persistAgendaState(null);
            location.href=buildPlannerRoomHref('/app/discovery-studio/',contactName||(matchedAccount&&matchedAccount.name)||'Call Planner','Discovery Studio');
        };

        window.openLinkedDealWorkspace=async function(){
            var saved=await persistAgendaState(null);
            var dealId=saved&&saved.agenda?saved.agenda.linkedDeal:'';
            location.href=dealId
                ? buildPlannerRoomHref('/app/deal-workspace/?deal='+encodeURIComponent(dealId),(saved&&saved.agenda&&(saved.agenda.company||saved.agenda.contact))||'Linked deal','Deal Workspace')
                : buildPlannerRoomHref('/app/deal-workspace/',contactName||(matchedAccount&&matchedAccount.name)||'Call Planner','Deal Workspace');
        };

        async function bootDiscoveryAgenda(){
            renderBootState(
                'loading',
                'Loading Call Planner',
                'Pulling saved deals, discovery context, and Signal Console accounts before the agenda tools come online.'
            );
            if(window.gtmPersistence&&window.gtmPersistence.deals&&typeof window.gtmPersistence.deals.load==='function'){
                var dealsLoaded=await window.gtmPersistence.deals.load();
                if(dealsLoaded&&dealsLoaded.error)console.error('Deal sync failed:',dealsLoaded.error);
            }
            if(window.gtmPersistence&&window.gtmPersistence.discovery&&typeof window.gtmPersistence.discovery.load==='function'){
                var discoveryLoaded=await window.gtmPersistence.discovery.load();
                if(discoveryLoaded&&discoveryLoaded.error)console.error('Discovery sync failed:',discoveryLoaded.error);
            }
            await syncSignalConsoleAccounts();
            populateDealDropdown();
            buildAgenda();
            clearBootState();
        }

        function onDiscoveryAgendaBootFailure(error){
            console.error('Discovery agenda boot failed:',error);
            renderBootState(
                'error',
                'Call Planner could not finish loading.',
                'Antaeus hit a startup failure while rebuilding your deals or discovery context. Retry once. If this keeps happening, refresh the page and verify your workspace auth session is still healthy.'
            );
        }

        window.retryDiscoveryAgendaBoot=function(){
            bootDiscoveryAgenda().catch(onDiscoveryAgendaBootFailure);
        };

        if(window.__gtmosAuthGatePending&&window.requireAuthReady&&typeof window.requireAuthReady.then==='function'){
            window.requireAuthReady.then(bootDiscoveryAgenda).catch(onDiscoveryAgendaBootFailure);
        }else if(window.__gtmosAuthGatePending){
            renderBootState(
                'loading',
                'Waiting for auth',
                'Call Planner is waiting for your authenticated workspace before it rebuilds deal and signal context.'
            );
            window.addEventListener('gtmos:auth-ready',function(){bootDiscoveryAgenda().catch(onDiscoveryAgendaBootFailure);},{once:true});
        }else{
            bootDiscoveryAgenda().catch(onDiscoveryAgendaBootFailure);
        }
    })();
    </script>
</body>
</html>
