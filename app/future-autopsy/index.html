<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Autopsy | Antaeus GTM OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <style>
        body.room-future-autopsy{
            background:
                radial-gradient(circle at 0% 0%, rgba(36,113,231,0.06), transparent 26%),
                radial-gradient(circle at 100% 0%, rgba(230,112,30,0.05), transparent 24%),
                linear-gradient(180deg,#fbfcff 0%,#f2f6fc 100%);
            color:#10274f;
        }
        body.room-future-autopsy .app-main{
            background:
                radial-gradient(circle at 12% 0%, rgba(36,113,231,0.06), transparent 24%),
                radial-gradient(circle at 88% 0%, rgba(230,112,30,0.05), transparent 18%),
                linear-gradient(180deg,#fbfcff 0%,#f2f6fc 100%);
        }
        body.room-future-autopsy .app-content{
            max-width:1380px;
            padding-top:24px;
        }
        body.room-future-autopsy .module-header{display:none;}

        .fa-room-shell{display:grid;gap:24px;}
        .fa-toast{position:fixed;right:16px;bottom:16px;background:#1f1a14;color:#fff;padding:10px 14px;border-radius:var(--radius-md);font-size:0.82rem;font-weight:600;opacity:0;transform:translateY(6px);transition:0.25s;pointer-events:none;z-index:9999;}
        .fa-toast.show{opacity:1;transform:none;}

        .fa-first-fold{
            position:relative;
            overflow:hidden;
            margin-bottom:0;
            padding:22px 24px 24px;
            border:1px solid rgba(10,28,64,0.06);
            border-radius:32px;
            background:
                radial-gradient(circle at 16% 10%, rgba(36,113,231,0.14), transparent 28%),
                radial-gradient(circle at 90% 86%, rgba(230,112,30,0.12), transparent 26%),
                linear-gradient(180deg,#f8fbff 0%,#eef5fb 100%);
            box-shadow:0 28px 74px rgba(10,28,64,0.1);
        }
        .fa-first-fold::before{
            content:"";
            position:absolute;inset:0;
            background-image:
                linear-gradient(rgba(10,28,64,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(10,28,64,0.03) 1px, transparent 1px);
            background-size:32px 32px;
            pointer-events:none;
            opacity:.45;
        }
        .fa-first-fold > *{position:relative;z-index:1;}
        .fa-first-fold-meta{
            display:flex;
            justify-content:space-between;
            gap:18px;
            align-items:flex-start;
            margin-bottom:16px;
        }
        .fa-meta-kicker{
            font-size:0.68rem;
            text-transform:uppercase;
            letter-spacing:0.18em;
            color:var(--brand-gold-dark);
            font-weight:700;
            margin-bottom:6px;
        }
        .fa-meta-title{
            font-family:"Outfit","Public Sans",sans-serif;
            font-size:2.2rem;
            line-height:1;
            letter-spacing:-0.05em;
            color:#0a1c40;
            font-weight:700;
            max-width:12ch;
        }
        .fa-room-sub{
            margin-top:8px;
            max-width:56ch;
            font-size:0.95rem;
            line-height:1.65;
            color:#5f7594;
        }
        .fa-horizon-tag{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            min-height:36px;
            padding:0 14px;
            border-radius:999px;
            border:1px solid rgba(10,28,64,0.1);
            background:rgba(255,255,255,0.72);
            font-size:0.7rem;
            letter-spacing:0.16em;
            text-transform:uppercase;
            font-weight:700;
            color:#5f7594;
            white-space:nowrap;
        }
        .fa-first-fold .fa-horizon-tag{display:none !important;}
        .fa-first-fold #futureAutopsyBootState{margin-bottom:14px;}
        .fa-first-fold #futureAutopsyReturnBridge{margin-bottom:14px;}
        .fa-first-fold #futureAutopsyReturnBridge .shell-handoff-bridge,
        .fa-first-fold #futureAutopsyReturnBridge .shell-pinned-object{margin-bottom:0;}

        .fa-case-switcher{
            width:min(100%,760px);
            margin-top:0;
        }
        .fa-ledger-shell{width:100%;}
        .fa-ledger-head{
            display:grid;
            grid-template-columns:minmax(0,1fr) minmax(210px,0.8fr);
            gap:18px;
            align-items:end;
            margin-bottom:8px;
        }
        .fa-ledger-title{
            font-size:0.5rem;
            letter-spacing:0.18em;
            text-transform:uppercase;
            color:#8b9cb4;
            font-weight:700;
        }
        .fa-ledger{
            display:grid;
            border-top:1px solid rgba(10,28,64,0.08);
        }
        .fa-ledger-row{
            width:100%;
            min-height:58px;
            display:grid;
            grid-template-columns:18px minmax(0,1fr) 58px auto;
            gap:14px;
            align-items:center;
            padding:0 2px;
            border:0;
            border-bottom:1px solid rgba(10,28,64,0.08);
            background:transparent;
            color:#587092;
            text-align:left;
            cursor:pointer;
            font:inherit;
        }
        .fa-ledger-row:last-child{border-bottom:0;}
        .fa-ledger-row:hover .fa-ledger-name,
        .fa-ledger-row:hover .fa-ledger-stage{color:#0a1c40;}
        .fa-ledger-mark{
            width:8px;
            height:8px;
            border-radius:50%;
            background:rgba(10,28,64,0.16);
            box-shadow:0 0 0 6px rgba(10,28,64,0.04);
        }
        .fa-ledger-row.active .fa-ledger-mark{
            background:var(--orange);
            box-shadow:0 0 0 6px rgba(230,112,30,0.12);
        }
        .fa-ledger-name{
            font-size:1.72rem;
            line-height:1.02;
            letter-spacing:-0.035em;
            color:#6d83a4;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .fa-ledger-row.active .fa-ledger-name{
            color:#0a1c40;
            font-weight:700;
        }
        .fa-ledger-stage{
            justify-self:end;
            font-size:0.68rem;
            letter-spacing:0.16em;
            text-transform:uppercase;
            color:#9caec6;
            white-space:nowrap;
        }
        .fa-ledger-value{
            font-size:1rem;
            letter-spacing:0.03em;
            color:#8b9cb4;
            white-space:nowrap;
        }
        .fa-ledger-note{
            font-size:0.74rem;
            line-height:1.45;
            color:#5f7594;
            max-width:28ch;
            text-align:right;
            justify-self:end;
        }
        .fa-command-row{
            display:grid;
            grid-template-columns:repeat(3,minmax(0,1fr));
            gap:30px;
            padding-top:16px;
            align-items:start;
        }
        .fa-command-row.is-pending .fa-command-link--run .fa-command-title::after{
            content:" · pending";
            font-size:0.58rem;
            letter-spacing:0.16em;
            text-transform:uppercase;
            color:var(--orange);
            font-weight:700;
            margin-left:6px;
            vertical-align:middle;
        }
        .fa-command-row.is-pending .fa-command-link--run .fa-command-copy{
            color:#34506e;
        }
        .fa-command-link{
            display:grid;
            grid-template-columns:auto 1fr;
            align-items:start;
            gap:10px;
            width:100%;
            border:0;
            background:none;
            padding:0;
            text-decoration:none;
            text-align:left;
            font:inherit;
            color:#0a1c40;
            cursor:pointer;
        }
        .fa-command-text{
            display:grid;
            gap:3px;
        }
        .fa-command-title{
            font-size:0.92rem;
            line-height:1.05;
            font-weight:700;
        }
        .fa-command-link--run{color:var(--green);}
        .fa-command-link--urgent{color:#c44b45;}
        .fa-command-link--copy{color:#4d6f9d;}
        .fa-command-copy{
            margin:0;
            font-size:0.72rem;
            line-height:1.45;
            color:#5f7594;
            max-width:22ch;
        }
        .fa-command-symbol{
            position:relative;
            width:24px;height:24px;
            flex:0 0 auto;
            display:inline-block;
        }
        .fa-command-symbol--run::before{
            content:"";
            position:absolute;inset:3px;
            border-radius:50%;
            background:radial-gradient(circle at 35% 35%, rgba(45,122,75,0.1), rgba(45,122,75,0.22));
            border:1px solid rgba(45,122,75,0.2);
        }
        .fa-command-symbol--run::after{
            content:"";
            position:absolute;left:11px;top:8px;
            width:0;height:0;
            border-top:6px solid transparent;
            border-bottom:6px solid transparent;
            border-left:10px solid var(--green);
            filter:drop-shadow(0 0 4px rgba(45,122,75,0.18));
        }
        .fa-command-symbol--urgent::before{
            content:"";
            position:absolute;left:4px;top:4px;
            width:20px;height:20px;
            background:radial-gradient(circle at center, rgba(196,75,69,0.12) 0 38%, transparent 40%);
            clip-path:polygon(50% 0%, 61% 28%, 92% 18%, 74% 49%, 100% 50%, 74% 52%, 92% 82%, 61% 72%, 50% 100%, 39% 72%, 8% 82%, 26% 52%, 0% 50%, 26% 49%, 8% 18%, 39% 28%);
            border:1px solid rgba(196,75,69,0.18);
        }
        .fa-command-symbol--urgent::after{
            content:"";
            position:absolute;left:12px;top:7px;
            width:4px;height:12px;border-radius:3px;
            background:#c44b45;
            box-shadow:0 15px 0 -1px #c44b45;
        }
        .fa-command-symbol--copy::before{
            content:"";
            position:absolute;left:7px;top:7px;
            width:12px;height:14px;border-radius:4px;
            border:1px solid rgba(36,113,231,0.28);
            background:rgba(255,255,255,0.92);
            box-shadow:0 0 0 4px rgba(36,113,231,0.06);
        }
        .fa-command-symbol--copy::after{
            content:"";
            position:absolute;left:11px;top:5px;
            width:12px;height:14px;border-radius:4px;
            border:1px solid rgba(36,113,231,0.22);
            background:rgba(36,113,231,0.08);
        }

        .fa-light-grid{
            display:grid;
            grid-template-columns:minmax(500px,0.98fr) minmax(420px,1.02fr);
            gap:34px;
            align-items:start;
            min-height:640px;
        }
        .fa-pinned-column{display:grid;align-content:start;padding-top:0;}
        .fa-analysis-column{display:grid;gap:10px;align-content:start;padding-top:12px;}
        #futureAutopsyPinnedCase:empty{display:none;}
        .fa-ledger-bench{
            display:grid;
            grid-template-columns:minmax(220px,1fr) minmax(220px,0.95fr);
            gap:28px;
            align-items:start;
            width:min(700px,100%);
            padding-top:8px;
        }
        .fa-ledger-panel{display:grid;gap:0;align-content:start;}
        .fa-note-label{
            font-size:0.64rem;
            letter-spacing:0.18em;
            text-transform:uppercase;
            color:#8b9cb4;
            font-weight:700;
        }
        .fa-context-strip{
            display:grid;
            gap:6px;
            padding-left:20px;
            padding-bottom:4px;
        }
        .fa-context-head{
            display:grid;
            grid-template-columns:auto 1fr;
            gap:12px;
            align-items:start;
        }
        .fa-context-pin{
            position:relative;
            width:18px;
            height:18px;
            border-radius:50%;
            background:rgba(230,112,30,0.16);
            border:1px solid rgba(230,112,30,0.24);
            box-shadow:0 0 0 6px rgba(230,112,30,0.08);
            margin-top:2px;
        }
        .fa-context-pin::after{
            content:"";
            position:absolute;
            inset:-6px;
            border-radius:50%;
            border:1px solid rgba(230,112,30,0.18);
            animation:faPulse 1.8s ease-out infinite;
        }
        @keyframes faPulse{
            0%{transform:scale(0.9);opacity:0.75;}
            70%{transform:scale(1.28);opacity:0;}
            100%{transform:scale(1.28);opacity:0;}
        }
        .fa-context-title{
            font-size:2rem;
            line-height:0.95;
            letter-spacing:-0.03em;
            font-weight:700;
            color:#0a1c40;
        }
        .fa-context-copy{
            font-size:1rem;
            line-height:1.45;
            color:#5f7594;
        }
        .fa-context-meta{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            margin-top:4px;
        }
        .fa-context-meta span{
            display:inline-flex;
            align-items:center;
            min-height:24px;
            padding:0 8px;
            border-radius:999px;
            background:rgba(255,255,255,.42);
            border:1px solid rgba(10,28,64,0.06);
            font-size:0.6rem;
            letter-spacing:0.12em;
            text-transform:uppercase;
            font-weight:700;
            color:#5f7594;
        }
        .fa-sheet-context{
            display:grid;
            gap:6px;
            padding-left:12px;
            margin-bottom:10px;
        }
        .fa-sheet-context .fa-context-copy{max-width:40ch;}
        .fa-sheet-stack{
            position:relative;
            min-height:560px;
            isolation:isolate;
        }
        .fa-sheet{
            position:absolute;
            width:min(100%, 620px);
            border-radius:30px;
            background:rgba(255,255,255,.54);
            border:1px solid rgba(10,28,64,0.08);
            backdrop-filter:blur(16px);
            box-shadow:0 20px 48px rgba(10,28,64,0.08);
            padding:22px 24px;
            cursor:pointer;
            transition:transform .26s ease, box-shadow .26s ease, border-color .26s ease, opacity .26s ease;
        }
        .fa-sheet-a{top:0;left:18px;transform:rotate(-1.2deg);z-index:1;}
        .fa-sheet-b{top:82px;left:42px;transform:rotate(0.9deg);z-index:2;}
        .fa-sheet-c{top:164px;left:26px;transform:rotate(-0.6deg);z-index:3;}
        .fa-sheet:hover{
            border-color:rgba(10,28,64,0.14);
        }
        .fa-sheet:focus-visible{
            outline:2px solid rgba(36,113,231,0.45);
            outline-offset:6px;
        }
        .fa-sheet-stack.state-symptom .fa-sheet-symptom,
        .fa-sheet-stack.state-proof .fa-sheet-proof,
        .fa-sheet-stack.state-pattern .fa-sheet-pattern{
            z-index:3;
            box-shadow:0 24px 56px rgba(10,28,64,0.11);
        }
        .fa-sheet-stack.state-symptom .fa-sheet-symptom{top:8px;left:18px;transform:rotate(-1deg);}
        .fa-sheet-stack.state-symptom .fa-sheet-proof{top:86px;left:42px;transform:rotate(0.8deg);z-index:2;}
        .fa-sheet-stack.state-symptom .fa-sheet-pattern{top:166px;left:26px;transform:rotate(-0.5deg);z-index:1;}
        .fa-sheet-stack.state-proof .fa-sheet-proof{top:8px;left:18px;transform:rotate(-0.8deg);}
        .fa-sheet-stack.state-proof .fa-sheet-pattern{top:86px;left:42px;transform:rotate(0.7deg);z-index:2;}
        .fa-sheet-stack.state-proof .fa-sheet-symptom{top:166px;left:26px;transform:rotate(-1deg);z-index:1;}
        .fa-sheet-stack.state-pattern .fa-sheet-pattern{top:8px;left:18px;transform:rotate(-0.6deg);}
        .fa-sheet-stack.state-pattern .fa-sheet-symptom{top:86px;left:42px;transform:rotate(-1deg);z-index:2;}
        .fa-sheet-stack.state-pattern .fa-sheet-proof{top:166px;left:26px;transform:rotate(0.8deg);z-index:1;}
        .fa-sheet-stack.state-symptom .fa-sheet-symptom,
        .fa-sheet-stack.state-proof .fa-sheet-proof,
        .fa-sheet-stack.state-pattern .fa-sheet-pattern{
            order:1;
        }
        .fa-sheet-stack.state-symptom .fa-sheet-proof,
        .fa-sheet-stack.state-proof .fa-sheet-pattern,
        .fa-sheet-stack.state-pattern .fa-sheet-symptom{
            order:2;
        }
        .fa-sheet-stack.state-symptom .fa-sheet-pattern,
        .fa-sheet-stack.state-proof .fa-sheet-symptom,
        .fa-sheet-stack.state-pattern .fa-sheet-proof{
            order:3;
        }
        .fa-sheet-tab{
            display:inline-flex;align-items:center;justify-content:center;
            min-height:30px;padding:0 10px;border-radius:999px;
            font-size:0.64rem;letter-spacing:0.16em;text-transform:uppercase;font-weight:700;
            margin-bottom:12px;
        }
        .fa-sheet-tab.orange{background:rgba(230,112,30,0.12);color:var(--orange);}
        .fa-sheet-tab.blue{background:rgba(36,113,231,0.12);color:var(--blue);}
        .fa-sheet-tab.green{background:rgba(45,122,75,0.12);color:var(--green);}
        .fa-sheet-title{
            font-family:var(--font-serif);
            font-size:2.5rem;
            line-height:.95;
            letter-spacing:-0.06em;
            max-width:8ch;
            color:#0a1c40;
            margin-bottom:14px;
        }
        .fa-sheet-row{
            display:grid;
            grid-template-columns:36px 86px 110px 1fr;
            gap:12px;
            align-items:center;
            padding:10px 0;
            border-top:1px solid rgba(10,28,64,0.08);
        }
        .fa-sheet-row:first-of-type{border-top:0;padding-top:0;}
        .fa-mark{
            width:30px;height:30px;border-radius:50%;
            display:grid;place-items:center;
            font-size:15px;font-weight:700;
        }
        .fa-mark.orange{background:rgba(230,112,30,0.14);color:var(--orange);}
        .fa-mark.blue{background:rgba(36,113,231,0.12);color:var(--blue);}
        .fa-mark.green{background:rgba(45,122,75,0.12);color:var(--green);}
        .fa-row-label,.fa-row-value,.fa-row-copy{font-size:0.82rem;}
        .fa-row-label{letter-spacing:0.16em;text-transform:uppercase;color:#8b9cb4;font-weight:700;}
        .fa-row-value{font-weight:700;}
        .fa-row-value.orange{color:var(--orange);}
        .fa-row-value.blue{color:var(--blue);}
        .fa-row-value.green{color:var(--green);}
        .fa-row-copy{line-height:1.45;color:#10274f;}

        .fa-route-rack{
            display:grid;
            grid-template-columns:repeat(3,minmax(0,1fr));
            gap:26px;
            padding-top:8px;
            align-items:start;
        }
        .fa-route-line{
            display:grid;
            gap:6px;
            padding:14px 0 12px;
            border-top:1px solid rgba(10,28,64,0.08);
            position:relative;
        }
        .fa-route-line::before{
            content:"";
            position:absolute;
            left:0;top:-1px;
            width:72px;height:2px;border-radius:999px;
            background:var(--orange);
        }
        .fa-route-line.blue::before{background:var(--blue);}
        .fa-route-line.green::before{background:var(--green);}
        .fa-route-line:only-child{
            grid-column:1/-1;
            max-width:620px;
        }
        .fa-route-line h4{
            font-size:1.04rem;
            line-height:1.2;
            letter-spacing:-0.02em;
            font-weight:700;
            color:var(--orange);
        }
        .fa-route-line.blue h4{color:var(--blue);}
        .fa-route-line.green h4{color:var(--green);}
        .fa-route-line p{
            font-size:0.86rem;
            line-height:1.55;
            color:#5f7594;
            max-width:58ch;
        }
        .fa-route-link{
            color:var(--blue);
            text-decoration:none;
            font-size:0.72rem;
            letter-spacing:0.16em;
            text-transform:uppercase;
            font-weight:700;
        }
        .fa-body{display:grid;gap:18px;}
        .shell-section{
            position:relative;
            overflow:hidden;
            display:grid;
            gap:18px;
            padding:24px 24px 22px;
            border-radius:28px;
            border:1px solid rgba(10,28,64,0.08);
            background:rgba(255,255,255,0.84);
            box-shadow:0 18px 42px rgba(10,28,64,0.08);
        }
        .shell-section::after{display:none;}
        .shell-section-kicker{
            color:var(--orange);
            font-size:0.66rem;
            letter-spacing:0.16em;
        }
        .shell-section-title{
            color:#0a1c40;
            font-size:1.75rem;
            line-height:1.08;
            letter-spacing:-0.05em;
        }
        .shell-section-copy,.shell-section-note{
            color:#5f7594;
        }
        .fa-bottom-shell{display:grid;gap:24px;}
        .fa-stage-strip{
            display:grid;
            grid-template-columns:1.2fr 0.7fr 0.9fr;
            gap:22px;
            align-items:stretch;
            padding:14px 18px;
            border-radius:24px;
            background:rgba(255,255,255,0.58);
            border:1px solid rgba(10,28,64,0.05);
        }
        .fa-stage-cell{display:grid;gap:6px;align-content:start;}
        .fa-stage-cell + .fa-stage-cell{
            padding-left:22px;
            border-left:1px solid rgba(10,28,64,0.08);
        }
        .fa-stage-label{
            font-size:0.64rem;
            letter-spacing:0.16em;
            text-transform:uppercase;
            color:#8b9cb4;
            font-weight:700;
        }
        .fa-stage-value{
            font-family:"Outfit","Public Sans",sans-serif;
            font-size:1.55rem;
            line-height:1;
            letter-spacing:-0.05em;
            color:#0a1c40;
            font-weight:700;
        }
        .fa-stage-copy{
            font-size:0.82rem;
            line-height:1.55;
            color:#5f7594;
            max-width:34ch;
        }
        .fa-stage-line{
            display:flex;
            gap:12px;
            align-items:center;
            flex-wrap:wrap;
            font-size:0.76rem;
            font-weight:700;
            color:#5f7594;
        }
        .fa-stage-node{
            display:inline-flex;
            align-items:center;
            gap:8px;
        }
        .fa-stage-node::after{
            content:"";
            width:18px;
            height:1px;

        function stageLead(st, topCauseId) {
            var causeVar = CAUSE_LEADS[topCauseId];
            if (causeVar) {
                if (causeVar[st]) return causeVar[st];
                if (causeVar._default) return causeVar._default;
            }
            return STAGE_LEADS[st] || STAGE_LEADS._default;

        // ── AUTOPSY ENGINE ──

        function chooseTasks(v, causes) {
            var sevByCause = {};
            causes.forEach(function(c) { sevByCause[c.id] = c.severity; });
            var stageBoost = function(t) {
                if (v.stage === 'poc' && ['set_exec_readout','quantify_impact','map_decision_process'].indexOf(t.taskId) >= 0) return 4;
                if ((v.stage === 'negotiation' || v.stage === 'verbal') && ['bring_eb_in','map_decision_process','set_exec_readout'].indexOf(t.taskId) >= 0) return 4;
                if ((v.stage === 'discovery' || v.stage === 'evaluation') && ['clarify_use_case','quantify_impact','confirm_champion'].indexOf(t.taskId) >= 0) return 3;
                return 0;
            };
            var valueBoost = v.value >= PREFS.highValueUSD ? 2 : 0;
            return TASKS.map(function(t) {
                var score = t.match.reduce(function(a, id) { return a + (sevByCause[id] || 0); }, 0) + stageBoost(t) + valueBoost;
                return { task: t, score: score };
            }).filter(function(x) { return x.score > 0; })
              .sort(function(a, b) { return b.score - a.score; })
              .slice(0, 5)
              .map(function(x) { return x.task; });
        }

        function killSwitch(v) {
            var ok = v.value <= PREFS.killValueUSD && v.staleDays >= PREFS.staleCriticalDays && v.qualScore <= 6 && v.riskScore >= 70;

                reason: ok ? 'Low value + stale + weak qualification + high risk.' : 'Criteria not fully met for kill switch.',

        function generateAutopsy(v) {
            var causes = dh.topCauses(v, PREFS, 5);
            // Add chapter text from original CAUSES

                no_nextstep:'Calendar ambiguity turned every follow-up into a maybe.',
                stale_thread:'Silence signaled low priority internally.',

                no_eb:'Budget authority stayed invisible until it was too late.',
                no_process:'Unknown steps multiplied slippage and rework.',
                timeline_fantasy:'No forcing function meant no decision pressure.',
                impact_not_real:'Without quantified impact, urgency never materialized.',
                usecase_blurry:'Stakeholders did not align on what success meant.',
                competition_unknown:'You fought an invisible opponent and lost narrative control.',
                late_stage_fragility:'Legal and procurement widened the blast radius instantly.',
                stage_stuck:'Elapsed time became a proxy for hidden no.',
                poc_no_criteria:'The pilot produced activity, not decision-ready proof.',

            };
            causes.forEach(function(c) { c.chapter = CHAPTERS[c.id] || ''; });

            // Win conditions (mirror of causes)
            var wins = [], seen = {};
            causes.forEach(function(c) {
                var wid = WMAP[c.id] || 'momentum_restored';
                if (!seen[wid]) { wins.push({ id: wid, text: WTEXT[wid] || 'Critical win condition satisfied.' }); seen[wid] = 1; }
            });
            while (wins.length < 5) wins.push({ id: 'momentum_' + wins.length, text: 'Momentum restored with named owner and date.' });

            // Stories with variation
            var topCauseId = causes.length > 0 ? causes[0].id : '';
            var loseLead = stageLead(v.stage, topCauseId);
            var winLead = stageWinLead(v.stage);
            var loseTail = causes.length > 0 ? ' Key failure pattern: ' + causes.slice(0, 3).map(function(c) { return c.text.toLowerCase(); }).join(' ') + ' The loss was not dramatic; it was procedural, then inevitable.' : '';
            var winTail = ' Key win pattern: ' + wins.slice(0, 3).map(function(c) { return c.text; }).join(' ') + ' You forced proof early, so the close became an execution step, not a hope exercise.';

            // Tasks
            var tasks = chooseTasks(v, causes).map(function(t) {
                return {
                    taskId: t.taskId, label: t.label, why: t.why,
                    successEvidence: t.evidence, tab: t.tab,
                    script: t.script(v)
                };

            var k = killSwitch(v);

            return {

            score += (v.stage === 'negotiation' || v.stage === 'verbal') ? 10 : 0;
            score += Number(v.qualScore || 0) <= 6 ? 8 : 0;

                if (preferred) {
                    autopsyUniverse.push(preferred);
                    seen[preferred.id] = true;
                }

            allVitals.slice()
                .sort(function(a, b) { return autopsyUniverseScore(b) - autopsyUniverseScore(a); })
                .forEach(function(v){
                    if (seen[v.id] || autopsyUniverse.length >= 6) return;
                    autopsyUniverse.push(v);
                    seen[v.id] = true;

        }

        function getOperationalDue(mode, idx) {
            return mode === 'corrected' ? biz(2 + (idx * 2)) : biz(1 + idx);
        }

        function formatInlineActionLabel(label) {
            var txt = String(label || '').toLowerCase();
            if (txt.indexOf('workspace') >= 0) return 'Open workspace';
            if (txt.indexOf('call planner') >= 0) return 'Open Call Planner';
            if (txt.indexOf('discovery') >= 0) return 'Open Discovery Studio';
            if (txt.indexOf('poc') >= 0) return 'Open PoC Framework';
            if (txt.indexOf('deal') >= 0) return 'Open Deal';
            return label || 'Open';
        }

        function getVerdictConfig(a, v, mode) {
            if (mode === 'corrected') {
                return {
                    headline: 'Control is back in the deal.',
                    intro: 'The missing decision conditions are now explicit.',
                    chips: [
                        'Next step dated',
                        'Owner named',
                        'Budget confirmed',
                        'Proof attached'
                    ],
                    impact: [
                        {
                            title: 'Stage credibility restored',
                            copy: 'Qualification means something again because the institutional gate is now real.'
                        },
                        {
                            title: 'Forecast pressure reduced',
                            copy: 'The deal stops flattering the board with borrowed momentum.'
                        },
                        {
                            title: 'Exit pressure weakened',
                            copy: 'Kill-switch urgency drops because proof, ownership, and sequence are now visible.'
                        }
                    ]
                };
            }
            return {
                headline: 'Control is still missing from the deal.',
                intro: 'The missing decision conditions are still not explicit.',
                chips: (a && a.lose && a.lose.causes || []).slice(0, 4).map(function(c){ return causeLabel(c.id); }),
                impact: [
                    {
                        title: 'Stage credibility weakens',
                        copy: 'The stage label survives longer than the buying reality underneath it.'
                    },
                    {
                        title: 'Forecast pressure rises',
                        copy: 'Activity remains visible enough to preserve optimism, but not enough to preserve control.'
                    },
                    {
                        title: 'Exit pressure stays live',
                        copy: 'There is still a path to recovery, but only if the missing gate gets forced into the deal now.'
                    }
                ]
            };
        }

        function getDocketConfig(a, v, mode) {
            var taskPool = {};
            (a && a.countermeasures || []).forEach(function(t) {
                if (t && t.taskId) taskPool[t.taskId] = t;
            });
            TASKS.forEach(function(t) {
                if (t && t.taskId && !taskPool[t.taskId]) taskPool[t.taskId] = t;
            });
            function pick(id){ return taskPool[id] || null; }

            var orderedTasks = mode === 'corrected'
                ? [pick('get_dated_nextstep'), pick('write_mutual_plan'), pick('multi_thread')]
                : [pick('get_dated_nextstep'), pick('confirm_champion'), pick('bring_eb_in')];

            var tasks = orderedTasks.filter(Boolean).map(function(t, i) {
                var action = getTaskAction(t, v, a);
                return {
                    tag: '0' + (i + 1),
                    tone: mode === 'left' ? 'red' : (i < 2 ? 'green' : 'blue'),
                    title: mode === 'left'
                        ? t.label
                        : (i === 0
                            ? 'Keep the next-step cadence alive'
                            : i === 1
                                ? 'Turn owner into close path'
                                : 'Convert proof into a mutual plan'),
                    why: mode === 'left'
                        ? t.why
                        : (i === 0
                            ? 'Prevents relapse into passive stage language.'
                            : i === 1
                                ? 'Turns the corrected state into a shared operating sequence.'
                                : 'Keeps the deal multi-threaded so the recovery does not collapse back onto one contact.'),
                    status: getOperationalStatus(mode, i),
                    owner: getOperationalOwner(t, v),
                    due: getOperationalDue(mode, i),
                    actionLabel: formatInlineActionLabel(action.label),
                    actionHref: action.href
                };
            });

            return mode === 'corrected'
                ? {
                    title: 'What keeps the recovery intact',
                    sub: 'Keep cadence alive, keep ownership attached, and keep proof tied to the close path.',
                    primaryActionLabel: 'Open Deal Workspace',
                    primaryActionHref: buildFutureAutopsyRoomHref('/app/deal-workspace/?deal=' + encodeURIComponent(v.id), v.name, 'Deal Workspace'),
                    exitPill: 'Exit pressure weakens',
                    exitTone: 'green',
                    exitCopy: 'The deal no longer needs artificial urgency once proof, ownership, and sequence carry the motion.',
                    exitActionLabel: 'Open Deal',
                    exitActionHref: buildFutureAutopsyRoomHref('/app/deal-workspace/?deal=' + encodeURIComponent(v.id), v.name, 'Deal Workspace'),
                    items: tasks
                  }
                : {
                    title: 'What interrupts the collapse',
                    sub: 'Open the deal, force the missing gate into view, and stop the stage from outrunning the thread.',
                    primaryActionLabel: 'Open Deal Workspace',
                    primaryActionHref: buildFutureAutopsyRoomHref('/app/deal-workspace/?deal=' + encodeURIComponent(v.id), v.name, 'Deal Workspace'),
                    exitPill: 'Exit pressure',
                    exitTone: 'red',
                    exitCopy: 'Kill switch stays off for now, but only because there is still a live path to restore the thread.',
                    exitActionLabel: 'Copy close-clean script',
                    exitActionHref: 'javascript:copyKill()',
                    items: tasks
                  };
        }

        function getActionPlan(v, a) {
            var topCauseId = a && a.lose && a.lose.causes && a.lose.causes[0] ? a.lose.causes[0].id : '';
            var primary = {
                key: 'deal',
                title: 'Change the live deal truth',
                copy: 'Open Deal Workspace to change dates, stage, qualification, and ownership immediately.',
                label: 'Open Deal Workspace',
                href: buildFutureAutopsyRoomHref('/app/deal-workspace/?deal=' + encodeURIComponent(v.id), v.name, 'Deal Workspace')
            };
            var secondary;
            if (v.stage === 'poc' || topCauseId === 'poc_no_criteria' || topCauseId === 'impact_not_real') {
                secondary = {
                    key: 'poc',
                    title: 'Tighten the proof design',
                    copy: 'Use PoC Framework to turn the autopsy into success criteria, boundaries, and a real readout path.',
                    label: 'Open PoC Framework',
                    href: buildFutureAutopsyRoomHref('/app/poc-framework/', v.name, 'PoC Framework')
                };
            } else if (['no_champion','no_eb','single_threaded','usecase_blurry','competition_unknown'].indexOf(topCauseId) >= 0 || ['discovery','evaluation','prospect'].indexOf(v.stage) >= 0) {
                secondary = {
                    key: 'call-planner',
                    title: 'Plan the forcing conversation',
                    copy: 'Use Call Planner to force the missing champion, EB, use case, or status-quo truth into the next live meeting.',
                    label: 'Open Call Planner',
                    href: buildFutureAutopsyRoomHref('/app/discovery-agenda/', v.name, 'Call Planner')
                };
            } else {
                secondary = {
                    key: 'discovery',
                    title: 'Work the risk live',
                    copy: 'Use Discovery Studio to take the risk pattern into the next conversation and force the move in real time.',
                    label: 'Open Discovery Studio',
                    href: buildFutureAutopsyRoomHref('/app/discovery-studio/', v.name, 'Discovery Studio')
                };
            }
            var tertiary = secondary.key === 'discovery'
                ? {
                    key: 'call-planner',
                    title: 'Rebuild the agenda',
                    copy: 'If the thread is still live, rebuild the next call around the exposed risk instead of repeating the same conversation.',
                    label: 'Open Call Planner',
                    href: buildFutureAutopsyRoomHref('/app/discovery-agenda/', v.name, 'Call Planner')
                }
                : {
                    key: 'discovery',
                    title: 'Carry the risk into execution',
                    copy: 'Use Discovery Studio to pressure-test the failure theme live instead of keeping it as a theory.',
                    label: 'Open Discovery Studio',
                    href: buildFutureAutopsyRoomHref('/app/discovery-studio/', v.name, 'Discovery Studio')
                };
            return { primary: primary, secondary: secondary, tertiary: tertiary };
        }

        function getTaskAction(task, v, a) {
            if (!task || !v) return { label: 'Open Deal Workspace', href: buildFutureAutopsyRoomHref('/app/deal-workspace/', 'Future Autopsy', 'Deal Workspace') };
            if (task.taskId === 'quantify_impact' && (v.stage === 'poc' || (a && a.lose && a.lose.causes || []).some(function(c){ return c.id === 'poc_no_criteria'; }))) {
                return { label: 'Open PoC Framework', href: buildFutureAutopsyRoomHref('/app/poc-framework/', v.name, 'PoC Framework') };
            }
            if (['bring_eb_in','confirm_champion','clarify_use_case','name_competition','multi_thread','set_exec_readout'].indexOf(task.taskId) >= 0) {
                return { label: 'Open Call Planner', href: buildFutureAutopsyRoomHref('/app/discovery-agenda/', v.name, 'Call Planner') };
            }
            if (task.taskId === 'surface_risks') {
                return { label: 'Open Discovery Studio', href: buildFutureAutopsyRoomHref('/app/discovery-studio/', v.name, 'Discovery Studio') };
            }
            return { label: 'Open Deal Workspace', href: buildFutureAutopsyRoomHref('/app/deal-workspace/?deal=' + encodeURIComponent(v.id), v.name, 'Deal Workspace') };
        }

        function renderFutureAutopsyHealth(a, v) {
            var node = document.getElementById('futureAutopsyHealthPanel');
            if (!node) return;
            node.innerHTML = '';
        }

        function renderAutopsy(a, v) {
            document.getElementById('dealSub').textContent = 'Bring one failure pattern into focus, then route pressure into the room that can still change the outcome.';
            currentActionPlan = getActionPlan(v, a);
            renderForensicFirstFold(a, v);

            var html = '';
            var stageModel = getStageModel(v.stage || '');
            var currentStage = prettyStageLabel(v.stage || '');
            var missingGate = getMissingGate(v, a);
            var verdict = getVerdictConfig(a, v, currentVerdictMode === 'corrected' ? 'corrected' : 'left');
            var docket = getDocketConfig(a, v, currentVerdictMode === 'corrected' ? 'corrected' : 'left');

            html += '<section class="fa-bottom-shell">';
            html += '<section class="fa-stage-strip">';
            html += '<div class="fa-stage-cell">';
            html += '<div class="fa-stage-label">Pipeline path in this workspace</div>';
            html += '<div class="fa-stage-line">';
            stageModel.forEach(function(label) {
                var active = label.toLowerCase() === currentStage.toLowerCase();
                html += '<span class="fa-stage-node' + (active ? ' active' : '') + '"><span class="fa-stage-pill">' + escH(label) + '</span></span>';
            });
            html += '</div>';
            html += '<div class="fa-stage-copy">The strip only orients the deal inside its actual pipeline model. It does not retell the failure anatomy already shown above.</div>';
            html += '</div>';
            html += '<div class="fa-stage-cell">';
            html += '<div class="fa-stage-label">Current stage age</div>';
            html += '<div class="fa-stage-value">' + escH(String(v.staleDays || 0)) + 'd</div>';
            html += '<div class="fa-stage-copy">Time in stage matters because long stage age without a dated next step usually means the label is outrunning reality.</div>';
            html += '</div>';
            html += '<div class="fa-stage-cell">';
            html += '<div class="fa-stage-label">Gate still missing</div>';
            html += '<div class="fa-stage-value">' + escH(missingGate) + '</div>';
            html += '<div class="fa-stage-copy">This is context, not a second diagnosis. It tells the user what institutional gate still has to become real.</div>';
            html += '</div>';
            html += '</section>';

            html += '<section class="fa-verdict-layout fa-verdict-layout--single">';
            html += '<div class="fa-toggle-row" role="tablist" aria-label="Autopsy verdict states">';
            html += '<button class="fa-verdict-toggle' + (currentVerdictMode !== 'corrected' ? ' active-left' : '') + '" type="button" aria-selected="' + (currentVerdictMode !== 'corrected' ? 'true' : 'false') + '" data-fa-action="setFutureAutopsyVerdict" data-fa-arg="left">';
            html += '<span class="fa-verdict-inner"><span class="fa-verdict-mark fa-verdict-mark--fracture"></span><span><span class="fa-verdict-title">If left alone</span></span></span>';
            html += '</button>';
            html += '<button class="fa-verdict-toggle' + (currentVerdictMode === 'corrected' ? ' active-right' : '') + '" type="button" aria-selected="' + (currentVerdictMode === 'corrected' ? 'true' : 'false') + '" data-fa-action="setFutureAutopsyVerdict" data-fa-arg="corrected">';
            html += '<span class="fa-verdict-inner"><span class="fa-verdict-mark fa-verdict-mark--seal"></span><span><span class="fa-verdict-title">If corrected</span></span></span>';
            html += '</button>';
            html += '</div>';

            html += '<aside class="fa-docket-shell">';
            html += '<div class="fa-stage-label">Maintenance docket</div>';
            html += '<div class="fa-docket-title">' + escH(docket.title) + '</div>';
            html += '<div class="fa-docket-sub">' + escH(docket.sub) + '</div>';
            html += '<div class="fa-docket-list">';
            docket.items.forEach(function(item) {
                html += '<div class="fa-docket-item">';
                html += '<div class="fa-docket-tag ' + escH(item.tone) + '">' + escH(item.tag) + '</div>';
                html += '<div><strong>' + escH(item.title) + '</strong><div class="fa-docket-why">' + escH(item.why) + '</div><div class="fa-docket-meta"><span>Status: ' + escH(item.status) + '</span><span>Owner: ' + escH(item.owner) + '</span><span>Due: ' + escH(item.due) + '</span></div></div>';
                html += '<a class="fa-docket-inline" href="' + escH(item.actionHref) + '">' + escH(item.actionLabel) + '</a>';
                html += '</div>';
            });
            html += '</div>';
            html += '<div class="fa-docket-exit">';
            html += '<div class="fa-docket-exit-pill ' + escH(docket.exitTone) + '">' + escH(docket.exitPill) + '</div>';
            html += '<div class="fa-docket-exit-copy">' + escH(docket.exitCopy) + '</div>';
            if (docket.exitActionHref.indexOf('javascript:') === 0) {
                // Extract the function name from "javascript:fnName()" — only no-arg calls supported here
                var jsCall = docket.exitActionHref.replace('javascript:', '').replace(/\s*\(\s*\)\s*;?\s*$/, '');
                html += '<button class="fa-docket-exit-link red" type="button" data-fa-action="' + escH(jsCall) + '">' + escH(docket.exitActionLabel) + '</button>';
            } else {
                html += '<a class="fa-docket-exit-link" href="' + escH(docket.exitActionHref) + '">' + escH(docket.exitActionLabel) + '</a>';
            }
            html += '</div>';
            html += '</aside>';
            html += '</section>';
            html += '</section>';

            document.getElementById('autopsyContent').innerHTML = html;
            renderFutureAutopsyHealth(a, v);
        }

        window.setFutureAutopsyVerdict = function(mode) {
            currentVerdictMode = mode === 'corrected' ? 'corrected' : 'left';
            if (currentAutopsy && currentVitals) renderAutopsy(currentAutopsy, currentVitals);
        };

        window.openAutopsyAction = function(which) {
            if (!currentActionPlan || !currentActionPlan[which]) return;
            location.href = currentActionPlan[which].href;
        };

        window.openTaskSurface = function(idx) {
            if (!currentAutopsy || !currentAutopsy.countermeasures[idx] || !currentVitals) return;
            var action = getTaskAction(currentAutopsy.countermeasures[idx], currentVitals, currentAutopsy);
            location.href = action.href;
        };

        window.copyScript = function(idx) {
            if (!currentAutopsy || !currentAutopsy.countermeasures[idx]) return;
            cp(currentAutopsy.countermeasures[idx].script).then(function() { toast('Script copied'); });
        };

        window.copyKill = function() {
            if (!currentAutopsy) return;
            cp(currentAutopsy.killSwitch.script).then(function() { toast('Close-clean script copied'); });
        };

        window.copyAutopsy = function() {
            var target = getAutopsyCopyTarget();
            if (!target) { toast('Run Future Autopsy first'); return; }
            var a = target.autopsy, v = target.vitals;
            var lines = [
                'FUTURE AUTOPSY \u2014 ' + a.horizonDays + ' DAYS OUT',
                'Deal: ' + v.name + ' \u2014 ' + dh.money(v.value) + ' \u2014 ' + v.stageRaw + ' \u2014 Qual ' + v.qualScore + '/18 \u2014 Risk ' + v.riskScore + '/100',
                '', 'IF WE LOSE'
            ];
            a.lose.causes.forEach(function(c) { lines.push('- ' + c.text + ' (sev ' + c.severity + ')'); });
            lines.push('Story: ' + a.lose.story, '', 'IF WE WIN');
            a.win.conditions.forEach(function(c) { lines.push('- ' + c.text); });
            lines.push('Story: ' + a.win.story, '', 'PROOF TASKS (TOP 5)');
            a.countermeasures.forEach(function(t) { lines.push('[' + (taskState(v.id, t.taskId) ? 'x' : ' ') + '] ' + t.label); });
            lines.push('', 'KILL SWITCH: ' + (a.killSwitch.recommended ? 'Recommended' : 'Not recommended'));
            cp(lines.join('\n')).then(function() { toast(target.pending ? 'Pinned-case brief copied' : 'Autopsy copied'); });
        };

        // ── BOOT ──

        function showFutureAutopsyBootState(kind,title,text){
            if(!window.gtmModuleBootState)return;
            window.gtmModuleBootState.show('#futureAutopsyBootState',{
                kind:kind,
                title:title,
                text:text,
                retryLabel:'Retry Future Autopsy',
                retryAction:'retryFutureAutopsyBoot'
            });
        }
        function clearFutureAutopsyBootState(){
            if(window.gtmModuleBootState)window.gtmModuleBootState.clear('#futureAutopsyBootState');
        }
        function onFutureAutopsyBootFailure(error){
            console.error('Future Autopsy boot failed:',error);
            document.getElementById('autopsyContent').innerHTML='';
            document.getElementById('dealSub').textContent='Future Autopsy failed to load.';
            renderForensicFirstFold(null, null);
            renderFutureAutopsyHealth(null, null);
            showFutureAutopsyBootState(
                'error',
                'Future Autopsy could not load.',
                'Antaeus failed while rebuilding your deal vitals or autopsy context. Retry once. If it fails again, refresh the page and verify that deal data and workspace sync are still healthy.'
            );
        }
        window.retryFutureAutopsyBoot=function(){
            bootFutureAutopsy().catch(onFutureAutopsyBootFailure);
        };

        async function bootFutureAutopsy() {
            showFutureAutopsyBootState(
                'loading',
                'Loading Future Autopsy',
                'Pulling deal vitals and autopsy history before the stress-test view comes online.'
            );
            if (window.gtmPersistence && window.gtmPersistence.docs && typeof window.gtmPersistence.docs.load === 'function') {
                await window.gtmPersistence.docs.load({ keys: ['gtmos_autopsy_log_v1'] }).catch(function(error) {
                    console.error('Future Autopsy docs preload failed:', error);
                });
            }
            if (window.dealHealth && typeof window.dealHealth.preload === 'function') {
                await window.dealHealth.preload().catch(function(error) {
                    console.error('Future Autopsy workspace preload failed:', error);
                });
            }

            loadVitals();
            clearFutureAutopsyBootState();

            if (allVitals.length === 0) {
                document.getElementById('dealSub').textContent = 'No deals to autopsy yet.';
                autopsyUniverse = [];
                selectedDealId = '';
                renderLedger();
                renderForensicFirstFold(null, null);
                renderFutureAutopsyHealth(null, null);
                document.getElementById('autopsyContent').innerHTML = '<div class="fa-empty"><div style="font-size:2rem;margin-bottom:12px;">\ud83d\udd2c</div><div style="font-size:1.1rem;color:var(--text-primary);margin-bottom:8px;">No active deals</div><div>Create your first deal in <a href="/app/deal-workspace/">Deal Workspace</a>, then come back to stress-test it.</div></div>';
            } else {
                var urlDeal = new URLSearchParams(window.location.search).get('deal');
                syncAutopsyUniverse(urlDeal);
                renderLedger();
                if (urlDeal && allVitals.find(function(v) { return v.id === urlDeal; })) {
                    selectedDealId = urlDeal;
                    run(urlDeal);
                } else {
                    autopsyOfDay();
                }
            }
        }

        if (window.__gtmosAuthGatePending && window.requireAuthReady && typeof window.requireAuthReady.then === 'function') {
            window.requireAuthReady.then(bootFutureAutopsy).catch(onFutureAutopsyBootFailure);
        } else if (window.__gtmosAuthGatePending) {
            showFutureAutopsyBootState(
                'loading',
                'Waiting for auth',
                'Future Autopsy is waiting for your authenticated workspace before it rebuilds deal vitals.'
            );
            window.addEventListener('gtmos:auth-ready', function() {
                bootFutureAutopsy().catch(onFutureAutopsyBootFailure);
            }, { once: true });
        } else {
            bootFutureAutopsy().catch(onFutureAutopsyBootFailure);
        }

        // Delegated action dispatcher — replaces inline onclick/onkeydown handlers.
        // Rendered buttons carry data-fa-action="<fnName>" and optional data-fa-arg="<value>".
        // The function must be attached to window (runSelected, selectPinnedCase, etc.).
        function invokeFaAction(el) {
            var name = el.getAttribute('data-fa-action');
            if (!name) return false;
            var fn = window[name];
            if (typeof fn !== 'function') return false;
            var arg = el.getAttribute('data-fa-arg');
            if (arg != null) fn(arg); else fn();
            return true;
        }
        document.addEventListener('click', function(event) {
            var el = event.target.closest('[data-fa-action]');
            if (!el) return;
            if (invokeFaAction(el)) event.preventDefault();
        });
        document.addEventListener('keydown', function(event) {
            if (event.key !== 'Enter' && event.key !== ' ') return;
            var el = event.target.closest('[data-fa-action][role="button"], [data-fa-action][tabindex]');
            if (!el) return;
            if (invokeFaAction(el)) event.preventDefault();
        });
    })();
    </script>
