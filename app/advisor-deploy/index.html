<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advisor Deploy | Antaeus GTM OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=JetBrains+Mono:wght@500;700;800&family=Outfit:wght@600;700;800;900&family=Public+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <style>
        body.room-advisor-deploy{background:linear-gradient(rgba(47,115,232,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(47,115,232,.035) 1px,transparent 1px),radial-gradient(circle at 0 0,rgba(47,115,232,.09),transparent 28%),radial-gradient(circle at 100% 5%,rgba(237,107,31,.08),transparent 30%),#f5f8fc;color:#071735}
        body.room-advisor-deploy .app-main,body.room-advisor-deploy .app-content{background:transparent}
        body.room-advisor-deploy .app-content{max-width:none;padding:0}
        .advisor-room{--ink:#071735;--night:#081225;--paper:#f5f8fc;--white:#fffdfa;--warm:#fbf1e5;--mist:#e8f1fa;--blue:#2f73e8;--orange:#ed6b1f;--green:#287c52;--red:#c94a43;--line:rgba(88,105,132,.2);--line2:rgba(88,105,132,.36);--muted:#647691;--shadow:0 36px 100px rgba(7,23,53,.15);--sans:"Public Sans",sans-serif;--display:"Outfit",sans-serif;--serif:"DM Serif Display",serif;--mono:"JetBrains Mono",monospace;min-height:100vh;padding:34px clamp(22px,3vw,54px) 96px;font-family:var(--sans);color:var(--ink)}

        .ask-sheet{position:absolute;right:52px;top:78px;width:min(520px,36%);min-height:340px;border-radius:12px;background:var(--white);box-shadow:0 36px 90px rgba(7,23,53,.14);padding:32px 34px;transform:rotate(-1.3deg)}.ask-sheet:before{content:"";position:absolute;left:50%;top:-20px;width:76px;height:38px;border-radius:40px 40px 0 0;transform:translateX(-50%);background:rgba(237,107,31,.16);border:1px solid rgba(237,107,31,.24)}.ask-sheet h3{margin-top:18px;color:var(--ink);font-family:var(--serif);font-size:clamp(34px,3.2vw,52px);line-height:.95;letter-spacing:-.052em}.ask-sheet p{margin-top:18px;color:#526783;line-height:1.6;font-size:15px}.ask-sheet textarea{margin-top:20px;min-height:110px;border-radius:18px;background:rgba(245,248,252,.9);font-size:13px;line-height:1.5}

        .secondary-stack{max-width:1780px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:18px}.desk-sheet{border:1px solid var(--line);border-radius:32px;background:rgba(255,253,250,.84);box-shadow:0 18px 58px rgba(7,23,53,.07);overflow:hidden}.desk-sheet.wide{grid-column:1/-1}.sheet-head{width:100%;border:0;background:transparent;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:22px 26px;color:var(--ink);cursor:pointer;text-align:left}.sheet-head h2{color:var(--ink);font:900 30px/.96 var(--display);letter-spacing:-.055em}.sheet-head p{margin-top:7px;color:#647691;font-size:14px;line-height:1.5}.sheet-head span{flex:0 0 auto;color:var(--orange);font:900 10px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase}.desk-sheet.is-open .sheet-head{border-bottom:1px solid var(--line)}.sheet-body{display:none;padding:24px 26px 28px}.desk-sheet.is-open .sheet-body{display:block}

        .pill{display:inline-flex;align-items:center;justify-content:center;min-height:28px;border-radius:999px;border:1px solid rgba(88,105,132,.2);padding:7px 10px;font:900 9px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:#71839d;background:rgba(255,255,255,.64)}.pill.green{color:var(--green);border-color:rgba(40,124,82,.24);background:rgba(40,124,82,.08)}.pill.orange{color:var(--orange);border-color:rgba(237,107,31,.24);background:rgba(237,107,31,.08)}.pill.red{color:var(--red);border-color:rgba(201,74,67,.24);background:rgba(201,74,67,.08)}.pill.blue{color:var(--blue);border-color:rgba(47,115,232,.24);background:rgba(47,115,232,.08)}.outcome-select{min-height:36px;border-radius:999px;padding:8px 12px;border:1px solid rgba(88,105,132,.22);color:var(--ink);background:rgba(255,255,255,.72);font:800 11px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase}
        .impact-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.impact-cell{border-top:1px solid var(--line2);padding-top:16px}.impact-cell strong{display:block;color:var(--ink);font:900 44px/.9 var(--display);letter-spacing:-.07em}.impact-cell span{display:block;margin-top:8px;color:#647691;font:900 10px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase}.toast{position:fixed;right:24px;bottom:24px;z-index:200;padding:12px 16px;border-radius:999px;background:rgba(7,23,53,.94);color:#fffdfa;box-shadow:0 22px 60px rgba(7,23,53,.18);font:900 11px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;opacity:0;transform:translateY(8px);pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:none}.empty-note{padding:22px;border-radius:24px;background:rgba(232,241,250,.72);color:#647691;line-height:1.55}
        @media (max-width:1320px){.desk-hero,.secondary-stack,.registry-grid{grid-template-columns:1fr}.desk-read{justify-self:stretch}.desktop{min-height:960px;display:grid;gap:22px;padding:28px}.proof-blotter,.rolodex,.ask-sheet,.stamp-strip,.desk-edge{position:relative;left:auto;right:auto;top:auto;bottom:auto;width:auto;margin:0;transform:none}.proof-blotter{min-height:260px}.rolodex{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.contact-tab{margin:0;transform:none!important;border-radius:0 24px 24px 0}.stamp-strip{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));justify-items:center}.desk-edge{grid-template-columns:repeat(2,minmax(0,1fr))}}

<body class="room-advisor-deploy">
<script src="/js/app-auth-preflight.js"></script>
<div class="app-container">
    <aside class="app-sidebar">
        <script src="/js/analytics-site-config.js"></script>
        <script src="/js/analytics.js"></script>
        <!--
            Wave 6 — flag-based cutover to /advisor-deploy/ Preact rebuild.
            When the Posthog feature flag `room_advisor_deploy_v2` is ON
            for the current user, redirect to the new room. Otherwise the
            legacy room renders normally.

            Skip-redirect escape hatch: ?demo=1 or ?qa=1 keeps the
            legacy room loading. Used by the CI Playwright smoke tests
            + the demo-seed bootstrap path.

            Uses the post-PR-#24 event-listener pattern:
              1. Fast path: maybeRedirect runs immediately for warm-cache
                 visits where Posthog SDK is already loaded.
              2. Cold path: listens for the gtmos:posthog-ready event
                 dispatched by js/analytics.js after the Posthog SDK
                 script's onload + posthog.init runs.

            Ref: deliverables/adr/adr-001-foundation-stack-migration-2026-04-21.md §6
        -->
        <script>
            (function () {
                var qs = window.location.search || "";
                if (qs.indexOf("demo=1") !== -1 || qs.indexOf("qa=1") !== -1) {
                    return;
                }
                function maybeRedirect() {
                    if (typeof posthog === "undefined" || !posthog.onFeatureFlags) {
                        return false;
                    }
                    posthog.onFeatureFlags(function () {
                        if (posthog.isFeatureEnabled("room_advisor_deploy_v2")) {
                            var hash = window.location.hash || "";
                            window.location.replace("/advisor-deploy/" + qs + hash);
                        }
                    });
                    return true;
                }
                if (maybeRedirect()) return;
                window.addEventListener(
                    "gtmos:posthog-ready",
                    maybeRedirect,
                    { once: true }
                );
            })();
        </script>
        <script src="/js/data-manager.js"></script>
        <script src="/js/demo-storage-bootstrap.js"></script>
        <script src="/js/workspace-guard.js"></script>
        <script src="/js/nav.js"></script>
    </aside>
    <main class="app-main">
        <div class="app-content">
            <section class="advisor-room" id="advisorRoom">
                <div class="advisor-mast">
                    <div><strong>Advisor Deploy</strong> / backchannel desk</div>
                    <div class="advisor-topbar">
                        <button class="desk-btn" type="button" data-action="reset-route">Reset route</button>
                        <button class="desk-btn blue" type="button" data-action="copy-ask">Copy ask</button>
                        <button class="desk-btn" type="button" data-action="export-pack">Export pack</button>
                        <button class="desk-btn primary" type="button" data-action="log-send">Log send</button>
                    </div>
                </div>

                <section class="desk-board" aria-labelledby="advisorDeskTitle">
                    <div class="desk-hero">
                        <div>
                            <div class="desk-kicker">Private influence desk</div>
                            <h1 class="desk-title" id="advisorDeskTitle">Prepare one backchannel ask before you spend trust.</h1>
                            <p class="desk-note" id="deskNote">Choose the live deal, pick the carrier, and ship only the ask that is specific enough for an advisor to act on without interpreting the deal.</p>
                        </div>
                        <aside class="desk-read" id="deskRead"></aside>
                    </div>

                    <div class="desk-route" aria-label="Advisor route controls">
                        <div class="route-cell">
                            <label for="dealSelect">Deal</label>
                            <select class="desk-select" id="dealSelect"></select>
                        </div>
                        <div class="route-cell">
                            <label for="advisorSelect">Carrier</label>
                            <select class="desk-select" id="advisorSelect"></select>
                        </div>
                        <div class="route-cell">
                            <label for="momentSelect">Ask moment</label>
                            <select class="desk-select" id="momentSelect"></select>
                        </div>
                    </div>

                    <div class="desktop">
                        <article class="proof-blotter" id="proofBlotter"></article>
                        <div class="rolodex" id="advisorRolodex" aria-label="Advisor rolodex"></div>
                        <article class="ask-sheet" id="askSheet"></article>
                        <div class="stamp-strip" aria-label="Deployment outcome stamps">
                            <button class="stamp send" type="button" data-action="log-send">Send</button>
                            <button class="stamp hold" type="button" data-action="log-hold">Hold</button>
                            <button class="stamp reroute" type="button" data-action="log-reroute">Reroute</button>
                        </div>
                        <div class="desk-edge" id="deskEdge"></div>
                    </div>
                </section>

                <section class="secondary-stack" aria-label="Advisor secondary sheets">
                    <article class="desk-sheet is-open" id="registrySheet">
                        <button class="sheet-head" type="button" data-action="toggle-sheet" data-target="registrySheet">
                            <div>
                                <h2>Advisor registry</h2>
                                <p>Add relationships, then attach them to the companies where they can actually carry weight.</p>
                            </div>
                            <span>edit carriers</span>
                        </button>
                        <div class="sheet-body">
                            <div class="registry-grid">
                                <form id="advisorForm" class="form-grid">
                                    <div class="field">
                                        <label for="advisorName">Name</label>
                                        <input class="desk-input" id="advisorName" type="text" placeholder="Sarah Chen">
                                    </div>
                                    <div class="field">
                                        <label for="advisorTitle">Role</label>
                                        <input class="desk-input" id="advisorTitle" type="text" placeholder="Board member, operator, customer">
                                    </div>
                                    <div class="field">
                                        <label for="advisorTier">Tier</label>
                                        <select class="desk-select" id="advisorTier">
                                            <option value="t1">Board / investor</option>
                                            <option value="t2">Strategic advisor</option>
                                            <option value="t3">Angel / portfolio</option>
                                            <option value="t4">Customer reference</option>
                                        </select>
                                    </div>
                                    <div class="field">
                                        <label for="advisorExpertise">Expertise</label>
                                        <input class="desk-input" id="advisorExpertise" type="text" placeholder="Enterprise SaaS, CX, procurement">
                                    </div>
                                    <div class="field full">
                                        <label for="advisorCompanies">Companies</label>
                                        <input class="desk-input" id="advisorCompanies" type="text" placeholder="Meridian Logistics, Northstar Financial">
                                    </div>
                                    <div class="field full">
                                        <label for="advisorNotes">Notes</label>
                                        <textarea class="desk-textarea" id="advisorNotes" placeholder="What kind of ask should this person carry?"></textarea>
                                    </div>
                                    <div class="field full">
                                        <button class="desk-btn primary" type="submit">Save advisor</button>
                                    </div>
                                </form>
                                <div class="advisor-list" id="advisorList"></div>
                            </div>
                        </div>
                    </article>

                    <article class="desk-sheet is-open" id="deploymentSheet">
                        <button class="sheet-head" type="button" data-action="toggle-sheet" data-target="deploymentSheet">
                            <div>
                                <h2>Deployment loops</h2>
                                <p>Every ask should return as a deal update, an advisor hold, or a reroute.</p>
                            </div>
                            <span>track results</span>
                        </button>
                        <div class="sheet-body">
                            <div class="deployment-list" id="deploymentList"></div>
                        </div>
                    </article>

                    <article class="desk-sheet wide is-open" id="impactSheet">
                        <button class="sheet-head" type="button" data-action="toggle-sheet" data-target="impactSheet">
                            <div>
                                <h2>Desk read</h2>
                                <p>The room should tell you whether outside leverage is mapped, justified, and returning evidence.</p>
                            </div>
                            <span>system health</span>
                        </button>
                        <div class="sheet-body">
                            <div class="impact-grid" id="impactGrid"></div>
                            <div class="impact-list" id="impactList" style="margin-top:18px;"></div>
                            <div class="advisor-topbar" style="margin-top:18px;">
                                <button class="desk-btn blue" type="button" data-action="open-deal">Open Deal Workspace</button>
                                <button class="desk-btn" type="button" data-action="open-autopsy">Open Future Autopsy</button>
                                <button class="desk-btn green" type="button" data-action="open-poc">Open PoC Framework</button>
                            </div>
                        </div>
                    </article>
                </section>
            </section>
            <div class="toast" id="toast"></div>
