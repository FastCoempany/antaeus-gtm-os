<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="robots" content="noindex" />
<meta http-equiv="refresh" content="0; url=/quota-workback/" />
<title>Redirecting to /quota-workback/</title>
<link rel="canonical" href="/quota-workback/" />
<script>
// Phase 4 deletion sweep: this legacy path was retired in PR #45.
// Operators land on the canonical room. Keep the stub so old bookmarks
// + emailed links don't 404.
(function () {
  try {
    var qs = window.location.search || "";
    var hash = window.location.hash || "";
    window.location.replace("/quota-workback/" + qs + hash);
  } catch (e) {
    /* meta-refresh handles the fallback */
  }
})();
</script>
</head>
<body>
<p>Redirecting to <a href="/quota-workback/">/quota-workback/</a>…</p>
</body>
</html>
