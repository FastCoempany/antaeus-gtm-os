<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Antaeus GTM OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">ANTAEUS</div>
            <p class="auth-subtitle">Create your GTM workspace</p>
            
            <form id="signupForm">
                <div class="form-group">
                    <label class="form-label" for="fullName">Full Name</label>
                    <input type="text" id="fullName" class="form-input" placeholder="Jane Doe" required autocomplete="name">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="email">Work Email</label>
                    <input type="email" id="email" class="form-input" placeholder="you@company.com" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
                    <p class="form-hint">Minimum 8 characters</p>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="role">Your Role</label>
                    <select id="role" class="form-select" required>
                        <option value="">Select your role...</option>
                        <option value="ae">Account Executive</option>
                        <option value="sdr">SDR / BDR</option>
                        <option value="sales_lead">Sales Leader</option>
                        <option value="founder">Founder / CEO</option>
                        <option value="revops">Revenue Operations</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <div id="errorMessage" class="callout callout-danger mb-md hidden">
                    <span id="errorText"></span>
                </div>
                
                <div id="successMessage" class="callout callout-success mb-md hidden">
                    <strong>Check your email!</strong><br>
                    We've sent you a confirmation link. Click it to activate your account.
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg btn-block" id="submitBtn">
                    <span id="btnText">Create Account</span>
                    <div class="spinner hidden" id="btnSpinner"></div>
                </button>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>
    
    <script src="js/analytics-site-config.js"></script>
    <script src="js/analytics.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/onboarding.js"></script>
    <script>
        function withTimeout(promise, ms) {
            return Promise.race([
                promise,
                new Promise(function(_, reject) {
                    setTimeout(function() { reject(new Error('Request timed out. Please check your internet connection and try again.')); }, ms);
                })
            ]);
        }
        async function routeAfterAuth(session) {
            try {
                if (typeof window.resolvePostAuthRoute === 'function') {
                    window.location.href = await window.resolvePostAuthRoute(session, { force: true });
                    return;
                }
            } catch (e) {
                console.error('Post-auth routing failed:', e);
            }

            if (window.gtmOnboarding && !window.gtmOnboarding.isCompleted()) {
                window.location.href = '/app/onboarding/';
                return;
            }

            window.location.href = '/app/dashboard/';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!window.supabase || !window.supabase.createClient) {
                document.getElementById('errorText').textContent = 'Unable to connect. Check your internet and try again.';
                document.getElementById('errorMessage').classList.remove('hidden');
                document.getElementById('submitBtn').disabled = true;
                return;
            }
            initSupabase();
            try {
                const session = await withTimeout(auth.getSession(), 8000);
                if (session) await routeAfterAuth(session);
            } catch(e) { /* ignore — just show signup form */ }
        });
        
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (window.gtmAnalytics) window.gtmAnalytics.track('signup_submit', { form: 'signup' });
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const successMessage = document.getElementById('successMessage');
            
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');
            submitBtn.disabled = true;
            btnText.textContent = 'Creating account...';
            btnSpinner.classList.remove('hidden');
            
            try {
                const redirectUrl = window.location.origin + "/auth/callback/";

                const signupData = await withTimeout(auth.signUp(
                email,
                password,
                { full_name: fullName, role: role },
                redirectUrl
                ), 10000);

                if (!signupData) throw new Error('Failed to create account');

                if (signupData.user && signupData.user.identities && signupData.user.identities.length === 0) {
                throw new Error("An account with this email already exists.");
                }

                if (signupData.session) {
                    if (window.gtmAnalytics) window.gtmAnalytics.track('signup_success', { form: 'signup', immediate_session: true });
                    await routeAfterAuth(signupData.session);
                    return;
                }

                if (window.gtmAnalytics) window.gtmAnalytics.track('signup_confirmation_sent', { form: 'signup' });
                successMessage.classList.remove("hidden");
                document.getElementById("signupForm").reset();
                submitBtn.style.display = "none";

            } catch (error) {
                var msg = (error && error.message) ? error.message : '';
                var isConnectivityError = /timed out|network|failed to fetch|connect/i.test(msg);
                errorText.textContent = isConnectivityError ? 'Unable to connect. Check your internet and try again.' : (msg || 'Failed to create account');
                if (window.gtmAnalytics) window.gtmAnalytics.track('signup_error', { form: 'signup', message: msg || 'Failed to create account' });
                errorMessage.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Create Account';
                btnSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
