<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Antaeus</title>
  <script>
    (function () {
      try {
        var raw = window.localStorage.getItem('antaeus-auth-token');
        if (raw) {
          var parsed = JSON.parse(raw);
          var hasSession = !!(
            (parsed && parsed.access_token) ||
            (parsed && parsed.refresh_token) ||
            (parsed &&
              parsed.currentSession &&
              (parsed.currentSession.access_token || parsed.currentSession.refresh_token)) ||
            (parsed &&
              parsed.session &&
              (parsed.session.access_token || parsed.session.refresh_token))
          );
          if (hasSession) {
            var profileRaw = window.localStorage.getItem('gtmos_profile_cache');
            var onboardingRaw = window.localStorage.getItem('gtmos_onboarding');
            var profile = profileRaw ? JSON.parse(profileRaw) : null;
            var onboarding = onboardingRaw ? JSON.parse(onboardingRaw) : null;
            var profileId = profile && profile.id ? String(profile.id).trim() : '';
            var welcomeKey = profileId ? ('gtmos_welcome_seen__user_' + profileId) : 'gtmos_welcome_seen';
            var seen = window.localStorage.getItem(welcomeKey);
            if (profileId && welcomeKey !== 'gtmos_welcome_seen' && (seen !== '1' && seen !== 'true')) {
              var legacySeen = window.localStorage.getItem('gtmos_welcome_seen');
              if (legacySeen === '1' || legacySeen === 'true') seen = legacySeen;
            }

            var completed = !!(
              (profile && profile.onboarding_completed === true) ||
              (onboarding && onboarding.completed === true)
            );
            var route = !completed ? '/app/onboarding/' : ((seen === '1' || seen === 'true') ? '/app/dashboard/' : '/app/welcome/');
            window.location.replace(route);
            return;
          }
        }

        window.location.replace('/coming-soon.html');
      } catch (e) {
        window.location.replace('/coming-soon.html');
      }
    })();
  </script>
</head>
<body>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/coming-soon.html" />
    <p><a href="/coming-soon.html">Continue to Antaeus</a></p>
  </noscript>
</body>
</html>
