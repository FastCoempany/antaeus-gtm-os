<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discovery Studio Control Face 02 - Signal Spine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f8fd;--ink:#0d2756;--muted:#6f87ac;--line:rgba(13,39,86,.12);--line2:rgba(13,39,86,.22);
      --blue:#2c6ef2;--orange:#eb7b26;--green:#2f8a57;--red:#c84d4d;--wash:#ffffff;
    }
    *{box-sizing:border-box} html,body{margin:0;padding:0}
    body{
      font-family:"Public Sans",sans-serif;color:var(--ink);
      background:
        radial-gradient(circle at 18% 0%, rgba(44,110,242,.08), transparent 22%),
        radial-gradient(circle at 92% 0%, rgba(235,123,38,.08), transparent 20%),
        linear-gradient(180deg,#fbfdff 0%, var(--bg) 100%);
      padding:22px;
    }
    button{font:inherit}
    .page{max-width:1680px;margin:0 auto}
    .top{
      display:grid;grid-template-columns:minmax(0,1fr) auto;gap:18px;align-items:start;
      padding-bottom:16px;border-bottom:1px solid var(--line2);
    }
    .eyebrow,.tiny,.tab{font-size:11px;letter-spacing:.28em;text-transform:uppercase;font-weight:700}
    .eyebrow{color:var(--orange)}
    .headline{margin-top:8px;font-family:"Outfit",sans-serif;font-size:40px;line-height:.94;letter-spacing:-.06em;max-width:12ch}
    .sub{margin-top:10px;max-width:60ch;font-size:14px;line-height:1.72;color:var(--muted)}
    .meta{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .metaItem{padding:10px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.8);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
    .frameworkStrip{
      display:flex;gap:12px;overflow:auto;padding:14px 0 6px;border-bottom:1px solid var(--line);margin-bottom:18px;
      scrollbar-width:none;
    }
    .frameworkStrip::-webkit-scrollbar{display:none}
    .frameworkBtn{
      display:inline-flex;align-items:center;gap:10px;padding:8px 0;border:0;background:none;color:#97a8c1;cursor:pointer;white-space:nowrap;
    }
    .frameworkBtn .dot,.segDot,.replyDot,.recDot,.footDot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(13,39,86,.16);position:relative;flex:0 0 auto}
    .frameworkBtn .dot::after,.segDot::after,.replyDot::after,.recDot::after,.footDot::after{content:"";position:absolute;inset:3px;border-radius:50%;background:#d7e0ee}
    .frameworkBtn.active{color:var(--ink)}
    .frameworkBtn.active .dot::after{background:var(--orange)}
    .layout{display:grid;grid-template-columns:180px minmax(0,1fr) 270px;gap:30px}
    .ladder,.recover{position:sticky;top:20px;align-self:start}
    .tiny{color:#98aac5}
    .segRail{margin-top:12px;border-top:1px solid var(--line)}
    .segBtn{
      width:100%;display:grid;grid-template-columns:12px 38px minmax(0,1fr);gap:12px;align-items:center;
      padding:12px 0;border:0;border-bottom:1px solid var(--line);background:none;text-align:left;cursor:pointer;color:inherit;
    }
    .segBtn.active .segDot::after{background:var(--orange)}
    .segBtn.active .segName{color:var(--ink)}
    .segNum{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#9db0ca;font-weight:700}
    .segName{font-size:15px;line-height:1.28;color:#8da1bc;font-weight:700}
    .stage{
      display:grid;gap:18px;padding-right:6px;
    }
    .activePlate{
      padding:6px 0 18px;border-bottom:1px solid var(--line2);
    }
    .plateHead{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center}
    .plateMark{
      width:42px;height:42px;border-radius:50%;border:1px solid rgba(235,123,38,.22);background:rgba(235,123,38,.08);
      position:relative;
    }
    .plateMark::after{content:"";position:absolute;inset:11px;border-radius:50%;background:var(--orange)}
    .plateTitle{font-family:"Outfit",sans-serif;font-size:28px;line-height:.96;letter-spacing:-.05em}
    .plateCue{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#9aabc4;font-weight:700}
    .plateState{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);font-weight:700}
    .sayGrid{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(260px,.8fr);gap:26px;margin-top:18px}
    .sayK,.asideK{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:#9aacc6;font-weight:700}
    .sayNow{margin-top:10px;font-family:"Outfit",sans-serif;font-size:54px;line-height:.93;letter-spacing:-.065em;max-width:15ch}
    .saySub{margin-top:10px;font-size:14px;line-height:1.72;color:var(--muted);max-width:56ch}
    .replyList{display:grid;gap:0;border-top:1px solid var(--line)}
    .reply{
      width:100%;display:grid;grid-template-columns:12px minmax(0,1fr);gap:12px;align-items:start;
      padding:14px 0;border:0;border-bottom:1px solid var(--line);background:none;text-align:left;cursor:pointer;color:inherit;
    }
    .reply.green .replyDot::after{background:var(--green)} .reply.orange .replyDot::after{background:var(--orange)} .reply.red .replyDot::after{background:var(--red)}
    .replyMeta{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#9aadca;font-weight:700}
    .replyQuote{margin-top:7px;font-size:21px;line-height:1.08;letter-spacing:-.04em;font-weight:700;max-width:24ch}
    .replyCopy{margin-top:7px;font-size:13px;line-height:1.66;color:var(--muted);max-width:44ch}
    .nextStack{display:grid;gap:18px}
    .nextBlock{padding-bottom:14px;border-bottom:1px solid var(--line)}
    .nextLine{margin-top:8px;font-family:"Outfit",sans-serif;font-size:28px;line-height:.96;letter-spacing:-.05em;max-width:14ch}
    .body{margin-top:8px;font-size:13px;line-height:1.74;color:var(--muted)}
    .compressedList{display:grid;gap:0}
    .compressed{
      width:100%;display:grid;grid-template-columns:36px minmax(0,1fr) auto;gap:16px;align-items:center;
      padding:14px 0;border:0;border-bottom:1px solid var(--line);background:none;text-align:left;cursor:pointer;color:inherit;
    }
    .compressedTitle{font-family:"Outfit",sans-serif;font-size:24px;line-height:.96;letter-spacing:-.05em}
    .compressedCue{font-size:13px;line-height:1.6;color:var(--muted)}
    .compressedState{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#9eafca;font-weight:700}
    .footerDock{
      display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:24px;padding-top:18px;border-top:1px solid var(--line2);
    }
    .footHead{display:flex;align-items:center;gap:10px}
    .footDot.truth::after{background:var(--blue)} .footDot.worked::after{background:var(--green)} .footDot.lock::after{background:var(--orange)}
    .footTitle{font-family:"Outfit",sans-serif;font-size:24px;line-height:.96;letter-spacing:-.05em}
    .recoverList{margin-top:12px;border-top:1px solid var(--line)}
    .recoverItem{display:grid;grid-template-columns:12px minmax(0,1fr);gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
    .recDot.loss::after{background:var(--red)} .recDot.proof::after{background:var(--orange)} .recDot.clean::after{background:var(--blue)} .recDot.room::after{background:#9db7ff}
    .recTitle{font-size:14px;line-height:1.35;font-weight:700}
    .recCopy{margin-top:5px;font-size:13px;line-height:1.7;color:var(--muted)}
    @media (max-width: 1320px){
      .layout{grid-template-columns:170px minmax(0,1fr)}
      .recover{grid-column:1 / -1;position:static}
    }
    @media (max-width: 960px){
      .layout{grid-template-columns:1fr}
      .ladder{position:static}
      .sayGrid,.footerDock{grid-template-columns:1fr}
      .frameworkStrip{padding-top:10px}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top">
      <div>
        <div class="eyebrow">Discovery Studio · Control Face 02</div>
        <div class="headline">Signal spine.</div>
        <div class="sub">The active segment becomes a sheet at center stage. Everything else compresses into a quick-jump spine so the rep keeps one thought in hand at a time.</div>
      </div>
      <div class="meta">
        <div class="metaItem">9 framework slots</div>
        <div class="metaItem">1 active sheet</div>
        <div class="metaItem">sticky rescue</div>
      </div>
    </div>

    <div class="frameworkStrip" id="frameworkStrip"></div>

    <div class="layout">
      <aside class="ladder">
        <div class="tiny">Segment spine</div>
        <div class="segRail" id="segRail"></div>
      </aside>

      <main class="stage">
        <section class="activePlate" id="activePlate"></section>
        <section class="compressedList" id="compressedList"></section>
        <section class="footerDock" id="footerDock"></section>
      </main>

      <aside class="recover">
        <div class="tiny">Recover the call</div>
        <div class="recoverList" id="recoverList"></div>
      </aside>
    </div>
  </div>

  <script>
    const frameworks = ['Legal','Recruiting','Product / UX','GovTech','Customer Support','Sales / Revenue','Manufacturing','Data / Intelligence','AI-Native'];
    const segments = [
      {id:'o',n:'01',t:'Opening frame',c:'Permission + hypothesis',say:'Most teams I talk to already have support automation, but the human queue still carries the expensive edge cases. Is that true here too?', replies:[
        {tone:'green',meta:'They correct usefully',quote:'"Mostly. The problem is the bot can answer, but not resolve."',copy:'Good. They are giving you the real boundary.'},
        {tone:'orange',meta:'They stay broad',quote:'"We have a normal support stack."',copy:'Still too abstract. Force a workflow answer.'}
      ], next:'Name the system and the human handoff.', learn:'Hypothesis accepted or corrected.', worked:'Hypothesis opener', lock:'No lock yet.'},
      {id:'c',n:'02',t:'Current-state truth',c:'Workflow before pitch',say:'From what I could tell, it looks like you are running Zendesk or Intercom for ticketing, probably doing email and chat, maybe some phone. Is that roughly right, or more complicated than that?', replies:[
        {tone:'green',meta:'Detailed answer',quote:'"Yeah, we are on Intercom, doing about 15K tickets a month. Team of 25. Bots mostly deflect."',copy:'Now the workflow is real.'},
        {tone:'orange',meta:'Thin answer',quote:'"We use Zendesk. Support team is about 20 people. Pretty standard."',copy:'Need numbers, channels, and failure modes.'},
        {tone:'red',meta:'Defensive answer',quote:'"Why do you need to know our setup? Can you not just show me the product?"',copy:'Trust is not earned yet.'}
      ], next:'Of those tickets, what percentage truly needs human judgment?', learn:'Stack, volume, channels, and team shape.', worked:'Current-state opener', lock:'Still earning context.'},
      {id:'p',n:'03',t:'Pain and consequence',c:'Name the breakage',say:'Where does the current setup start hurting: cost, speed, quality, burnout, or all of the above?', replies:[], next:'Push to one named consequence.', learn:'A painful outcome is now concrete.', worked:'Pain sharpened', lock:'No lock until pain has an owner.'},
      {id:'u',n:'04',t:'Trigger and urgency',c:'Why now',say:'What changed recently that made this worth looking at now?', replies:[], next:'Separate real urgency from ambient curiosity.', learn:'Trigger enters the call record.', worked:'Trigger surfaced', lock:'Still no dated move.'},
      {id:'s',n:'05',t:'Stakeholder and ownership',c:'Owner, approver, blocker',say:'Who actually owns this pain, and who would own a change if this became real?', replies:[], next:'Separate pain owner from budget owner.', learn:'Stakeholder map forms.', worked:'Owner map', lock:'Can only lock if the owner is real.'},
      {id:'f',n:'06',t:'Proof threshold',c:'What proof matters',say:'What would they need to believe before change feels safe enough to move?', replies:[], next:'Choose the lightest valid proof.', learn:'Proof path named.', worked:'Proof route', lock:'No lock without proof fit.'},
      {id:'d',n:'07',t:'Current vendor and displacement',c:'What are they defending',say:'What have they tried already, and what still keeps the status quo alive?', replies:[], next:'Expose switching cost and political inertia.', learn:'Displacement path visible.', worked:'Displacement route', lock:'Still pre-lock.'},
      {id:'a',n:'08',t:'Decision architecture',c:'Real approval path',say:'If this became real, what would the decision path actually look like?', replies:[], next:'Map the gates before you ask for motion.', learn:'Decision path named.', worked:'Decision map', lock:'Lock only if path is navigable.'},
      {id:'n',n:'09',t:'Next-step lock',c:'Date, owner, purpose',say:'What is the next review worth taking, and who must be there?', replies:[], next:'Turn the branch into a real calendar event.', learn:'Next action becomes explicit.', worked:'Next step locked', lock:'This is the first true lock.'},
      {id:'r',n:'10',t:'Post-call routing',c:'Carry truth forward',say:'What should move to Deal Workspace, what should stay in Call Planner, and what belongs in Future Autopsy?', replies:[], next:'Export only earned truth.', learn:'Handoff package ready.', worked:'Handoff packaged', lock:'Route only.'}
    ];
    const recover = [
      {tone:'loss',title:'If they answer vaguely',copy:'Shrink the question and force one correction.'},
      {tone:'proof',title:'If they ask for proof early',copy:'Ask what belief they want to earn before choosing proof.'},
      {tone:'clean',title:'If they answer cleanly',copy:'Move to consequence. Do not admire the setup for too long.'},
      {tone:'room',title:'If you need the next room',copy:'Carry only earned truth, missing truth, and the branch condition.'}
    ];
    let activeFramework = 4;
    let activeSegment = 'c';
    let activeReply = 0;

    function current(){ return segments.find(x => x.id === activeSegment); }

    function renderFrameworks(){
      document.getElementById('frameworkStrip').innerHTML = frameworks.map((f,i)=>`
        <button class="frameworkBtn ${i===activeFramework?'active':''}" onclick="activeFramework=${i};render()">
          <span class="dot"></span><span>${f}</span>
        </button>
      `).join('');
    }
    function renderRail(){
      document.getElementById('segRail').innerHTML = segments.map(s=>`
        <button class="segBtn ${s.id===activeSegment?'active':''}" onclick="activeSegment='${s.id}';activeReply=0;render()">
          <span class="segDot"></span><span class="segNum">${s.n}</span><span class="segName">${s.t}</span>
        </button>
      `).join('');
    }
    function renderActive(){
      const s = current(), r = (s.replies||[])[activeReply];
      document.getElementById('activePlate').innerHTML = `
        <div class="plateHead">
          <span class="plateMark"></span>
          <div>
            <div class="plateCue">${s.c}</div>
            <div class="plateTitle">${s.t}</div>
          </div>
          <div class="plateState">active</div>
        </div>
        <div class="sayGrid">
          <div>
            <div class="sayK">Say this now</div>
            <div class="sayNow">${s.say}</div>
            <div class="saySub">${s.c}. Keep the language speakable and controlled.</div>
            <div class="replyList">
              ${(s.replies||[]).length ? s.replies.map((reply,i)=>`
                <button class="reply ${reply.tone}" onclick="activeReply=${i};render()">
                  <span class="replyDot"></span>
                  <span>
                    <span class="replyMeta">${reply.meta}</span>
                    <span class="replyQuote">${reply.quote}</span>
                    <span class="replyCopy">${reply.copy}</span>
                  </span>
                </button>
              `).join('') : `<div class="body">This segment stays compressed until it becomes the live part of the call.</div>`}
            </div>
          </div>
          <div class="nextStack">
            <div class="nextBlock">
              <div class="asideK">Say next</div>
              <div class="nextLine">${s.next}</div>
              <div class="body">${r ? r.copy : s.learn}</div>
            </div>
            <div class="nextBlock">
              <div class="asideK">Learned truth</div>
              <div class="body">${s.learn}</div>
            </div>
            <div class="nextBlock">
              <div class="asideK">Lock condition</div>
              <div class="body">${s.lock}</div>
            </div>
          </div>
        </div>
      `;
    }
    function renderCompressed(){
      document.getElementById('compressedList').innerHTML = segments.filter(s=>s.id!==activeSegment).map(s=>`
        <button class="compressed" onclick="activeSegment='${s.id}';activeReply=0;render()">
          <span class="segNum">${s.n}</span>
          <span>
            <span class="compressedTitle">${s.t}</span>
            <span class="compressedCue">${s.c}</span>
          </span>
          <span class="compressedState">${s.state || 'queued'}</span>
        </button>
      `).join('');
    }
    function renderFooter(){
      const s = current();
      document.getElementById('footerDock').innerHTML = `
        <div>
          <div class="footHead"><span class="footDot truth"></span><span class="footTitle">Learned truth</span></div>
          <div class="body">${s.learn}</div>
        </div>
        <div>
          <div class="footHead"><span class="footDot worked"></span><span class="footTitle">Worked memory</span></div>
          <div class="body">${s.worked}</div>
        </div>
        <div>
          <div class="footHead"><span class="footDot lock"></span><span class="footTitle">Next-step lock</span></div>
          <div class="body">${s.lock}</div>
        </div>
      `;
    }
    function renderRecover(){
      document.getElementById('recoverList').innerHTML = recover.map(item=>`
        <div class="recoverItem">
          <span class="recDot ${item.tone}"></span>
          <span><div class="recTitle">${item.title}</div><div class="recCopy">${item.copy}</div></span>
        </div>
      `).join('');
    }
    function render(){ renderFrameworks(); renderRail(); renderActive(); renderCompressed(); renderFooter(); renderRecover(); }
    render();
  </script>
</body>
</html>
