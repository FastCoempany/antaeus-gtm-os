# deploy-supabase-functions.yml — Auto-deploy Supabase Edge Functions
#
# Fires on every push to main that touches supabase/functions/**. Replaces
# the manual `npx supabase functions deploy ...` step in the founder's
# PowerShell. Pattern matches data-parity-ci.yml: fail-soft if the
# SUPABASE_ACCESS_TOKEN secret isn't set (warning, not failure) so the
# workflow can land before the secret does.
#
# Also exposes workflow_dispatch so the founder (or a future session) can
# manually re-deploy without pushing a code change — useful for emergency
# rollbacks or syncing after a Supabase outage.
#
# The token must belong to an account with project access (Owner or
# Developer role) on the target project. The founder's personal access
# token has Owner, which is fine.

name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch:
    inputs:
      function:
        description: "Which function to deploy (or 'all')"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - briefing-pipeline
          - heartbeat

permissions:
  contents: write   # verify job commits the verification log back to main

concurrency:
  group: deploy-supabase-functions
  cancel-in-progress: false

env:
  PROJECT_REF: wjdqmgxwulqxxxnyuzyl

jobs:
  gate:
    name: Should deploy?
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - id: check
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN secret not set. Skipping deploy. Add the secret at https://github.com/${{ github.repository }}/settings/secrets/actions to enable auto-deploy."
            echo "run=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "run=true" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy ${{ matrix.function }}
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        function:
          - briefing-pipeline
          - heartbeat
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Decide whether to deploy this function
        id: decide
        run: |
          # On workflow_dispatch, honor the input. On push, deploy all
          # functions in the matrix — Supabase deploy is idempotent so
          # re-deploying an unchanged function is a fast no-op (~3s).
          choice="${{ github.event.inputs.function }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$choice" ] && [ "$choice" != "all" ] && [ "$choice" != "${{ matrix.function }}" ]; then
            echo "Skipping ${{ matrix.function }} (workflow_dispatch input requested $choice)."
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Supabase CLI
        if: steps.decide.outputs.should_deploy == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy ${{ matrix.function }}
        if: steps.decide.outputs.should_deploy == 'true'
        run: |
          echo "::group::supabase functions deploy ${{ matrix.function }}"
          supabase functions deploy "${{ matrix.function }}" \
            --no-verify-jwt \
            --project-ref "$PROJECT_REF"
          echo "::endgroup::"
          echo "Deployed ${{ matrix.function }} to project $PROJECT_REF."

  verify-briefing-pipeline:
    name: Verify briefing-pipeline
    needs: deploy
    # Only run if at least one deploy succeeded AND briefing-pipeline
    # specifically was in scope (skip when only heartbeat was deployed
    # via workflow_dispatch). On push, briefing-pipeline is always in
    # scope so the conditional simplifies to "deploy succeeded".
    if: |
      always() &&
      needs.deploy.result == 'success' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.function == 'all' || github.event.inputs.function == 'briefing-pipeline')
    runs-on: ubuntu-latest
    env:
      SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history to commit + push verification log back.
          fetch-depth: 0
          # Default GITHUB_TOKEN has contents:write per permissions block
          # above, which is what we need for the push step.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gate on SERVICE_ROLE_KEY
        id: gate
        run: |
          if [ -z "$SERVICE_ROLE_KEY" ]; then
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY secret not set. Skipping verification."
            echo "run=false" >> $GITHUB_OUTPUT
          else
            echo "run=true" >> $GITHUB_OUTPUT
          fi

      - name: Call briefing-pipeline
        if: steps.gate.outputs.run == 'true'
        id: call
        run: |
          # No override:true here — the cost gate decides. If the rolling
          # weekly cost is paused, the run aborts cleanly and the log
          # captures that, which is still a useful health signal (proves
          # the new code can execute cost_check). If the gate is open,
          # the run goes through and spends real Anthropic budget — but
          # only when the rolling cost is below ceiling.
          set +e
          response=$(curl -s --max-time 600 -X POST \
            "https://wjdqmgxwulqxxxnyuzyl.supabase.co/functions/v1/briefing-pipeline" \
            -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          curl_status=$?
          set -e
          if [ $curl_status -ne 0 ]; then
            echo "curl exited $curl_status — pipeline call failed at the transport level."
            echo "$response"
            # Still write a log row so the failure is recorded.
            response="{\"ok\":false,\"transport_error\":\"curl exit $curl_status\"}"
          fi
          # Write to a file so the format step can read it without
          # heredoc-escaping the JSON.
          printf '%s' "$response" > /tmp/verification.json
          echo "Captured response into /tmp/verification.json ($(wc -c < /tmp/verification.json) bytes)."

      - name: Format verification log entry
        if: steps.gate.outputs.run == 'true'
        run: |
          # Two outputs: append to the tracked log file (best-effort,
          # might fail to push back if repo permissions don't allow),
          # AND write the same content to the workflow's job summary
          # (always works, durable in the run UI for 90 days, fetchable
          # via WebFetch on the job summary URL). The job summary is
          # the canonical surface for now; the file commit is a nice-
          # to-have audit trail.
          formatted=$(python3 .github/scripts/format-briefing-verification.py \
            /tmp/verification.json \
            "${{ github.sha }}" \
            "${{ github.event.head_commit.message }}")
          # Append to the tracked log file (will commit + push below).
          printf '%s' "$formatted" >> deliverables/audit/briefing-verification-log.md
          # Mirror to the workflow job summary so it's always readable
          # without depending on push permission.
          {
            echo "## Briefing pipeline verification"
            echo ""
            echo "$formatted"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit + push log (best-effort)
        if: steps.gate.outputs.run == 'true'
        # Continue-on-error so a permission failure on push doesn't
        # red the workflow. The job summary already carries the result;
        # the log file commit is a nice-to-have audit trail.
        continue-on-error: true
        run: |
          # Use the standard github-actions[bot] noreply email so the
          # commit's author renders correctly in the GitHub UI.
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add deliverables/audit/briefing-verification-log.md
          if git diff --staged --quiet; then
            echo "::notice::No changes to commit (verification log already in sync)."
            exit 0
          fi
          # [skip-screenshots] avoids re-triggering render-screenshots.yml
          # which has no path filter. Our own workflow filters on
          # supabase/functions/** so the log commit won't loop.
          git commit -m "verification log: ${{ github.sha }} [skip-screenshots]"

          # Diagnostic block: surface the actual git push stderr in the
          # step log so future failures are debuggable without needing
          # to expand the step. Previous version swallowed the real
          # error inside an if-else and only emitted a generic warning.
          echo "::group::git remote -v"
          git remote -v
          echo "::endgroup::"
          echo "::group::git status (pre-push)"
          git status --short
          git log -1 --oneline
          echo "::endgroup::"
          echo "::group::git push origin HEAD:main"
          # Push with set +e so the run continues; verbose so the
          # stderr is captured. The exit code is checked after.
          set +e
          git push origin HEAD:main 2>&1
          push_exit=$?
          set -e
          echo "::endgroup::"
          if [ $push_exit -eq 0 ]; then
            echo "::notice::Pushed verification log entry to main."
          else
            echo "::warning::git push failed with exit $push_exit. See the 'git push origin HEAD:main' group above for the actual stderr. Log entry is still captured in the workflow job summary."
          fi
