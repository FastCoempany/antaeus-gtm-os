# deploy.yml — Antaeus GTM OS production deploy
#
# Runs only on push to main (i.e., after a PR has been merged and CI was
# already green on that PR). Re-runs the full CI gate before deploying —
# main branch CI status is not assumed, it is verified.
#
# Secrets required (set in GitHub → Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — scoped to Cloudflare Pages + Workers for this project
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID
#
# The deploy fails closed: if any gate step fails, deployment does not run.
# Rolling back is a separate action (re-deploy an earlier tag).
#
# See deliverables/adr/adr-001-foundation-stack-migration-2026-04-21.md §6 Phase 1.3.

name: Deploy (production)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify CI gates on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
      - run: npm run build

  deploy:
    name: Deploy to Cloudflare
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - name: Build
        run: |
          npm run build
          npm run build:cloudflare
      - name: Deploy via Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler versions upload
