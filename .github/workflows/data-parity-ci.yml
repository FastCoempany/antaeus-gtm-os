# data-parity-ci.yml — per-PR ephemeral Supabase branch for Phase 4.5
# retrofit PRs.
#
# Triggers on PRs that touch schema (supabase/migrations/**), the typed
# client surface (src/lib/database.types.ts, src/lib/data-client.ts), or
# this workflow itself. Also triggers on PRs labeled "data-parity" so the
# founder can opt in manually for PRs that exercise the live data path
# without modifying schema files (e.g. Step 4 flip-read PRs that don't
# add migrations).
#
# Provisions a fresh Supabase branch named pr-<num>-run-<id>, runs migrations
# against it, runs realtime-sensitive Playwright tests pointed at the
# branch's DB URL, then tears the branch down on completion (always).
#
# Stranded branches from cancelled CI runs are cleaned up by the daily
# janitor at .github/workflows/data-parity-branch-janitor.yml.
#
# Required GitHub Actions secrets:
#   SUPABASE_CI_PAT     — Personal access token for ci@antaeus.app
#                         (Supabase service account). Permissions:
#                         branches:write on the antaeus-gtm-os project.
#
# Required GitHub Actions variables (not secrets):
#   SUPABASE_PROJECT_REF — production project ref (e.g. wjdqmgxwulqxxxnyuzyl).
#                         Branches are created under this project.
#
# See: deliverables/adr/adr-005-data-layer-parity-2026-05-20.md §"CI gate"
# See: docs/founder-data-parity-ci-setup.md for the click-by-click setup.

name: Data Parity CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - "supabase/migrations/**"
      - "src/lib/data-client.ts"
      - "src/lib/data-client-demo-local.ts"
      - "src/lib/database.types.ts"
      - "src/lib/data-parity-flags.ts"
      - ".github/workflows/data-parity-ci.yml"

permissions:
  contents: read
  pull-requests: read

concurrency:
  # Cancel in-progress data-parity runs when a new commit lands on the same
  # PR. Branch teardown still runs because of the `if: always()` guard on
  # the teardown job — every cancelled run still cleans up its branch.
  group: data-parity-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Gate: only run the rest of this workflow when (a) the PR is opted in
  # (path filter triggered automatically or "data-parity" label) AND (b) the
  # SUPABASE_CI_PAT secret is configured. The secret check is the
  # graceful-degrade path for the period between Checkpoint 1 merging and
  # the founder completing docs/founder-data-parity-ci-setup.md — without
  # it, every retrofit PR would surface a hard failure on the "Provision
  # Supabase branch" job before setup is even possible. With the check,
  # the workflow skips cleanly with a warning until setup is done.
  should-run:
    name: Should run data-parity CI?
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.gate.outputs.run }}
    env:
      # Reading the secret into an env var so we can check emptiness without
      # GitHub Actions surfacing it. The check `-z "$VAR"` doesn't expose
      # the value, and the value isn't logged.
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_CI_PAT }}
    steps:
      - id: gate
        run: |
          # First gate: was this PR opted in by path filter or label?
          if [ "${{ github.event.action }}" = "labeled" ]; then
            if [ "${{ github.event.label.name }}" != "data-parity" ]; then
              echo "PR labeled with something other than 'data-parity' — skipping."
              echo "run=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          # Path filter on pull_request triggered this run; any non-label
          # event that reaches here was matched by the paths block above.

          # Second gate: is the SUPABASE_CI_PAT secret configured? Until the
          # founder completes docs/founder-data-parity-ci-setup.md, this is
          # empty and we skip cleanly (warning-level, not failure).
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_CI_PAT not configured. Skipping data-parity CI until founder completes docs/founder-data-parity-ci-setup.md. This is expected on the Checkpoint 1 setup PR and any retrofit PR opened before setup completes."
            echo "run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "run=true" >> $GITHUB_OUTPUT

  provision-branch:
    name: Provision Supabase branch
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.create.outputs.branch_name }}
      branch_ref: ${{ steps.create.outputs.branch_ref }}
      db_url: ${{ steps.create.outputs.db_url }}
      api_url: ${{ steps.create.outputs.api_url }}
      anon_key: ${{ steps.create.outputs.anon_key }}
      service_role_key: ${{ steps.create.outputs.service_role_key }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - id: create
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_CI_PAT }}
          PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          BRANCH_NAME="pr-${{ github.event.pull_request.number }}-run-${{ github.run_id }}"
          echo "Creating branch $BRANCH_NAME under project $PROJECT_REF"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

          # Create the branch. `--experimental` is required while branches
          # are still flagged in the Supabase CLI.
          supabase --experimental branches create "$BRANCH_NAME" \
            --project-ref "$PROJECT_REF" \
            --region us-east-1

          # Poll until the branch reaches a state where we can take over with
          # manual migration. Three terminal states qualify:
          #   - FUNCTIONS_DEPLOYED / ACTIVE_HEALTHY — Supabase auto-applied
          #     migrations from a connected GitHub repo and the branch is
          #     fully ready.
          #   - MIGRATIONS_FAILED — Supabase tried auto-migration but couldn't
          #     find migration files to apply (we have GitHub integration
          #     connected but Automatic branching is OFF per ADR-005 doctrine,
          #     so Supabase doesn't auto-apply migrations to CLI-created
          #     branches). The branch DB itself is up and reachable; we just
          #     need to apply migrations manually via `supabase db push` in
          #     the next step (when Tier 1 retrofit PRs add an actual strategy
          #     — Step 0 leaves Apply migrations as a no-op for now).
          # Branches typically provision in 30-90 seconds, but Supabase
          # provisioning latency is highly variable — observed up to 10+
          # minutes in CREATING_PROJECT state under load (PR #154 hit
          # 5 min and never advanced). Budget 15 minutes worst-case.
          for attempt in $(seq 1 90); do
            STATUS=$(supabase --experimental branches list \
              --project-ref "$PROJECT_REF" -o json 2>/dev/null \
              | python3 -c "import sys,json; \
                d=json.load(sys.stdin); \
                print(next((b['status'] for b in d if b['name']=='$BRANCH_NAME'), 'NOT_FOUND'))" \
              || echo "QUERY_FAILED")
            echo "Attempt $attempt: status=$STATUS"
            if [ "$STATUS" = "FUNCTIONS_DEPLOYED" ] \
              || [ "$STATUS" = "ACTIVE_HEALTHY" ] \
              || [ "$STATUS" = "MIGRATIONS_FAILED" ]; then
              break
            fi
            sleep 10
          done

          if [ "$STATUS" != "FUNCTIONS_DEPLOYED" ] \
            && [ "$STATUS" != "ACTIVE_HEALTHY" ] \
            && [ "$STATUS" != "MIGRATIONS_FAILED" ]; then
            echo "::error::Branch $BRANCH_NAME never reached a DB-reachable state (last seen: $STATUS)"
            exit 1
          fi

          if [ "$STATUS" = "MIGRATIONS_FAILED" ]; then
            echo "::warning::Branch reached MIGRATIONS_FAILED state — this is expected when GitHub Automatic branching is OFF (per ADR-005 doctrine). Apply migrations step will run the documented no-op until a Tier 1 retrofit PR picks one of the three candidate strategies."
          fi

          # Resolve connection details + the branch's project_ref.
          # On MIGRATIONS_FAILED branches, Supabase hasn't published API
          # endpoints yet, so db_url / api_url / anon_key may all come
          # back empty. That's not a hard failure — Apply migrations
          # uses branch_ref + SUPABASE_DB_PASSWORD (which doesn't need
          # the endpoint URLs), and Realtime tests pass via
          # --pass-with-no-tests until @realtime-tagged tests exist
          # (Step 4 retrofit work).
          BRANCH_JSON=$(supabase --experimental branches get "$BRANCH_NAME" \
            --project-ref "$PROJECT_REF" -o json)
          BRANCH_REF=$(echo "$BRANCH_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
          DB_URL=$(echo "$BRANCH_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('db_url',''))")
          API_URL=$(echo "$BRANCH_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('api_url',''))")
          ANON_KEY=$(echo "$BRANCH_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('anon_key',''))")
          # Service-role key — needed by the @realtime Playwright suite
          # for test-user / workspace / account seeding via Supabase Auth
          # Admin + RLS bypass. May not be present in all branches
          # output formats; the realtime suite skips cleanly when absent.
          SERVICE_ROLE_KEY=$(echo "$BRANCH_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('service_role_key',''))")

          if [ -z "$BRANCH_REF" ]; then
            echo "::warning::Branch $BRANCH_NAME returned no project_ref (id field empty). Apply migrations will be skipped — without a project_ref we can't link to the branch."
          fi

          if [ -z "$DB_URL" ] || [ -z "$API_URL" ] || [ -z "$ANON_KEY" ]; then
            DB_STATUS=$([ -n "$DB_URL" ] && echo present || echo missing)
            API_STATUS=$([ -n "$API_URL" ] && echo present || echo missing)
            ANON_STATUS=$([ -n "$ANON_KEY" ] && echo present || echo missing)
            echo "::warning::Branch $BRANCH_NAME returned incomplete connection details (status=$STATUS): db_url=$DB_STATUS, api_url=$API_STATUS, anon_key=$ANON_STATUS. Continuing — Apply migrations uses link + DB password (doesn't need URLs); Realtime tests pass with 0 tests via --pass-with-no-tests."
          fi

          # Mask whatever secrets we have (no-op if empty)
          [ -n "$DB_URL" ] && echo "::add-mask::$DB_URL" || true
          [ -n "$ANON_KEY" ] && echo "::add-mask::$ANON_KEY" || true
          [ -n "$SERVICE_ROLE_KEY" ] && echo "::add-mask::$SERVICE_ROLE_KEY" || true

          echo "branch_ref=$BRANCH_REF" >> $GITHUB_OUTPUT
          echo "db_url=$DB_URL" >> $GITHUB_OUTPUT
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "anon_key=$ANON_KEY" >> $GITHUB_OUTPUT
          echo "service_role_key=$SERVICE_ROLE_KEY" >> $GITHUB_OUTPUT

      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_CI_PAT }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          BRANCH_REF: ${{ steps.create.outputs.branch_ref }}
          BRANCH_NAME: ${{ steps.create.outputs.branch_name }}
        run: |
          # Apply migrations to the freshly-created preview branch.
          #
          # Strategy: option (a) from the audit doc + Step 0 comment
          # block — supabase link --project-ref <branch_ref>
          # --password $SUPABASE_DB_PASSWORD + db push --linked --yes.
          #
          # Why option (a):
          #   - (b) supabase db push --db-url <branch_db_url> needs the
          #     branch to publish its db_url. On MIGRATIONS_FAILED
          #     branches (our default state) endpoints aren't published.
          #   - (c) Supabase Management API direct call needs JSON-RPC
          #     scaffolding we haven't built.
          #   - (a) uses CLI commands that already exist + just one new
          #     GitHub secret (SUPABASE_DB_PASSWORD).
          #
          # Locked by founder direction during Signal Console Step 1
          # audit approval (2026-05-21).

          if [ -z "$BRANCH_REF" ]; then
            echo "::warning::No branch_ref available — skipping Apply migrations. Provision step couldn't extract the branch's project_ref. Without it we can't link to the branch."
            exit 0
          fi

          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::warning::SUPABASE_DB_PASSWORD secret not set — skipping Apply migrations. Founder must populate this secret per docs/founder-data-parity-ci-setup.md before retrofit PRs can apply migrations to branches."
            exit 0
          fi

          echo "Linking CLI context to branch project_ref=$BRANCH_REF (branch_name=$BRANCH_NAME)"

          # supabase link writes to ./supabase/.temp/ to record the
          # linked project_ref. The --password flag sets the DB
          # password for the linked context. --yes accepts the
          # confirmation prompt.
          supabase link --project-ref "$BRANCH_REF" --password "$SUPABASE_DB_PASSWORD"

          # Push migrations from this checkout's supabase/migrations/
          # against the linked branch. --linked uses the project_ref
          # we just linked above. --yes accepts confirmation prompts.
          supabase db push --linked --yes

          echo "::notice::supabase db push --linked --yes succeeded — branch DB has migration chain applied."

  realtime-tests:
    name: Realtime cross-tab tests
    needs: provision-branch
    if: needs.provision-branch.result == 'success'
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ needs.provision-branch.outputs.api_url }}
      VITE_SUPABASE_ANON_KEY: ${{ needs.provision-branch.outputs.anon_key }}
      # Service-role key for @realtime test fixtures (user seeding via
      # Supabase Auth Admin + RLS-bypass writes). When empty, the
      # @realtime suite skips cleanly via hasRealtimeFixturesEnv().
      SUPABASE_SERVICE_ROLE_KEY: ${{ needs.provision-branch.outputs.service_role_key }}
      VITE_APP_ENV: preview
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run cross-tab realtime suite
        # This script is added per-retrofit-PR; in Checkpoint 1 it runs no
        # tests yet but must succeed (the runner asserts the script is
        # present and the env vars wire through).
        run: npm run test:realtime

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: realtime-playwright-report
          path: playwright-report/
          retention-days: 7

  teardown-branch:
    name: Teardown Supabase branch
    needs: [provision-branch, realtime-tests]
    # Run whenever a branch name was emitted — including when provision
    # itself failed mid-flight (e.g. polling timeout while Supabase was
    # still in CREATING_PROJECT). The branch was created on the Supabase
    # side even if our poll loop gave up, so we have to tear it down or
    # we leak. The daily janitor catches anything this guard misses.
    if: always() && needs.provision-branch.outputs.branch_name != ''
    runs-on: ubuntu-latest
    steps:
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Delete branch
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_CI_PAT }}
          PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          BRANCH_NAME="${{ needs.provision-branch.outputs.branch_name }}"
          echo "Tearing down branch $BRANCH_NAME"
          # `|| true` so teardown never fails the workflow — the janitor
          # will catch anything that's still stranded.
          supabase --experimental branches delete "$BRANCH_NAME" \
            --project-ref "$PROJECT_REF" -y || true
