<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Antaeus" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Antaeus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Public+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <script>
    (function () {
      try {
        var raw = window.localStorage.getItem('antaeus-auth-token');
        if (!raw) return;
        var parsed = JSON.parse(raw);
        var hasSession = !!(
          (parsed && parsed.access_token) ||
          (parsed && parsed.refresh_token) ||
          (parsed &&
            parsed.currentSession &&
            (parsed.currentSession.access_token || parsed.currentSession.refresh_token)) ||
          (parsed &&
            parsed.session &&
            (parsed.session.access_token || parsed.session.refresh_token))
        );
        if (!hasSession) return;

        var profileRaw = window.localStorage.getItem('gtmos_profile_cache');
        var onboardingRaw = window.localStorage.getItem('gtmos_onboarding');
        var profile = profileRaw ? JSON.parse(profileRaw) : null;
        var onboarding = onboardingRaw ? JSON.parse(onboardingRaw) : null;
        var profileId = profile && profile.id ? String(profile.id).trim() : '';
        var welcomeKey = profileId ? ('gtmos_welcome_seen__user_' + profileId) : 'gtmos_welcome_seen';
        var seen = window.localStorage.getItem(welcomeKey);
        if (profileId && welcomeKey !== 'gtmos_welcome_seen' && (seen !== '1' && seen !== 'true')) {
          var legacySeen = window.localStorage.getItem('gtmos_welcome_seen');
          if (legacySeen === '1' || legacySeen === 'true') seen = legacySeen;
        }

        var completed = !!(
          (profile && profile.onboarding_completed === true) ||
          (onboarding && onboarding.completed === true)
        );
        var route = !completed ? '/app/onboarding/' : ((seen === '1' || seen === 'true') ? '/app/dashboard/' : '/app/welcome/');
        window.location.replace(route);
      } catch (e) {}
    })();
  </script>
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #0f172a;
      --bg-tertiary: #1e293b;
      --brand-gold: #d4a574;
      --brand-gold-light: #e8c9a8;
      --brand-teal: #2dd4bf;
      --text-primary: #ffffff;
      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-sans: 'Public Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 18% 24%, rgba(212, 165, 116, 0.14), transparent 24%),
        radial-gradient(circle at 80% 74%, rgba(45, 212, 191, 0.12), transparent 20%),
        linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 48%, #070b14 100%);
      color: var(--text-primary);
      font-family: var(--font-sans);
      overflow: hidden;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: auto;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(56px);
    }

    body::before {
      top: -8vh;
      left: -6vw;
      width: 36vw;
      height: 36vw;
      background: radial-gradient(circle, rgba(212, 165, 116, 0.28) 0%, rgba(212, 165, 116, 0.06) 42%, transparent 72%);
      animation: glowGold 6.6s ease-in-out infinite;
    }

    body::after {
      right: -6vw;
      bottom: -8vh;
      width: 30vw;
      height: 30vw;
      background: radial-gradient(circle, rgba(45, 212, 191, 0.24) 0%, rgba(45, 212, 191, 0.04) 42%, transparent 72%);
      animation: glowTeal 7.6s ease-in-out infinite;
    }

    .rings {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at 50% 48%, transparent 0 18%, rgba(255,255,255,0.04) 18.3%, transparent 19.1% 28%, rgba(255,255,255,0.025) 28.4%, transparent 29.1% 100%);
      opacity: 0.72;
      transform: scale(1.08);
      animation: breathe 9s ease-in-out infinite;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 24px;
    }

    h1 {
      width: min(1320px, 100%);
      margin: 0;
      text-align: center;
      font-family: var(--font-serif);
      font-size: clamp(3rem, 6.2vw, 7rem);
      line-height: 0.94;
      letter-spacing: -0.045em;
      text-wrap: balance;
      text-shadow: 0 0 28px rgba(255, 255, 255, 0.05);
    }

    .pulse-word {
      display: inline-block;
      color: var(--brand-gold-light);
      text-shadow:
        0 0 16px rgba(212, 165, 116, 0.24),
        0 0 44px rgba(212, 165, 116, 0.12);
      animation: pulseWord 2.5s ease-in-out infinite;
    }

    @keyframes glowGold {
      0%, 100% { transform: scale(0.98); opacity: 0.8; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @keyframes glowTeal {
      0%, 100% { transform: scale(1) translate3d(0, 0, 0); opacity: 0.68; }
      50% { transform: scale(1.08) translate3d(-2%, -1%, 0); opacity: 0.96; }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1.06); opacity: 0.54; }
      50% { transform: scale(1.12); opacity: 0.82; }
    }

    @keyframes pulseWord {
      0%, 100% {
        transform: scale(1);
        opacity: 0.82;
      }
      50% {
        transform: scale(1.045);
        opacity: 1;
      }
    }

    @media (max-width: 760px) {
      body {
        overflow-y: auto;
      }

      h1 {
        font-size: clamp(2.2rem, 9.6vw, 4.2rem);
        line-height: 0.98;
      }
    }
  </style>
</head>
<body>
  <div class="rings" aria-hidden="true"></div>

  <main class="page">
    <h1>Your first go-to-market hire just became more <span class="pulse-word">predictable.</span></h1>
  </main>

  <script src="/js/analytics-site-config.js"></script>
  <script src="/js/analytics.js"></script>
</body>
</html>
