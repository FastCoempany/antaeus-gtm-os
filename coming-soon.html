<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Antaeus" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Antaeus</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet"
  />
  <script>
    // Note: the legacy auth-aware auto-redirect that used to live here
    // was removed when the pre-beta gate (worker/index.ts) shipped.
    // With the gate enabled, the Worker bounces unauthorized visitors
    // here regardless of whether they have a Supabase session. Once
    // the gate is disabled (set GATE_ENABLED=false in wrangler.jsonc),
    // restore the auth-redirect logic if you want logged-in visitors
    // to skip the marketing splash.
  </script>
  <style>
    /*
     * Bright re-skin (2026) — retires the dark navy + gold/teal gate.
     * The gate is the first surface a visitor sees; it used to contradict
     * the bright product behind it (canon Part II §1: bright field, navy
     * ink, orange accent, DM Serif Display). Now it matches start.html so
     * first contact and the landing are continuous. Calm + still — the
     * old glow/ring/breathe animations were marketing energy where an
     * operator tool needs stillness (same call as the retired pulse).
     */
    :root {
      --field: #f6f8fc;
      --raised: #ffffff;
      --ink: #0a1c40;
      --ink-70: rgba(10, 28, 64, 0.70);
      --ink-50: rgba(10, 28, 64, 0.50);
      --ink-25: rgba(10, 28, 64, 0.25);
      --ink-10: rgba(10, 28, 64, 0.10);
      --orange: #e6701e;
      --orange-dark: #d05f12;
      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-sans: 'Public Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'IBM Plex Mono', monospace;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--field);
      background-image:
        radial-gradient(circle at 10% 0%, rgba(37, 99, 235, 0.05), transparent 30%),
        radial-gradient(circle at 90% 6%, rgba(230, 112, 30, 0.045), transparent 28%);
      color: var(--ink);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 24px;
    }

    h1 {
      width: min(1200px, 100%);
      margin: 0;
      text-align: center;
      font-family: var(--font-serif);
      font-size: clamp(2.8rem, 6vw, 6.4rem);
      line-height: 0.98;
      letter-spacing: -0.03em;
      text-wrap: balance;
      color: var(--ink);
    }

    .pulse-word {
      display: inline-block;
      color: var(--orange);
      font-style: italic;
    }

    @media (max-width: 760px) {
      body { overflow-y: auto; }
      h1 {
        font-size: clamp(2.1rem, 9.2vw, 4rem);
        line-height: 1.0;
      }
    }

    /* ─── Pre-beta gate form ─────────────────────────────────────── */

    .gate {
      margin: 40px auto 0;
      width: min(380px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .gate__kicker {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--orange);
      margin: 0;
    }

    .gate__row {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .gate__input {
      flex: 1;
      background: var(--raised);
      border: 1px solid var(--ink-25);
      border-radius: 9px;
      padding: 12px 14px;
      color: var(--ink);
      font-family: var(--font-mono);
      font-size: 1rem;
      letter-spacing: 0.16em;
      text-align: center;
      transition: border-color 140ms ease, box-shadow 140ms ease;
    }

    .gate__input:focus {
      outline: none;
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(230, 112, 30, 0.14);
    }

    .gate__input::placeholder {
      color: var(--ink-25);
      letter-spacing: 0.16em;
    }

    .gate__submit {
      background: var(--orange);
      border: 1px solid var(--orange);
      color: #fff;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.95rem;
      padding: 12px 20px;
      border-radius: 9px;
      cursor: pointer;
      transition: background 140ms ease, box-shadow 140ms ease;
    }

    .gate__submit:hover {
      background: var(--orange-dark);
      box-shadow: 0 6px 18px rgba(230, 112, 30, 0.22);
    }

    .gate__error {
      margin: 0;
      font-size: 0.82rem;
      color: #cf3b34;
      text-align: center;
      min-height: 1.2em;
    }

    .gate__exit {
      margin: 20px auto 0;
      max-width: 480px;
      text-align: center;
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--ink-50);
    }

    .gate__exit a {
      color: var(--orange);
      text-decoration: none;
      border-bottom: 1px dotted rgba(230, 112, 30, 0.4);
    }

    .gate__exit a:hover { opacity: 0.82; }
  </style>
</head>
<body>
  <main class="page">
    <div>
      <h1>Your first go-to-market hire just became more <span class="pulse-word">predictable.</span></h1>

      <form class="gate" method="get" action="/_gate/unlock" autocomplete="off">
        <p class="gate__kicker">Antaeus · Private build</p>
        <div class="gate__row">
          <input
            class="gate__input"
            type="text"
            name="code"
            inputmode="numeric"
            pattern="[0-9]*"
            placeholder="• • • • • •"
            aria-label="Access code"
            required
          />
          <button class="gate__submit" type="submit">Enter</button>
        </div>
        <p class="gate__error" id="gate-error" role="alert"></p>
        <input type="hidden" name="next" id="gate-next" value="/" />
      </form>

      <p class="gate__exit">
        No code? Operator preview is invite-only right now. Reach out at
        <a href="mailto:founders@antaeus.app">founders@antaeus.app</a> and
        we'll get you in.
      </p>
    </div>
  </main>

  <script>
    // Surface ?error=1 inline + carry ?next= through the unlock POST.
    (function () {
      try {
        var params = new URLSearchParams(window.location.search || '');
        if (params.get('error') === '1') {
          var err = document.getElementById('gate-error');
          if (err) err.textContent = 'That code does not unlock anything yet. Try again.';
        }
        var next = params.get('next');
        if (next && next.charAt(0) === '/' && next.charAt(1) !== '/') {
          var nextInput = document.getElementById('gate-next');
          if (nextInput) nextInput.value = next;
        }
      } catch (e) {}
    })();
  </script>

  <script src="/js/analytics-site-config.js"></script>
  <script src="/js/analytics.js"></script>
</body>
</html>
