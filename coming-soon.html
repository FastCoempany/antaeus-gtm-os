<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Antaeus" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Antaeus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,500;6..96,700&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --paper: #f5ecdf;
      --ink: #121010;
      --ink-soft: rgba(18, 16, 16, 0.72);
      --ink-faint: rgba(18, 16, 16, 0.44);
      --ember: #ff7c41;
      --ember-hot: #ffb25b;
      --scar: #ce3f2f;
      --electric: #5d87ff;
      --violet: #c66bff;
      --serif: 'Bodoni Moda', Georgia, serif;
      --sans: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      overflow-x: hidden;
      overflow-y: auto;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      pointer-events: none;
      filter: blur(38px);
      opacity: 0.96;
      z-index: 0;
    }

    body::before {
      top: -10vh;
      left: -4vw;
      width: 52vw;
      height: 52vw;
      background:
        radial-gradient(circle at 40% 42%, rgba(255, 124, 65, 0.88) 0%, rgba(255, 178, 91, 0.56) 28%, rgba(255, 124, 65, 0.12) 56%, transparent 72%);
      animation: flare 6.4s ease-in-out infinite;
    }

    body::after {
      right: -6vw;
      bottom: -14vh;
      width: 44vw;
      height: 44vw;
      background:
        radial-gradient(circle at 56% 48%, rgba(93, 135, 255, 0.68) 0%, rgba(198, 107, 255, 0.34) 42%, rgba(93, 135, 255, 0.08) 68%, transparent 80%);
      animation: drift 7.8s ease-in-out infinite;
    }

    .veil,
    .rings,
    .wash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .veil {
      background:
        linear-gradient(120deg, rgba(255,255,255,0.14), rgba(255,255,255,0) 34%),
        linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0) 28%, rgba(18,16,16,0.03) 100%);
      mix-blend-mode: screen;
      opacity: 0.72;
    }

    .rings {
      background:
        radial-gradient(circle at 52% 46%, transparent 0 22%, rgba(18,16,16,0.06) 22.4%, transparent 23.4% 30%, rgba(18,16,16,0.04) 30.3%, transparent 31.2% 100%);
      opacity: 0.82;
      transform: scale(1.1);
      animation: pulse 8.6s ease-in-out infinite;
    }

    .wash {
      background:
        linear-gradient(115deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.28) 46%, rgba(255,255,255,0) 72%);
      transform: translateX(-24%) skewX(-10deg);
      opacity: 0.34;
      animation: sweep 10s ease-in-out infinite;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 28px 30px 34px;
      display: flex;
      flex-direction: column;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      width: fit-content;
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(18, 16, 16, 0.84);
    }

    .brand-mark {
      position: relative;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 34%, rgba(255,255,255,0.92) 0 9%, transparent 10%),
        conic-gradient(from 210deg, var(--scar), var(--ember), var(--ember-hot), var(--electric), var(--violet), var(--scar));
      box-shadow:
        0 0 26px rgba(255, 124, 65, 0.18),
        inset 0 0 16px rgba(255,255,255,0.22);
      animation: brandSpin 10s linear infinite;
    }

    .brand-mark::after {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      background: rgba(245, 236, 223, 0.88);
      box-shadow: inset 0 0 18px rgba(18, 16, 16, 0.08);
    }

    .brand-word {
      font-family: var(--sans);
    }

    .stage {
      flex: 1;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 4vh 4vw 8vh;
    }

    .stack {
      width: min(980px, 100%);
    }

    h1 {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(3.25rem, 7.2vw, 7.4rem);
      line-height: 0.9;
      letter-spacing: -0.055em;
      text-transform: lowercase;
      text-wrap: balance;
    }

    .line-1,
    .line-2,
    .line-3,
    .line-4 {
      display: block;
    }

    .line-2,
    .line-4 {
      margin-top: 0.08em;
    }

    .line-3,
    .line-4 {
      color: var(--scar);
      text-shadow:
        0 0 18px rgba(206, 63, 47, 0.18),
        0 0 38px rgba(255, 124, 65, 0.18);
      animation: warning 3.4s ease-in-out infinite;
    }

    .capture {
      width: min(500px, 100%);
      margin: 42px auto 0;
    }

    .capture-label {
      display: block;
      margin-bottom: 10px;
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .capture-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
    }

    .capture-input {
      width: 100%;
      padding: 12px 0 11px;
      border: 0;
      border-bottom: 1px solid rgba(18, 16, 16, 0.2);
      background: transparent;
      color: var(--ink);
      font: 500 1rem/1.3 var(--sans);
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    .capture-input::placeholder {
      color: var(--ink-faint);
    }

    .capture-input:focus {
      border-bottom-color: rgba(18, 16, 16, 0.66);
      box-shadow: inset 0 -1px 0 rgba(18, 16, 16, 0.66);
    }

    .capture-button {
      padding: 0 0 10px;
      border: 0;
      background: transparent;
      color: var(--ink);
      font: 700 1.55rem/1 var(--sans);
      letter-spacing: -0.04em;
      cursor: pointer;
      transition: transform 180ms ease, opacity 180ms ease;
      animation: bait 2.8s ease-in-out infinite;
    }

    .capture-button:hover,
    .capture-button:focus-visible {
      transform: translateY(-1px);
      opacity: 1;
      outline: none;
    }

    .capture-note {
      min-height: 1.4em;
      margin: 14px 0 0;
      font-size: 0.9rem;
      color: var(--ink-faint);
    }

    @keyframes flare {
      0%, 100% { transform: scale(0.98); opacity: 0.92; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @keyframes drift {
      0%, 100% { transform: translate3d(0, 0, 0) scale(0.96); opacity: 0.92; }
      50% { transform: translate3d(-3%, -2%, 0) scale(1.06); opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.72; transform: scale(1.08); }
      50% { opacity: 1; transform: scale(1.14); }
    }

    @keyframes sweep {
      0%, 100% { transform: translateX(-24%) skewX(-10deg); opacity: 0.2; }
      50% { transform: translateX(18%) skewX(-10deg); opacity: 0.42; }
    }

    @keyframes warning {
      0%, 100% { opacity: 0.92; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-2px); }
    }

    @keyframes bait {
      0%, 100% { opacity: 0.72; }
      50% { opacity: 1; }
    }

    @keyframes brandSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (max-width: 760px) {
      .page {
        padding: 20px 18px 24px;
      }

      h1 {
        font-size: clamp(2.8rem, 11vw, 5rem);
        line-height: 0.92;
      }

      .capture {
        margin-top: 34px;
      }

      .capture-row {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .capture-button {
        justify-self: start;
      }

      .brand {
        gap: 10px;
      }

      .brand-mark {
        width: 24px;
        height: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="veil" aria-hidden="true"></div>
  <div class="rings" aria-hidden="true"></div>
  <div class="wash" aria-hidden="true"></div>

  <main class="page">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-word">antaeus</span>
    </div>

    <section class="stage" aria-label="Antaeus coming soon">
      <div class="stack">
        <h1>
          <span class="line-1">your first sales</span>
          <span class="line-2">go to market hire</span>
          <span class="line-3">is going to fail.</span>
          <span class="line-4">because you haven't the slightest clue what prepared means.</span>
        </h1>

        <form class="capture" id="captureForm" autocomplete="on">
          <label class="capture-label" for="curiousEmail">nervous?</label>
          <div class="capture-row">
            <input
              class="capture-input"
              id="curiousEmail"
              name="email"
              type="email"
              inputmode="email"
              autocomplete="email"
              placeholder="leave your email"
              aria-label="Email"
            />
            <button class="capture-button" type="submit">nervous?</button>
          </div>
          <p class="capture-note" id="captureNote" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/public-waitlist.js"></script>
  <script src="/js/analytics-site-config.js"></script>
  <script src="/js/analytics.js"></script>
</body>
</html>
