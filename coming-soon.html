<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Antaeus" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Antaeus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Public+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <script>
    // Note: the legacy auth-aware auto-redirect that used to live here
    // was removed when the pre-beta gate (worker/index.ts) shipped.
    // With the gate enabled, the Worker bounces unauthorized visitors
    // here regardless of whether they have a Supabase session. Once
    // the gate is disabled (set GATE_ENABLED=false in wrangler.jsonc),
    // restore the auth-redirect logic if you want logged-in visitors
    // to skip the marketing splash.
  </script>
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #0f172a;
      --bg-tertiary: #1e293b;
      --brand-gold: #d4a574;
      --brand-gold-light: #e8c9a8;
      --brand-teal: #2dd4bf;
      --text-primary: #ffffff;
      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-sans: 'Public Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 18% 24%, rgba(212, 165, 116, 0.14), transparent 24%),
        radial-gradient(circle at 80% 74%, rgba(45, 212, 191, 0.12), transparent 20%),
        linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 48%, #070b14 100%);
      color: var(--text-primary);
      font-family: var(--font-sans);
      overflow: hidden;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: auto;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(56px);
    }

    body::before {
      top: -8vh;
      left: -6vw;
      width: 36vw;
      height: 36vw;
      background: radial-gradient(circle, rgba(212, 165, 116, 0.28) 0%, rgba(212, 165, 116, 0.06) 42%, transparent 72%);
      animation: glowGold 6.6s ease-in-out infinite;
    }

    body::after {
      right: -6vw;
      bottom: -8vh;
      width: 30vw;
      height: 30vw;
      background: radial-gradient(circle, rgba(45, 212, 191, 0.24) 0%, rgba(45, 212, 191, 0.04) 42%, transparent 72%);
      animation: glowTeal 7.6s ease-in-out infinite;
    }

    .rings {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at 50% 48%, transparent 0 18%, rgba(255,255,255,0.04) 18.3%, transparent 19.1% 28%, rgba(255,255,255,0.025) 28.4%, transparent 29.1% 100%);
      opacity: 0.72;
      transform: scale(1.08);
      animation: breathe 9s ease-in-out infinite;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 24px;
    }

    h1 {
      width: min(1320px, 100%);
      margin: 0;
      text-align: center;
      font-family: var(--font-serif);
      font-size: clamp(3rem, 6.2vw, 7rem);
      line-height: 0.94;
      letter-spacing: -0.045em;
      text-wrap: balance;
      text-shadow: 0 0 28px rgba(255, 255, 255, 0.05);
    }

    .pulse-word {
      display: inline-block;
      color: var(--brand-gold-light);
      text-shadow:
        0 0 16px rgba(212, 165, 116, 0.24),
        0 0 44px rgba(212, 165, 116, 0.12);
      animation: pulseWord 2.5s ease-in-out infinite;
    }

    @keyframes glowGold {
      0%, 100% { transform: scale(0.98); opacity: 0.8; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @keyframes glowTeal {
      0%, 100% { transform: scale(1) translate3d(0, 0, 0); opacity: 0.68; }
      50% { transform: scale(1.08) translate3d(-2%, -1%, 0); opacity: 0.96; }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1.06); opacity: 0.54; }
      50% { transform: scale(1.12); opacity: 0.82; }
    }

    @keyframes pulseWord {
      0%, 100% {
        transform: scale(1);
        opacity: 0.82;
      }
      50% {
        transform: scale(1.045);
        opacity: 1;
      }
    }

    @media (max-width: 760px) {
      body {
        overflow-y: auto;
      }

      h1 {
        font-size: clamp(2.2rem, 9.6vw, 4.2rem);
        line-height: 0.98;
      }
    }

    /* ─── Pre-beta gate form ─────────────────────────────────────── */

    .gate {
      margin: 36px auto 0;
      width: min(360px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .gate__kicker {
      font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace;
      font-size: 0.66rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.48);
      margin: 0;
    }

    .gate__row {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .gate__input {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--text-primary);
      font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace;
      font-size: 1rem;
      letter-spacing: 0.16em;
      text-align: center;
    }

    .gate__input:focus {
      outline: none;
      border-color: var(--brand-gold);
      box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.16);
    }

    .gate__input::placeholder {
      color: rgba(255, 255, 255, 0.32);
      letter-spacing: 0.16em;
    }

    .gate__submit {
      background: var(--brand-gold);
      border: 1px solid var(--brand-gold);
      color: #0a0e1a;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.92rem;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 140ms ease;
    }

    .gate__submit:hover {
      opacity: 0.88;
    }

    .gate__error {
      margin: 0;
      font-size: 0.82rem;
      color: #fca5a5;
      text-align: center;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="rings" aria-hidden="true"></div>

  <main class="page">
    <div>
      <h1>Your first go-to-market hire just became more <span class="pulse-word">predictable.</span></h1>

      <form class="gate" method="get" action="/_gate/unlock" autocomplete="off">
        <p class="gate__kicker">Beta access</p>
        <div class="gate__row">
          <input
            class="gate__input"
            type="text"
            name="code"
            inputmode="numeric"
            pattern="[0-9]*"
            placeholder="• • • • • •"
            aria-label="Access code"
            required
          />
          <button class="gate__submit" type="submit">Enter</button>
        </div>
        <p class="gate__error" id="gate-error" role="alert"></p>
        <input type="hidden" name="next" id="gate-next" value="/" />
      </form>
    </div>
  </main>

  <script>
    // Surface ?error=1 inline + carry ?next= through the unlock POST.
    (function () {
      try {
        var params = new URLSearchParams(window.location.search || '');
        if (params.get('error') === '1') {
          var err = document.getElementById('gate-error');
          if (err) err.textContent = 'That code does not unlock anything yet. Try again.';
        }
        var next = params.get('next');
        if (next && next.charAt(0) === '/' && next.charAt(1) !== '/') {
          var nextInput = document.getElementById('gate-next');
          if (nextInput) nextInput.value = next;
        }
      } catch (e) {}
    })();
  </script>

  <script src="/js/analytics-site-config.js"></script>
  <script src="/js/analytics.js"></script>
</body>
</html>
