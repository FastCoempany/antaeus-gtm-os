<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Antaeus" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Antaeus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Public+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #0f172a;
      --bg-tertiary: #1e293b;
      --brand-gold: #d4a574;
      --brand-gold-light: #e8c9a8;
      --brand-teal: #2dd4bf;
      --accent-red: #ef4444;
      --text-primary: #ffffff;
      --text-secondary: #e2e8f0;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.12);
      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-sans: 'Public Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 18% 18%, rgba(212, 165, 116, 0.18), transparent 28%),
        radial-gradient(circle at 78% 70%, rgba(45, 212, 191, 0.14), transparent 24%),
        linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 46%, #070b14 100%);
      color: var(--text-primary);
      font-family: var(--font-sans);
      overflow-x: hidden;
      overflow-y: auto;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: auto;
      pointer-events: none;
      z-index: 0;
      filter: blur(44px);
    }

    body::before {
      top: 8%;
      left: -4%;
      width: 34vw;
      height: 34vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212, 165, 116, 0.42) 0%, rgba(212, 165, 116, 0.08) 42%, transparent 72%);
      animation: glowGold 6s ease-in-out infinite;
    }

    body::after {
      right: -6%;
      bottom: 4%;
      width: 28vw;
      height: 28vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(45, 212, 191, 0.26) 0%, rgba(59, 130, 246, 0.08) 46%, transparent 72%);
      animation: glowTeal 7.4s ease-in-out infinite;
    }

    .field,
    .rings {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .field {
      background:
        linear-gradient(120deg, rgba(255,255,255,0.04) 0%, transparent 34%, rgba(255,255,255,0.02) 55%, transparent 76%),
        linear-gradient(180deg, rgba(255,255,255,0.03), transparent 24%);
    }

    .rings {
      background:
        radial-gradient(circle at 50% 44%, transparent 0 20%, rgba(255,255,255,0.05) 20.4%, transparent 21.2% 28%, rgba(255,255,255,0.03) 28.3%, transparent 29.1% 100%);
      opacity: 0.7;
      transform: scale(1.08);
      animation: breathe 8.8s ease-in-out infinite;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 26px 28px 36px;
      display: flex;
      flex-direction: column;
    }

    .stage {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 5vh 4vw 8vh;
      text-align: center;
    }

    .stack {
      width: min(1220px, 100%);
    }

    .statement-1,
    .statement-2 {
      margin: 0;
      font-family: var(--font-serif);
      line-height: 0.94;
      letter-spacing: -0.04em;
      white-space: nowrap;
    }

    .statement-1 {
      font-size: clamp(2.6rem, 5.6vw, 6rem);
      color: var(--text-primary);
      text-shadow: 0 0 28px rgba(255, 255, 255, 0.05);
    }

    .statement-2 {
      margin-top: 20px;
      font-size: clamp(2.3rem, 5vw, 5.3rem);
      color: var(--brand-gold);
      text-shadow:
        0 0 26px rgba(212, 165, 116, 0.12),
        0 0 58px rgba(212, 165, 116, 0.08);
    }

    .prepared {
      display: inline-block;
      color: var(--brand-gold-light);
      text-shadow:
        0 0 18px rgba(212, 165, 116, 0.28),
        0 0 40px rgba(212, 165, 116, 0.14);
      animation: pulsePrepared 2.6s ease-in-out infinite;
    }

    .capture {
      width: min(520px, 100%);
      margin: 48px auto 0;
    }

    .capture-label {
      display: block;
      margin: 0 0 12px;
      color: var(--brand-gold-light);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .capture-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: end;
    }

    .capture-input {
      width: 100%;
      padding: 13px 0 12px;
      border: 0;
      border-bottom: 1px solid var(--border);
      background: transparent;
      color: var(--text-primary);
      font: 500 1.02rem/1.3 var(--font-sans);
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    .capture-input::placeholder {
      color: var(--text-muted);
    }

    .capture-input:focus {
      border-bottom-color: rgba(212, 165, 116, 0.88);
      box-shadow: inset 0 -1px 0 rgba(212, 165, 116, 0.88);
    }

    .capture-button {
      padding: 0 0 12px;
      border: 0;
      background: transparent;
      color: var(--brand-gold-light);
      font: 700 1rem/1 var(--font-sans);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 180ms ease, opacity 180ms ease, color 180ms ease;
    }

    .capture-button:hover,
    .capture-button:focus-visible {
      color: var(--text-primary);
      transform: translateY(-1px);
      outline: none;
    }

    .capture-note {
      min-height: 1.4em;
      margin: 12px 0 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    @keyframes glowGold {
      0%, 100% { transform: scale(0.98); opacity: 0.84; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @keyframes glowTeal {
      0%, 100% { transform: scale(1) translate3d(0, 0, 0); opacity: 0.7; }
      50% { transform: scale(1.1) translate3d(-2%, -2%, 0); opacity: 1; }
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.52; transform: scale(1.05); }
      50% { opacity: 0.82; transform: scale(1.11); }
    }

    @keyframes pulseText {
      0%, 100% { opacity: 0.92; }
      50% { opacity: 1; }
    }

    @keyframes pulsePrepared {
      0%, 100% {
        transform: scale(1);
        opacity: 0.86;
      }
      50% {
        transform: scale(1.035);
        opacity: 1;
      }
    }

    @media (max-width: 760px) {
      .page {
        padding: 20px 18px 26px;
      }

      .statement-1 {
        font-size: clamp(1.95rem, 6vw, 3.2rem);
      }

      .statement-2 {
        margin-top: 16px;
        font-size: clamp(1.7rem, 5.2vw, 2.8rem);
      }

      .capture {
        margin-top: 34px;
      }

      .capture-row {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .capture-button {
        justify-self: start;
      }
    }
  </style>
</head>
<body>
  <div class="field" aria-hidden="true"></div>
  <div class="rings" aria-hidden="true"></div>

  <main class="page">
    <section class="stage" aria-label="Antaeus coming soon">
      <div class="stack">
        <h1 class="statement-1">Your first sales go to market hire is going to fail.</h1>
        <p class="statement-2">Because you haven't the slightest clue what <span class="prepared">prepared</span> means.</p>

        <form class="capture" id="captureForm" autocomplete="on">
          <label class="capture-label" for="curiousEmail">Nervous?</label>
          <div class="capture-row">
            <input
              class="capture-input"
              id="curiousEmail"
              name="email"
              type="email"
              inputmode="email"
              autocomplete="email"
              placeholder="Leave your email"
              aria-label="Email"
            />
            <button class="capture-button" type="submit">Submit</button>
          </div>
          <p class="capture-note" id="captureNote" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/public-waitlist.js"></script>
  <script src="/js/analytics-site-config.js"></script>
  <script src="/js/analytics.js"></script>
</body>
</html>
