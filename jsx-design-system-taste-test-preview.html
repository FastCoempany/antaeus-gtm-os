<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antaeus Design-System Taste Test</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b14;
      --panel: #0b1020;
      --border: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --muted: #94a3b8;
      --gold: #d4a574;
      --red: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .preview-shell {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0));
    }

    .preview-shell__title {
      display: grid;
      gap: 4px;
    }

    .preview-shell__label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .preview-shell__name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .preview-shell__hint {
      font-size: 12px;
      color: var(--muted);
    }

    .preview-root {
      min-height: 0;
    }

    .preview-status {
      padding: 18px;
      font-size: 14px;
      color: var(--muted);
    }

    .preview-error {
      margin: 18px;
      padding: 16px;
      border: 1px solid rgba(239, 68, 68, 0.4);
      background: rgba(239, 68, 68, 0.08);
      border-radius: 14px;
    }

    .preview-error strong {
      display: block;
      margin-bottom: 8px;
      color: #fecaca;
    }

    .preview-error pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.5;
      color: #fee2e2;
    }
  </style>
</head>
<body>
  <div class="preview-shell">
    <div class="preview-shell__title">
      <div class="preview-shell__label">Preview Surface</div>
      <div class="preview-shell__name">Antaeus Design-System Taste Test</div>
      <div class="preview-shell__hint">This page mounts <code>jsx-design-system-taste-test.jsx</code> directly.</div>
    </div>
    <div class="preview-shell__hint">If this is opened from <code>file://</code>, use a local server if fetch is blocked.</div>
  </div>

  <div id="status" class="preview-status">Loading JSX taste test…</div>
  <div id="root" class="preview-root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    (async function mountTasteTest() {
      const status = document.getElementById("status");
      const rootNode = document.getElementById("root");

      try {
        const response = await fetch("./jsx-design-system-taste-test.jsx", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Failed to load JSX file: " + response.status + " " + response.statusText);
        }

        let source = await response.text();
        source = source.replace(
          /import\s*\{\s*useMemo\s*,\s*useState\s*\}\s*from\s*["']react["'];?/,
          "const { useMemo, useState } = React;"
        );
        source = source.replace(
          /export\s+default\s+function\s+DesignSystemTasteTest\s*\(/,
          "window.DesignSystemTasteTest = function DesignSystemTasteTest("
        );

        const transformed = Babel.transform(source, {
          presets: ["react"],
          filename: "jsx-design-system-taste-test.jsx",
        }).code;

        window.eval(transformed);

        const Component = window.DesignSystemTasteTest;
        if (!Component) {
          throw new Error("DesignSystemTasteTest was not attached to window.");
        }

        ReactDOM.createRoot(rootNode).render(React.createElement(Component));
        status.remove();
      } catch (error) {
        status.textContent = "Preview failed.";
        const panel = document.createElement("div");
        panel.className = "preview-error";
        panel.innerHTML = "<strong>Could not render jsx-design-system-taste-test.jsx</strong><pre></pre>";
        panel.querySelector("pre").textContent = String(error && error.stack ? error.stack : error);
        rootNode.replaceWith(panel);
      }
    })();
  </script>
</body>
</html>
