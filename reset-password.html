<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Antaeus GTM OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">ANTAEUS</div>
            <p class="auth-subtitle">Set your new password</p>
            
            <div id="loadingState" style="text-align:center;padding:24px 0;">
                <div class="spinner" style="display:inline-block;"></div>
                <p style="margin-top:12px;font-size:0.85rem;color:var(--text-muted);">Verifying your reset link…</p>
            </div>

            <div id="expiredState" class="hidden" style="text-align:center;padding:24px 0;">
                <p style="font-size:1.1rem;margin-bottom:12px;">⚠️ Link expired or invalid</p>
                <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:24px;">Password reset links are single-use and expire after 1 hour.</p>
                <a href="/forgot-password.html" class="btn btn-primary">Request a new link</a>
            </div>

            <form id="resetForm" class="hidden">
                <div class="form-group">
                    <label class="form-label" for="newPassword">New Password</label>
                    <input type="password" id="newPassword" class="form-input" placeholder="••••••••" required minlength="8" autocomplete="new-password">
                    <p class="form-hint">Must be at least 8 characters</p>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••" required minlength="8" autocomplete="new-password">
                </div>
                
                <div id="errorMessage" class="callout callout-danger mb-md hidden">
                    <span id="errorText"></span>
                </div>
                
                <div id="successMessage" class="callout callout-success mb-md hidden">
                    <strong>Password updated!</strong><br>
                    Redirecting you to sign in…
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg btn-block" id="submitBtn">
                    <span id="btnText">Update Password</span>
                    <div class="spinner hidden" id="btnSpinner"></div>
                </button>
            </form>
            
            <div class="auth-footer">
                Remember your password? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>
    
    <script src="js/analytics.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        function withTimeout(promise, ms) {
            return Promise.race([
                promise,
                new Promise(function(_, reject) {
                    setTimeout(function() { reject(new Error('Request timed out. Please check your internet connection and try again.')); }, ms);
                })
            ]);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!window.supabase || !window.supabase.createClient) {
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('expiredState').classList.remove('hidden');
                return;
            }

            var client = initSupabase();
            
            // Supabase processes the recovery token from the URL hash automatically.
            // Listen for the PASSWORD_RECOVERY event to know when session is ready.
            var recoveryDetected = false;
            
            client.auth.onAuthStateChange(function(event, session) {
                if (event === 'PASSWORD_RECOVERY') {
                    recoveryDetected = true;
                    document.getElementById('loadingState').classList.add('hidden');
                    document.getElementById('resetForm').classList.remove('hidden');
                }
            });

            // Fallback: if no recovery event after 5 seconds, check if we have a session anyway
            setTimeout(async function() {
                if (recoveryDetected) return;
                
                try {
                    var session = await auth.getSession();
                    if (session) {
                        // We have a session — allow password change
                        document.getElementById('loadingState').classList.add('hidden');
                        document.getElementById('resetForm').classList.remove('hidden');
                    } else {
                        // No session, no recovery token — link is expired/invalid
                        document.getElementById('loadingState').classList.add('hidden');
                        document.getElementById('expiredState').classList.remove('hidden');
                    }
                } catch(e) {
                    document.getElementById('loadingState').classList.add('hidden');
                    document.getElementById('expiredState').classList.remove('hidden');
                }
            }, 5000);
        });
        
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            var newPw = document.getElementById('newPassword').value;
            var confirmPw = document.getElementById('confirmPassword').value;
            var submitBtn = document.getElementById('submitBtn');
            var btnText = document.getElementById('btnText');
            var btnSpinner = document.getElementById('btnSpinner');
            var errorMessage = document.getElementById('errorMessage');
            var errorText = document.getElementById('errorText');
            var successMessage = document.getElementById('successMessage');
            
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');

            if (newPw !== confirmPw) {
                errorText.textContent = 'Passwords do not match.';
                errorMessage.classList.remove('hidden');
                return;
            }

            if (newPw.length < 8) {
                errorText.textContent = 'Password must be at least 8 characters.';
                errorMessage.classList.remove('hidden');
                return;
            }
            
            submitBtn.disabled = true;
            btnText.textContent = 'Updating…';
            btnSpinner.classList.remove('hidden');
            
            try {
                var { data, error } = await withTimeout(auth.updatePassword(newPw), 15000);
                if (error) throw error;
                
                successMessage.classList.remove('hidden');
                submitBtn.style.display = 'none';
                
                // Redirect to login after 2 seconds
                setTimeout(function() {
                    window.location.href = '/login.html';
                }, 2000);
            } catch (error) {
                errorText.textContent = error.message || 'Failed to update password. Please try again.';
                errorMessage.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Update Password';
                btnSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
