<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Antaeus GTM OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">ANTAEUS</div>
            <p class="auth-subtitle">Reset your password</p>
            
            <form id="resetForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="you@company.com" required autocomplete="email">
                    <p class="form-hint">We'll send you a link to reset your password</p>
                </div>
                
                <div id="errorMessage" class="callout callout-danger mb-md hidden">
                    <span id="errorText"></span>
                </div>
                
                <div id="successMessage" class="callout callout-success mb-md hidden">
                    <strong>Check your email!</strong><br>
                    We've sent you a password reset link.
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg btn-block" id="submitBtn">
                    <span id="btnText">Send Reset Link</span>
                    <div class="spinner hidden" id="btnSpinner"></div>
                </button>
            </form>
            
            <div class="auth-footer">
                Remember your password? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>
    
    <script src="js/analytics.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        function withTimeout(promise, ms) {
            return Promise.race([
                promise,
                new Promise(function(_, reject) {
                    setTimeout(function() { reject(new Error('Request timed out. Please check your internet connection and try again.')); }, ms);
                })
            ]);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!window.supabase || !window.supabase.createClient) {
                document.getElementById('errorText').textContent = 'Unable to connect. Check your internet and try again.';
                document.getElementById('errorMessage').classList.remove('hidden');
                document.getElementById('submitBtn').disabled = true;
                return;
            }
            initSupabase();
        });
        
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const successMessage = document.getElementById('successMessage');
            
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');
            submitBtn.disabled = true;
            btnText.textContent = 'Sending...';
            btnSpinner.classList.remove('hidden');
            
            try {
                const { data, error } = await withTimeout(auth.resetPassword(email), 10000);
                if (error) throw error;
                successMessage.classList.remove('hidden');
                submitBtn.style.display = 'none';
            } catch (error) {
                var msg = (error && error.message) ? error.message : '';
                var isConnectivityError = /timed out|network|failed to fetch|connect/i.test(msg);
                errorText.textContent = isConnectivityError ? 'Unable to connect. Check your internet and try again.' : (msg || 'Failed to send reset link');
                errorMessage.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Send Reset Link';
                btnSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
